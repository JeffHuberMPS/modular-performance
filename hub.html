<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MPS" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />

  <title>MPS — Modular Performance</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Saira+Condensed:ital,wght@0,600;0,700;1,900&display=swap" />

  <link rel="stylesheet" href="/shared/styles.css" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/shared/firebase.js"></script>
  <script src="/demo-data.js"></script>

  <style>
    :root { --shell-header-h: 56px; --shell-tabs-h: 60px; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    body { background: radial-gradient(120% 80% at 50% -10%, #15130c 0%, #0b0b0b 48%, #070707 100%); display: flex; flex-direction: column; min-height: 100dvh; }

    /* Header */
    .shell-header { flex: 0 0 auto; height: var(--shell-header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--space-lg); background: linear-gradient(180deg, rgba(24,22,16,1) 0%, rgba(10,10,10,1) 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -1px 0 rgba(201,160,32,0.28), 0 6px 18px rgba(0,0,0,0.5); position: relative; z-index: 30; }
    .shell-logo { display: flex; align-items: baseline; gap: 9px; cursor: pointer; }
    .logo-mps { font-family: 'Saira Condensed','Bebas Neue',sans-serif; font-style: italic; font-weight: 900; font-size: 2rem; letter-spacing: 0.04em; line-height: 1; background: linear-gradient(180deg, #ffffff 0%, #f6e9c2 26%, #C9A020 60%, #8a6d15 88%, #5c4708 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.6)); }
    .shell-logo .bar { align-self: center; width: 22px; height: 2px; background: linear-gradient(90deg, rgba(201,160,32,0.2), #C9A020 50%, rgba(192,192,192,0.7)); }
    .shell-logo small { font-family: 'Inter',sans-serif; font-size: 0.5rem; letter-spacing: 0.32em; text-transform: uppercase; color: #b9b09a; }

    .shell-right { display: flex; align-items: center; gap: 12px; }
    .theme-toggle { display: none; align-items: center; gap: 6px; background: linear-gradient(180deg, rgba(40,40,40,0.6), rgba(18,18,18,0.6)); border: 1px solid rgba(255,255,255,0.12); color: var(--text-dim); font-family: 'Bebas Neue',sans-serif; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 11px; border-radius: var(--radius-md); cursor: pointer; white-space: nowrap; transition: all var(--transition); }
    .theme-toggle:hover { color: var(--ns-yellow); border-color: rgba(201,160,32,0.5); }
    .theme-toggle .dot { width: 10px; height: 10px; border-radius: 50%; background: conic-gradient(#4ab3f4, #dc2626, #16a34a, #9b6bc9, #C9A020, #4ab3f4); }
    body.tier-mono .theme-toggle .dot { background: #888; }
    /* Tier badge / upgrade CTA next to the profile */
    .tier-badge { display: inline-flex; align-items: center; gap: 5px; font-family: 'Bebas Neue', sans-serif; font-size: 0.86rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 14px; border-radius: 999px; cursor: pointer; white-space: nowrap; transition: all var(--transition); text-decoration: none; line-height: 1; }
    .tier-badge--upgrade { background: linear-gradient(180deg, #e2c04a, #c49a1c); color: #1a1505; border: 1px solid rgba(201,160,32,0.65); box-shadow: 0 2px 10px rgba(201,160,32,0.35), inset 0 1px 0 rgba(255,255,255,0.35); font-weight: 700; }
    .tier-badge--upgrade:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 5px 16px rgba(201,160,32,0.5), inset 0 1px 0 rgba(255,255,255,0.35); }
    .tier-badge--premium { background: linear-gradient(180deg, rgba(201,160,32,0.16), rgba(201,160,32,0.05)); color: var(--ns-yellow); border: 1px solid rgba(201,160,32,0.5); cursor: default; }
    .tier-badge .tb-ico { font-size: 0.74rem; }

    .shell-user { display: flex; align-items: center; gap: 10px; cursor: pointer; position: relative; }
    .shell-avatar { width: 33px; height: 33px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #232323, #121212); border: 1px solid rgba(201,160,32,0.45); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 2px 6px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: var(--ns-yellow); overflow: hidden; flex-shrink: 0; }
    .shell-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .shell-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: #161616; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); min-width: 184px; box-shadow: 0 12px 32px rgba(0,0,0,0.6); z-index: 40; display: none; overflow: hidden; }
    .shell-dropdown.open { display: block; }
    .shell-dropdown__name { padding: 12px 16px 6px; font-size: 0.85rem; color: var(--text-primary); font-weight: 600; }
    .shell-dropdown__plan { padding: 0 16px 10px; font-size: 0.72rem; color: var(--text-dim); border-bottom: 1px solid var(--border-subtle); }
    .shell-dropdown__plan span { color: var(--ns-yellow); }
    .shell-dropdown__item { display: block; width: 100%; padding: 11px 16px; background: none; border: none; text-align: left; color: var(--text-primary); font-size: 0.85rem; font-family: inherit; cursor: pointer; transition: background var(--transition); }
    .shell-dropdown__item:hover { background: var(--card-bg); }
    .shell-dropdown__item--danger { color: #ef4444; }

    /* Tabs */
    .shell-tabs { flex: 0 0 auto; height: var(--shell-tabs-h); display: flex; gap: 9px; padding: 9px var(--space-lg); overflow-x: auto; overflow-y: hidden; background: linear-gradient(180deg, rgba(14,14,14,0.9), rgba(8,8,8,0.9)); border-bottom: 1px solid rgba(255,255,255,0.05); -webkit-overflow-scrolling: touch; scrollbar-width: none; position: relative; z-index: 20; }
    .shell-tabs::-webkit-scrollbar { display: none; }
    .shell-tab { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; min-width: 78px; padding: 6px 15px; background: linear-gradient(180deg, rgba(46,46,46,0.5) 0%, rgba(18,18,18,0.5) 100%); border: 1px solid rgba(255,255,255,0.09); border-radius: var(--radius-md); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 2px 6px rgba(0,0,0,0.35); color: var(--text-dim); font-family: 'Bebas Neue',sans-serif; font-size: 0.95rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; white-space: nowrap; transition: all var(--transition); position: relative; }
    .shell-tab__dot { width: 22px; height: 3px; border-radius: 2px; background: var(--accent, #888); opacity: 0.5; box-shadow: 0 0 6px var(--accent, transparent); transition: opacity var(--transition); }
    .shell-tab:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .shell-tab.active { color: #fff; border-color: color-mix(in srgb, var(--accent, #C9A020) 55%, rgba(255,255,255,0.2)); background: linear-gradient(180deg, color-mix(in srgb, var(--accent, #C9A020) 20%, rgba(34,34,34,0.6)) 0%, rgba(12,12,12,0.65) 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 0 16px color-mix(in srgb, var(--accent, #C9A020) 28%, transparent); }
    .shell-tab.active .shell-tab__dot { opacity: 1; }
    .shell-tab__lock { font-size: 0.6rem; opacity: 0.5; }
    .shell-tab.locked { opacity: 0.5; }

    /* Free/Medium = professional silver-gray + black with GOLD accent words and a thin
       gold wireframe outline. Clean desaturation only — NO sepia / old-photo wash. */
    /* Free/Medium: apps recolored to black + WHITE numbers + GOLD labels via applyFrameThemes
       (matches the home dashboard). */
    body.tier-mono .shell-tab__dot { filter: grayscale(1); opacity: 0.5; }
    body.tier-mono .shell-tab.active { border-color: rgba(201,160,32,0.5); background: linear-gradient(180deg, rgba(40,38,28,0.6), rgba(12,11,8,0.65)); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12); }
    body.tier-mono .tracker-title__bar { background: #C9A020 !important; box-shadow: none !important; }
    body.tier-mono .tracker-title__name { color: #d9c789 !important; }
    body.tier-mono .tier-banner { background: linear-gradient(180deg, rgba(201,160,32,0.10), rgba(201,160,32,0.04)) !important; }
    body.tier-mono .metric-card { border-color: rgba(201,160,32,0.30) !important; }
    body.tier-mono .metric-card::before { background: #bdbdbd !important; box-shadow: none !important; }
    body.tier-mono .metric-card__head .pip { background: #bdbdbd !important; box-shadow: none !important; }
    body.tier-mono .hl-lbl { color: #C9A020 !important; }
    body.tier-mono .mini__lbl { color: #a08f5e !important; }

    /* Uniform tracker title (shell-owned → identical for every tracker) */
    .tracker-title { flex: 0 0 auto; display: none; align-items: center; gap: 12px; padding: 13px var(--space-lg) 11px; border-bottom: 1px solid rgba(255,255,255,0.06); background: linear-gradient(180deg, rgba(16,16,16,0.6), rgba(8,8,8,0.6)); }
    .tracker-title.show { display: flex; }
    .tracker-title__bar { width: 4px; height: 22px; border-radius: 2px; background: var(--accent, #C9A020); box-shadow: 0 0 10px var(--accent, transparent); }
    .tracker-title__name { font-family: 'Saira Condensed','Bebas Neue',sans-serif; font-style: italic; font-weight: 900; font-size: 1.5rem; letter-spacing: 0.05em; color: #fff; line-height: 1; }

    /* Stage */
    .shell-stage { flex: 1 1 auto; position: relative; background: var(--ns-black); overflow: hidden; }
    .shell-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: var(--ns-black); opacity: 0; pointer-events: none; transition: opacity 0.1s ease; }
    .shell-frame.active { opacity: 1; pointer-events: auto; }
    .shell-loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--ns-black); z-index: 5; }
    .shell-loader.hidden { display: none; }

    /* Home dashboard */
    .home-view { position: absolute; inset: 0; overflow-y: auto; display: none; padding: 0; background: radial-gradient(130% 70% at 50% -5%, #14120b 0%, #0a0a0a 55%, #060606 100%); scroll-snap-type: y mandatory; scroll-behavior: smooth; }
    .home-view.active { display: block; }
    /* Two snap-screens: (1) calm hero, (2) all five systems at a glance */
    .home-screen { min-height: 100%; box-sizing: border-box; scroll-snap-align: start; scroll-snap-stop: always; padding: 26px var(--space-lg) 30px; display: flex; flex-direction: column; }
    .home-screen--hero { align-items: center; justify-content: center; text-align: center; position: relative; }
    .home-screen--systems { justify-content: center; }
    .home-scrollcue { position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%); background: transparent; border: 0; cursor: pointer; color: #8a8472; font-family: 'Bebas Neue',sans-serif; letter-spacing: 0.2em; font-size: 0.72rem; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 2px; animation: cueBounce 1.9s ease-in-out infinite; }
    .home-scrollcue:hover { color: #C9A020; }
    .home-scrollcue .cue-chev { font-size: 1.15rem; line-height: 0.5; }
    @keyframes cueBounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(5px); } }
    /* Compact card layout so all five systems fit one screen, zero scroll */
    /* 3-across, last 2 centered → only 2 rows, so all five fit with zero scroll */
    .home-screen--systems .home-section-label { text-align: center; margin: 0 0 14px; }
    .home-screen--systems .home-grid { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 26px; max-width: 1340px; width: 100%; }
    .home-screen--systems .metric-card { flex: 1 1 360px; max-width: 422px; padding: 17px 21px; }
    .home-screen--systems .metric-card:nth-child(5) { width: auto; }
    .home-screen--systems .metric-card__head { margin-bottom: 10px; }
    .home-screen--systems .metric-card__hl { margin: 0 0 12px; padding-bottom: 12px; }
    .home-screen--systems .hl-val { font-size: 1.9rem; }
    .home-screen--systems .mini-grid { gap: 12px 16px; }
    .home-screen--systems .mini__val { font-size: 1.15rem; }
    .home-screen--systems .mini-grid .mini:nth-child(n+5) { display: none; }
    @media (max-width: 640px) {
      .home-view { scroll-snap-type: y proximity; }                       /* gentle snap on phones — never traps */
      .home-screen { padding: 16px 13px 20px; }
      .home-hero { margin: 6px auto 18px; }
      .home-hero__score { font-size: 4.4rem; }
      .home-hero__score small { font-size: 1.6rem; }
      .home-screen--systems .home-section-label { margin: 0 0 10px; }
      .home-screen--systems .home-grid { gap: 11px; }
      .home-screen--systems .metric-card { flex: 1 1 44%; max-width: none; padding: 11px 13px; }
      .home-screen--systems .metric-card__title { font-size: 0.82rem; }
      .home-screen--systems .metric-card__open { display: none; }         /* whole tile is tappable */
      .home-screen--systems .metric-card__head { margin-bottom: 7px; }
      .home-screen--systems .metric-card__hl { margin: 0 0 8px; padding-bottom: 8px; }
      .home-screen--systems .hl-val { font-size: 1.5rem; }
      .home-screen--systems .mini-grid { gap: 6px 10px; }
      .home-screen--systems .mini__val { font-size: 1.02rem; }
      .home-screen--systems .mini__lbl { font-size: 0.55rem; }
      .home-screen--systems .mini-grid .mini:nth-child(n+5) { display: none; }   /* headline + all 4 stats per tile (matches desktop) */
    }
    /* Calm home: navigate via the cards + Back, not a top tab strip */
    .shell-tabs { display: none !important; }
    .home-hero { max-width: 760px; margin: 6px auto 32px; text-align: center; }
    .home-hero__score { font-family: 'Bebas Neue', sans-serif; font-size: 5.4rem; line-height: 1; color: #C9A020; letter-spacing: 0.02em; text-shadow: 0 0 24px rgba(201,160,32,0.35); }
    .home-hero__score small { font-size: 2rem; color: #6a6a6a; }
    .home-hero__label { font-size: 0.72rem; letter-spacing: 0.22em; color: #8a8a8a; text-transform: uppercase; margin-top: 4px; }
    .home-hero__today-h { font-size: 0.7rem; letter-spacing: 0.2em; color: #6a6a6a; text-transform: uppercase; margin: 28px 0 12px; }
    .today-item { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 430px; margin: 0 auto 9px; padding: 14px 16px; background: rgba(28,28,28,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; cursor: pointer; text-align: left; transition: border-color 0.15s, transform 0.15s; }
    .today-item:hover { border-color: rgba(201,160,32,0.5); transform: translateY(-1px); }
    .today-item__dot { width: 8px; height: 8px; border-radius: 50%; background: #C9A020; flex-shrink: 0; box-shadow: 0 0 8px rgba(201,160,32,0.6); }
    .today-item__txt { flex: 1; color: #e8e8e8; font-size: 0.92rem; }
    .today-item__go { color: #6a6a6a; font-size: 1rem; }
    .today-alldone { color: #C9A020; font-size: 0.95rem; letter-spacing: 0.03em; padding: 10px 0; }
    .back-home { background: transparent; border: 1px solid rgba(255,255,255,0.16); color: #cfcfcf; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 13px; border-radius: 8px; cursor: pointer; margin-right: 14px; font-family: inherit; }
    .back-home:hover { border-color: rgba(201,160,32,0.55); color: #fff; }
    .home-greeting { font-family: 'Bebas Neue',sans-serif; font-size: 1.9rem; letter-spacing: 0.04em; color: #fff; }
    .home-date { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
    .home-section-label { font-family: 'Bebas Neue',sans-serif; font-size: 0.85rem; letter-spacing: 0.22em; color: #8a8472; margin: 24px 2px 12px; }
    .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 44px; max-width: 924px; margin: 0 auto; }
    .metric-card:nth-child(5) { grid-column: 1 / -1; width: calc(50% - 22px); justify-self: center; }
    @media (max-width: 640px) { .home-grid { gap: 14px; } .metric-card:nth-child(5) { width: calc(50% - 7px); } }
    .metric-card { position: relative; overflow: hidden; cursor: pointer; background: linear-gradient(180deg, rgba(28,28,28,0.7) 0%, rgba(13,13,13,0.7) 100%); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-lg); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 22px rgba(0,0,0,0.4); padding: 20px 22px 22px; transition: transform 0.18s ease, border-color 0.18s ease; }
    .metric-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
    .metric-card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--accent) 50%, rgba(255,255,255,0.1)); }
    .metric-card__head { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .metric-card__head .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .metric-card__title { font-family: 'Bebas Neue',sans-serif; font-size: 1.05rem; letter-spacing: 0.14em; color: #e8e8e8; }
    .metric-card__open { margin-left: auto; color: #666; font-size: 0.72rem; letter-spacing: 0.08em; }
    .metric-card__hl { display: flex; align-items: baseline; gap: 10px; margin: 2px 0 18px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .hl-val { font-family: 'Saira Condensed','Bebas Neue',sans-serif; font-weight: 700; font-size: 2.7rem; line-height: 0.9; color: #fff; }
    .hl-lbl { font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 14px; }
    .mini__val { font-family: 'Saira Condensed','Bebas Neue',sans-serif; font-weight: 700; font-size: 1.55rem; line-height: 1; color: #fff; }
    .mini__lbl { font-size: 0.62rem; letter-spacing: 0.05em; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; }

    .shell-locked-panel { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--space-2xl); gap: 14px; z-index: 6; }
    .shell-locked-panel.show { display: flex; }
    .shell-locked-panel h2 { font-family: 'Bebas Neue',sans-serif; font-size: 1.8rem; color: var(--ns-white); letter-spacing: 0.04em; }
    .shell-locked-panel p { color: var(--text-dim); max-width: 320px; font-size: 0.9rem; }

    /* Tier tester (dev) */
    .tier-tester { position: fixed; left: 12px; bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 50; display: none; flex-direction: column; align-items: flex-start; gap: 6px; background: rgba(12,12,12,0.94); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 9px 11px; border: 1px solid rgba(201,160,32,0.3); border-radius: var(--radius-md); box-shadow: 0 8px 24px rgba(0,0,0,0.55); cursor: move; user-select: none; -webkit-user-select: none; touch-action: none; }
    .tier-tester button { cursor: pointer; touch-action: auto; }
    .tester-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; width: 100%; }
    .tester-head__title { font-size: 0.56rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); }
    .tester-collapse { background: transparent; border: 0; color: #8a8472; cursor: pointer; font-size: 0.78rem; line-height: 1; padding: 2px 4px; font-family: inherit; }
    .tester-collapse:hover { color: #C9A020; }
    .tester-body { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; width: 100%; }
    .tier-tester.collapsed .tester-body { display: none; }
    .tier-tester.show { display: flex; }
    /* Dev tools are DESKTOP-ONLY for the owner — never on phones / the installed mobile app */
    @media (max-width: 768px) { .tier-tester, .tier-tester.show { display: none !important; } }
    .tier-tester__label { font-size: 0.56rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); }
    .tier-tester__row { display: flex; gap: 6px; }
    .tier-opt { background: linear-gradient(180deg, #222, #161616); border: 1px solid rgba(255,255,255,0.1); color: var(--text-dim); font-family: 'Bebas Neue',sans-serif; font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); }
    .tier-opt:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.25); }
    .tier-opt.active { color: var(--ns-yellow); border-color: var(--ns-yellow); background: linear-gradient(180deg, rgba(201,160,32,0.16), rgba(201,160,32,0.04)); }

    @media (display-mode: standalone) { .shell-header { padding-top: env(safe-area-inset-top); height: calc(var(--shell-header-h) + env(safe-area-inset-top)); } }
  </style>
</head>

<body>

  <header class="shell-header">
    <div class="shell-logo" onclick="selectTab('home')">
      <span class="logo-mps">MPS</span><span class="bar"></span><small>Modular Performance</small>
    </div>

  <script>
    const APPS = [
      { id: 'workout',  label: 'Workout',  title: 'Workout Tracker', path: '/apps/workout/',  accent: '#4ab3f4' },
      { id: 'habits',   label: 'Habits',   title: 'Habit Tracker',   path: '/apps/habits/',   accent: '#dc2626' },
      { id: 'sleep',    label: 'Recovery', title: 'Rest & Recovery', path: '/apps/sleep/',    accent: '#9b6bc9' },
      { id: 'expenses', label: 'Expenses', title: 'Expense Tracker', path: '/apps/expenses/', accent: '#16a34a' },
      { id: 'journal',  label: 'Journal',  title: 'Journal',         path: '/apps/journal/',  accent: '#c9a86b' }
    ];
    const NAV = [{ id: 'home', label: 'Home', accent: '#C9A020' }].concat(APPS);

    const TIER_FEATURES = {
      workout:  { free:'Log freely · PRs & stats locked', medium:'Everything unlocked · last 60 days of history', all:'Everything + full history + colorful theme' },
      habits:   { free:'Log all habits free · insights locked', medium:'Everything unlocked · last 60 days of history', all:'Everything + full history + colorful theme' },
      sleep:    { free:'Log freely · insights locked', medium:'Everything unlocked · last 60 days of history', all:'Everything + full history + colorful theme' },
      expenses: { free:'Log freely · insights locked', medium:'Everything unlocked · last 60 days of history', all:'Everything + full history + colorful theme' },
      journal:  { free:'Locked · unlocks with Elite', medium:'Unlocked · last 60 days of history', all:'Upgraded journal + full history + colorful theme' }
    };
    const TIER_LABEL = { free: 'Core', medium: 'Elite', all: 'Premium' };
    // Aspirational Premium pitches (per app) for the header upsell — benefit-led, what they're missing.
    const PREMIUM_PITCH = {
      workout:  'PR tracking · Strength-Score trends · 6-week auto-load plan — train with a blueprint.',
      habits:   'Compound view · strength & streak scores · 5 habits/block — see what’s actually sticking.',
      sleep:    'Recovery Score · 7-day charts · wearable sync (HRV/RHR) — recover with your own data.',
      expenses: 'Budget alerts · auto-tagging rules · insights (top merchants, biggest buys, YTD net).',
      journal:  'Weekly & monthly check-ins · full entry archive · guided prompts — reflect on your whole journey.'
    };
    // Normalize every tier spelling used across the codebase (single/duo/trio/all-access,
    // Free/Medium/All-Access, Core/Elite/Premium) into the hub's internal free|medium|all.
    function normTier(t) {
      t = String(t || '').toLowerCase();
      if (['all', 'allaccess', 'all-access', 'premium'].includes(t)) return 'all';
      if (['medium', 'elite', 'duo', 'trio'].includes(t))            return 'medium';
      return 'free';   // single, free, core, none, unknown
    }
    const DEV_EMAILS = ['jeffreyhuber86@gmail.com'];
    // ── Beta / VIP access link ──────────────────────────────────
    // Share  …/hub.html?beta=mps-vip-2026  with chosen testers → full Premium, free, on that
    // device (sticks until they clear browser data). Change the code below to revoke everyone.
    // ONE shared free-Premium beta link — give the same link to everyone. The link only
    // unlocks Premium; each tester signs in with their OWN Firebase account, which is what
    // separates their personal data. Grants Premium only; never carries the owner's private
    // back-end (Make.com/bank webhook). Change this code to revoke the link for everyone.
    const BETA_CODE = 'mps-beta-2026';
    (function(){ try { const b = new URLSearchParams(location.search).get('beta'); if (b && b === BETA_CODE) localStorage.setItem('mps_beta', BETA_CODE); } catch(e){} })();
    const IS_BETA = (()=>{ try { return localStorage.getItem('mps_beta') === BETA_CODE; } catch(e){ return false; } })();

    let unlockedApps = APPS.map(a => a.id);
    const APP_VERSION = '203';   // bump each deploy — forces fresh tracker iframes (defeats stale browser cache)
    let currentTier = 'all';
    // All-Access ALWAYS starts in full COLOR; the toggle switches to Dark/Gray for the session only.
    let themePref = 'color';
    let activeId = null;

    function ymd(d) { const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }
    function daysAgo(n) { const d=new Date(); d.setDate(d.getDate()-n); return d; }

    /* ── Theme (Free/Medium forced gray; All-Access toggles) ── */
    function applyTheme() {
      const mono = (currentTier !== 'all') || (themePref === 'mono');
      document.body.classList.toggle('tier-mono', mono);
      document.body.classList.toggle('tier-core', currentTier === 'free');   // Core-only feature locks
      document.body.classList.toggle('tier-premium', currentTier === 'all');  // Premium-only: full history (apps cap others to 60 days). Independent of the gray theme toggle.
      const tg = document.getElementById('theme-toggle');
      tg.style.display = (currentTier === 'all') ? 'inline-flex' : 'none';
      document.getElementById('theme-toggle-label').textContent = (themePref === 'mono') ? 'Black & Gold' : 'Colorful';
      applyFrameThemes();
    }
    /* In gray mode, recolor variable-driven apps (Workout, Expenses) to black + gold + white. */
    function applyFrameThemes() {
      const gray = document.body.classList.contains('tier-mono');
      const core = document.body.classList.contains('tier-core');
      const prem = document.body.classList.contains('tier-premium');
      // Vanilla apps (Workout, Expenses): instant theme class; reload only when the Core flag
      // flips (so Core feature-locks re-read at load). Core flips are rare (dev tester only).
      ['workout', 'expenses'].forEach(id => {
        try {
          const f = document.getElementById('frame-' + id);
          if (f && f.contentDocument && f.contentDocument.body) {
            f.contentDocument.body.classList.toggle('mps-gray', gray);
            f.contentDocument.body.classList.toggle('mps-core', core);
          }
          if (f && f.src) {
            // Reload on gray OR core change so the app's load-time __GRAY flag re-evaluates
            // (its JS bakes gray/blue accents at load; a class toggle alone won't update them).
            const want = (gray ? '1' : '0') + (core ? 'C' : 'N') + (prem ? 'P' : 'F'), have = f.getAttribute('data-core');
            if (have == null) f.setAttribute('data-core', want);
            else if (have !== want) { f.setAttribute('data-core', want); f.src = f.src; }
          }
        } catch (e) {}
      });
      /* React apps (Habits, Journal, Sleep) read theme + tier at load — reload when either flips. */
      ['habits', 'journal', 'sleep'].forEach(id => {
        const f = document.getElementById('frame-' + id);
        if (!f || !f.src) return;
        const want = (gray ? '1' : '0') + (core ? 'C' : 'N') + (prem ? 'P' : 'F'), have = f.getAttribute('data-gray');
        if (have == null) f.setAttribute('data-gray', want);
        else if (have !== want) { f.setAttribute('data-gray', want); f.src = f.src; }
      });
    }
    function toggleTheme() {
      themePref = (themePref === 'mono') ? 'color' : 'mono';
      applyTheme();
      showToast(themePref === 'mono' ? 'Black & Gold theme' : 'Colorful theme');
    }

    /* ── Tabs ─────────────────────────────────────────────── */
    function buildTabs() {
      const strip = document.getElementById('tab-strip');
      strip.innerHTML = '';
      NAV.forEach(item => {
        const tab = document.createElement('button');
        tab.className = 'shell-tab';
        tab.id = 'tab-' + item.id;
        tab.style.setProperty('--accent', item.accent);
        tab.innerHTML = '<span class="shell-tab__dot"></span><span>' + item.label + '</span>';
        tab.addEventListener('click', () => selectTab(item.id));
        strip.appendChild(tab);
      });
    }

    function selectTab(id) {
      activeId = id;
      document.querySelectorAll('.shell-tab').forEach(t => t.classList.toggle('active', t.id === 'tab-' + id));
      const homeView = document.getElementById('home-view');
      const lockedPanel = document.getElementById('locked-panel');
      const titleBar = document.getElementById('tracker-title');
      document.querySelectorAll('.shell-frame').forEach(f => f.classList.remove('active'));
      lockedPanel.classList.remove('show');
      document.getElementById('stage-loader').classList.add('hidden');

      if (id === 'home') {
        homeView.classList.add('active');
        titleBar.classList.remove('show');
        updateTierBanner();
        loadDashboard();
        maybeCleanupFrames();   // phone: free the app frames while sitting on Home → smooth
        return;
      }
      homeView.classList.remove('active');
      const app = APPS.find(a => a.id === id);
      if (!app) return;

      titleBar.style.setProperty('--accent', app.accent);
      document.getElementById('tracker-title-name').textContent = app.title;
      titleBar.classList.add('show');
      updateTierBanner();

      if (!unlockedApps.includes(id)) {
        document.getElementById('locked-title').textContent = app.label.toUpperCase() + ' Locked';
        lockedPanel.classList.add('show');
        return;
      }

      const existing = document.getElementById('frame-' + id);
      const warm = existing && existing.dataset.loaded === '1';
      if (warm) document.getElementById('stage-loader').classList.add('hidden');
      else document.getElementById('stage-loader').classList.remove('hidden');
      const frame = ensureFrame(app);
      frame.classList.add('active');
      maybeCleanupFrames();   // phone: free the OTHER app frames → only the active app stays in RAM
    }

    /* Create an app's iframe once and keep it persistent. Pre-warming these in the background after the
       hub loads makes the first tap instant — no cold network/Firebase/render lag when switching. */
    function ensureFrame(app) {
      let frame = document.getElementById('frame-' + app.id);
      if (frame) return frame;
      frame = document.createElement('iframe');
      frame.className = 'shell-frame';
      frame.id = 'frame-' + app.id;
      frame.setAttribute('title', app.label);
      frame.setAttribute('loading', 'lazy');
      frame.dataset.loaded = '0';
      frame.addEventListener('load', () => {
        frame.dataset.loaded = '1';
        try {
          const d = frame.contentDocument;
          if (d) {
            /* Load Inter into the app frame so the override below has the font available. */
            const fl = d.createElement('link'); fl.rel = 'stylesheet';
            fl.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap';
            d.head.appendChild(fl);
            let css = 'a[href="/hub.html"]{display:none!important}'
                    + '#mps-hub-nav,#hub-nav,.nav-title{display:none!important}'
                    + '.brand-block,.mps-header{display:none!important}'
                    + '*:has(> .mps-logo-rsp){display:none!important}'
                    + 'body{padding-top:0!important}'
                    /* Smooth, contained scrolling: stop the iframe scroll from chaining into the locked
                       hub shell (the "freezes when you scroll back up" symptom) + native momentum. */
                    + 'html,body{overscroll-behavior:none!important;-webkit-overflow-scrolling:touch!important;}'
                    /* Uniform font across every tracker (skip <i>/icon elements to keep icon fonts). */
                    + 'body, body *:not(i):not([class*="icon"]):not([class*="ti-"]), svg text, svg tspan, text, tspan { font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif !important; font-style: normal !important; }';
            if (app.id === 'journal') css += 'nav:first-of-type{display:none!important}';
            const s = d.createElement('style'); s.textContent = css; d.head.appendChild(s);
          }
        } catch (e) {}
        // FIX FROZEN SCROLL ON SECONDARY TABS: a tab that was display:none at load doesn't get a fresh
        // scroll layer when shown, and the scroll position isn't reset — so it sticks. Same-origin lets us
        // attach directly: when a click changes the content height (a tab switch), reset scroll to top and
        // re-init the scroll layer so up/down both work. Only fires on real content changes — normal taps are untouched.
        try {
          const idoc = frame.contentDocument, iwin = frame.contentWindow;
          if (idoc && iwin && !idoc.__mpsScrollFix) {
            idoc.__mpsScrollFix = true;
            const TAB_SEL = '[data-tab],.tab,.tabs button,.seg,.seg-btn,.segment,[role="tab"],.view-tab,.subtab,.nav-pill,.toggle-btn';
            // habits/sleep/journal render bare <button>s (no class) for tabs → also detect a small row of
            // sibling nav buttons near the top of the page as a tab bar.
            const looksLikeTabBar = (el) => {
              const b = el.closest && el.closest('button,a,[role="button"]'); if (!b) return false;
              const p = b.parentElement; if (!p) return false;
              const sib = Array.from(p.children).filter(c => /^(BUTTON|A)$/.test(c.tagName));
              return sib.length >= 2 && sib.length <= 8 && p.getBoundingClientRect().top < 210;
            };
            idoc.addEventListener('click', (ev) => {
              const tabish = (ev.target.closest && ev.target.closest(TAB_SEL)) || looksLikeTabBar(ev.target);
              const h0 = idoc.body.scrollHeight;
              iwin.setTimeout(() => {
                const h1 = idoc.body.scrollHeight;
                const changed = Math.abs(h1 - h0) > 40;          // a panel swapped in/out
                if ((tabish && changed) || h1 < h0 - 40) {       // tab switch w/ content change, OR shrank (the stuck case)
                  const se = idoc.scrollingElement || idoc.documentElement;
                  se.scrollTop = 0;                              // land at the TOP of the new tab
                  const b = idoc.body, o = b.style.overflowY;    // re-init the scroll layer so up + down both work
                  b.style.overflowY = 'hidden'; void b.offsetHeight; b.style.overflowY = o || '';
                }
              }, 60);
            }, true);
          }
        } catch (e) {}
        if (activeId === app.id) document.getElementById('stage-loader').classList.add('hidden');   // only the visible frame controls the loader
        applyFrameThemes();
      });
      frame.src = app.path + (app.path.indexOf('?') >= 0 ? '&' : '?') + 'v=' + APP_VERSION;
      document.getElementById('stage').appendChild(frame);
      return frame;
    }

    let _prewarmed = false;
    /* GENTLE, SEQUENTIAL prewarm. Booting all five app frames at once spiked a phone's memory and
       main thread and froze scrolling. Instead, load ONE frame at a time — each scheduled on idle
       (so it never runs mid-scroll), only after the previous one finished loading plus a short breath.
       The phone is never asked to boot more than one app at a time, so scrolling stays buttery, and
       the frames still end up warm for instant switching. */
    function prewarmFrames() {
      // Safety re-renders so Home catches up to cloud data on a fresh device (storage event also handles this).
      [3000, 7000, 13000].forEach(ms => setTimeout(() => { if (activeId === 'home') loadDashboard(); }, ms));
      const queue = APPS.filter(a => unlockedApps.includes(a.id));
      const idle = (cb) => ('requestIdleCallback' in window) ? requestIdleCallback(cb, { timeout: 4000 }) : setTimeout(cb, 700);
      let n = 0;
      function loadNext() {
        if (n >= queue.length) return;
        const app = queue[n++];
        idle(() => {
          let f = null;
          try { f = ensureFrame(app); } catch (e) {}
          let advanced = false;
          const advance = () => { if (advanced) return; advanced = true; setTimeout(loadNext, 600); };   // breath between apps
          // Keep EVERY frame warm (don't unload) → tapping an app is instant. The scroll-jank causes
          // (fixed background, header blur) were fixed in v196, so warm frames no longer hurt scrolling.
          if (f && f.dataset.loaded !== '1') { f.addEventListener('load', advance, { once: true }); setTimeout(advance, 5000); }
          else advance();
        });
      }
      loadNext();
    }

    function maybeCleanupFrames() { /* no-op: frames stay warm on every device for instant switching */ }

    /* ── Dashboard ────────────────────────────────────────── */
    function setMini(id, i, value, label) {
      const v = document.getElementById('m-' + id + '-' + i + '-v'), l = document.getElementById('m-' + id + '-' + i + '-l');
      if (v) v.textContent = value; if (l) l.textContent = label;
    }
    function setCardMetrics(id, metrics) {
      const hv = document.getElementById('m-' + id + '-h-v'), hl = document.getElementById('m-' + id + '-h-l');
      const h = metrics[0] || ['0', ''];
      if (hv) hv.textContent = h[0]; if (hl) hl.textContent = h[1];
      const grid = document.getElementById('mini-grid-' + id);
      if (!grid) return;
      grid.innerHTML = metrics.slice(1).map(m => {
        const v = (m && m[0] != null) ? m[0] : '0', l = (m && m[1] != null) ? m[1] : '';
        return '<div class="mini"><div class="mini__val">' + v + '</div><div class="mini__lbl">' + l + '</div></div>';
      }).join('');
    }
    function buildDashCards() {
      const grid = document.getElementById('home-grid'); grid.innerHTML = '';
      APPS.forEach(app => {
        const c = document.createElement('div');
        c.className = 'metric-card'; c.style.setProperty('--accent', app.accent); c.onclick = () => selectTab(app.id);
        let minis = '';
        for (let i = 0; i < 4; i++) minis += '<div class="mini"><div class="mini__val">0</div><div class="mini__lbl"></div></div>';
        c.innerHTML = '<div class="metric-card__head"><span class="pip"></span><span class="metric-card__title">' + app.label.toUpperCase() + '</span><span class="metric-card__open">Open ›</span></div>'
          + '<div class="metric-card__hl"><span class="hl-val" id="m-'+app.id+'-h-v">0</span><span class="hl-lbl" id="m-'+app.id+'-h-l"></span></div>'
          + '<div class="mini-grid" id="mini-grid-'+app.id+'">' + minis + '</div>';
        grid.appendChild(c);
      });
    }
    let dashLoaded = false;
    async function loadDashboard() {
      const hour = new Date().getHours();
      const part = hour < 12 ? 'morning' : hour < 18 ? 'afternoon' : 'evening';
      const name = (firebase.auth().currentUser?.displayName || 'Jeff').split(' ')[0];
      document.getElementById('home-greeting').textContent = 'Good ' + part + ', ' + name;
      document.getElementById('home-date').textContent = new Date().toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });
      const uid = firebase.auth().currentUser?.uid;
      if (!uid) return;
      const today = new Date(), todayKey = ymd(today), monthPrefix = todayKey.slice(0,7);
      const sig = { habitsDone:0, habitsTotal:15, workout:false, sleep:false, journal:false, expense:false };
      /* All five trackers persist to localStorage (same origin → shared with the hub).
         Read the SAME source the apps write, so REAL logging updates the Home — not just demo data. */
      const sget = (key) => { try { const v = localStorage.getItem(key); return v != null ? JSON.parse(v) : null; } catch(e){ return null; } };

      try {
        const days = (sget('mps_v3_history') || []).filter(d => d && d.date);
        /* All-time Strength Score — matches the Workout app exactly: total volume / total sets (raw). */
        let vol=0, sets=0;
        days.forEach(h => {
          if (!Array.isArray(h.detail)) return;
          const skills = new Set(h.skills || []);
          h.detail.forEach(ex => {
            if (skills.has(ex.blockName)) return;
            (ex.sets||[]).forEach(s => {
              if (!s || !s.done) return;
              const w = parseFloat(s.weight)||0, r = parseFloat(s.reps)||0;
              if (w<=0 && r<=0) return;
              vol += w*r; sets += 1;
            });
          });
        });
        const strength = sets>0 ? Math.round(vol/sets) : 0;
        const set = new Set(days.map(d => d.date));
        sig.workout = set.has(todayKey);
        let week=0; for (let i=0;i<7;i++) if (set.has(ymd(daysAgo(i)))) week++;
        let streak=0; for (let i=0;;i++){ if (set.has(ymd(daysAgo(i)))) streak++; else break; }
        const month = days.filter(d => (d.date||'').startsWith(monthPrefix)).length;
        setCardMetrics('workout', [[String(strength),'avg strength'], [week+' / 10','this week'], [String(streak),'day streak'], [String(month),'this month'], [String(days.length),'total logged']]);
      } catch(e){ setCardMetrics('workout', []); }

      try {
        /* Habits store under users/{uid}/app_storage/{habits_v4, blocks_v4} (NOT habit_logs). */
        const hlog = sget('habits_v4') || {};   // { dateKey: { habitId: bool } }
        const blocks = sget('blocks_v4') || {
          MRN: { habits: [{id:'h_wake'},{id:'h_gymtr'},{id:'h_breath'},{id:'h_read'},{id:'h_cold'}] },
          WRK: { habits: [{id:'h_mind'},{id:'h_course'},{id:'h_outr'},{id:'h_chess'},{id:'h_auto'}] },
          NGT: { habits: [{id:'h_journ'},{id:'h_pray'},{id:'h_bible'},{id:'h_guit'},{id:'h_sleep'}] }
        };
        const blockIds = bk => (blocks[bk] && blocks[bk].habits ? blocks[bk].habits : []).map(h => h.id);
        const dates = Object.keys(hlog);
        const n = dates.length;
        const sum = { MRN:0, WRK:0, NGT:0, ALL:0 };
        dates.forEach(dk => {
          const day = hlog[dk] || {};
          ['MRN','WRK','NGT'].forEach(bk => blockIds(bk).forEach(id => { if (day[id]) sum[bk]++; }));
          sum.ALL += Object.values(day).filter(Boolean).length;
        });
        const avg = x => n ? Math.round(x/n*10)/10 : 0;
        const todayDone = Object.values(hlog[todayKey] || {}).filter(Boolean).length;
        sig.habitsDone = todayDone; sig.habitsTotal = (blockIds('MRN').length+blockIds('WRK').length+blockIds('NGT').length) || 15;
        setCardMetrics('habits', [
          [avg(sum.ALL)+' / 15','avg per day'],
          [avg(sum.MRN)+' / 5','avg morning'],
          [String(n),'days logged'],
          [avg(sum.WRK)+' / 5','avg work'],
          [String(todayDone)+' / 15','done today'],
          [avg(sum.NGT)+' / 5','avg night']
        ]);
      } catch(e){ setCardMetrics('habits', []); }

      try {
        const logs = Object.keys(localStorage)
          .filter(k => k.indexOf('rr_sleep:') === 0 && k !== 'rr_sleep:wearable_interest')
          .map(k => sget(k)).filter(Boolean)
          .sort((a,b) => (b.date||'').localeCompare(a.date||''))
          .slice(0,30);
        sig.sleep = logs.some(l => l.date === todayKey);
        const calcHours = (sl, wk) => { if(!sl||!wk) return 0; const a=sl.split(':').map(Number), b=wk.split(':').map(Number); let m=b[0]*60+b[1]-(a[0]*60+a[1]); if(m<0)m+=1440; return m/60; };
        const durs = logs.map(l => calcHours(l.sleepTime, l.wakeTime)).filter(h => h > 0);
        const avgDur = durs.length ? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length*10)/10 : null;
        const latest = logs[0];
        const e7 = logs.slice(0,7).map(l=>Number(l.energy)).filter(n=>!isNaN(n));
        const avgE = e7.length ? Math.round(e7.reduce((a,b)=>a+b,0)/e7.length*10)/10 : null;
        setCardMetrics('sleep', [
          [(avgDur!=null ? avgDur : 0)+'H','avg duration'],
          [(latest&&latest.energy!=null ? latest.energy : 0)+' / 10','last energy'],
          [(latest&&latest.soreness!=null ? latest.soreness : 0)+' / 10','last soreness'],
          [(avgE!=null ? avgE : 0)+' / 10','avg energy 7d'],
          [String(logs.length),'entries (30d)']
        ]);
      } catch(e){ setCardMetrics('sleep', []); }

      try {
        const entries = (sget('mps_expense:entries') || []).filter(e => e && e.date);
        // Match the Expense app exactly (v156): every outflow is spend (incl. transfers/investments);
        // only Income/Paycheck are excluded, and amounts are summed as absolute values.
        const purch = entries.filter(e => e.item !== 'Income' && e.item !== 'Paycheck');
        const amt = e => { const a = Math.abs(Number(e.amount)); return isNaN(a) ? 0 : a; };
        const monthP = purch.filter(e => (e.date||'').startsWith(monthPrefix));
        let total=0; monthP.forEach(e => total += amt(e));
        const txns = monthP.length;
        const avg = today.getDate() ? total/today.getDate() : 0;
        const wkStart = ymd(daysAgo(6));
        let wkSpend=0; purch.forEach(e => { if ((e.date||'') >= wkStart) wkSpend += amt(e); });
        let todaySpend=0; purch.forEach(e => { if (e.date === todayKey) todaySpend += amt(e); });
        sig.expense = purch.some(e => e.date === todayKey);
        const daysLogged = new Set(monthP.map(e => e.date)).size;
        setCardMetrics('expenses', [
          ['$'+Math.round(avg).toLocaleString(),'avg / day'],
          ['$'+Math.round(todaySpend).toLocaleString(),'today'],
          ['$'+Math.round(total).toLocaleString(),'this month'],
          [String(txns),'transactions'],
          ['$'+Math.round(wkSpend).toLocaleString(),'this week'],
          [String(daysLogged),'days logged']
        ]);
      } catch(e){ setCardMetrics('expenses', []); }

      try {
        const jmap = sget('mps_jnl_' + uid + '_journal_v1') || {};
        const dateList = Object.keys(jmap).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse();
        const set = new Set(dateList);
        sig.journal = set.has(todayKey);
        let streak=0; for (let i=0;;i++){ if (set.has(ymd(daysAgo(i)))) streak++; else break; }
        const month = dateList.filter(d => d.startsWith(monthPrefix)).length;
        let lastAgo = '0';
        if (dateList[0]) { for (let i=0;i<365;i++){ if (dateList[0] === ymd(daysAgo(i))) { lastAgo = i===0?'today': i===1?'1d ago' : i+'d ago'; break; } } }
        let week=0; for (let i=0;i<7;i++) if (set.has(ymd(daysAgo(i)))) week++;
        let best=0, run=0; for (let i=364;i>=0;i--){ if (set.has(ymd(daysAgo(i)))) { run++; if(run>best) best=run; } else run=0; }
        setCardMetrics('journal', [[String(streak),'day streak'], [String(month),'this month'], [String(dateList.length),'total entries'], [lastAgo,'last entry'], [String(week),'this week'], [String(best),'best streak']]);
      } catch(e){ setCardMetrics('journal', []); }

      /* ── Calm home: Discipline Score + today's 3 things ── */
      try {
        const hPct = sig.habitsTotal>0 ? sig.habitsDone/sig.habitsTotal*100 : 0;
        const score = Math.round((hPct + (sig.workout?100:0) + (sig.sleep?100:0) + (sig.journal?100:0))/4);
        const todos = [];
        const left = Math.max(0, sig.habitsTotal - sig.habitsDone);
        if (left>0) todos.push(['Finish your habits — '+left+' left','habits']);
        if (!sig.workout) todos.push(['Log a workout','workout']);
        if (!sig.sleep) todos.push(['Log last night’s sleep','sleep']);
        if (!sig.journal) todos.push(['Write your journal','journal']);
        if (!sig.expense) todos.push(['Log your spending','expenses']);
        const top = todos.slice(0,3);
        const list = top.length
          ? top.map(t => '<button class="today-item" onclick="selectTab(\''+t[1]+'\')"><span class="today-item__dot"></span><span class="today-item__txt">'+t[0]+'</span><span class="today-item__go">›</span></button>').join('')
          : '<div class="today-alldone"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><polyline points="20 6 9 17 4 12"/></svg>All your disciplines are done today. Well done.</div>';
        const hero = document.getElementById('home-hero');
        if (hero) hero.innerHTML =
          '<div class="home-hero__score">'+score+'<small>%</small></div>'
          + '<div class="home-hero__label">Discipline · Today</div>'
          + '<div class="home-hero__today-h">Today’s focus</div>'
          + list;
      } catch(e){}
      if (!_prewarmed) { _prewarmed = true; prewarmFrames(); }   // warm all app frames in the background → instant tab switches
    }

    /* ── User menu ────────────────────────────────────────── */
    document.getElementById('user-trigger').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('user-dropdown').classList.toggle('open'); });
    document.addEventListener('click', () => document.getElementById('user-dropdown').classList.remove('open'));
    function signOutUser() { firebase.auth().signOut().then(() => location.href = '/auth.html').catch(() => showToast('Sign-out failed.')); }
    /* "Install App" menu item: fire the install prompt on demand; auto-hide once the app is installed. */
    function mpsInstallApp(e) { if (e) e.stopPropagation(); document.getElementById('user-dropdown').classList.remove('open'); if (window.MPS_promptInstall) window.MPS_promptInstall(); }
    function refreshInstallMenu() { const b = document.getElementById('dd-install'); if (!b) return; const installed = window.MPS_isInstalled ? window.MPS_isInstalled() : false; b.style.display = installed ? 'none' : 'block'; }
    document.addEventListener('mps-install-state', refreshInstallMenu);
    window.addEventListener('load', refreshInstallMenu);
    function renderUser(name, email, photoURL, planLabel) {
      document.getElementById('dd-name').textContent = name || 'User';
      document.getElementById('dd-plan').textContent = planLabel || '—';
      const avatar = document.getElementById('user-avatar');
      if (photoURL) avatar.innerHTML = '<img src="' + photoURL + '" alt="">';
      else avatar.textContent = (name || 'U').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    }
    let toastTimer = null;
    function showToast(msg) { const t = document.getElementById('shell-toast'); t.textContent = msg; t.classList.add('show'); if (toastTimer) clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 3000); }

    /* ── Tier preview (dev) ───────────────────────────────── */
    function previewTier(tier) {
      currentTier = tier;
      document.querySelectorAll('.tier-opt').forEach(b => b.classList.toggle('active', b.dataset.tier === tier));
      document.getElementById('dd-plan').textContent = TIER_LABEL[tier];
      applyTheme();
      updateTierBanner();
      updateTierBadge();
      showToast('Previewing ' + TIER_LABEL[tier] + ' tier');
    }

    /* ── Sample / demo data (dev) ─────────────────────────── */
    function _demoBusy(on) {
      ['demo-load','demo-clear'].forEach(id => { const b = document.getElementById(id); if (b) b.disabled = on; });
    }
    async function demoLoad() {
      if (!window.MPS_DEMO) return showToast('Demo loader not ready');
      _demoBusy(true); showToast('Loading 2 weeks of sample data…');
      try { await MPS_DEMO.load(); showToast('Sample data loaded — refreshing…'); setTimeout(() => location.reload(), 700); }
      catch (e) { console.error(e); _demoBusy(false); showToast('Load failed: ' + (e && e.message || e)); }
    }
    async function demoClear() {
      if (!window.MPS_DEMO) return showToast('Demo loader not ready');
      _demoBusy(true); showToast('Clearing sample data…');
      try { const r = await MPS_DEMO.clear(); showToast(r && r.cleared ? 'Sample data cleared — refreshing…' : 'No sample data to clear'); setTimeout(() => location.reload(), 700); }
      catch (e) { console.error(e); _demoBusy(false); showToast('Clear failed: ' + (e && e.message || e)); }
    }
    // Reset Trackers — wipes ALL Workout/Habits/Recovery/Journal data (local + cloud), KEEPS Expenses.
    // Two-tap guard so it can never fire by accident.
    let _resetArmed = false, _resetTimer = null;
    async function resetTrackers() {
      if (!window.MPS_DEMO || !MPS_DEMO.wipeTrackers) return showToast('Reset not ready');
      const b = document.getElementById('reset-trackers');
      if (!_resetArmed) {
        _resetArmed = true;
        if (b) b.textContent = 'Tap again to confirm';
        showToast('This wipes Workout/Habits/Recovery/Journal (Expenses kept). Tap again to confirm.');
        clearTimeout(_resetTimer); _resetTimer = setTimeout(() => { _resetArmed = false; if (b) b.textContent = 'Reset trackers'; }, 4500);
        return;
      }
      _resetArmed = false; clearTimeout(_resetTimer);
      if (b) { b.disabled = true; b.textContent = 'Resetting…'; }
      try { await MPS_DEMO.wipeTrackers(); showToast('Trackers reset — refreshing…'); setTimeout(() => location.reload(), 800); }
      catch (e) { console.error(e); if (b) { b.disabled = false; b.textContent = 'Reset trackers'; } showToast('Reset failed: ' + (e && e.message || e)); }
    }
    // Collapse / expand the owner-only dev panel
    function toggleTester(){
      const el = document.getElementById('tier-tester'); if (!el) return;
      const collapsed = el.classList.toggle('collapsed');
      const btn = document.getElementById('tester-collapse'); if (btn) btn.textContent = collapsed ? '▸' : '▾';
      try { localStorage.setItem('mps_tester_collapsed', collapsed ? '1' : '0'); } catch(e){}
    }
    // Keep the owner dev box on-screen (a saved drag position + a smaller window could push it off-screen → "it disappeared").
    function clampTesterIntoView(){
      const el = document.getElementById('tier-tester');
      if (!el || !el.classList.contains('show') || !el.style.left) return;
      const w = el.offsetWidth, h = el.offsetHeight; if (!w || !h) return;
      let left = parseFloat(el.style.left) || 0, top = parseFloat(el.style.top) || 0;
      left = Math.max(0, Math.min(window.innerWidth  - w, left));
      top  = Math.max(0, Math.min(window.innerHeight - h, top));
      el.style.left = left + 'px'; el.style.top = top + 'px'; el.style.bottom = 'auto'; el.style.right = 'auto';
    }
    window.addEventListener('resize', clampTesterIntoView);
    // Make the owner-only dev panel click-and-draggable (buttons still click; position remembered)
    (function makeTesterDraggable(){
      const el = document.getElementById('tier-tester');
      if (!el) return;
      try { const p = JSON.parse(localStorage.getItem('mps_tester_pos') || 'null');
        if (p && typeof p.left === 'number') { el.style.left = p.left + 'px'; el.style.top = p.top + 'px'; el.style.bottom = 'auto'; el.style.right = 'auto'; } } catch(e){}
      try { if (localStorage.getItem('mps_tester_collapsed') === '1') { el.classList.add('collapsed'); const b = document.getElementById('tester-collapse'); if (b) b.textContent = '▸'; } } catch(e){}
      let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;
      el.addEventListener('pointerdown', e => {
        if (e.target.closest('button')) return;          // let the tier/demo buttons work normally
        const r = el.getBoundingClientRect();
        el.style.left = r.left + 'px'; el.style.top = r.top + 'px'; el.style.bottom = 'auto'; el.style.right = 'auto';
        dragging = true; sx = e.clientX; sy = e.clientY; ox = r.left; oy = r.top;
        try { el.setPointerCapture(e.pointerId); } catch(_){}
        e.preventDefault();
      });
      el.addEventListener('pointermove', e => {
        if (!dragging) return;
        const r = el.getBoundingClientRect();
        let nx = ox + (e.clientX - sx), ny = oy + (e.clientY - sy);
        nx = Math.max(0, Math.min(window.innerWidth  - r.width,  nx));
        ny = Math.max(0, Math.min(window.innerHeight - r.height, ny));
        el.style.left = nx + 'px'; el.style.top = ny + 'px';
      });
      function endDrag(){ if (!dragging) return; dragging = false;
        try { const r = el.getBoundingClientRect(); localStorage.setItem('mps_tester_pos', JSON.stringify({ left: Math.round(r.left), top: Math.round(r.top) })); } catch(_){}
      }
      el.addEventListener('pointerup', endDrag);
      el.addEventListener('pointercancel', endDrag);
    })();
    // Tier badge next to the avatar: UPGRADE (Free/Medium) or PREMIUM (All-Access)
    function updateTierBadge() {
      const b = document.getElementById('tier-badge'), t = document.getElementById('tier-badge-text');
      if (!b || !t) return;
      const ico = b.querySelector('.tb-ico');
      if (currentTier === 'all') {
        b.className = 'tier-badge tier-badge--premium';
        t.textContent = 'Premium';
        if (ico) ico.textContent = '◆';
        b.removeAttribute('href');
      } else {
        b.className = 'tier-badge tier-badge--upgrade';
        t.textContent = 'Upgrade';
        if (ico) ico.textContent = '↑';
        b.setAttribute('href', '/billing.html');
      }
    }
    function updateTierBanner() {
      const banner = document.getElementById('tier-banner');
      const note = document.getElementById('shell-feature-note');
      const hide = () => { if (banner) banner.classList.remove('show'); if (note) { note.classList.remove('show'); note.innerHTML = ''; } };
      // Premium users already have everything → no upsell. Nothing on Home either.
      if (activeId === 'home' || currentTier === 'all') { hide(); return; }
      const app = APPS.find(a => a.id === activeId);
      if (!app) { hide(); return; }
      // Aspirational upsell: sell what PREMIUM unlocks (NOT the current tier) so lower tiers see what they're missing.
      const pitch = PREMIUM_PITCH[app.id] || 'Unlock everything — your full history, every insight, no limits.';
      const goBilling = () => { location.href = '/billing.html'; };
      // Desktop: centered note on the MPS line
      if (note) {
        note.innerHTML = '<span class="sfn-pill">◆ PREMIUM</span><span class="sfn-pitch">' + pitch + '</span><span class="sfn-cta">→</span>';
        note.onclick = goBilling; note.classList.add('show');
      }
      // Mobile: thin bar
      if (banner) {
        banner.innerHTML = '<span class="tier-banner__pill">◆ PREMIUM</span><span class="tier-banner__text">' + pitch + ' →</span>';
        banner.onclick = goBilling; banner.style.cursor = 'pointer'; banner.classList.add('show');
      }
    }

    /* ── Auth ─────────────────────────────────────────────── */
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) { location.replace('/auth.html'); return; }
      if (DEV_EMAILS.includes((user.email || '').toLowerCase())) {
        unlockedApps = APPS.map(a => a.id);
        renderUser(user.displayName || 'Jeff', user.email, user.photoURL, 'All-Access');
        refreshTabLocks();
        if (!window.matchMedia('(max-width: 768px)').matches) {   // desktop only — no dev tools on phones
          document.getElementById('tier-tester').classList.add('show');
          clampTesterIntoView();
        }
        previewTier('all');
        if (activeId === 'home') loadDashboard();
        return;
      }
      if (IS_BETA) {
        // VIP / beta tester — full Premium, free, no dev tools.
        unlockedApps = APPS.map(a => a.id);
        currentTier = 'all';
        renderUser(user.displayName || user.email, user.email, user.photoURL, TIER_LABEL.all);
        applyTheme();
        updateTierBadge();
        refreshTabLocks();
        if (activeId === 'home') loadDashboard();
        return;
      }
      let tier = 'free';
      try {
        const snap = await firebase.firestore().collection('users').doc(user.uid).get();
        const data = snap.exists ? snap.data() : {};
        if (data.billing_bypass === true || data.role === 'developer') tier = 'all';
        else tier = normTier(data.tier);
      } catch (err) { tier = 'free'; }   // fail SAFE: a Firestore error must NOT grant free Premium
      // Unified one-app: every tracker is available to all tiers; tiers are feature/theme levels.
      unlockedApps = APPS.map(a => a.id);
      const planLabel = TIER_LABEL[tier] || 'Core';
      currentTier = tier;
      renderUser(user.displayName || user.email, user.email, user.photoURL, planLabel);
      applyTheme();
      updateTierBadge();
      refreshTabLocks();
      // NOTE: the dev tools box is OWNER-ONLY — shown only in the DEV_EMAILS branch above. Never here.
      if (activeId === 'home') loadDashboard();
    });

    /* Keep Home in sync with the apps. On a fresh device, localStorage starts empty and each app's
       frame fills it as it restores from the cloud (and on every later edit). The cross-document
       `storage` event fires here whenever a frame writes a tracker key — so re-render the dashboard
       and the numbers update to the real data. This is why Home now matches the apps on every device. */
    let _dashRefreshTimer = null;
    window.addEventListener('storage', (e) => {
      const k = e.key || '';
      if (!/^(mps_|rr_sleep:|habits_v4|blocks_v4)/.test(k)) return;   // only tracker data
      clearTimeout(_dashRefreshTimer);
      _dashRefreshTimer = setTimeout(() => { if (activeId === 'home') loadDashboard(); }, 350);
    });

    function refreshTabLocks() {
      APPS.forEach(app => {
        const tab = document.getElementById('tab-' + app.id); if (!tab) return;
        const locked = !unlockedApps.includes(app.id);
        tab.classList.toggle('locked', locked);
        tab.querySelector('.shell-tab__lock')?.remove();
        if (locked) { const lk = document.createElement('span'); lk.className = 'shell-tab__lock'; lk.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'; tab.appendChild(lk); }
      });
    }

    /* Auto-apply new deploys: reload once when a fresh service worker takes control. */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').then(reg => { reg.update(); }).catch(() => {});
      let _swReloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => { if (_swReloading) return; _swReloading = true; location.reload(); });
    }

    buildTabs();
    buildDashCards();
    applyTheme();
    selectTab('home');
  </script>

  <!-- Install-as-app prompt (Android/Chrome native + iOS instructions) -->
  <script src="/shared/install-prompt.js" defer></script>
