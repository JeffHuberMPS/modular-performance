<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>MPS — Modular Performance</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" />

  <!-- Shared Styles -->
  <link rel="stylesheet" href="/shared/styles.css" />

  <!-- Firebase (same project as every app → login is shared) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>

  <style>
    :root {
      --shell-header-h: 52px;
      --shell-tabs-h:   58px;
    }

    html, body {
      height: 100%;
      overflow: hidden;            /* the shell owns the scroll; each app scrolls inside its frame */
    }

    body {
      background: var(--ns-black);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── Top header ─────────────────────────────────────────── */
    .shell-header {
      flex: 0 0 auto;
      height: var(--shell-header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-lg);
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(10, 10, 10, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      z-index: 30;
    }

    .shell-logo {
      font-family: var(--font-display, 'Bebas Neue'), sans-serif;
      font-size: 1.6rem;
      color: var(--ns-white);
      letter-spacing: 0.05em;
      line-height: 1;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .shell-logo small {
      font-family: 'Inter', sans-serif;
      font-size: 0.5rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .shell-logo .bar {
      display: inline-block;
      width: 22px;
      height: 2px;
      background: var(--ns-yellow);
      vertical-align: middle;
    }

    .shell-user {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      position: relative;
    }
    .shell-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700;
      color: var(--ns-yellow);
      overflow: hidden; flex-shrink: 0;
    }
    .shell-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .shell-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #1a1a1a;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      min-width: 180px;
      box-shadow: var(--shadow-card);
      z-index: 40;
      display: none;
      overflow: hidden;
    }
    .shell-dropdown.open { display: block; }
    .shell-dropdown__name {
      padding: 12px 16px 6px;
      font-size: 0.85rem;
      color: var(--text-primary);
      font-weight: 600;
    }
    .shell-dropdown__plan {
      padding: 0 16px 10px;
      font-size: 0.72rem;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border-subtle);
    }
    .shell-dropdown__plan span { color: var(--ns-yellow); }
    .shell-dropdown__item {
      display: block; width: 100%;
      padding: 11px 16px;
      background: none; border: none;
      text-align: left;
      color: var(--text-primary);
      font-size: 0.85rem; font-family: inherit;
      cursor: pointer;
      transition: background var(--transition);
    }
    .shell-dropdown__item:hover { background: var(--card-bg); }
    .shell-dropdown__item--danger { color: #ef4444; }

    /* ── Tab strip ──────────────────────────────────────────── */
    .shell-tabs {
      flex: 0 0 auto;
      height: var(--shell-tabs-h);
      display: flex;
      gap: 8px;
      padding: 8px var(--space-lg);
      overflow-x: auto;
      overflow-y: hidden;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(10,10,10,0.96);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: relative;
      z-index: 20;
    }
    .shell-tabs::-webkit-scrollbar { display: none; }

    .shell-tab {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-width: 74px;
      padding: 6px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-dim);
      font-family: var(--font-display, 'Bebas Neue'), sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      position: relative;
    }
    .shell-tab__dot {
      width: 18px; height: 3px; border-radius: 2px;
      background: var(--accent, #888);
      opacity: 0.55;
      transition: opacity var(--transition);
    }
    .shell-tab:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.18); }
    .shell-tab.active {
      color: var(--ns-white);
      border-color: var(--accent, var(--ns-yellow));
      background: color-mix(in srgb, var(--accent, #888) 12%, transparent);
    }
    .shell-tab.active .shell-tab__dot { opacity: 1; }
    .shell-tab__lock { font-size: 0.6rem; opacity: 0.5; }
    .shell-tab.locked { opacity: 0.5; }

    /* ── App stage (holds the iframes) ──────────────────────── */
    .shell-stage {
      flex: 1 1 auto;
      position: relative;
      background: var(--ns-black);
      overflow: hidden;
    }
    .shell-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--ns-black);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }
    .shell-frame.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Centered loader shown until the first frame paints */
    .shell-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ns-black);
      z-index: 5;
    }
    .shell-loader.hidden { display: none; }

    /* Locked-app panel (non-entitled users) */
    .shell-locked-panel {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-2xl);
      gap: 14px;
      z-index: 6;
    }
    .shell-locked-panel.show { display: flex; }
    .shell-locked-panel h2 {
      font-family: var(--font-display, 'Bebas Neue'), sans-serif;
      font-size: 1.8rem; color: var(--ns-white); letter-spacing: 0.04em;
    }
    .shell-locked-panel p { color: var(--text-dim); max-width: 320px; font-size: 0.9rem; }

    @media (display-mode: standalone) {
      .shell-header { padding-top: env(safe-area-inset-top); height: calc(var(--shell-header-h) + env(safe-area-inset-top)); }
    }
  </style>
</head>

<body>

  <!-- ── Header ───────────────────────────────────────────── -->
  <header class="shell-header">
    <div class="shell-logo">
      MPS<span class="bar"></span><small>Modular Performance</small>
    </div>

    <div class="shell-user" id="user-trigger">
      <div class="shell-avatar" id="user-avatar">JH</div>
      <div class="shell-dropdown" id="user-dropdown">
        <div class="shell-dropdown__name" id="dd-name">Jeff Huber</div>
        <div class="shell-dropdown__plan">Plan: <span id="dd-plan">All-Access</span></div>
        <button class="shell-dropdown__item" onclick="location.href='/billing.html'">Billing &amp; Plan</button>
        <button class="shell-dropdown__item shell-dropdown__item--danger" onclick="signOutUser()">Sign Out</button>
      </div>
    </div>
  </header>

  <!-- ── Tabs ─────────────────────────────────────────────── -->
  <nav class="shell-tabs" id="tab-strip"><!-- built by JS --></nav>

  <!-- ── Stage ────────────────────────────────────────────── -->
  <main class="shell-stage" id="stage">
    <div class="shell-loader" id="stage-loader"><div class="spinner"></div></div>
    <div class="shell-locked-panel" id="locked-panel">
      <h2 id="locked-title">App Locked</h2>
      <p>This app isn’t part of your current plan. Add it from your plan page to unlock it here.</p>
      <button class="btn btn-primary" onclick="location.href='/billing.html'">Manage Plan</button>
    </div>
    <!-- iframes injected by JS -->
  </main>

  <div class="toast" id="shell-toast"></div>

  <script>
    /* ════════════════════════════════════════════════════════
       MPS UNIFIED APP (Site #2 — one app, tabs)
       Each tab loads the real, unchanged app from /apps/<id>/.
       Login + data are shared via Firebase (same origin).
       ════════════════════════════════════════════════════════ */

    const APPS = [
      { id: 'workout',  label: 'Workout',  path: '/apps/workout/',  accent: '#4ab3f4' },
      { id: 'habits',   label: 'Habits',   path: '/apps/habits/',   accent: '#dc2626' },
      { id: 'sleep',    label: 'Recovery', path: '/apps/sleep/',    accent: '#c9a86b' },
      { id: 'expenses', label: 'Expenses', path: '/apps/expenses/', accent: '#16a34a' },
      { id: 'journal',  label: 'Journal',  path: '/apps/journal/',  accent: '#c4a882' }
    ];

    // New 3-tier model (Site #2). Free / Medium / All-Access.
    const TIER_APPS = {
      free:   ['workout'],
      medium: ['workout', 'habits', 'sleep'],
      all:    ['workout', 'habits', 'sleep', 'expenses', 'journal']
    };

    const DEV_EMAILS = ['jeffreyhuber86@gmail.com'];

    let unlockedApps = APPS.map(a => a.id);  // optimistic; tightened after auth resolves
    let activeId = null;
    const loadedFrames = {};   // id -> true once its iframe src is set

    /* ── Build the tab strip ──────────────────────────────── */
    function buildTabs() {
      const strip = document.getElementById('tab-strip');
      strip.innerHTML = '';
      APPS.forEach(app => {
        const tab = document.createElement('button');
        tab.className = 'shell-tab';
        tab.id = 'tab-' + app.id;
        tab.style.setProperty('--accent', app.accent);
        tab.innerHTML =
          '<span class="shell-tab__dot"></span>' +
          '<span>' + app.label + '</span>';
        tab.addEventListener('click', () => selectTab(app.id));
        strip.appendChild(tab);
      });
    }

    /* ── Switch tabs (lazy-load frame on first open) ──────── */
    function selectTab(id) {
      const app = APPS.find(a => a.id === id);
      if (!app) return;
      activeId = id;

      document.querySelectorAll('.shell-tab').forEach(t =>
        t.classList.toggle('active', t.id === 'tab-' + id));

      const lockedPanel = document.getElementById('locked-panel');
      const isUnlocked = unlockedApps.includes(id);

      document.querySelectorAll('.shell-frame').forEach(f => f.classList.remove('active'));

      if (!isUnlocked) {
        document.getElementById('locked-title').textContent = app.label.toUpperCase() + ' Locked';
        lockedPanel.classList.add('show');
        document.getElementById('stage-loader').classList.add('hidden');
        return;
      }
      lockedPanel.classList.remove('show');

      let frame = document.getElementById('frame-' + id);
      if (!frame) {
        frame = document.createElement('iframe');
        frame.className = 'shell-frame';
        frame.id = 'frame-' + id;
        frame.setAttribute('title', app.label);
        frame.setAttribute('loading', 'lazy');
        frame.addEventListener('load', () => {
          document.getElementById('stage-loader').classList.add('hidden');
        });
        frame.src = app.path;
        document.getElementById('stage').appendChild(frame);
        loadedFrames[id] = true;
      }
      frame.classList.add('active');

      if (loadedFrames[id] && frame.contentDocument) {
        document.getElementById('stage-loader').classList.add('hidden');
      }
    }

    /* ── User menu ────────────────────────────────────────── */
    document.getElementById('user-trigger').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('user-dropdown').classList.toggle('open');
    });
    document.addEventListener('click', () =>
      document.getElementById('user-dropdown').classList.remove('open'));

    function signOutUser() {
      firebase.auth().signOut()
        .then(() => location.href = '/auth.html')
        .catch(() => showToast('Sign-out failed. Try again.'));
    }

    function renderUser(name, email, photoURL, planLabel) {
      document.getElementById('dd-name').textContent = name || 'User';
      document.getElementById('dd-plan').textContent = planLabel || '—';
      const avatar = document.getElementById('user-avatar');
      if (photoURL) {
        avatar.innerHTML = '<img src="' + photoURL + '" alt="">';
      } else {
        const initials = (name || 'U').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        avatar.textContent = initials;
      }
    }

    /* ── Toast ────────────────────────────────────────────── */
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('shell-toast');
      t.textContent = msg;
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ── Auth + entitlements ──────────────────────────────── */
    const TIER_LABEL = { free: 'Free', medium: 'Medium', all: 'All-Access' };

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {                       // not signed in → go log in
        location.replace('/auth.html');
        return;
      }

      if (DEV_EMAILS.includes(user.email)) {
        unlockedApps = APPS.map(a => a.id);
        renderUser(user.displayName || 'Jeff', user.email, user.photoURL, 'All-Access');
        refreshTabLocks();
        return;
      }

      let planLabel = '—';
      try {
        const snap = await firebase.firestore().collection('users').doc(user.uid).get();
        const data = snap.exists ? snap.data() : {};
        if (data.billing_bypass === true || data.role === 'developer') {
          unlockedApps = APPS.map(a => a.id);
          planLabel = 'All-Access';
        } else if (Array.isArray(data.apps) && data.apps.length) {
          unlockedApps = data.apps;
          planLabel = TIER_LABEL[data.tier] || 'Custom';
        } else {
          // map old tier names onto the new 3-tier model where possible
          const t = data.tier;
          if (t === 'all') { unlockedApps = TIER_APPS.all; planLabel = 'All-Access'; }
          else if (t === 'trio' || t === 'medium') { unlockedApps = TIER_APPS.medium; planLabel = 'Medium'; }
          else { unlockedApps = TIER_APPS.free; planLabel = 'Free'; }
        }
      } catch (err) {
        console.error('[MPS Unified] entitlement lookup failed:', err);
        unlockedApps = APPS.map(a => a.id);  // fail open — each app still self-guards
      }

      renderUser(user.displayName || user.email, user.email, user.photoURL, planLabel);
      refreshTabLocks();
    });

    /* ── Mark locked tabs + re-pick a valid starting tab ──── */
    function refreshTabLocks() {
      APPS.forEach(app => {
        const tab = document.getElementById('tab-' + app.id);
        if (!tab) return;
        const locked = !unlockedApps.includes(app.id);
        tab.classList.toggle('locked', locked);
        tab.querySelector('.shell-tab__lock')?.remove();
        if (locked) {
          const lk = document.createElement('span');
          lk.className = 'shell-tab__lock';
          lk.textContent = '🔒';
          tab.appendChild(lk);
        }
      });

      if (!activeId || !unlockedApps.includes(activeId)) {
        const firstOpen = APPS.find(a => unlockedApps.includes(a.id));
        selectTab(firstOpen ? firstOpen.id : APPS[0].id);
      }
    }

    /* ── Boot ─────────────────────────────────────────────── */
    buildTabs();
    selectTab('workout');   // optimistic first paint; auth handler corrects if needed
  </script>

</body>
</html>
