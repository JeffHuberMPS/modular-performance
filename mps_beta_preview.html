<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPS — Closed Beta</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { min-height:100%; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0a0a0a; color:#fff; min-height:100vh;
    background-image:radial-gradient(820px 460px at 14% -6%, rgba(0,212,255,0.07), transparent 60%), radial-gradient(760px 460px at 100% -4%, rgba(214,163,90,0.04), transparent 60%); }

  /* ---- top bar ---- */
  .topbar { height:54px; background:#0d0d0d; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 18px; gap:12px; position:sticky; top:0; z-index:30; }
  .logo { font-size:20px; font-weight:900; font-style:italic; letter-spacing:1px; }
  .logo .accent { color:#00d4ff; }
  .logo .sub { font-size:10px; color:#666; text-transform:uppercase; letter-spacing:2px; font-style:normal; font-weight:600; }
  .pill { margin-left:8px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:#00d4ff; border:1px solid #1d4a5a; background:#0e2630; border-radius:20px; padding:4px 10px; }
  .admin-link { margin-left:auto; font-size:11px; color:#666; text-decoration:none; border:1px solid #2a2a2a; padding:7px 12px; border-radius:8px; cursor:pointer; }
  .admin-link:hover { color:#00d4ff; border-color:#00d4ff; }

  /* ---- layout ---- */
  .wrap { max-width:760px; margin:0 auto; padding:40px 22px 80px; }
  .wide { max-width:1080px; }

  .card { background:linear-gradient(160deg, rgba(46,50,59,0.72) 0%, rgba(20,22,28,0.7) 55%, rgba(11,12,15,0.66) 100%); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.11); border-radius:18px; padding:30px 30px; box-shadow:0 24px 50px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.12); margin-bottom:20px; position:relative; overflow:hidden; }
  .card::after { content:''; position:absolute; top:16px; bottom:16px; left:0; width:3px; border-radius:0 3px 3px 0; background:var(--a,#00d4ff); box-shadow:0 0 16px var(--a,#00d4ff); }

  h1 { font-size:26px; font-weight:900; font-style:italic; margin-bottom:8px; line-height:1.15; }
  h2 { font-size:18px; font-weight:700; margin-bottom:6px; }
  .lead { font-size:14px; color:#aab; line-height:1.6; }
  .muted { color:#7a8290; }
  .accentc { color:#00d4ff; }
  .big-emoji { font-size:46px; margin-bottom:10px; }

  .label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#6a6a6a; margin:22px 0 8px; }
  input, select, textarea { width:100%; background:#0e0f13; border:1px solid #2a2d34; color:#fff; border-radius:10px; padding:12px 13px; font-size:14px; font-family:inherit; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:#00d4ff; }
  textarea { resize:vertical; min-height:74px; }
  .field { margin-bottom:14px; }
  .field > label { display:block; font-size:13px; color:#cfd4dc; margin-bottom:6px; font-weight:600; }
  .hint { font-size:12px; color:#777; margin-top:5px; }

  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:#00d4ff; color:#04212b; border:none; border-radius:11px; padding:14px 22px; font-size:15px; font-weight:800; cursor:pointer; transition:.15s; text-decoration:none; }
  .btn:hover { filter:brightness(1.08); transform:translateY(-1px); }
  .btn.block { width:100%; }
  .btn.ghost { background:transparent; color:#00d4ff; border:1px solid #1d4a5a; }
  .btn.ghost:hover { border-color:#00d4ff; background:rgba(0,212,255,0.06); }
  .btn.sm { padding:9px 14px; font-size:13px; border-radius:9px; }
  .btn.danger { background:transparent; color:#ff6b6b; border:1px solid #5a2a2a; }
  .btn.danger:hover { border-color:#ff6b6b; background:rgba(255,107,107,0.06); }
  .btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  .status-badge { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700; border-radius:20px; padding:6px 13px; }
  .sb-active { background:#0e2c1a; color:#2ecc71; border:1px solid #1c5a34; }
  .sb-warn { background:#2e2410; color:#f0b65a; border:1px solid #5a4a1c; }
  .sb-dead { background:#2e1414; color:#ff6b6b; border:1px solid #5a2424; }
  .sb-life { background:#1a1030; color:#b388ff; border:1px solid #3a2a6a; }

  /* countdown */
  .countdown { display:flex; gap:12px; margin:18px 0 4px; flex-wrap:wrap; }
  .cd-box { background:#0e0f13; border:1px solid #242830; border-radius:12px; padding:14px 0; text-align:center; flex:1; min-width:70px; }
  .cd-box b { font-size:30px; font-family:'Courier New',monospace; color:#00d4ff; display:block; line-height:1; }
  .cd-box span { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:#777; margin-top:6px; display:block; }

  /* code/link display */
  .codebox { background:#08090c; border:1px dashed #2a3a44; border-radius:10px; padding:13px 14px; font-family:'Courier New',monospace; font-size:13px; color:#9fe6ff; word-break:break-all; line-height:1.5; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .row.g8 { gap:8px; }

  /* stat grid */
  .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); gap:14px; }
  .stat { background:#0e0f13; border:1px solid #20232b; border-radius:13px; padding:15px 16px; }
  .stat .n { font-size:26px; font-weight:800; font-family:'Courier New',monospace; color:#00d4ff; line-height:1; }
  .stat .n.small { font-size:17px; }
  .stat .t { font-size:11px; color:#8a92a0; text-transform:uppercase; letter-spacing:1px; margin-top:8px; }
  .stat .sub2 { font-size:11px; color:#5f6671; margin-top:3px; }

  /* table */
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#6a6a6a; padding:9px 10px; border-bottom:1px solid #242424; position:sticky; top:54px; background:#0b0c0f; }
  td { padding:10px 10px; border-bottom:1px solid #1a1a1a; color:#cdd2da; vertical-align:top; }
  tr:hover td { background:rgba(255,255,255,0.02); }
  .tag { font-size:11px; font-weight:700; border-radius:6px; padding:2px 8px; white-space:nowrap; }
  .t-sent { background:#23272e; color:#9aa2ad; }
  .t-claim { background:#0e2c1a; color:#2ecc71; }
  .t-exp { background:#2e1414; color:#ff6b6b; }
  .t-life { background:#1a1030; color:#b388ff; }

  /* tabs */
  .tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { font-size:13px; font-weight:700; color:#9aa2ad; background:#121419; border:1px solid #23262e; padding:9px 16px; border-radius:10px; cursor:pointer; }
  .tab.active { background:#0e2630; color:#00d4ff; border-color:#00d4ff; }

  .divider { height:1px; background:#1f1f1f; margin:22px 0; }
  .seg { display:inline-flex; background:#0e0f13; border:1px solid #242830; border-radius:10px; overflow:hidden; }
  .seg button { background:none; border:none; color:#9aa2ad; padding:10px 16px; font-size:13px; font-weight:700; cursor:pointer; }
  .seg button.on { background:#00d4ff; color:#04212b; }

  .stars { display:flex; gap:6px; font-size:30px; }
  .stars span { cursor:pointer; color:#33373f; transition:.1s; }
  .stars span.on { color:#f0b65a; }

  .hidden { display:none !important; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#13283a; border:1px solid #00d4ff; color:#cfeaff; padding:12px 18px; border-radius:8px; font-size:13px; z-index:99999; max-width:90%; text-align:center; box-shadow:0 6px 24px rgba(0,0,0,.6); }
  .footnote { font-size:11px; color:#444; text-align:center; margin-top:30px; }
  ul.clean { list-style:none; }
  ul.clean li { padding:7px 0; border-bottom:1px solid #1c1c1c; font-size:13px; color:#cdd2da; display:flex; gap:8px; }
  ul.clean li:last-child { border-bottom:none; }
  .ok-check { color:#2ecc71; }
  @media (max-width:560px){ .card { padding:24px 20px; } h1 { font-size:22px; } }
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">MPS <span class="accent">OS</span> &nbsp;<span class="sub">Closed Beta</span></div>
    <span class="pill" id="topPill">Beta Access</span>
    <a class="admin-link" id="adminToggle">Admin</a>
  </div>

  <div id="app"></div>
  <div class="footnote" id="foot">MPS Closed Beta · your access is saved in this browser</div>

<script>
/* ============================================================
   MPS CLOSED BETA MANAGEMENT SYSTEM  —  single-file, no server
   All configuration lives in CONFIG below. Change values here only.
   ============================================================ */
const CONFIG = {
  MAX_BETA_USERS:        100,        // beta cap
  INVITE_EXPIRATION_DAYS:7,          // unclaimed invite expires after N days
  BETA_TRIAL_DAYS:       7,          // length of the premium trial
  REFERRAL_REWARD:       1,          // invites granted per completed survey
  BETA_SECRET:           'mps-beta-2026-keystone',  // signs invite codes (keep private-ish)
  ADMIN_PIN:             '1986',     // Jeff's admin PIN
  PRODUCT_NAME:          'MPS Performance System',
  PRICING_URL:           'index.html',        // where non-beta / expired users go to buy
  PRICING_TIERS:         ['Free', 'Elite', 'Premium'],  // selectable in survey
  JEFF_EMAIL:            'jeff@modular-performance.com'  // feedback receipts mailto target
};

/* ---------- tiny helpers ---------- */
const $ = s => document.querySelector(s);
function toast(m){ var t=document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t); setTimeout(function(){ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(function(){t.remove();},400); },2600); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function todayMid(){ var t=new Date(); t.setHours(0,0,0,0); return t; }
function fmtDate(ms){ if(!ms) return '—'; var d=new Date(ms); return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function daysLeft(ms){ if(!ms) return 0; return Math.ceil((ms - Date.now())/86400000); }
function baseUrl(){ return location.origin==='null'||location.protocol==='file:' ? location.href.split('?')[0] : location.origin+location.pathname; }

/* deterministic non-crypto hash (no Date/Math.random) — used to sign codes */
function sign(str){ var h=5381; for(var i=0;i<str.length;i++){ h=((h<<5)+h)^str.charCodeAt(i); h=h>>>0; } return (h>>>0).toString(36); }
function b64e(o){ try{ return btoa(unescape(encodeURIComponent(JSON.stringify(o)))).replace(/=+$/,''); }catch(e){ return ''; } }
function b64d(s){ try{ return JSON.parse(decodeURIComponent(escape(atob(s)))); }catch(e){ return null; } }

/* an invite code is: b64( {n,e,by,exp,cap} ) + "." + sign(payload+SECRET)
   - n=name  e=email  by=invitedBy  exp=expiry(ms)  cap=cohort serial
   email is BAKED IN, so a shared link only validates for that email. */
function makeInvite(name, email, invitedBy, serial){
  var exp = todayMid().getTime() + CONFIG.INVITE_EXPIRATION_DAYS*86400000 + 86399000;
  var payload = { n:name, e:email.toLowerCase().trim(), by:invitedBy||'Jeff', exp:exp, cap:serial };
  var enc = b64e(payload);
  var code = enc + '.' + sign(enc + CONFIG.BETA_SECRET);
  return { code:code, payload:payload, link:baseUrl()+'?i='+encodeURIComponent(code) };
}
function readInvite(code){
  if(!code || code.indexOf('.')<0) return { ok:false, reason:'malformed' };
  var parts = code.split('.'); var enc=parts[0], sig=parts[1];
  if(sign(enc + CONFIG.BETA_SECRET) !== sig) return { ok:false, reason:'bad-signature' };
  var p = b64d(enc); if(!p) return { ok:false, reason:'malformed' };
  return { ok:true, payload:p };
}

/* ---------- storage ---------- */
const MK = { me:'mps_beta_me', admin:'mps_beta_admin' };
function loadMe(){ try{ return JSON.parse(localStorage.getItem(MK.me)); }catch(e){ return null; } }
function saveMe(o){ localStorage.setItem(MK.me, JSON.stringify(o)); }
function loadAdmin(){ try{ var a=JSON.parse(localStorage.getItem(MK.admin)); return a||{invites:[],feedback:[],serial:0}; }catch(e){ return {invites:[],feedback:[],serial:0}; } }
function saveAdmin(o){ localStorage.setItem(MK.admin, JSON.stringify(o)); }

/* ============================================================
   PAYWALL HOOK  —  other MPS apps call MPSBeta.hasPremium()
   to decide whether to show premium features. Modular: no beta
   logic lives in the paywall, it only asks this one question.
   ============================================================ */
window.MPSBeta = {
  hasPremium: function(){
    var me = loadMe();
    if(!me || me.status!=='active') return false;
    if(me.lifetime) return true;                       // lifetime beta = always premium
    if(Date.now() <= me.betaExpiry) return true;       // inside the 7-day trial
    return false;                                      // trial over, no lifetime
  },
  state: function(){ return loadMe(); }
};

/* ============================================================
   ROUTER
   ============================================================ */
function qs(name){ var m=location.search.match(new RegExp('[?&]'+name+'=([^&]+)')); return m?decodeURIComponent(m[1]):null; }

function route(){
  // enforce: expire an active trial whose survey was never completed
  enforceTrial();
  var inviteCode = qs('i');
  var me = loadMe();

  if(qs('admin')==='1'){ renderAdmin(); return; }

  if(inviteCode){
    var r = readInvite(inviteCode);
    if(!r.ok){ renderInvalid(); return; }
    // already have an account on this device?
    if(me){
      if(me.email === r.payload.e){ renderDashboard(); return; }   // same person returning
      renderAlreadyOnDevice(r.payload); return;                    // a different code on a claimed device
    }
    renderClaim(inviteCode, r.payload); return;
  }

  if(me){ renderDashboard(); return; }
  renderNoInvite();
}

/* expire trials with no survey (fully automated, no manual step) */
function enforceTrial(){
  var me = loadMe();
  if(!me) return;
  if(me.status==='active' && !me.lifetime && Date.now() > me.betaExpiry && !me.surveyCompleted){
    me.status='expired'; me.premiumStatus=false; saveMe(me);
  }
}

/* ============================================================
   TESTER VIEWS
   ============================================================ */
function renderClaim(code, p){
  setPill('Invitation');
  var dleft = daysLeft(p.exp);
  $('#app').innerHTML =
  '<div class="wrap"><div class="card">'
   +'<div class="big-emoji">🎟️</div>'
   +'<h1>You\'re invited to the<br>'+esc(CONFIG.PRODUCT_NAME)+' Closed Beta</h1>'
   +'<p class="lead" style="margin-top:10px">Hi '+esc(p.n||'there')+' — you\'ve been hand-picked by <b>'+esc(p.by)+'</b> to test MPS before launch. '
   +'You get <b class="accentc">'+CONFIG.BETA_TRIAL_DAYS+' days of full Premium access, free</b>.</p>'
   +'<div class="card" style="--a:#2ecc71;margin:22px 0 18px;background:#0c1510;border-color:#1c3a28">'
     +'<h2>The simple agreement</h2>'
     +'<ul class="clean" style="margin-top:8px">'
       +'<li><span class="ok-check">✔</span> We give you Premium MPS free for '+CONFIG.BETA_TRIAL_DAYS+' days.</li>'
       +'<li><span class="ok-check">✔</span> You give us one honest feedback survey.</li>'
       +'<li><span class="ok-check">✔</span> Finish the survey → keep Premium <b>free for life</b> + earn an invite to share.</li>'
     +'</ul></div>'
   +'<p class="hint">This invitation was created just for <b>'+esc(p.e)+'</b> and expires in <b>'+dleft+' day'+(dleft===1?'':'s')+'</b> ('+fmtDate(p.exp)+').</p>'
   +'<button class="btn block" style="margin-top:18px" id="activate">Activate my free beta →</button>'
  +'</div></div>';
  $('#activate').onclick = function(){ claimNow(code, p); };
}

function claimNow(code, p){
  if(Date.now() > p.exp){ renderExpiredInvite(); return; }
  var now = Date.now();
  var me = {
    code: code,
    name: p.n, email: p.e, invitedBy: p.by,
    status: 'active', premiumStatus: true, lifetime: false,
    joinDate: now, lastLogin: now,
    betaStart: now, betaExpiry: now + CONFIG.BETA_TRIAL_DAYS*86400000,
    surveyCompleted: false, surveyDate: null, survey: null,
    referralCount: 0, referralCredits: 0, referralInvites: []
  };
  saveMe(me);
  toast('Premium beta activated 🎉');
  renderDashboard();
}

function renderDashboard(){
  var me = loadMe(); me.lastLogin = Date.now(); saveMe(me);

  if(me.lifetime){ return renderLifetime(me); }
  if(me.status==='expired'){ return renderBetaEnded(me); }

  setPill('Premium Beta');
  var dleft = daysLeft(me.betaExpiry); if(dleft<0) dleft=0;
  var hrs = Math.max(0, Math.floor((me.betaExpiry-Date.now())/3600000) % 24);
  var urgent = dleft<=2;
  $('#app').innerHTML =
  '<div class="wrap">'
   +'<div class="card">'
     +'<div class="row" style="justify-content:space-between"><h1 style="font-size:22px">Welcome, '+esc(me.name||'tester')+' 👋</h1>'
     +'<span class="status-badge sb-active">● Premium active</span></div>'
     +'<p class="lead" style="margin-top:8px">Your full Premium beta is unlocked. Use the app like you own it — then tell us the truth.</p>'
     +'<div class="label">Time left in your free trial</div>'
     +'<div class="countdown"><div class="cd-box"><b>'+dleft+'</b><span>days</span></div><div class="cd-box"><b>'+hrs+'</b><span>hours</span></div>'
       +'<div class="cd-box" style="flex:2;background:'+(urgent?'#2e1414':'#0c1510')+';border-color:'+(urgent?'#5a2424':'#1c3a28')+'"><b style="font-size:15px;color:'+(urgent?'#ff6b6b':'#2ecc71')+';font-family:inherit;font-weight:800;padding-top:6px">'
         +(urgent?'Survey due soon!':'You\'re all set')+'</b><span>Finish the survey to keep it forever</span></div></div>'
   +'</div>'
   +'<div class="card" style="--a:#f0b65a">'
     +'<h2>🎯 Your one task: the feedback survey</h2>'
     +'<p class="lead" style="margin:8px 0 4px">This is how you pay for the beta — and how you unlock <b class="accentc">Premium for life</b>. Takes about 3 minutes. You can do it any time before your trial ends.</p>'
     +'<button class="btn block" style="margin-top:16px" onclick="renderSurvey()">Take the survey & unlock lifetime →</button>'
   +'</div>'
   +'<div class="row" style="justify-content:space-between"><a class="btn ghost sm" href="'+esc(CONFIG.PRICING_URL)+'">Open the MPS app</a>'
     +'<button class="btn ghost sm" onclick="resetMe()">Not you? Reset this device</button></div>'
  +'</div>';
}

var SURVEY_Q = [
  { k:'does',    t:'1. In your own words, what do you think this app does?', type:'text' },
  { k:'tier',    t:'2. Which pricing option would you choose?', type:'tier' },
  { k:'why',     t:'3. Why that one?', type:'text' },
  { k:'confuse', t:'4. What was your biggest point of confusion?', type:'text' },
  { k:'fav',     t:'5. Your favorite feature?', type:'text' },
  { k:'improve', t:'6. The single biggest improvement you\'d want?', type:'text' },
  { k:'buy',     t:'7. Would you actually purchase this?', type:'buy' },
  { k:'price',   t:'8. What price feels fair to you?', type:'short' },
  { k:'other',   t:'9. Anything else? (optional)', type:'text', opt:true }
];

function renderSurvey(){
  setPill('Feedback');
  var bg = loadMe().bg || '';
  var fields = '';
  // overall rating (feeds analytics)
  fields += '<div class="field"><label>Overall, how would you rate MPS so far?</label>'
    +'<div class="stars" id="stars">'+[1,2,3,4,5].map(function(i){return '<span data-v="'+i+'">★</span>';}).join('')+'</div>'
    +'<input type="hidden" id="rating" value=""></div>';
  // background (customer discovery)
  fields += '<div class="field"><label>Your background (helps us read your answers)</label><select id="f_bg">'
    +['', 'Fitness','Business','Tech','General'].map(function(o){return '<option value="'+o+'"'+(o===bg?' selected':'')+'>'+(o||'Choose one…')+'</option>';}).join('')+'</select></div>';

  SURVEY_Q.forEach(function(q){
    fields += '<div class="field"><label>'+esc(q.t)+'</label>';
    if(q.type==='tier'){
      fields += '<select id="f_'+q.k+'"><option value="">Choose one…</option>'+CONFIG.PRICING_TIERS.map(function(o){return '<option>'+esc(o)+'</option>';}).join('')+'</select>';
    } else if(q.type==='buy'){
      fields += '<select id="f_'+q.k+'"><option value="">Choose one…</option><option>Yes</option><option>Maybe</option><option>No</option></select>';
    } else if(q.type==='short'){
      fields += '<input id="f_'+q.k+'" placeholder="e.g. $19/mo, $99 one-time…">';
    } else {
      fields += '<textarea id="f_'+q.k+'" placeholder="Type your honest answer…"></textarea>';
    }
    fields += '</div>';
  });

  $('#app').innerHTML =
  '<div class="wrap"><div class="card" style="--a:#f0b65a">'
   +'<h1 style="font-size:22px">Your feedback survey</h1>'
   +'<p class="lead" style="margin:6px 0 4px">Be brutally honest — that\'s the whole point. Finishing this unlocks <b class="accentc">Premium for life</b>.</p>'
   +'<div class="divider"></div>'
   + fields
   +'<button class="btn block" style="margin-top:8px" id="submitSurvey">Submit & unlock lifetime access →</button>'
   +'<button class="btn ghost sm block" style="margin-top:10px" onclick="renderDashboard()">Back</button>'
  +'</div></div>';

  // star handler
  var stars = document.querySelectorAll('#stars span');
  stars.forEach(function(s){ s.onclick=function(){ var v=+s.getAttribute('data-v'); $('#rating').value=v; stars.forEach(function(x){ x.classList.toggle('on', +x.getAttribute('data-v')<=v); }); }; });
  $('#submitSurvey').onclick = submitSurvey;
}

function submitSurvey(){
  var ans = {}; var missing = [];
  ans.rating = $('#rating').value;
  ans.bg = $('#f_bg').value;
  SURVEY_Q.forEach(function(q){
    var el = $('#f_'+q.k); var v = el?el.value.trim():'';

/* ---------- feedback receipt (tester -> Jeff, serverless) ---------- */
function buildReceipt(me){
  var r = { v:1, e:me.email, n:me.name, by:me.invitedBy, start:me.betaStart, sd:me.surveyDate, s:me.survey, refs:(me.referralInvites||[]).map(function(x){return x.email;}) };
  var enc = b64e(r); return 'MPSFB1.'+enc+'.'+sign(enc+CONFIG.BETA_SECRET);
}
function readReceipt(str){
  str=(str||'').trim(); if(str.indexOf('MPSFB1.')!==0) return null;
  var parts=str.split('.'); if(parts.length<3) return null;
  if(sign(parts[1]+CONFIG.BETA_SECRET)!==parts[2]) return null;
  return b64d(parts[1]);
}
function mailtoFor(receipt, me){
  var subj = encodeURIComponent('MPS Beta feedback — '+(me.name||me.email));
  var body = encodeURIComponent(
    'My MPS beta feedback is below.\n\nName: '+(me.name||'')+'\nEmail: '+me.email+'\n\n'
    +'--- Paste this whole code into the MPS admin Feedback tab ---\n'+receipt+'\n');
  return 'mailto:'+CONFIG.JEFF_EMAIL+'?subject='+subj+'&body='+body;
}
function mailtoInvite(inv, name, from){
  var subj=encodeURIComponent('You\'re invited to try MPS (free)');
  var body=encodeURIComponent('Hi '+(name||'')+',\n\n'+(from||'A friend')+' invited you to try the '+CONFIG.PRODUCT_NAME+' free for '+CONFIG.BETA_TRIAL_DAYS+' days.\n\nActivate here:\n'+inv.link+'\n\nThis invite is just for you and expires in '+CONFIG.INVITE_EXPIRATION_DAYS+' days.');
  return 'mailto:'+inv.payload.e+'?subject='+subj+'&body='+body;
}
function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(function(){toast('Copied ✓');},function(){fallbackCopy(t);}); }
  else fallbackCopy(t);
}
function fallbackCopy(t){ var a=document.createElement('textarea'); a.value=t; document.body.appendChild(a); a.select(); try{document.execCommand('copy');toast('Copied ✓');}catch(e){toast('Copy failed — select manually');} a.remove(); }

/* merge what we know: generated invites + claim/survey signals from pasted receipts */
function adminModel(){
  var a = loadAdmin();
  var now = Date.now();
  // index feedback receipts by email
  var fbByEmail = {};
  (a.feedback||[]).forEach(function(f){ fbByEmail[(f.e||'').toLowerCase()] = f; });
  a.invites.forEach(function(inv){
    var fb = fbByEmail[(inv.email||'').toLowerCase()];
    // expire unclaimed past expiry
    if(inv.status==='sent' && now>inv.expiry) inv.status='expired';
    if(fb){
      inv.status='claimed';
      inv.surveyCompleted=true; inv.surveyDate=fb.sd; inv.survey=fb.s; inv.lifetime=true;
      inv.bg = fb.s && fb.s.bg; inv.referralEmails = fb.refs||[];
    }
  });
  saveAdmin(a);
  return a;
}

function adminDash(){
  var a = adminModel();
  var inv = a.invites;
  var sent = inv.length;
  var claimed = inv.filter(function(i){return i.status==='claimed';}).length;
  var expired = inv.filter(function(i){return i.status==='expired';}).length;
  var surveys = inv.filter(function(i){return i.surveyCompleted;});
  var lifetime = surveys.length;
  var ratings = surveys.map(function(i){return +((i.survey||{}).rating);}).filter(function(n){return n>0;});
  var avgRating = ratings.length ? (ratings.reduce(function(x,y){return x+y;},0)/ratings.length).toFixed(1) : '—';
  var tierMode = mode(surveys.map(function(i){return (i.survey||{}).tier;}));
  var buyYes = surveys.filter(function(i){return (i.survey||{}).buy==='Yes';}).length;
  var conv = claimed ? Math.round(lifetime/claimed*100) : 0;
  var expRate = sent ? Math.round(expired/sent*100) : 0;
  var surveyPct = claimed ? Math.round(lifetime/claimed*100) : 0;
  // avg time to survey + avg lifetime
  var times = surveys.map(function(i){return (i.surveyDate-(i.created))/86400000;}).filter(function(n){return n>=0;});
  var avgTime = times.length ? (times.reduce(function(x,y){return x+y;},0)/times.length).toFixed(1)+'d' : '—';
  // referral success
  var refsGiven = surveys.reduce(function(x,i){return x+((i.referralEmails||[]).length);},0);
  // most active = invitedBy frequency among claimed
  var active = topCount(inv.filter(function(i){return i.status==='claimed';}).map(function(i){return i.invitedBy||'Jeff';}));

  function stat(n,t,sub,cls){ return '<div class="stat"><div class="n'+(cls?' '+cls:'')+'">'+n+'</div><div class="t">'+t+'</div>'+(sub?'<div class="sub2">'+sub+'</div>':'')+'</div>'; }

  $('#adminBody').innerHTML =
    '<div class="card"><h2>Program at a glance</h2><div class="stats" style="margin-top:14px">'
     + stat(claimed+' / '+CONFIG.MAX_BETA_USERS,'Beta users','‎'+(CONFIG.MAX_BETA_USERS-claimed)+' spots left')
     + stat(sent,'Invites sent')
     + stat(claimed,'Invites claimed')
     + stat(expRate+'%','Expiration rate', expired+' expired')
     + stat(surveyPct+'%','Survey completion', lifetime+' of '+claimed)
     + stat(avgRating,'Avg rating', ratings.length+' ratings')
     + stat(conv+'%','Conversion to lifetime')
     + stat(lifetime,'Lifetime members')
    +'</div></div>'
    +'<div class="card" style="--a:#f0b65a"><h2>What testers are telling you</h2><div class="stats" style="margin-top:14px">'
     + stat(tierMode||'—','Most-chosen pricing','',( 'small'))
     + stat(buyYes+' / '+lifetime,'Would purchase (Yes)')
     + stat(avgTime,'Avg time to survey')
     + stat(refsGiven,'Referrals generated')
     + stat(active||'—','Most active inviter','',( 'small'))
    +'</div>'
    + topListBlock('Most requested improvements', surveys.map(function(i){return (i.survey||{}).improve;}))
    + topListBlock('Most common confusion', surveys.map(function(i){return (i.survey||{}).confuse;}))
    +'</div>'
    + referralTreeBlock(inv);
}

function topListBlock(title, arr){
  arr = arr.filter(Boolean);
  if(!arr.length) return '<div class="label">'+title+'</div><p class="hint">No survey answers yet.</p>';
  var items = arr.slice(0,6).map(function(s){return '<li>• '+esc(s)+'</li>';}).join('');
  return '<div class="label">'+title+'</div><ul class="clean">'+items+'</ul>';
}

function referralTreeBlock(inv){
  var claimed = inv.filter(function(i){return i.status==='claimed';});
  if(!claimed.length) return '';
  // group by invitedBy
  var byParent = {};
  claimed.forEach(function(i){ var p=i.invitedBy||'Jeff'; (byParent[p]=byParent[p]||[]).push(i); });
  var rows = Object.keys(byParent).map(function(p){
    return '<div style="margin-bottom:10px"><b class="accentc">'+esc(p)+'</b><div style="padding-left:16px;margin-top:4px">'
      + byParent[p].map(function(c){return '<div class="muted" style="font-size:13px;padding:2px 0">↳ '+esc(c.name||c.email)+' '+statusTag(c.status)+(c.lifetime?' <span class="tag t-life">lifetime</span>':'')+'</div>';}).join('')
      +'</div></div>';
  }).join('');
  return '<div class="card"><h2>Referral tree</h2><div style="margin-top:12px">'+rows+'</div></div>';
}

  var discovery = a.invites.filter(function(i){return i.surveyCompleted && i.survey;});

  var dRows = discovery.map(function(i){var s=i.survey;return '<tr>'
    +'<td><b>'+esc(i.name||'')+'</b><br><span class="muted" style="font-size:12px">'+esc(i.email)+'</span></td>'
    +'<td>'+esc(s.bg||'—')+'</td>'
    +'<td>'+'★'.repeat(+s.rating||0)+'</td>'
    +'<td>'+esc(s.tier||'—')+'</td>'
    +'<td>'+esc(s.buy||'—')+'</td>'
    +'<td>'+esc(s.price||'—')+'</td>'
    +'<td class="muted">'+esc(s.confuse||'')+'</td>'
    +'<td class="muted">'+esc(s.improve||'')+'</td></tr>';
  }).join('');

  $('#adminBody').innerHTML =
   '<div class="card" style="--a:#f0b65a"><h2>Paste a feedback code</h2>'
     +'<p class="lead" style="margin:6px 0 12px">When a tester finishes their survey they email you a feedback code (starts with <code>MPSFB1.</code>). Paste it here to record their results and unlock their lifetime status in your dashboard.</p>'
     +'<textarea id="fbIn" placeholder="MPSFB1...."></textarea>'
     +'<button class="btn" style="margin-top:12px" id="fbBtn">Record this feedback</button>'
   +'</div>'
   +'<div class="card"><div class="row" style="justify-content:space-between"><h2>Customer discovery ('+discovery.length+')</h2>'
     +(discovery.length?'<button class="btn ghost sm" onclick="exportFeedback()">Export CSV</button>':'')+'</div>'
     +'<div class="field" style="margin-top:12px"><input id="fSearch" placeholder="Search answers…" oninput="filterDiscovery(this.value)"></div>'
     +(discovery.length?'<div style="overflow-x:auto"><table id="discTable"><thead><tr><th>Tester</th><th>Background</th><th>Rating</th><th>Pricing</th><th>Buy?</th><th>Fair price</th><th>Confusion</th><th>Improvement</th></tr></thead><tbody>'+dRows+'</tbody></table></div>'
       :'<p class="hint" style="margin-top:10px">No feedback recorded yet. Paste a tester\'s code above to populate this.</p>')
   +'</div>';

  $('#fbBtn').onclick=function(){
    var r=readReceipt($('#fbIn').value);
    if(!r){ toast('That code isn\'t valid. Copy the whole MPSFB1… line.'); return; }
    var ad=loadAdmin(); ad.feedback=ad.feedback||[];
    var existing=ad.feedback.findIndex(function(f){return (f.e||'').toLowerCase()===(r.e||'').toLowerCase();});
    if(existing>=0) ad.feedback[existing]=r; else ad.feedback.push(r);
    // if this email isn't in invites (e.g. a referral), add a record so it appears
    if(!ad.invites.some(function(i){return (i.email||'').toLowerCase()===(r.e||'').toLowerCase();})){
      ad.invites.push({ idx:ad.invites.length, name:r.n, email:r.e, invitedBy:r.by||'referral', code:'(external)', created:r.start||Date.now(), expiry:r.start||Date.now(), status:'claimed', surveyCompleted:true, lifetime:true });
    }
    saveAdmin(ad);
    toast('Feedback recorded ✓');
    adminFeedback();
  };
}
function filterDiscovery(q){ q=(q||'').toLowerCase(); var rows=document.querySelectorAll('#discTable tbody tr'); rows.forEach(function(r){ r.style.display = r.textContent.toLowerCase().indexOf(q)>=0?'':'none'; }); }
function exportFeedback(){
  var a=loadAdmin();
  var rows=[['Name','Email','Background','Rating','WhatItDoes','Tier','Why','Confusion','Favorite','Improvement','WouldBuy','FairPrice','Other','SurveyDate']];
  a.invites.filter(function(i){return i.survey;}).forEach(function(i){var s=i.survey;rows.push([i.name||'',i.email,s.bg||'',s.rating||'',s.does||'',s.tier||'',s.why||'',s.confuse||'',s.fav||'',s.improve||'',s.buy||'',s.price||'',s.other||'',fmtDate(i.surveyDate)]);});
  downloadCSV('mps_beta_feedback.csv', rows);
}

function adminConfig(){
  var rows = Object.keys(CONFIG).map(function(k){
    var v=CONFIG[k]; if(Array.isArray(v)) v=v.join(', ');
    return '<tr><td><code>'+k+'</code></td><td class="muted">'+esc(String(v))+'</td></tr>';
  }).join('');
  var a=loadAdmin();
  $('#adminBody').innerHTML =
   '<div class="card"><h2>Configuration</h2>'
     +'<p class="lead" style="margin:6px 0 14px">These are the live settings. To change any of them, edit the <code>CONFIG</code> block near the top of <code>mps_beta.html</code> — nothing is hard-coded anywhere else.</p>'
     +'<table><thead><tr><th>Setting</th><th>Current value</th></tr></thead><tbody>'+rows+'</tbody></table>'
   +'</div>'
   +'<div class="card" style="--a:#ff6b6b"><h2>Data</h2>'
     +'<p class="lead" style="margin:6px 0 12px">'+a.invites.length+' invitations and '+(a.feedback||[]).length+' feedback records are stored in this browser.</p>'
     +'<div class="row g8"><button class="btn ghost sm" onclick="backupAll()">Download backup (JSON)</button>'
     +'<button class="btn danger sm" onclick="wipeAll()">Erase all beta data</button></div>'
   +'</div>';
}
function backupAll(){ var blob=new Blob([JSON.stringify(loadAdmin(),null,2)],{type:'application/json'}); var u=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=u; a.download='mps_beta_backup.json'; a.click(); URL.revokeObjectURL(u); }
function wipeAll(){ if(confirm('Erase ALL beta invitations and feedback from this browser? This cannot be undone.')){ localStorage.removeItem(MK.admin); toast('All beta data erased'); adminTab('dash'); } }

/* ---------- small analytics utils ---------- */
function mode(arr){ arr=arr.filter(Boolean); if(!arr.length) return ''; var c={}; var best='',bn=0; arr.forEach(function(x){c[x]=(c[x]||0)+1; if(c[x]>bn){bn=c[x];best=x;}}); return best+' ('+bn+')'; }
function topCount(arr){ return mode(arr); }
function downloadCSV(name, rows){
  var csv=rows.map(function(r){return r.map(function(c){c=String(c==null?'':c); return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'}); var u=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u);
}

/* ---------- chrome ---------- */
function setPill(t){ $('#topPill').textContent=t; }
$('#adminToggle').onclick=function(){ var u=baseUrl()+'?admin=1'; location.href=u; };

/* go */
route();
</script>
</body>
