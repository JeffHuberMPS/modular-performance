<style>

  .topbar { height:54px; background:#0d0d0d; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 18px; gap:12px; position:sticky; top:0; z-index:30; }

  .card::after { content:''; position:absolute; top:16px; bottom:16px; left:0; width:3px; border-radius:0 3px 3px 0; background:var(--a,#00d4ff); box-shadow:0 0 16px var(--a,#00d4ff); }

  .btn.sm { padding:9px 14px; font-size:13px; border-radius:9px; }

  .btn.danger:hover { border-color:#ff6b6b; background:rgba(255,107,107,0.06); }
  .btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
  .status-badge { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700; border-radius:20px; padding:6px 13px; }

  /* spots-left meter */
  .meter { margin:18px 0; }

  .bar { height:12px; background:#0e0f13; border:1px solid #242830; border-radius:8px; overflow:hidden; }

  .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); gap:14px; }
  .stat { background:#0e0f13; border:1px solid #20232b; border-radius:13px; padding:15px 16px; }

  table { width:100%; border-collapse:collapse; font-size:13px; }

  tr:hover td { background:rgba(255,255,255,0.02); }
  .tag { font-size:11px; font-weight:700; border-radius:6px; padding:2px 8px; white-space:nowrap; }
  .t-claim { background:#0e2c1a; color:#2ecc71; } .t-life { background:#1a1030; color:#b388ff; }
  .tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }

  .tab.active { background:#0e2630; color:#00d4ff; border-color:#00d4ff; }

  h2 .ti svg { width:17px; height:17px; }
  .divider { height:1px; background:#1f1f1f; margin:22px 0; }
  .qacc { border:1px solid #20242c; border-radius:12px; margin-bottom:10px; overflow:hidden; background:#0e0f13; }
  .qacc-head { display:flex; align-items:center; gap:11px; padding:14px 16px; cursor:pointer; user-select:none; }
  .qacc-head:hover { background:rgba(255,255,255,0.025); }
  .qacc-arrow { color:#00d4ff; font-size:11px; width:12px; flex-shrink:0; transition:transform .15s; }
  .qacc.open .qacc-arrow { transform:rotate(90deg); }
  .qacc-q { font-size:14px; font-weight:600; color:#e8ecf2; flex:1; }
  .qacc-count { font-size:12px; font-weight:700; font-family:'Courier New',monospace; color:#9aa2ad; background:#1a1d24; border-radius:20px; padding:3px 11px; flex-shrink:0; }
  .qacc-body { padding:2px 16px 14px 39px; }
  .qacc-tally { font-size:12.5px; color:#00d4ff; margin:2px 0 12px; font-weight:600; }
  .qacc-ans { padding:8px 0; border-bottom:1px solid #1a1a1a; font-size:13px; color:#cdd2da; display:flex; justify-content:space-between; gap:14px; align-items:baseline; }
  .qacc-ans:last-child { border-bottom:none; }
  .qacc-ans .who { color:#6a7280; font-size:12px; white-space:nowrap; }
  .qacc-empty { font-size:13px; color:#5f6671; padding:4px 0; }
  .stars { display:flex; gap:6px; font-size:30px; }
  .stars span { cursor:pointer; color:#33373f; transition:.1s; }
  .stars span.on { color:#f0b65a; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#13283a; border:1px solid #00d4ff; color:#cfeaff; padding:12px 18px; border-radius:8px; font-size:13px; z-index:99999; max-width:90%; text-align:center; box-shadow:0 6px 24px rgba(0,0,0,.6); }
  .footnote { font-size:11px; color:#444; text-align:center; margin-top:30px; }
  ul.clean { list-style:none; } ul.clean li { padding:7px 0; border-bottom:1px solid #1c1c1c; font-size:13px; color:#cdd2da; display:flex; gap:8px; }
  ul.clean li:last-child { border-bottom:none; }
  .ok-check { color:#2ecc71; }
  .spinner { width:34px; height:34px; border:3px solid #1d2a33; border-top-color:#00d4ff; border-radius:50%; animation:spin .8s linear infinite; margin:30px auto; }

  @media (max-width:560px){ .card { padding:24px 20px; } h1 { font-size:22px; } }

<body>
  <div class="topbar">
    <div class="logo">MPS <span class="accent">OS</span> &nbsp;<span class="sub">Closed Beta</span></div>
    <span class="pill" id="topPill">Beta Access</span>
    <a class="admin-link" id="adminToggle">Admin</a>
  </div>
  <div id="app"><div class="wrap"><div class="spinner"></div></div></div>
  <div class="footnote" id="foot">MPS Closed Beta · limited free spots</div>

<script>
/* ============================================================
   MPS CLOSED BETA  —  PUBLIC, CAPPED, Firebase-backed
   One public link. First N people get free Premium beta.
   A server-side counter enforces the cap across all devices.
   ============================================================ */
const CONFIG = {
  DEFAULT_CAP:     100,   // used only to seed the counter the first time
  BETA_TRIAL_DAYS: 7,
  PRODUCT_NAME:    'MPS Performance System',
  PRICING_URL:     '/landing.html',
  PRICING_TIERS:   ['Free', 'Elite', 'Premium'],
  OWNER_EMAIL:     'jeffreyhuber86@gmail.com'   // only this account can read the roster
};

/* Firebase config — SAME project as the live MPS app (client keys are public/safe) */
const firebaseConfig = {
  apiKey:            "AIzaSyD4PeWraZijDdwOSWogkj7SQjWZSRvJQbY",
  authDomain:        "modular-performance.firebaseapp.com",
  projectId:         "modular-performance",
  storageBucket:     "modular-performance.firebasestorage.app",
  messagingSenderId: "596501615310",
  appId:             "1:596501615310:web:252c59a5039665ebe4769f"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const COUNTER = db.collection('beta_meta').doc('counter');
const SIGNUPS = db.collection('beta_signups');

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
function toast(m){ var t=document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t); setTimeout(function(){ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(function(){t.remove();},400); },2600); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function fmtDate(ms){ if(!ms) return '—'; return new Date(ms).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function daysLeft(ms){ if(!ms) return 0; return Math.ceil((ms - Date.now())/86400000); }
function hoursLeft(ms){ if(!ms) return 0; return Math.max(0, Math.floor((ms - Date.now())/3600000)); }
// midnight at the END of the Nth day (signup day counts as day 1) — the survey deadline
function deadlineMidnight(days){ var t=new Date(); t.setHours(0,0,0,0); return t.getTime() + days*86400000; }
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function setPill(t){ $('#topPill').textContent=t; }
function validEmail(e){ return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e); }
function hash(str){ var h=5381; for(var i=0;i<str.length;i++){ h=((h<<5)+h)^str.charCodeAt(i); h=h>>>0; } return (h>>>0).toString(36); }
function emailKey(e){ e=e.toLowerCase().trim(); return e.replace(/[^a-z0-9]/g,'_').slice(0,40)+'_'+hash(e); }
function copyText(t){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(function(){toast('Copied ✓');},fb); } else fb(); function fb(){ var a=document.createElement('textarea'); a.value=t; document.body.appendChild(a); a.select(); try{document.execCommand('copy');toast('Copied ✓');}catch(e){} a.remove(); } }

/* ---------- local cache of THIS device's membership ---------- */
const MEKEY='mps_beta_me';
function loadMe(){ try{ return JSON.parse(localStorage.getItem(MEKEY)); }catch(e){ return null; } }
function saveMe(o){ localStorage.setItem(MEKEY, JSON.stringify(o)); }

/* ============================================================
   PAYWALL HOOK — other MPS pages call MPSBeta.hasPremium()
   ============================================================ */
window.MPSBeta = {
  hasPremium:function(){ var me=loadMe(); if(!me) return false; if(me.lifetime) return true; return Date.now()<=me.betaExpiry; },
  state:function(){ return loadMe(); }
};

/* ============================================================
   ROUTER
   ============================================================ */
function qs(n){ var m=location.search.match(new RegExp('[?&]'+n+'=([^&]+)')); return m?decodeURIComponent(m[1]):null; }
async function route(){
  if(qs('admin')==='1'){ return renderAdmin(); }
  var me = loadMe();
  if(me){
    if(me.lifetime) return renderLifetime(me);
    if(Date.now() > me.betaExpiry && !me.surveyCompleted){ return renderBetaEnded(me); }
    return renderDashboard();
  }
  return renderJoin();
}

/* ============================================================
   PUBLIC JOIN (the give-to-anyone screen)
   ============================================================ */
async function renderJoin(){
  setPill('Closed Beta');
  $('#app').innerHTML = '<div class="wrap"><div class="spinner"></div></div>';
  var c = await readCounter();
  if(c && (!c.open || c.count >= c.cap)) return renderFull(c);

  var left = c ? Math.max(0, c.cap - c.count) : null;
  var pct = c ? Math.min(100, Math.round(c.count / c.cap * 100)) : 0;
  $('#app').innerHTML =
  '<div class="wrap"><div class="card">'
   +'<div class="big-emoji">🎟️</div>'
   +'<h1>Join the '+esc(CONFIG.PRODUCT_NAME)+'<br>Closed Beta — free</h1>'
   +'<p class="lead" style="margin-top:10px">We\'re letting a limited number of people in early. Grab a spot and get <b class="accentc">'+CONFIG.BETA_TRIAL_DAYS+' days of full Premium, free</b>.</p>'
   + (c ? '<div class="meter"><div class="meter-top"><b>Free spots</b><span class="left">'+left+' left</span></div><div class="bar"><div style="width:'+pct+'%"></div></div><div class="hint">'+c.count+' of '+c.cap+' claimed</div></div>'
        : '<div class="hint" style="margin:16px 0">Connecting…</div>')
   +'<div class="card" style="--a:#2ecc71;margin:18px 0;background:#0c1510;border-color:#1c3a28">'
     +'<h2>The simple deal</h2><ul class="clean" style="margin-top:8px">'
       +'<li><span class="ok-check">✔</span> '+CONFIG.BETA_TRIAL_DAYS+' days of Premium MPS, totally free.</li>'
       +'<li><span class="ok-check">✔</span> You give us one short, honest feedback survey.</li>'
       +'<li><span class="ok-check">✔</span> Finish it → keep Premium <b>free for life</b>.</li>'
     +'</ul></div>'
   +'<div class="field"><label>Your first name</label><input id="jn" placeholder="Alex"></div>'
   +'<div class="field"><label>Your email</label><input id="je" placeholder="you@email.com" type="email"><div class="hint">One spot per email. We use this only for your beta access.</div></div>'
   +'<button class="btn block" id="joinBtn">Claim my free beta spot →</button>'
  +'</div></div>';
  $('#joinBtn').onclick = doJoin;
}

async function doJoin(){
  var name = $('#jn').value.trim(), email = $('#je').value.trim().toLowerCase();
  if(!name){ toast('Please enter your first name.'); return; }
  if(!validEmail(email)){ toast('Please enter a valid email.'); return; }
  var btn = $('#joinBtn'); btn.disabled=true; btn.textContent='Claiming…';
  var res = await claimSpot(name, email);
  if(res.error==='full'){ btn.disabled=false; btn.textContent='Claim my free beta spot →'; return renderFull(res.counter); }
  if(res.error==='no-counter'){ btn.disabled=false; btn.textContent='Claim my free beta spot →'; return toast('Beta isn\'t open yet — check back soon.'); }
  if(res.error){ btn.disabled=false; btn.textContent='Claim my free beta spot →'; return toast('Something went wrong. Please try again.'); }
  // success or already-claimed → cache locally + go to dashboard
  saveMe(res.data);
  if(res.already) toast('Welcome back — restoring your beta.');
  else toast('You\'re in! Premium unlocked 🎉');
  route();
}

/* transaction: enforce cap atomically across all devices */
async function claimSpot(name, email){
  var key = emailKey(email), now = Date.now();
  try {
    return await db.runTransaction(async function(tx){
      var cSnap = await tx.get(COUNTER);
      if(!cSnap.exists) throw {code:'no-counter'};
      var c = cSnap.data();
      var sSnap = await tx.get(SIGNUPS.doc(key));
      if(sSnap.exists){ return {already:true, data:sSnap.data()}; }
      if(!c.open || c.count >= c.cap){ var e={code:'full'}; e.counter=c; throw e; }
      var rec = { name:name, email:email, joinedAt:now, betaStart:now,
        betaExpiry: deadlineMidnight(CONFIG.BETA_TRIAL_DAYS), invitedBy:'public',
        surveyCompleted:false, surveyDate:null, survey:null, lifetime:false };
      tx.set(SIGNUPS.doc(key), rec);
      tx.update(COUNTER, { count: c.count + 1 });
      return {created:true, data:rec};
    });
  } catch(e){ return { error:(e&&e.code)||'error', counter:(e&&e.counter)||null }; }
}

async function readCounter(){ try{ var s=await COUNTER.get(); return s.exists? s.data():null; }catch(e){ return null; } }

/* ============================================================
   TESTER DASHBOARD (trial)
   ============================================================ */
function renderDashboard(){
  var me = loadMe(); setPill('Premium Beta');
  var dleft = Math.max(0, daysLeft(me.betaExpiry));
  var hrs = hoursLeft(me.betaExpiry) % 24;
  // phase by how close the midnight deadline is — survey is timed so they've actually used it
  var phase = dleft<=1 ? 'final' : (dleft<=4 ? 'push' : 'early');
  var urgent = phase==='final';

  var capLabel, capColor, capBg, capBorder;
  if(phase==='final'){ capLabel='Final day — closes midnight'; capColor='#ff6b6b'; capBg='#2e1414'; capBorder='#5a2424'; }
  else if(phase==='push'){ capLabel='Ready when you are'; capColor='#f0b65a'; capBg='#16120a'; capBorder='#3a2f14'; }
  else { capLabel='Settle in — survey comes later'; capColor='#2ecc71'; capBg='#0c1510'; capBorder='#1c3a28'; }

  var surveyCard;
  if(phase==='early'){
    surveyCard = '<div class="card" style="--a:#2ecc71"><h2>Settle in first</h2>'
      +'<p class="lead" style="margin:8px 0 4px">Use MPS for real over the next few days. In a bit we\'ll ask what you honestly think — and that\'s what unlocks <b class="accentc">Premium for life</b>. No rush yet.</p>'
      +'<button class="btn ghost block" style="margin-top:16px" onclick="renderSurvey()">Used it enough already? Take the survey →</button></div>';
  } else if(phase==='push'){
    surveyCard = '<div class="card" style="--a:#f0b65a"><h2>Ready when you are: the feedback survey</h2>'
      +'<p class="lead" style="margin:8px 0 4px">You\'ve had a few days with MPS. Tell us the truth and lock in <b class="accentc">Premium for life</b> — about 2 minutes.</p>'
      +'<button class="btn block" style="margin-top:16px" onclick="renderSurvey()">Take the survey & unlock lifetime →</button></div>';
  } else {
    surveyCard = '<div class="card" style="--a:#ff6b6b;background:#1a0e0e;border-color:#5a2424"><h2 style="color:#ff6b6b">⚠ Final day — survey closes at midnight</h2>'
      +'<p class="lead" style="margin:8px 0 4px">This is your last chance. Finish the survey before <b>midnight tonight</b> to keep Premium <b class="accentc">free for life</b>. Miss it and your access ends.</p>'
      +'<button class="btn block" style="margin-top:16px;background:#ff6b6b;color:#2a0a0a" onclick="renderSurvey()">Finish my survey now →</button></div>';
  }

  $('#app').innerHTML =
  '<div class="wrap">'
   +'<div class="card"><div class="row" style="justify-content:space-between"><h1 style="font-size:22px">Welcome, '+esc(me.name||'tester')+' 👋</h1>'
     +'<span class="status-badge sb-active">● Premium active</span></div>'
     +'<p class="lead" style="margin-top:8px">Your full Premium beta is unlocked. Use it like you own it — then tell us the truth.</p>'
     +'<div class="label">Time left in your free trial</div>'

async function submitSurvey(){
  var ans={}, missing=false, weak=false;
  RATINGS.forEach(function(r){ var inp=$('#f_'+r.k); var v=inp?inp.value:''; ans[r.k]=v; if(!v) missing=true; });
  SURVEY_Q.forEach(function(q){
    var el=$('#f_'+q.k); var v=el?el.value.trim():''; ans[q.k]=v;
    if(el) el.style.borderColor='';
    if(q.opt) return;
    if(!v){ missing=true; if(el) el.style.borderColor='#ff6b6b'; return; }
    // reject lazy / junk answers on the open-text questions
    if((q.type==='text'||q.type==='short')){
      if(isJunk(v) || (q.min && v.length<q.min)){ weak=true; if(el) el.style.borderColor='#ff6b6b'; }
    }
  });
  if(missing){ toast('Please rate everything and answer every question.'); return; }
  if(weak){ toast('A couple answers need a real sentence. We read every one.'); return; }
  var btn=$('#submitSurvey'); btn.disabled=true; btn.textContent='Saving…';
  var me=loadMe();
  me.survey=ans; me.surveyCompleted=true; me.surveyDate=Date.now(); me.lifetime=true; me.rating=ans.r_overall;

  try{
    await SIGNUPS.doc(emailKey(me.email)).update({ surveyCompleted:true, surveyDate:me.surveyDate, survey:ans, lifetime:true, rating:ans.r_overall });
  }catch(e){ /* keep local lifetime even if the write hiccups */ }
  saveMe(me);
  renderComplete(me);
}

  var ob=$('#openBtn'); if(ob) ob.onclick=async function(){ try{ await COUNTER.update({ open: !c.open }); toast('Saved ✓'); adminTab('settings'); }catch(e){ toast('Failed: '+(e.code||e.message)); } };
}
function publicLink(){ return location.origin + location.pathname; }

/* CSV */
function downloadCSV(name,rows){ var csv=rows.map(function(r){return r.map(function(c){c=String(c==null?'':c); return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',');}).join('\n'); var b=new Blob([csv],{type:'text/csv'}); var u=URL.createObjectURL(b); var a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function exportSignups(){ var rows=[['Name','Email','Status','SurveyDone','SurveyDate','Joined']]; ADMIN_DATA.signups.forEach(function(x){ rows.push([x.name||'',x.email,x.lifetime?'lifetime':'trial',x.surveyCompleted?'Yes':'No',fmtDate(x.surveyDate),fmtDate(x.joinedAt)]); }); downloadCSV('mps_beta_signups.csv',rows); }
function exportFeedback(){ var rows=[['Name','Email','EaseOfUse','LookFeel','Usefulness','WorthThePrice','Overall','PlanWouldPayFor','FairPrice','ChangeOneThing','AlmostQuit','FeatureToAdd','LikedMost','KeepUsing','SurveyDate']]; ADMIN_DATA.signups.filter(function(x){return x.survey;}).forEach(function(i){var s=i.survey;rows.push([i.name||'',i.email,s.r_ease||'',s.r_look||'',s.r_useful||'',s.r_worth||'',s.r_overall||'',s.tier||'',s.price||'',s.change||'',s.quit||'',s.feature||'',s.liked||'',s.keep||'',fmtDate(i.surveyDate)]);}); downloadCSV('mps_beta_feedback.csv',rows); }
