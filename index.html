<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MPS" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Every system. One platform. Built for the ones who don't quit." />
  <title>MPS — Modular Performance</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Splash ─────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Center block ───────────────────────────────── */
    .splash-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      user-select: none;
    }

    /* MPS — big, white M+S, gold P */
    .splash-mps {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 28vw, 160px);
      line-height: 1;
      letter-spacing: 0.06em;
    }
    .splash-mps .m { color: #ffffff; }
    .splash-mps .p {
      color: transparent;
      background: linear-gradient(160deg, #7A5A00 0%, #C9A020 20%, #F5E060 48%, #D4AF37 65%, #8B6600 100%);
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0 0 14px rgba(201,160,32,0.5));
    }
    .splash-mps .s { color: #ffffff; }

    /* Gold divider under MPS */
    .splash-divider {
      width: 56px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,160,32,0.8), transparent);
      margin: 10px auto 12px;
    }

    /* MODULAR PERFORMANCE SYSTEMS */
    .splash-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(11px, 3.2vw, 15px);
      letter-spacing: 0.32em;
      color: rgba(201, 160, 32, 0.82);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Tagline */
    .splash-tagline {
      margin-top: 20px;
      font-size: clamp(12px, 3.5vw, 15px);
      color: rgba(255, 255, 255, 0.38);
      letter-spacing: 0.04em;
      line-height: 1.55;
      text-align: center;
    }

    /* Loading dots */
    .splash-loader {
      position: absolute;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .splash-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(201, 160, 32, 0.35);
      animation: dotPulse 1.3s ease-in-out infinite;
    }
    .splash-dot:nth-child(2) { animation-delay: 0.22s; }
    .splash-dot:nth-child(3) { animation-delay: 0.44s; }
    @keyframes dotPulse {
      0%, 80%, 100% { background: rgba(201,160,32,0.25); transform: scale(0.8); }
      40%            { background: rgba(201,160,32,0.9); transform: scale(1.2); }
    }

    /* Version */
    .splash-version {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: rgba(201, 160, 32, 0.22);
      white-space: nowrap;
    }
  </style>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="/firebase-config.js"></script>
</head>
<body>

  <div id="splash">
    <div class="splash-center">
      <!-- MPS with gold P -->
      <div class="splash-mps">
        <span class="m">M</span><span class="p">P</span><span class="s">S</span>
      </div>

      <!-- Divider -->
      <div class="splash-divider"></div>

      <!-- Brand name below MPS -->
      <div class="splash-brand">Modular Performance Systems</div>

      <!-- Tagline -->
      <div class="splash-tagline">
        Stop guessing. Start measuring.<br>Watch discipline compound.
      </div>
    </div>

    <!-- Loading indicator -->
    <div class="splash-loader">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>

    <div class="splash-version">modular-performance.com</div>
  </div>

  <script>
    // ── Service Worker ───────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(console.warn);
    }

    // ── Splash + Auth Logic ──────────────────────────
    const SPLASH_MIN_MS = 2400;
    const splashEl      = document.getElementById('splash');

    let authUser    = undefined;
    let minTimeDone = false;

    // Installed app (added to home screen) launches straight into the app —
    // never the marketing landing page. The website still shows landing to visitors.
    // NOTE: do NOT use an `android-app://` referrer to detect the installed app.
    // In-app browsers (Instagram, Facebook, Messenger) set the referrer to
    // android-app://com.instagram.android etc., which falsely flagged real
    // visitors as the installed app and skipped them past the landing page
    // straight to sign-in. display-mode/standalone are the reliable signals.
    var isInstalledApp =
      (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
      window.navigator.standalone === true;

    // FAST PATH: a plain website visitor (not the installed app, not a ?beta link) can ONLY
    // go to the landing page, and that decision depends on nothing async. So jump there
    // instantly — no 2.4s splash, no waiting on Firebase. The splash below only runs for the
    // installed-app / beta paths, which genuinely need the auth state to pick a destination.
    (function() {
      var qs = location.search || '';
      var isBeta = false; try { isBeta = new URLSearchParams(qs).has('beta'); } catch(e){}
      if (!isInstalledApp && !isBeta) {
        window.location.replace('/landing.html' + qs);
      }
    })();

    function tryProceed() {
      if (authUser === undefined || !minTimeDone) return;
      splashEl.classList.add('fade-out');
      setTimeout(function() {
        var qs = location.search || '';                  // preserve ?beta & ?ref through the splash
        var isBeta = false; try { isBeta = new URLSearchParams(qs).has('beta'); } catch(e){}
        var dest;
        if (isInstalledApp) {
          dest = authUser ? '/hub.html' : '/auth.html'; // app: signed-in → app, else → sign in
        } else {
          // website: a beta link goes straight into the app (sign-in → hub); everyone else sees marketing
          dest = isBeta ? (authUser ? '/hub.html' : '/auth.html') : '/landing.html';
        }
        window.location.replace(dest + qs);
      }, 480);
    }

    setTimeout(function() {
      minTimeDone = true;
      tryProceed();
    }, SPLASH_MIN_MS);

    firebase.auth().onAuthStateChanged(function(user) {
      authUser = user || null;
      tryProceed();
    });
  </script>
</body>
</html>
