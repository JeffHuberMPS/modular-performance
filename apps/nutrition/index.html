<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPS — Nutrition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --g:#2dd4bf;            /* nutrition — Seahawks "Action Green" */
    --g2:#5eead4;           /* lighter */
    --gdark:#08240f;        /* text on green */
    --gglow:rgba(45,212,191,0.45);
    --gactive:#16280e;      /* dark green active bg */
    --gold:#d8b25f;
    --bg:#050506;
    --mut:#8a93a0;
    --mut2:#5f6a76;
    --line:#1d2126;
    --disp:'Oswald','Arial Narrow','Helvetica Neue',Impact,sans-serif;
    --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--body); background:var(--bg); color:#fff; min-height:100vh; padding:22px;
    background-image:radial-gradient(880px 480px at 12% -14%, rgba(45,212,191,0.07), transparent 60%), radial-gradient(760px 460px at 100% -8%, rgba(120,140,170,0.04), transparent 60%); }
  /* Smooth momentum scrolling + keep the scroll from chaining into the shell. */
  html, body { -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; }
  .accent { color:var(--g); }

  /* Modular Performance card look */
  .glass { position:relative; overflow:hidden;
    background:linear-gradient(162deg, #15181c 0%, #0c0e11 62%, #08090b 100%);
    border:1px solid var(--line);
    box-shadow:0 18px 40px rgba(0,0,0,0.55), 0 8px 34px -16px var(--gglow), inset 0 1px 0 rgba(255,255,255,0.05); }
  .glass::before { content:''; position:absolute; top:13px; bottom:13px; left:0; width:3px; border-radius:0 3px 3px 0; background:var(--g); box-shadow:0 0 16px var(--gglow); }

  /* Phones: lighten the per-tile paint so fast scrolling stays buttery. Big blurred shadows + card
     glows are expensive to re-rasterize as each row scrolls into view (the choppiness). Keep the
     look — just cheaper — and remove the accent-bar halo that repaints on every card. */
  @media (max-width:640px){
    .glass { box-shadow:0 6px 16px rgba(0,0,0,0.5); }
    .glass::before { box-shadow:none; }
    .tab.active { box-shadow:none; }
  }

  /* header */
  .header { display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .brand { display:flex; align-items:baseline; gap:11px; }
  .b-mps { font-family:var(--disp); font-weight:700; font-size:30px; letter-spacing:1px; background:linear-gradient(120deg,#f1d57e,#c79a44); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .b-dash { color:#c79a44; font-size:24px; font-weight:300; }
  .b-pillar { font-family:var(--disp); font-weight:600; font-size:15px; letter-spacing:5px; color:var(--g); text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .tier-badge { font-family:var(--disp); font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:8px 15px; border-radius:22px; cursor:pointer; transition:.15s; }
  .tier-free { background:#16191e; color:#9fb0c0; border:1px solid #2a2f36; }
  .tier-elite { background:var(--gactive); color:var(--g); border:1px solid var(--g); }
  .tier-premium { background:linear-gradient(120deg,#3b3015,#5c4720); color:#f1d98a; border:1px solid var(--gold); }
  .tier-premium::before { content:'◆ '; }
  .datepick { background:#0d0f12; border:1px solid #23272d; color:#fff; border-radius:10px; padding:8px 11px; font-size:13px; font-family:var(--body); }
  .datepick:focus { outline:none; border-color:var(--g); }

  /* tabs */
  .tabs { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:20px; }
  .tab { font-family:var(--disp); font-size:14px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; padding:9px 16px; border-radius:10px; color:#aab2bd; cursor:pointer; border:1px solid transparent; transition:.15s; display:flex; align-items:center; gap:7px; }
  .tab:hover { background:#13161a; color:#fff; }
  .tab.active { background:var(--gactive); color:var(--g); border-color:var(--g); box-shadow:0 0 22px -10px var(--gglow); }
  .tab .lock { font-size:11px; opacity:.7; }

  .view { display:none; }
  .view.active { display:block; }

  .section-title { font-family:var(--disp); font-size:13px; text-transform:uppercase; letter-spacing:3px; color:#7a8390; margin:6px 0 13px; }

  /* TODAY — donut */
  .today-top { display:flex; gap:18px; flex-wrap:wrap; align-items:stretch; margin-bottom:18px; }
  .donut-card { flex:1; min-width:300px; border-radius:18px; padding:24px; display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
  .donut-wrap { position:relative; width:190px; height:190px; flex-shrink:0; cursor:pointer; }
  .donut-wrap svg { transform:rotate(-90deg); }
  .donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
  .donut-center b { font-family:var(--disp); font-size:48px; font-weight:600; line-height:1; }
  .donut-center span { font-family:var(--disp); font-size:11px; color:#8a93a0; text-transform:uppercase; letter-spacing:2px; margin-top:5px; }
  .donut-center .hint { font-size:10px; color:#5f6a76; margin-top:8px; letter-spacing:0; font-family:var(--body); }
  .donut-legend { flex:1; min-width:180px; }
  .legend-row { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:13px; }
  .legend-dot { width:11px; height:11px; border-radius:3px; flex-shrink:0; }
  .legend-name { flex:1; color:#cdd4dc; }
  .legend-val { font-family:var(--disp); font-weight:500; letter-spacing:.5px; }
  .meal-mini { min-width:240px; flex:1; border-radius:18px; padding:20px; }
  .meal-mini h3 { font-family:var(--disp); font-size:13px; text-transform:uppercase; letter-spacing:2px; color:#8a93a0; margin-bottom:12px; }
  .mscore { font-family:var(--disp); font-size:40px; font-weight:600; color:var(--g); margin-bottom:4px; line-height:1; }
  .mscore small { font-size:13px; color:#8a93a0; font-weight:400; letter-spacing:0; }
  .mlist { font-size:12px; color:#aab2bd; line-height:1.7; }
  .mlist .done { color:var(--g); }
  .mlist .miss { color:#5f6a76; }

  /* breakdown bars */
  .breakdown { display:none; }
  .breakdown.show { display:block; }
  .bd-grid { display:grid; grid-template-columns:1fr 200px; gap:18px; }
  @media(max-width:720px){ .bd-grid { grid-template-columns:1fr; } }
  .bar-row { margin-bottom:14px; }
  .bar-top { display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; }
  .bar-top .n { font-weight:600; }
  .bar-top .v { font-family:var(--disp); letter-spacing:.5px; }
  .bar-track { height:22px; background:#15181c; border:1px solid #1d2126; border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:5px; transition:width .4s; min-width:2px; }
  .bd-overall { border-radius:18px; padding:22px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .bd-overall b { font-family:var(--disp); font-size:52px; font-weight:600; line-height:1; }
  .bd-overall span { font-family:var(--disp); font-size:12px; color:#8a93a0; text-transform:uppercase; letter-spacing:2px; margin-top:4px; }
  .back-btn { font-size:12px; color:var(--g); cursor:pointer; margin-bottom:14px; display:inline-block; }

  /* meals on Today */
  .meals-wrap { margin-top:6px; }
  .meal-block { border-radius:15px; padding:16px 18px; margin-bottom:12px; }
  .meal-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:4px; }
  .meal-head h3 { font-size:15px; font-weight:600; }
  .meal-head .add { font-family:var(--disp); letter-spacing:1px; background:var(--g); color:var(--gdark); border:none; border-radius:8px; padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer; text-transform:uppercase; }
  .meal-head .add:hover { box-shadow:0 0 14px var(--gglow); }
  .meal-sum { font-size:11px; color:#8a93a0; font-family:var(--disp); letter-spacing:.5px; }
  .food-line { display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px solid #1f242a; font-size:13px; }
  .food-emoji { font-size:20px; flex-shrink:0; }
  .food-info { flex:1; min-width:0; }
  .food-info .fn { font-weight:500; }
  .food-info .fm { font-size:11px; color:#8a93a0; font-family:var(--disp); letter-spacing:.5px; }
  .food-del { color:#5f6a76; cursor:pointer; font-size:16px; padding:0 4px; }
  .food-del:hover { color:#ffffff; }
  .meal-empty { font-size:12px; color:#5f6a76; padding:6px 0; }

  /* search / log modal */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); align-items:flex-start; justify-content:center; padding:18px; z-index:50; overflow-y:auto; }
  .overlay.active { display:flex; }
  .modal { width:100%; max-width:520px; border-radius:16px; padding:22px; margin-top:30px; border:1px solid rgba(45,212,191,.35); background:linear-gradient(160deg, #16191e, #0b0c0e); box-shadow:0 24px 60px rgba(0,0,0,0.7), 0 0 50px -20px var(--gglow); }
  .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .modal-head h2 { font-family:var(--disp); font-weight:600; font-size:19px; letter-spacing:1px; }
  .modal-head .x { cursor:pointer; color:#8a93a0; font-size:22px; line-height:1; }
  .search-in { width:100%; background:#0a0b0d; border:1px solid #262b31; color:#fff; border-radius:10px; padding:12px 14px; font-size:15px; margin-bottom:10px; font-family:var(--body); }
  .search-in:focus { outline:none; border-color:var(--g); }
  .cat-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .chip { font-size:11px; padding:5px 11px; border-radius:14px; background:#15181c; border:1px solid #262b31; color:#aab2bd; cursor:pointer; }
  .chip.active { background:var(--gactive); border-color:var(--g); color:var(--g); }
  .results { max-height:340px; overflow-y:auto; }
  .res-item { display:flex; align-items:center; gap:11px; padding:10px 8px; border-radius:10px; cursor:pointer; }
  .res-item:hover { background:#14171b; }
  .res-emoji { font-size:22px; }
  .res-info { flex:1; min-width:0; }
  .res-info .rn { font-size:14px; font-weight:500; }
  .res-info .rm { font-size:11px; color:#8a93a0; font-family:var(--disp); letter-spacing:.5px; }
  .res-fav { font-size:16px; cursor:pointer; padding:0 4px; }
  .star-on { color:#ffc24d; }
  .star-off { color:#3a424c; }
  .res-empty { color:#5f6a76; text-align:center; padding:24px; font-size:13px; }

  /* serving selector */
  .serv-food { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .serv-food .se { font-size:34px; }
  .serv-food .sn { font-size:17px; font-weight:600; }
  .serv-food .sc { font-size:12px; color:#8a93a0; }
  label { display:block; font-family:var(--disp); font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#8a93a0; margin:12px 0 5px; }
  .modal input, .modal select { width:100%; background:#0a0b0d; border:1px solid #262b31; color:#fff; border-radius:9px; padding:11px; font-size:14px; font-family:var(--body); }
  .modal input:focus, .modal select:focus { outline:none; border-color:var(--g); }
  .serv-row { display:flex; gap:10px; }
  .serv-row > div { flex:1; }
  .macro-preview { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:16px 0; }
  .mp { background:#0d0f12; border:1px solid #1f242a; border-radius:10px; padding:11px; text-align:center; }
  .mp b { font-family:var(--disp); font-size:20px; font-weight:600; display:block; }
  .mp span { font-family:var(--disp); font-size:9px; text-transform:uppercase; letter-spacing:.5px; color:#8a93a0; }
  .modal-actions { display:flex; gap:8px; margin-top:8px; }
  .save { flex:1; font-family:var(--disp); letter-spacing:1px; text-transform:uppercase; background:var(--g); color:var(--gdark); border:none; border-radius:9px; padding:13px; font-weight:600; cursor:pointer; font-size:14px; }
  .cancel { font-family:var(--disp); letter-spacing:1px; text-transform:uppercase; background:none; border:1px solid #2a2f36; color:#9fb0c0; border-radius:9px; padding:13px 18px; cursor:pointer; }

  /* settings */
  .set-card { border-radius:16px; padding:20px; margin-bottom:16px; }
  /* Library: 4-container grid */
  .lib-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .lib-card { padding:20px 16px; cursor:pointer; transition:border-color .15s, transform .1s; }
  .lib-card:hover { border-color:var(--g); }
  .lib-card:active { transform:scale(.985); }
  .lib-ico { color:var(--g); margin-bottom:10px; }
  .lib-t { font-family:var(--disp); font-weight:600; letter-spacing:1px; font-size:15px; text-transform:uppercase; color:#e6ebf0; }
  .lib-c { font-size:26px; font-weight:700; margin-top:6px; color:#fff; font-variant-numeric:tabular-nums; line-height:1; }
  .lib-s { font-size:12px; color:#8a93a0; margin-top:3px; }
  @media (max-width:520px){ .lib-grid{ gap:9px; } .lib-card{ padding:16px 12px; } .lib-c{ font-size:23px; } }
  .set-card h3 { font-family:var(--disp); font-weight:600; letter-spacing:1px; font-size:16px; margin-bottom:4px; text-transform:uppercase; }
  .set-card .desc { font-size:12px; color:#8a93a0; margin-bottom:14px; line-height:1.5; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-top:1px solid #1f242a; gap:10px; }
  .toggle-row:first-of-type { border-top:none; }
  .toggle-row .tl { font-size:14px; }
  .toggle-row .tl small { display:block; font-size:11px; color:#8a93a0; }
  .sw { width:46px; height:26px; border-radius:14px; background:#262b31; position:relative; cursor:pointer; flex-shrink:0; transition:.2s; }
  .sw.on { background:var(--g); }
  .sw::after { content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s; }
  .sw.on::after { left:23px; }
  .sw.locked { opacity:.4; cursor:not-allowed; }
  .lock-tag { font-family:var(--disp); font-size:10px; letter-spacing:1px; background:linear-gradient(120deg,#3b3015,#5c4720); color:#f1d98a; padding:2px 8px; border-radius:10px; margin-left:6px; }
  .lock-tag.elite { background:var(--gactive); color:var(--g); }
  .tier-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
  .tier-opt { flex:1; min-width:130px; border-radius:12px; padding:15px; border:1px solid #262b31; background:#0d0f12; cursor:pointer; text-align:center; transition:.15s; }
  .tier-opt.sel { border-color:var(--g); background:var(--gactive); box-shadow:0 0 22px -10px var(--gglow); }
  .tier-opt .tn { font-family:var(--disp); font-weight:600; letter-spacing:1px; font-size:15px; }
  .tier-opt .tp { font-size:12px; color:#8a93a0; margin-top:3px; }
  .field-row { display:flex; gap:10px; flex-wrap:wrap; }
  .field-row > div { flex:1; min-width:130px; }
  input[type=number], select { font-family:var(--body); }
  .set-card input, .set-card select { width:100%; background:#0a0b0d; border:1px solid #262b31; color:#fff; border-radius:9px; padding:11px; font-size:14px; }
  .set-card input:focus, .set-card select:focus { outline:none; border-color:var(--g); }
  .btn-primary { font-family:var(--disp); letter-spacing:1px; text-transform:uppercase; background:var(--g); color:var(--gdark); border:none; border-radius:9px; padding:12px 18px; font-weight:600; cursor:pointer; font-size:13px; }
  .btn-ghost { font-family:var(--disp); letter-spacing:1px; text-transform:uppercase; background:none; border:1px solid #2a2f36; color:#9fb0c0; border-radius:9px; padding:12px 16px; cursor:pointer; font-size:13px; }

  /* insights / locked panels */
  .locked-panel { border-radius:16px; padding:34px 22px; text-align:center; }
  .locked-panel::before { display:none; }
  .locked-panel .lk { font-size:30px; margin-bottom:10px; }
  .locked-panel h3 { font-family:var(--disp); font-weight:600; letter-spacing:1px; font-size:18px; margin-bottom:6px; text-transform:uppercase; }
  .locked-panel p { font-size:13px; color:#8a93a0; max-width:380px; margin:0 auto 16px; line-height:1.5; }
  .insight-card { border-radius:14px; padding:16px 18px; margin-bottom:12px; }
  .insight-card::before { background:var(--g); }
  .insight-card.warn::before { background:#ffc24d; }
  .insight-card.good::before { background:#2ecc71; }
  .insight-card .ic-t { font-family:var(--disp); font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:#8a93a0; margin-bottom:4px; }
  .insight-card .ic-b { font-size:14px; line-height:1.55; }

  /* history */
  .range-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .range-tab { font-family:var(--disp); letter-spacing:1px; padding:8px 14px; border-radius:9px; font-size:12px; color:#aab2bd; cursor:pointer; background:#13161a; border:1px solid #1f242a; text-transform:uppercase; }
  .range-tab.active { background:var(--gactive); border-color:var(--g); color:var(--g); }
  .chart-card { border-radius:16px; padding:20px; margin-bottom:16px; }
  .hist-day { display:flex; align-items:center; gap:12px; padding:9px 0; border-top:1px solid #1f242a; font-size:13px; }
  .hist-day:first-of-type { border-top:none; }
  .hist-day .hd { width:80px; color:#aab2bd; font-size:12px; }
  .hist-bar { flex:1; height:18px; background:#15181c; border:1px solid #1d2126; border-radius:5px; overflow:hidden; }
  .hist-bar > div { height:100%; }
  .hist-pct { width:42px; text-align:right; font-family:var(--disp); letter-spacing:.5px; font-weight:600; }

  /* weight */
  .weight-now { display:flex; align-items:baseline; gap:10px; margin-bottom:4px; }
  .weight-now b { font-family:var(--disp); font-size:44px; font-weight:600; line-height:1; }
  .weight-now span { color:#8a93a0; }
  .wtrend { font-size:13px; margin-bottom:16px; }
  .wup { color:#ffffff; } .wdown { color:var(--g); }

  /* onboarding */
  .ob-overlay { position:fixed; inset:0; background:rgba(4,5,6,.97); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; }
  .ob-card { width:100%; max-width:440px; border-radius:18px; padding:28px; border:1px solid rgba(45,212,191,.28); background:linear-gradient(160deg, #16191e, #0a0b0d); box-shadow:0 30px 70px rgba(0,0,0,.7), 0 0 60px -24px var(--gglow); }
  .ob-card .ob-step { font-family:var(--disp); font-size:11px; color:var(--g); letter-spacing:2px; text-transform:uppercase; }
  .ob-card h2 { font-family:var(--disp); font-weight:600; letter-spacing:1px; font-size:24px; margin:6px 0 4px; text-transform:uppercase; }
  .ob-card .ob-q { font-size:13px; color:#8a93a0; margin-bottom:18px; }
  .ob-opts { display:flex; flex-direction:column; gap:9px; }
  .ob-opt { padding:14px; border-radius:11px; border:1px solid #262b31; background:#0d0f12; cursor:pointer; font-size:14px; transition:.15s; }
  .ob-opt:hover, .ob-opt.sel { border-color:var(--g); background:var(--gactive); }
  .ob-sub { font-family:var(--disp); font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#8a93a0; margin:16px 0 8px; }
  .ob-sub:first-child { margin-top:0; }
  .ob-pills { display:flex; gap:9px; }
  .ob-pill { flex:1; padding:14px 0; text-align:center; border-radius:11px; border:1px solid #262b31; background:#0d0f12; cursor:pointer; font-size:17px; font-weight:600; font-family:var(--disp); transition:.15s; }
  .ob-pill:hover { border-color:var(--g); }
  .ob-pill.sel { border-color:var(--g); background:var(--gactive); color:var(--g); }
  .ob-card input { width:100%; background:#0a0b0d; border:1px solid #262b31; color:#fff; border-radius:10px; padding:13px; font-size:16px; font-family:var(--body); }
  .ob-card input:focus { outline:none; border-color:var(--g); }
  .ob-next { width:100%; font-family:var(--disp); letter-spacing:1px; text-transform:uppercase; background:var(--g); color:var(--gdark); border:none; border-radius:10px; padding:14px; font-weight:600; font-size:15px; cursor:pointer; margin-top:18px; }
  .ob-prog { display:flex; gap:5px; margin-bottom:18px; }
  .ob-prog > div { flex:1; height:6px; border-radius:2px; background:#262b31; transition:background .15s; }
  .ob-prog > div.on { background:var(--g); }
  .ob-prog > div.clk { cursor:pointer; }
  .ob-prog > div.clk:hover { background:var(--g2); box-shadow:0 0 8px var(--gglow); }

  .disclaimer { font-size:11px; color:#5f6a76; text-align:center; margin-top:24px; padding:14px; border-top:1px solid #15181c; line-height:1.5; }
</style>

<!-- ── Cross-device cloud sync (matches the other 5 systems): mirrors the single 'mps_nutrition' blob to
     users/{uid}/settings/nutrition_backup, timestamp-gated two-way, restores on a fresh device. ── -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/firebase-config.js"></script>
<script>
(function(){ 'use strict';
  if (typeof firebase === 'undefined' || !firebase.auth) return;
  var KEY = 'mps_nutrition', TS_KEY = 'nutrition_synced_ts';
  firebase.auth().onAuthStateChanged(function(user){
    if (!user) return;                     // signed out → local-only; hub handles auth
    var _bDoc = firebase.firestore().doc('users/' + user.uid + '/settings/nutrition_backup');
    var _busy = false, _timer = null;

    function _push(){
      if (_busy) return; _busy = true; var ts = Date.now(), val = null;
      try { val = localStorage.getItem(KEY); } catch(e){}
      try { _bDoc.set({ data: val, ts: ts, v: 1 }).then(function(){
        try { localStorage.setItem(TS_KEY, String(ts)); } catch(e){} _busy = false;
      }).catch(function(){ _busy = false; }); } catch(e){ _busy = false; }
    }
    // debounced backup, called from the app's save()
    window.nutritionScheduleBackup = function(){ if (_timer) clearTimeout(_timer); _timer = setTimeout(_push, 1500); };
    // wipe → push an empty state to the cloud with a fresh ts so the reset propagates (and restore won't undo it)
    window.nutritionPushWipe = function(){
      var ts = Date.now(); try { localStorage.setItem(TS_KEY, String(ts)); } catch(e){}
      try { return _bDoc.set({ data: null, ts: ts, v: 1 }); } catch(e){ return Promise.resolve(); }
    };

    // Restore on a fresh device ONLY when there's no local data yet (never clobber local edits).
    function _restoreIfEmpty(){
      var hasLocal = false; try { hasLocal = !!localStorage.getItem(KEY); } catch(e){}
      if (hasLocal) return Promise.resolve(false);
      return _bDoc.get().then(function(s){
        if (s.exists && s.data() && s.data().data){
          try { localStorage.setItem(KEY, s.data().data); } catch(e){}
          try { localStorage.setItem(TS_KEY, String(s.data().ts || Date.now())); } catch(e){}
          return true;
        }
        return false;
      }).catch(function(){ return false; });
    }

    // Live two-way: apply ONLY a strictly-newer cloud state (ts-gated → ignores our own/older writes).
    function _watchLive(){
      try { _bDoc.onSnapshot(function(s){
        if (!s.exists || !s.data()) return;
        var cloud = s.data().data, cloudTs = s.data().ts || 0, localTs = 0;
        try { localTs = parseInt(localStorage.getItem(TS_KEY) || '0', 10) || 0; } catch(e){}
        if (cloudTs <= localTs) return;
        try { localStorage.setItem(TS_KEY, String(cloudTs)); } catch(e){}
        var cur = null; try { cur = localStorage.getItem(KEY); } catch(e){}
        if (cur === cloud) return;
        try { if (cloud == null) localStorage.removeItem(KEY); else localStorage.setItem(KEY, cloud); } catch(e){}
        location.reload();
      }); } catch(e){}
    }

    var _did = false; try { _did = sessionStorage.getItem('nutrition_restored') === '1'; } catch(e){}
    _restoreIfEmpty().then(function(restored){
      if (restored && !_did){ try { sessionStorage.setItem('nutrition_restored','1'); } catch(e){} location.reload(); return; }
      window.nutritionScheduleBackup();    // seed cloud on open
      _watchLive();
    });
  });
})();
</script>

function todayISO(){ var t=new Date(); return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); }

/* ============================== TARGETS ============================== */
function computeTargets(){
  if(S.customTargets && S.targets._custom) return;
  var w = S.profile.weight||180, g = S.profile.goal;
  var calMul = g==='lose'?13: g==='gain'?16: 14.5;
  var actMul = {sedentary:0.90, light:1.0, moderate:1.10, active:1.20}[S.profile.activity] || 1.0;
  S.targets = {
    protein: Math.round(w * (g==='gain'?1.1:1.0)),
    carbs:   Math.round(w * (g==='lose'?0.9:1.3) * actMul),
    veg:     5,
    calories:Math.round(w * calMul * actMul),
    fats:    Math.round(w * 0.4),
    water:   2500,
    fruits:  2,
    sodium:  2300,
    sugar:   40
  };
}

/* ============================== SCORING ============================== */
function activeMetrics(){ return METRICS.filter(x=> x.core || (S.tracked[x.k] && tierOK(x.tier))); }

function dayTotals(date){
  var entries = S.log[date]||[];
  var t = {}; METRICS.forEach(x=>t[x.k]=0);
  entries.forEach(en=>{ METRICS.forEach(x=>{ t[x.k]+= (en.m[x.k]!==undefined? en.m[x.k] : x.get(en.m))||0; }); });
  return t;
}
function metricPct(date, k){
  var tot = dayTotals(date)[k]||0;
  var tgt = S.targets[k]||1;
  return tgt>0 ? (tot/tgt*100) : 0;
}
function goalCompletion(date){
  var ms = activeMetrics();
  if(!ms.length) return 0;
  var sum = ms.reduce((a,m)=> a + Math.min(100, metricPct(date,m.k)), 0);
  return Math.round(sum/ms.length);
}
function mealCompletion(date){
  if(!S.meals.length) return 100;
  var entries = S.log[date]||[];
  var logged = S.meals.filter(meal=> entries.some(e=>e.meal===meal));
  return Math.round(logged.length / S.meals.length * 100);
}
function dailyScore(date){
  return Math.round( mealCompletion(date)/100 * goalCompletion(date) );
}

function colorFor(pct){
  if(pct>100) return '#0a0a0a';

let showBreakdown=false;
function renderToday(){
  var top=document.getElementById('todayTop');
  var ms=activeMetrics();
  var overall=dailyScore(curDate);
  var n=ms.length, gap=3, r=80, cx=95, cy=95;
  var circ=2*Math.PI*r;
  var segLen=circ/n;
  var svg='<svg width="190" height="190" viewBox="0 0 190 190">';
  svg+='<circle cx="95" cy="95" r="80" fill="none" stroke="#15181c" stroke-width="20"/>';
  ms.forEach((m,i)=>{
    var pct=Math.min(100,metricPct(curDate,m.k));
    var col=colorFor(metricPct(curDate,m.k));
    var dash=(segLen-gap)*(pct/100);
    var offset=-(i*segLen);
    svg+='<circle cx="95" cy="95" r="80" fill="none" stroke="'+col+'" stroke-width="20" stroke-linecap="butt" '
      +'stroke-dasharray="'+dash.toFixed(1)+' '+(circ-dash).toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'"/>';
  });
  svg+='</svg>';
  var ovCol = overall>=100?'#2ecc71': overall>=65?'#2dd4bf': overall>=33?'#ffc24d':'#ffffff';

  var legend=ms.map(m=>{
    var tot=Math.round(dayTotals(curDate)[m.k]);
    var tgt=S.targets[m.k];
    var pct=Math.round(metricPct(curDate,m.k));
    return '<div class="legend-row"><span class="legend-dot" style="background:'+colorFor(pct)+'"></span>'
      +'<span class="legend-name">'+m.label+'</span>'
      +'<span class="legend-val" style="color:'+colorForText(pct)+'">'+tot+'/'+tgt+m.unit+' · '+pct+'%</span></div>';
  }).join('');

  top.innerHTML=
    '<div class="donut-card glass">'
    +'<div class="donut-wrap" onclick="toggleBreakdown()">'+svg
      +'<div class="donut-center"><b style="color:'+ovCol+'">'+overall+'%</b><span>Daily Score</span><div class="hint">tap for breakdown</div></div>'
    +'</div>'
    +'<div class="donut-legend">'+legend+'</div>'
    +'</div>'
    + mealMiniHTML();

  renderBreakdownPanel();
  renderMeals();
  renderTodayWeight();
  renderTodaySupps();
  renderDailyTarget();
  renderAlerts();
  renderOverall();
}
function mealMiniHTML(){
  var entries=S.log[curDate]||[];
  var mc=mealCompletion(curDate);
  var logged=S.meals.filter(meal=> entries.some(e=>e.meal===meal));
  var list=S.meals.map(m=> logged.includes(m)
      ? '<span class="done">✓ '+m+'</span>'
      : '<span class="miss">○ '+m+'</span>').join('<br>');
  return '<div class="meal-mini glass"><h3>Meals Logged</h3>'
    +'<div class="mscore">'+logged.length+'<small>/'+S.meals.length+' · '+mc+'%</small></div>'
    +'<div class="mlist">'+list+'</div></div>';
}
function toggleBreakdown(){ showBreakdown=!showBreakdown; renderBreakdownPanel(); }
function renderBreakdownPanel(){
  var bd=document.getElementById('breakdown');
  if(!showBreakdown){ bd.classList.remove('show'); bd.innerHTML=''; return; }
  bd.classList.add('show');
  var ms=activeMetrics();
  var bars=ms.map(m=>{
    var tot=Math.round(dayTotals(curDate)[m.k]);
    var tgt=S.targets[m.k];
    var pct=metricPct(curDate,m.k);
    var rpct=Math.round(pct);
    var col=colorFor(pct);
    return '<div class="bar-row"><div class="bar-top"><span class="n">'+m.label+'</span>'
      +'<span class="v" style="color:'+colorForText(rpct)+'">'+tot+' / '+tgt+m.unit+' · '+rpct+'%</span></div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+Math.min(100,pct)+'%;background:'+col+'"></div></div></div>';

    +'<div class="bd-overall glass"><b style="color:'+ovCol+'">'+overall+'%</b><span>Overall Daily</span></div></div>';

function renderMeals(){
  var wrap=document.getElementById('mealsWrap');

  S.meals.forEach(meal=>{
    var items=entries.filter(e=>e.meal===meal);

    items.forEach(it=>{ sums.p+=it.m.protein; sums.cal+=it.m.calories; sums.c+=it.m.carbs; sums.veg+=it.m.veg; });
    var sumTxt='P '+Math.round(sums.p)+'g · C '+Math.round(sums.c)+'g · '+Math.round(sums.cal)+' cal';
    html+='<div class="meal-block glass"><div class="meal-head"><div><h3>'+MEAL_EMOJI[meal]+' '+meal+'</h3>'
      +(items.length?'<div class="meal-sum">'+sumTxt+'</div>':'')+'</div>'

          +'<div class="food-info"><div class="fn">'+it.name+' <span style="color:#5f6a76">×'+it.qty+'</span></div>'

function saveMealAsTemplate(meal){

  document.getElementById('modal').innerHTML=
    '<div class="modal-head"><h2>Save Template</h2><span class="x" onclick="closeModal()">×</span></div>'
    +'<div class="desc">Saving '+todays.length+' item'+(todays.length>1?'s':'')+' from '+meal+' exactly as logged.</div>'
    +'<label>Template name</label><input id="tplName" value="'+esc(meal)+'">'
    +'<div class="modal-actions"><button class="save" onclick="commitTemplate(\''+meal+'\')">Save Template</button><button class="cancel" onclick="openTemplates(\''+meal+'\')">Back</button></div>';

function commitTemplate(meal){
  var name=(document.getElementById('tplName').value||'').trim(); if(!name){ toast('Enter a name'); return; }
  var todays=(S.log[curDate]||[]).filter(e=>e.meal===meal);
  S.mealTemplates.push({ id:'t'+Date.now(), name:name, items: todays.map(e=>({foodId:e.foodId, name:e.name, emoji:e.emoji, qty:e.qty, m:Object.assign({},e.m)})), createdAt:curDate });
  save(); toast('Template saved: '+name); openTemplates(meal);
}
function logTemplate(id, meal){
  var t=S.mealTemplates.find(x=>x.id===id); if(!t) return;
  if(!S.log[curDate]) S.log[curDate]=[];
  t.items.forEach(it=>{
    S.log[curDate].push({ id:'e'+Date.now()+Math.floor(Math.random()*10000), meal:meal, foodId:it.foodId, name:it.name, emoji:it.emoji, qty:it.qty, m:Object.assign({},it.m) });
    if(it.foodId) S.recent=[it.foodId].concat(S.recent.filter(x=>x!==it.foodId)).slice(0,20);
  });
  save(); closeModal(); renderToday(); toast(t.name+' logged to '+meal);
}
function duplicateTemplate(id){
  var t=S.mealTemplates.find(x=>x.id===id); if(!t) return;
  S.mealTemplates.push({ id:'t'+Date.now(), name:t.name+' (copy)', createdAt:curDate, items:t.items.map(i=>Object.assign({},i,{m:Object.assign({},i.m)})) });
  save(); toast('Duplicated'); openTemplates(searchMeal);
}
function renameTemplate(id){
  var t=S.mealTemplates.find(x=>x.id===id); if(!t) return;
  document.getElementById('modal').innerHTML=
    '<div class="modal-head"><h2>Rename Template</h2><span class="x" onclick="closeModal()">×</span></div>'
    +'<label>Template name</label><input id="tplRename" value="'+esc(t.name)+'">'
    +'<div class="modal-actions"><button class="save" onclick="commitRename(\''+id+'\')">Save</button><button class="cancel" onclick="openTemplates(searchMeal)">Back</button></div>';
}
function commitRename(id){
  var t=S.mealTemplates.find(x=>x.id===id); if(!t) return;

function deleteTemplate(id){

  S.mealTemplates=S.mealTemplates.filter(x=>x.id!==id);

}

/* ===== Live food search: local DB first, then Open Food Facts + USDA (millions of foods, free) ===== */
var _liveResults=[], _liveTimer=null, _liveSeq=0, _liveStatus='';
var USDA_KEY='DEMO_KEY';   // free personal key (instant, no cost): https://fdc.nal.usda.gov/api-key-signup.html — swap DEMO_KEY to remove rate limits
function onSearchInput(v){
  searchQuery=v.toLowerCase().trim();
  renderResults();
  if(_liveTimer) clearTimeout(_liveTimer);
  if(searchQuery.length>=2 && searchCat==='all'){ _liveTimer=setTimeout(function(){ liveSearch(searchQuery); }, 350); }
  else { _liveResults=[]; _liveStatus=''; }
}
function renderResults(){
  var list=allFoods();
  if(searchCat==='fav') list=list.filter(f=>S.favorites.includes(f.id));
  else if(searchCat==='recent') list=S.recent.map(foodById).filter(Boolean);
  else if(searchCat!=='all') list=list.filter(f=>f.cat===searchCat);
  if(searchQuery) list=list.filter(f=>f.n.toLowerCase().includes(searchQuery));
  list=list.slice().sort((a,b)=>{var fa=S.favorites.includes(a.id)?0:1,fb=S.favorites.includes(b.id)?0:1; return fa-fb;});
  var el=document.getElementById('results'); if(!el) return;
  var html='';
  if(list.length){
    html += list.map(f=>{
      var fav=S.favorites.includes(f.id);
      var favBtn = tierOK('elite') ? '<span class="res-fav '+(fav?'star-on':'star-off')+'" onclick="event.stopPropagation();toggleFav(\''+f.id+'\')">'+(fav?'★':'☆')+'</span>' : '';

        +'<div class="res-info"><div class="rn">'+f.n+'</div><div class="rm">'+f.serv+' · P'+f.m.p+' C'+f.m.c+' F'+f.m.f+' · '+f.m.cal+'cal</div></div>'+favBtn+'</div>';
    }).join('');
  }
  // online results (USDA FoodData Central + Open Food Facts)
  if(searchCat==='all' && searchQuery.length>=2){
    if(_liveStatus) html+='<div style="font-size:12px;color:#8a93a0;text-align:center;padding:10px">'+esc(_liveStatus)+'</div>';
    if(_liveResults.length){
      html+='<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a93a0;margin:12px 4px 4px">Online · millions of foods</div>';
      html+=_liveResults.map(function(f){
        return '<div class="res-item" onclick="livePick(\''+f.id+'\')">'
          +'<div class="res-info"><div class="rn">'+esc(f.n)+' <span style="font-size:10px;color:#5f6a76">· '+f._src+'</span></div>'
          +'<div class="rm">'+esc(f.serv)+' · P'+Math.round(f.m.p)+' C'+Math.round(f.m.c)+' F'+Math.round(f.m.f)+' · '+Math.round(f.m.cal)+'cal</div></div></div>';
      }).join('');
    }
  }
  if(!html){ html='<div class="res-empty">'+(searchQuery.length>=2?'Searching…':'Start typing to search millions of foods.')+'</div>'; }
  el.innerHTML=html;
}
function liveSearch(q){
  var seq=++_liveSeq; _liveStatus='Searching millions of foods…'; renderResults();
  Promise.all([ searchOFF(q).catch(function(){return[];}), searchUSDA(q).catch(function(){return[];}) ]).then(function(res){
    if(seq!==_liveSeq) return;   // a newer query already fired
    var all=res[0].concat(res[1]), seen={}, out=[];
    all.forEach(function(f){ if(!f) return; var k=f.n.toLowerCase(); if(seen[k]) return; seen[k]=1; out.push(f); });
    _liveResults=out.slice(0,40);
    _liveStatus = out.length ? '' : 'No online matches for “'+q+'”.';
    renderResults();
  });
}
function fetchJSON(url, ms){   // aborts after `ms` so a slow/throttled API never stalls the results
  var ctl = (typeof AbortController!=='undefined') ? new AbortController() : null;
  var t = ctl ? setTimeout(function(){ try{ctl.abort();}catch(e){} }, ms||4500) : null;
  return fetch(url, ctl?{signal:ctl.signal}:{}).then(function(r){ if(t)clearTimeout(t); return r.json(); });
}
function searchOFF(q){
  // Open Food Facts full-text search is CORS-throttled from browsers, so it's a best-effort bonus.
  // (Its barcode product endpoint is reliable — that's what the scanner uses.) v2 endpoint allows CORS when it isn't rate-limited.
  var url='https://world.openfoodfacts.org/api/v2/search?search_terms='+encodeURIComponent(q)+'&fields=code,product_name,brands,nutriments,serving_size,categories_tags&page_size=25';
  return fetchJSON(url, 4500).then(function(j){ return (j.products||[]).map(offToFood).filter(Boolean); });
}
function offToFood(p){
  if(!p||!p.product_name) return null;
  var nu=p.nutriments||{};
  var perServing=(nu['energy-kcal_serving']!==undefined||nu['proteins_serving']!==undefined)&&!!p.serving_size;
  var suf=perServing?'_serving':'_100g', label=perServing?(p.serving_size||'1 serving'):'100 g';
  var m={ p:offNum(nu,'proteins'+suf), c:offNum(nu,'carbohydrates'+suf), f:offNum(nu,'fat'+suf), cal:offNum(nu,'energy-kcal'+suf), veg:0, fruit:0, water:0, sod:Math.round(offNum(nu,'sodium'+suf)*1000), sug:offNum(nu,'sugars'+suf) };
  if(!m.cal&&!m.p&&!m.c) return null;
  var name=String(p.product_name).trim(); if(p.brands) name+=' ('+String(p.brands).split(',')[0].trim()+')';
  return { id:'off'+(p.code||name.replace(/\W+/g,'').slice(0,24)), n:name, e:'', cat:guessCatFromOFF(p), serv:label, m:m, _src:'Open Food Facts' };
}
function searchUSDA(q){
  var url='https://api.nal.usda.gov/fdc/v1/foods/search?api_key='+USDA_KEY+'&query='+encodeURIComponent(q)+'&pageSize=20&dataType=Branded,Foundation,SR%20Legacy';
  return fetchJSON(url, 5000).then(function(j){ return (j.foods||[]).map(usdaToFood).filter(Boolean); });
}
function usdaToFood(fd){
  if(!fd||!fd.description) return null;
  var nut={}; (fd.foodNutrients||[]).forEach(function(n){ var nm=n.nutrientName||(n.nutrient&&n.nutrient.name); if(nm) nut[nm]=(n.value!=null?n.value:n.amount); });
  function g(nm){ var v=nut[nm]; return (typeof v==='number'&&!isNaN(v))?v:0; }
  var cal=g('Energy'), p=g('Protein'), c=g('Carbohydrate, by difference'), f=g('Total lipid (fat)');
  if(!cal&&!p&&!c) return null;
  var label=(fd.servingSize&&fd.servingSizeUnit)?(fd.servingSize+' '+fd.servingSizeUnit):'100 g';
  var m={ p:p, c:c, f:f, cal:cal, veg:0, fruit:0, water:0, sod:g('Sodium, Na'), sug:g('Sugars, total including NLEA') };
  var name=String(fd.description).trim(); if(fd.brandOwner) name+=' ('+String(fd.brandOwner).trim()+')';
  return { id:'usda'+fd.fdcId, n:name, e:'', cat:'snack', serv:label, m:m, _src:'USDA' };
}

var _cam={stream:null, timer:null};
function stopCam(){ try{ if(_cam.timer){ clearInterval(_cam.timer); _cam.timer=null; } if(_cam.stream){ _cam.stream.getTracks().forEach(t=>t.stop()); _cam.stream=null; } }catch(e){} }

    +'<video id="bcVideo" playsinline muted style="width:100%;height:100%;object-fit:cover"></video>'

  if(!supported){ html+='<div class="desc">Live scanning isn\'t available here. Type the barcode number below, or enter macros manually.</div>'; }
  html+='<label>Barcode number</label><div style="display:flex;gap:8px"><input id="bcManual" type="tel" inputmode="numeric" placeholder="e.g. 0123456789012" style="flex:1">'

function startBarcodeCam(meal){
  var det; try{ det=new window.BarcodeDetector(); }catch(e){ bcCamFail(); return; }
  var v=document.getElementById('bcVideo'); if(!v) return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
    _cam.stream=stream; v.srcObject=stream; v.play();
    _cam.timer=setInterval(function(){
      det.detect(v).then(function(codes){
        if(codes && codes.length){ var code=codes[0].rawValue; stopCam();
          var s=document.getElementById('bcStatus'); if(s) s.textContent='Found '+code+' — looking up…';
          lookupBarcode(code, meal);
        }
      }).catch(function(){});
    }, 450);
  }).catch(function(){ bcCamFail(); });
}
function bcCamFail(){ var s=document.getElementById('bcStatus'); if(s) s.textContent='Camera unavailable — type the barcode number below.'; var c=document.getElementById('bcCam'); if(c) c.style.display='none'; }

function offNum(nu,key){ var v=nu[key]; return (typeof v==='number' && !isNaN(v))?v:0; }
function guessCatFromOFF(p){ var t=((p.categories_tags||[]).join(' ')+' '+(p.categories||'')).toLowerCase();
  if(/vegetable/.test(t)) return 'veg'; if(/fruit/.test(t)) return 'fruit';
  if(/meat|fish|seafood|egg|poultry|yogurt|dairy|protein/.test(t)) return 'protein';
  if(/bread|pasta|rice|cereal|grain|potato|noodle/.test(t)) return 'carbs'; return 'snack'; }

function lookupBarcode(code, meal){
  code=(code||'').trim(); if(!code){ toast('Enter a barcode number'); return; }
  stopCam();
  document.getElementById('modal').innerHTML='<div class="modal-head"><h2>Looking up…</h2><span class="x" onclick="closeModal()">×</span></div><div class="desc">Barcode '+esc(code)+' — checking Open Food Facts…</div>';
  document.getElementById('overlay').classList.add('active');
  fetch('https://world.openfoodfacts.org/api/v0/product/'+encodeURIComponent(code)+'.json')
    .then(function(r){ return r.json(); })
    .then(function(j){ if(j && j.status===1 && j.product){ barcodeProduct(j.product, code, meal); } else { barcodeNotFound(code, meal, false); } })
    .catch(function(){ barcodeNotFound(code, meal, true); });
}
function barcodeProduct(p, code, meal){
  var nu=p.nutriments||{};
  var perServing = (nu['energy-kcal_serving']!==undefined || nu['proteins_serving']!==undefined) && !!p.serving_size;
  var suf = perServing ? '_serving' : '_100g';
  var label = perServing ? (p.serving_size||'1 serving') : '100 g';
  var m={ p:offNum(nu,'proteins'+suf), c:offNum(nu,'carbohydrates'+suf), f:offNum(nu,'fat'+suf),
    cal:offNum(nu,'energy-kcal'+suf), veg:0, fruit:0, water:0,
    sod:Math.round(offNum(nu,'sodium'+suf)*1000), sug:offNum(nu,'sugars'+suf) };
  var name=(p.product_name||'Scanned product').trim(); if(p.brands) name+=' ('+String(p.brands).split(',')[0].trim()+')';
  var id='off'+code;
  if(!S.customFoods.find(function(x){return x.id===id;})) S.customFoods.push({ id:id, n:name, e:'', cat:guessCatFromOFF(p), serv:label, m:m });
  save(); searchMeal=meal; openServing(id);
}

function recoConfirm(meal){

  if(!S.log[curDate]) S.log[curDate]=[];

function recoSlug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function recoResolveLabel(label){
  label=String(label||'').toLowerCase();
  for(var i=0;i<RECO_MATCH.length;i++){ for(var j=0;j<RECO_MATCH[i].kw.length;j++){ if(label.indexOf(RECO_MATCH[i].kw[j])>=0) return RECO_MATCH[i].f; } }
  return null;
}
function recoAddByLabel(label){
  var f=recoResolveLabel(label); if(!f) return false;
  var id='reco_'+recoSlug(f.n);
  if(!S.customFoods.find(function(x){return x.id===id;})){
    var m=Object.assign({p:0,c:0,f:0,cal:0,veg:0,fruit:0,water:0,sod:0,sug:0}, f.m);
    S.customFoods.push({ id:id, n:f.n, e:'', cat:f.cat, serv:f.serv, m:m });
  }
  if(!_recoItems.some(function(it){return it.foodId===id;})) recoPushFood(id,1);
  return true;
}

/* Best-effort on-device detection. Uses BOTH an object detector (multi-item plates) and an image
   classifier (~1000 ImageNet classes → far more foods), mapped through RECO_MATCH. Any failure => manual builder. */
function recoDetect(meal){
  var img=document.getElementById('recoImg');
  var before=_recoItems.length;
  var done=function(){ var added=_recoItems.length-before; var s=document.getElementById('recoStatus'); if(s){ s.textContent = added>0 ? ('Suggested '+added+' item'+(added===1?'':'s')+' — check and adjust below.') : 'Couldn\'t auto-detect this photo. Add the foods you see with “+ Add food”.'; } renderRecoList(meal); };
  if(!img){ done(); return; }
  (async function(){
    try{
      var vision=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs');
      var files=await vision.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
      if(!img.complete){ await new Promise(function(res){ img.onload=res; }); }
      // 1) object detection — good for multiple items on one plate (COCO food classes)
      try{
        var detector=await vision.ObjectDetector.createFromOptions(files,{ baseOptions:{ modelAssetPath:'https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite' }, scoreThreshold:0.35, maxResults:12, runningMode:'IMAGE' });
        (detector.detect(img).detections||[]).forEach(function(d){ recoAddByLabel(d.categories && d.categories[0] && d.categories[0].categoryName); });
      }catch(e){}
      // 2) image classification — much broader vocabulary (ImageNet has hundreds of foods)
      try{
        var clf=await vision.ImageClassifier.createFromOptions(files,{ baseOptions:{ modelAssetPath:'https://storage.googleapis.com/mediapipe-models/image_classifier/efficientnet_lite0/float32/1/efficientnet_lite0.tflite' }, maxResults:5, scoreThreshold:0.12, runningMode:'IMAGE' });
        var cr=clf.classify(img); var cats=(cr.classifications && cr.classifications[0] && cr.classifications[0].categories)||[];
        cats.forEach(function(c){ recoAddByLabel(c.categoryName); });
      }catch(e){}
    }catch(e){}
    done();
  })();
}

function lastNDays(n){
  var arr=[]; var base=new Date(curDate+'T00:00:00');
  for(var i=n-1;i>=0;i--){
    var d=new Date(base); d.setDate(d.getDate()-i);
    var iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var has=(S.log[iso]||[]).length>0;
    arr.push({date:iso, has:has, score: has?dailyScore(iso):0});

  return arr;
}

function weeklyChartSVG(data, mode){
  var W=320,H=140, padL=8,padR=8,padT=10,padB=22;
  var n=data.length, iw=W-padL-padR, ih=H-padT-padB;
  var x=function(i){ return padL + iw*(i/(n-1)); };
  var xb=function(i){ return padL + iw*(i/n) + (iw/n)/2; };
  var y=function(v){ return padT + ih*(1 - Math.max(0,Math.min(100,v))/100); };
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="margin-top:12px">';
  [0,50,100].forEach(function(g){ var yy=y(g).toFixed(1); svg+='<line x1="'+padL+'" y1="'+yy+'" x2="'+(W-padR)+'" y2="'+yy+'" stroke="#1d2126" stroke-width="1"/>'; });
  if(mode==='bar'){
    var bw=(iw/n)*0.6;
    data.forEach(function(d,i){ var v=d.has?d.score:0; var cx=xb(i); var yy=y(v); var col=d.has?colorFor(d.score):'#262b31';
      svg+='<rect x="'+(cx-bw/2).toFixed(1)+'" y="'+yy.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(0,(padT+ih-yy)).toFixed(1)+'" rx="3" fill="'+col+'"/>'; });
    data.forEach(function(d,i){ svg+='<text x="'+xb(i).toFixed(1)+'" y="'+(H-6)+'" fill="#5f6a76" font-size="9" text-anchor="middle">'+fmtDow(d.date)+'</text>'; });
  } else {
    var pts=data.map(function(d,i){ return x(i).toFixed(1)+','+y(d.has?d.score:0).toFixed(1); }).join(' ');
    svg+='<polyline points="'+pts+'" style="fill:none;stroke:var(--g);stroke-width:2.5" stroke-linecap="round" stroke-linejoin="round"/>';
    data.forEach(function(d,i){ svg+='<circle cx="'+x(i).toFixed(1)+'" cy="'+y(d.has?d.score:0).toFixed(1)+'" r="3.6" fill="'+(d.has?colorFor(d.score):'#262b31')+'" stroke="#0b0c0e" stroke-width="1.5"/>'; });
    data.forEach(function(d,i){ svg+='<text x="'+x(i).toFixed(1)+'" y="'+(H-6)+'" fill="#5f6a76" font-size="9" text-anchor="middle">'+fmtDow(d.date)+'</text>'; });
  }
  return svg+'</svg>';
}
function weeklyTrendHTML(){

  var wk= scored.length? Math.round(scored.reduce(function(a,d){return a+d.score;},0)/scored.length):0;

    + weeklyChartSVG(data, chartMode)

  function mini(lbl,val,col,sub){ return '<div class="set-card glass" style="margin:0;text-align:center;padding:14px 10px"><div style="font-size:10px;color:#8a93a0;text-transform:uppercase;letter-spacing:1px">'+lbl+'</div><div style="font-family:var(--disp);font-size:22px;color:'+col+';margin-top:2px">'+val+'</div><div style="font-size:11px;color:#8a93a0;margin-top:2px">'+sub+'</div></div>'; }

/* ============================== WEAPON 6: PERFORMANCE ALERTS ============================== */
/* Actionable, no spam: only fires once you've logged something today. Core P/C/V always; optional
   metrics only if you track them; over-limits (sodium/sugar/calories) flag high. */
function generateAlerts(date){
  var out=[]; var entries=S.log[date]||[];
  if(!entries.length) return out;                     // don't nag an untouched day
  var tot=dayTotals(date), tracked=activeMetrics();
  function has(k){ return tracked.some(function(m){return m.k===k;}); }
  function pct(k){ return metricPct(date,k); }
  if(has('protein') && pct('protein')<50) out.push({lvl:'warn', t:'Protein behind pace', b:'You\'re at '+Math.round(pct('protein'))+'% of your protein target.'});
  if(has('veg') && (tot.veg||0)===0)        out.push({lvl:'warn', t:'No vegetables yet', b:'You haven\'t logged any vegetables today.'});
  if(has('carbs') && pct('carbs')<35)       out.push({lvl:'', t:'Carbs behind pace', b:'Carbs are at '+Math.round(pct('carbs'))+'% of target.'});
  if(has('water') && pct('water')<40)       out.push({lvl:'warn', t:'Hydration behind pace', b:'Water is at '+Math.round(pct('water'))+'% of your goal.'});
  if(has('fruits') && (tot.fruit||0)===0)   out.push({lvl:'', t:'No fruit yet', b:'No fruit logged today.'});
  if(has('calories') && pct('calories')>115) out.push({lvl:'bad', t:'Over on calories', b:'You\'re at '+Math.round(pct('calories'))+'% of your calorie target.'});
  if(has('sodium') && pct('sodium')>100)    out.push({lvl:'bad', t:'Sodium is high', b:'Sodium is over your daily limit ('+Math.round(tot.sodium)+' mg).'});
  if(has('sugar') && pct('sugar')>100)      out.push({lvl:'bad', t:'Sugar is high', b:'Sugar is over your daily limit ('+Math.round(tot.sugar)+' g).'});
  return out;
}
function renderAlerts(){
  var el=document.getElementById('todayAlerts'); if(!el) return;
  var alerts=generateAlerts(curDate);
  if(!alerts.length){ el.innerHTML=''; return; }      // no alerts = no card (never nag)
  var html='<div class="section-title" style="margin-top:22px">Heads Up</div>';
  alerts.forEach(function(a){
    var col=a.lvl==='bad'?'#ff9d5c':(a.lvl==='warn'?'#ffc24d':'#8a93a0');
    html+='<div style="background:linear-gradient(160deg,#15181c,#0c0e11);border:1px solid #1d2126;border-left:3px solid '+col+';border-radius:12px;padding:11px 15px;margin-bottom:8px">'
      +'<div style="font-family:var(--disp);letter-spacing:.5px;font-size:14px;color:'+col+'">'+a.t+'</div>'
      +'<div style="font-size:13px;color:#cdd4dc;margin-top:2px">'+a.b+'</div></div>';
  });
  el.innerHTML=html;
}

/* ============================== WEAPON 7: RECOVERY / OVERALL PERFORMANCE SCORE ============================== */
/* Combines the pillars into one score. Reads the SAME localStorage the hub reads (same origin) so the
   numbers are real. Safe fallback: only Nutrition data -> show Nutrition + "connect other pillars". */
function _sget(k){ try{ var v=localStorage.getItem(k); return v!=null?JSON.parse(v):null; }catch(e){ return null; } }
function pillarScores(){
  var out=[{ name:'Nutrition', pct:dailyScore(curDate), self:true }];
  var uid=null; try{ if(window.firebase && firebase.auth && firebase.auth().currentUser) uid=firebase.auth().currentUser.uid; }catch(e){}
  try{ var hlog=_sget('habits_v4');
    if(hlog && Object.keys(hlog).length){
      var blocks=_sget('blocks_v4'), total=0;
      if(blocks){ ['MRN','WRK','NGT'].forEach(function(bk){ if(blocks[bk]&&blocks[bk].habits) total+=blocks[bk].habits.length; }); }
      if(!total) total=15;
      var done=Object.keys(hlog[curDate]||{}).filter(function(id){return hlog[curDate][id];}).length;
      out.push({ name:'Habits', pct:Math.round(Math.min(100, done/total*100)) });
    } }catch(e){}
  try{ var wh=_sget('mps_v3_history');
    if(Array.isArray(wh) && wh.length) out.push({ name:'Workout', pct: wh.some(function(d){return d&&d.date===curDate;})?100:0 });
  }catch(e){}
  try{ var hasSleep=false, sleptToday=false;
    for(var k in localStorage){ if(k.indexOf('rr_sleep:')===0 && k!=='rr_sleep:wearable_interest'){ hasSleep=true; var v=_sget(k); if(v && v.date===curDate) sleptToday=true; } }
    if(hasSleep) out.push({ name:'Sleep', pct: sleptToday?100:0 });
  }catch(e){}
  try{ if(uid){ var jmap=_sget('mps_jnl_'+uid+'_journal_v1'); if(jmap && Object.keys(jmap).length) out.push({ name:'Journal', pct: jmap[curDate]?100:0 }); } }catch(e){}
  return out;
}
function _scoreCol(p){ return p>=65?'var(--g)':p>=33?'#ffc24d':'#ffffff'; }
function renderOverall(){
  var el=document.getElementById('todayOverall'); if(!el) return;
  var ps=pillarScores();
  var others=ps.filter(function(p){return !p.self;});
  var html='<div class="section-title" style="margin-top:22px">Overall Performance</div>';
  if(!others.length){
    var n=ps[0];
    html+='<div class="set-card glass"><div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">'
      +'<span style="font-family:var(--disp);font-size:36px;font-weight:600;color:'+_scoreCol(n.pct)+'">'+n.pct+'%</span>'
      +'<span style="font-size:13px;color:#cdd4dc">Nutrition: '+n.pct+'% · <span style="color:#8a93a0">connect your other pillars to unlock your full performance score.</span></span></div></div>';
  } else {
    var overall=Math.round(ps.reduce(function(a,p){return a+p.pct;},0)/ps.length);
    html+='<div class="set-card glass">'
      +'<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:10px">'
        +'<span style="font-family:var(--disp);font-size:40px;font-weight:600;color:'+_scoreCol(overall)+'">'+overall+'%</span>'
        +'<span style="font-size:12px;color:#8a93a0;text-transform:uppercase;letter-spacing:1px">Overall Score · today</span></div>';
    ps.forEach(function(p){
      html+='<div class="toggle-row" style="cursor:default"><div class="tl">'+p.name+'</div>'
        +'<div style="font-family:var(--disp);letter-spacing:.5px;color:'+_scoreCol(p.pct)+'">'+p.pct+'%</div></div>';

  el.innerHTML=html;

/* ============================== WEAPON 4: DAILY TARGET ============================== */
/* Always-on Today card: "You're at X% — to hit 100% you still need ...". Live-updates on every log.
   Only lists reach-up metrics (skips sodium/sugar, which are limits not goals). */
function renderDailyTarget(){
  var el=document.getElementById('dailyTarget'); if(!el) return;
  var ms=activeMetrics();
  var overall=dailyScore(curDate);
  var tot=dayTotals(curDate);
  var needs=[];
  ms.forEach(function(m){
    if(m.k==='sodium'||m.k==='sugar') return;           // limits, not targets to reach
    var rem=(S.targets[m.k]||0)-(tot[m.k]||0);
    if(rem>0.5){
      var r=Math.round(rem), phrase;
      if(m.k==='veg') phrase=r+' veg serving'+(r===1?'':'s');
      else if(m.k==='fruits') phrase=r+' fruit serving'+(r===1?'':'s');
      else if(m.k==='calories') phrase=r+' cal';
      else if(m.k==='water') phrase=r+' ml water';
      else phrase=r+'g '+m.label.toLowerCase();          // protein / carbs / fats
      needs.push(phrase);
    }
  });
  var entries=S.log[curDate]||[];
  var mealsLeft=S.meals.filter(function(mm){ return !entries.some(function(e){return e.meal===mm;}); });
  var ocol = overall>=100?'var(--g)': overall>=65?'var(--g)': overall>=33?'#ffc24d':'#ffffff';
  var html='<div class="section-title" style="margin-top:22px">Daily Target</div>';
  if(overall>=100 && !needs.length && !mealsLeft.length){
    html+='<div class="set-card glass" style="display:flex;align-items:center;gap:14px">'
      +'<span style="font-family:var(--disp);font-size:34px;font-weight:600;color:var(--g)">100%</span>'
      +'<span style="font-size:14px;color:#cdd4dc">Crushed it — every target hit today.</span></div>';
  } else {
    var bits=[];
    if(needs.length) bits.push(needs.join('  ·  '));
    if(mealsLeft.length) bits.push('log '+mealsLeft.length+' more meal'+(mealsLeft.length===1?'':'s'));
    var need = bits.length ? bits.join('  ·  ') : 'targets met — finish logging your meals';
    html+='<div class="set-card glass">'
      +'<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:8px">'
        +'<span style="font-family:var(--disp);font-size:34px;font-weight:600;color:'+ocol+'">'+overall+'%</span>'

/* ============================== WEAPON 5: PERFORMANCE INSIGHTS (rules-based, no paid AI) ============================== */
let insightRange='week';
function setInsightRange(r){ insightRange=r; renderInsights(); }
function _iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function _avg(a){ return a.length? a.reduce(function(x,y){return x+y;},0)/a.length : 0; }
function lastNDaysRange(offset, n){
  var arr=[]; var base=new Date(curDate+'T00:00:00');
  for(var i=offset+n-1;i>=offset;i--){ var d=new Date(base); d.setDate(d.getDate()-i);
    var iso=_iso(d); var has=(S.log[iso]||[]).length>0; arr.push({date:iso, has:has, score:has?dailyScore(iso):0}); }
  return arr;
}
function bestWeekday(n){
  var sums={},cnts={}; lastNDaysRange(0,n).forEach(function(d){ if(!d.has)return; var wd=new Date(d.date+'T00:00:00').getDay(); sums[wd]=(sums[wd]||0)+d.score; cnts[wd]=(cnts[wd]||0)+1; });
  var best=null; Object.keys(cnts).forEach(function(wd){ var a=sums[wd]/cnts[wd]; if(!best||a>best.pct){ best={wd:+wd, pct:Math.round(a)}; } });
  if(!best) return null; best.name=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][best.wd]; return best;
}
function mostMissedMeal(n){
  if(!S.meals.length) return null; var miss={}, days=0;
  lastNDaysRange(0,n).forEach(function(d){ var e=S.log[d.date]||[]; if(!e.length) return; days++; S.meals.forEach(function(m){ if(!e.some(function(x){return x.meal===m;})) miss[m]=(miss[m]||0)+1; }); });
  if(!days) return null; var worst=null; S.meals.forEach(function(m){ var c=miss[m]||0; if(!worst||c>worst.count){ worst={meal:m,count:c}; } });
  if(!worst||worst.count===0) return null; worst.rate=Math.round((1-worst.count/days)*100); return worst;
}
function weekendVsWeekday(n){
  var we=[],wk=[]; lastNDaysRange(0,n).forEach(function(d){ if(!d.has)return; var g=new Date(d.date+'T00:00:00').getDay(); if(g===0||g===6) we.push(d.score); else wk.push(d.score); });
  if(!we.length||!wk.length) return null; var w=Math.round(_avg(we)), k=Math.round(_avg(wk)); return {weekend:w, weekday:k, dip:w<k-5};
}
function generateDailyInsights(date){
  var out=[]; var ms=activeMetrics(); var tot=dayTotals(date); var ov=dailyScore(date);
  if(!(S.log[date]||[]).length){ out.push({cls:'', t:'Today', b:'Nothing logged yet today. Log a meal to see where you stand.'}); return out; }
  if(ov>=90) out.push({cls:'good', t:'On track', b:'You\'re at '+ov+'% today — dialed in.'});
  ms.forEach(function(m){
    if(m.k==='sodium'||m.k==='sugar') return;
    var pct=Math.round(metricPct(date,m.k)); var rem=Math.round((S.targets[m.k]||0)-(tot[m.k]||0));
    if(pct<60 && rem>0){
      var unit=(m.k==='veg')?rem+' veg servings':(m.k==='fruits')?rem+' fruit servings':(m.k==='calories')?rem+' cal':(m.k==='water')?rem+' ml':rem+'g';
      out.push({cls:'warn', t:m.label+' behind pace', b:'Only '+pct+'% of your '+m.label.toLowerCase()+' target so far — about '+unit+' to go.'});
    }
  });
  if(ov<90 && out.length<=1) out.push({cls:'', t:'Almost there', b:'You\'re at '+ov+'% — finish your meals and macros to close at 100%.'});
  return out;
}
function generateWeeklyInsights(){
  var out=[]; var thisW=lastNDaysRange(0,7).filter(function(d){return d.has;}), lastW=lastNDaysRange(7,7).filter(function(d){return d.has;});
  if(thisW.length<2){ out.push({cls:'',t:'Building your week',b:'Log a few more days this week to unlock weekly patterns.'}); return out; }
  var tAvg=_avg(thisW.map(function(d){return d.score;})), lAvg=lastW.length?_avg(lastW.map(function(d){return d.score;})):null;
  if(lAvg!=null){ var d=Math.round(tAvg-lAvg); out.push({cls:d>=0?'good':'warn', t:'Weekly score', b:'Your nutrition score is '+(d>=0?'up':'down')+' '+Math.abs(d)+' pts vs last week ('+Math.round(tAvg)+'% vs '+Math.round(lAvg)+'%).'}); }
  else out.push({cls:'', t:'Weekly score', b:'Averaging '+Math.round(tAvg)+'% this week across '+thisW.length+' logged days.'});
  var tP=_avg(thisW.map(function(d){return Math.min(100,metricPct(d.date,'protein'));})), lP=lastW.length?_avg(lastW.map(function(d){return Math.min(100,metricPct(d.date,'protein'));})):null;
  if(lP!=null){ var dp=Math.round(tP-lP); if(Math.abs(dp)>=5) out.push({cls:dp>=0?'good':'warn', t:'Protein', b:'Protein adherence '+(dp>=0?'up':'down')+' '+Math.abs(dp)+'% vs last week.'}); }
  var best=bestWeekday(14); if(best) out.push({cls:'', t:'Your strongest day', b:best.name+' is your best day on average ('+best.pct+'%).'});
  var miss=mostMissedMeal(14); if(miss && miss.count>0) out.push({cls:'warn', t:'Most-missed meal', b:miss.meal+' is the meal you skip most — logged only '+miss.rate+'% of days.'});
  var wd=weekendVsWeekday(14); if(wd) out.push({cls:wd.dip?'warn':'', t:'Weekends', b: wd.dip? 'Your score dips on weekends ('+wd.weekend+'% vs '+wd.weekday+'% on weekdays).' : 'You hold steady on weekends ('+wd.weekend+'% vs '+wd.weekday+'%).'});
  return out;
}
function generateMonthlyInsights(){
  var out=[]; var thisM=lastNDaysRange(0,30).filter(function(d){return d.has;}), lastM=lastNDaysRange(30,30).filter(function(d){return d.has;});
  if(thisM.length<5){ out.push({cls:'',t:'Building your month',b:'Log more days to unlock monthly trends (about a week of data).'}); return out; }
  var tAvg=_avg(thisM.map(function(d){return d.score;})), lAvg=lastM.length?_avg(lastM.map(function(d){return d.score;})):null;
  if(lAvg!=null){ var d=Math.round(tAvg-lAvg); out.push({cls:d>=0?'good':'warn', t:'Consistency', b:'Averaging '+Math.round(tAvg)+'% this month — '+(d>=0?'up':'down')+' '+Math.abs(d)+' pts vs the previous 30 days.'}); }
  else out.push({cls:'', t:'This month', b:'Averaging '+Math.round(tAvg)+'% across '+thisM.length+' logged days.'});
  var tHit=Math.round(thisM.filter(function(d){return metricPct(d.date,'protein')>=90;}).length/thisM.length*100);
  out.push({cls:tHit>=70?'good':'', t:'Protein adherence', b:'You hit your protein target on '+tHit+'% of logged days this month.'});
  out.push({cls:'', t:'Days logged', b:thisM.length+' of the last 30 days logged.'});
  return out;
}
function perfInsightsHTML(){
  var tabs=[['day','Today'],['week','This Week'],['month','This Month']];
  var html='<div class="section-title">Insights</div>';
  html+='<div class="range-tabs">'+tabs.map(function(t){ return '<span class="range-tab'+(insightRange===t[0]?' active':'')+'" onclick="setInsightRange(\''+t[0]+'\')">'+t[1]+'</span>'; }).join('')+'</div>';
  var list = insightRange==='day'?generateDailyInsights(curDate): insightRange==='month'?generateMonthlyInsights(): generateWeeklyInsights();
  html += list.map(function(o){ return '<div class="insight-card '+(o.cls||'')+' glass"><div class="ic-t">'+o.t+'</div><div class="ic-b">'+o.b+'</div></div>'; }).join('');
  return html;
}

// Re-render Settings WITHOUT jumping to the top. renderSettings() rebuilds the whole view via
// innerHTML, which collapses the page height and snaps scroll to 0. Capture the scroll position and
// put it back so you can flip toggles one after another without the screen leaping up each time.
function rerenderSettingsKeepScroll(){
  // Capture from whichever element is actually scrolling (document, html, or body — differs between
  // standalone and inside the hub iframe).
  var se = document.scrollingElement || document.documentElement;
  var y = (se && se.scrollTop) || window.pageYOffset || (document.body && document.body.scrollTop) || 0;
  renderSettings();
  var restore = function(){
    if(se) se.scrollTop = y;
    if(document.body) document.body.scrollTop = y;   // fallback if body is the scroller
    try{ window.scrollTo(0, y); }catch(e){}
  };
  restore();                        // sync
  requestAnimationFrame(restore);   // again after layout settles, defeating the reflow clamp that
                                    // otherwise snaps scroll to the top when the view is rebuilt
}
// Flip the switch IN PLACE — no view rebuild — so the page never moves while you run down the list.

  } else if(step.type==='mealsnacks'){
    var pills=(k,arr)=>'<div class="ob-pills">'+arr.map(n=>'<div class="ob-pill'+(obData[k]===n?' sel':'')+'" onclick="obPickN(\''+k+'\','+n+')">'+n+'</div>').join('')+'</div>';
    body='<div class="ob-sub">Meals</div>'+pills('mealsN',[1,2,3])+'<div class="ob-sub">Snacks</div>'+pills('snacksN',[0,1,2,3]);
  } else {
    body='<div class="ob-opts">'+step.opts.map(o=>'<div class="ob-opt'+(obData[step.key]===o[0]?' sel':'')+'" onclick="obPick(\''+o[0]+'\')">'+o[1]+'</div>').join('')+'</div>';
  }
  document.getElementById('obRoot').innerHTML=
    '<div class="ob-overlay"><div class="ob-card"><div class="ob-prog">'+prog+'</div>'
    +'<div class="ob-step">'+step.step+' · Step '+(obIdx+1)+' of '+OB.length+'</div>'
    +'<h2>Nutrition Setup</h2><div class="ob-q">'+step.q+'</div>'+body
    +'<button class="ob-next" onclick="obNext()">'+(obIdx===OB.length-1?'Finish Setup':'Next')+'</button></div></div>';
}
function obPick(v){ obData[OB[obIdx].key]=v; renderOB(); }
function obPickN(k,n){ obData[k]=n; renderOB(); }
function obGoto(i){
  if(i<0 || i>=OB.length || i===obIdx) return;   // jump to ANY question, forward or back
  var step=OB[obIdx];                              // preserve the current answer before navigating
  if(step.type==='num'){ var el=document.getElementById('obIn'); if(el){ var val=parseFloat(el.value); if(val) obData[step.key]=val; } }
  obIdx=i; renderOB();
}
function obNext(){
  var step=OB[obIdx];
  if(step.type==='num'){ var val=parseFloat(document.getElementById('obIn').value); if(val) obData[step.key]=val; }
  if(obIdx<OB.length-1){ obIdx++; renderOB(); return; }
  S.profile.weight=obData.weight||180;
  S.profile.targetWeight=obData.targetWeight||obData.weight||180;
  S.profile.goal=obData.goal||'maintain';
  S.profile.activity=obData.activity||'light';
  var mn=obData.mealsN||3, sn=obData.snacksN||0;
  var mealNames = mn===1? ['Breakfast'] : mn===2? ['Breakfast','Dinner'] : ['Breakfast','Lunch','Dinner'];
  for(var si=1; si<=sn; si++) mealNames.push('Snack '+si);
  S.meals = mealNames;
  S.onboarded=true; computeTargets(); save();
  document.getElementById('obRoot').innerHTML='';
  toast('Setup complete — start logging!');
  go('today');
}

/* ============================== INIT ============================== */
function init(){
  load();
  computeTargets();
  document.getElementById('datePick').value=curDate;
  document.getElementById('datePick').max=todayISO();
  document.getElementById('datePick').addEventListener('change',function(){ curDate=this.value||todayISO(); showBreakdown=false; if(curTab==='today')renderToday(); else go(curTab); });
  renderTierBadge();
  buildTabs();
  if(!S.onboarded){ startOnboarding(); }
  renderToday();
}
init();
</script>
