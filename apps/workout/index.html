  const emptyEl = document.getElementById('chart-strength-empty');
  const subtitle = document.getElementById('chart-strength-subtitle');
  const weekPicker = document.getElementById('strength-week-picker');
  const weekSelect = document.getElementById('strength-week-select');
  if (!ctx || !strengthChartData) return;
  document.querySelectorAll('#strength-toggle-row .pill').forEach(p => {
    p.classList.toggle('active', p.dataset.strengthView === strengthChartView);
  });
  const { dailyData, weeks } = strengthChartData;
  const sixWeeksAgo = sixWeekWindowStart();
  sixWeeksAgo.setHours(0,0,0,0);
  const weekRangeLabel = (wIdx) => {
    const start = new Date(sixWeeksAgo);
    start.setDate(sixWeeksAgo.getDate() + wIdx * 7);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    const fmt = (d) => `${d.getMonth()+1}/${d.getDate()}`;
    return `Week ${wIdx+1} (${fmt(start)}–${fmt(end)})`;
  };
  if (weekSelect && weekSelect.options.length !== 6) {
    weekSelect.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = weekRangeLabel(i);
      if (i === strengthSelectedWeek) opt.selected = true;
      weekSelect.appendChild(opt);
    }
  } else if (weekSelect) {
    weekSelect.value = strengthSelectedWeek;
  }
  if (weekPicker) weekPicker.style.display = (strengthChartView === 'weekly') ? 'block' : 'none';
  // Compute badge value based on current view
  const badge = document.getElementById('strength-score-badge');
  const computeAvgScore = (scores) => {
    const valid = scores.filter(s => s != null && s > 0);
    if (valid.length === 0) return null;
    return Math.round(valid.reduce((a,b) => a+b, 0) / valid.length);
  };
  if (badge) {
    let badgeValue = null;
    let badgeLabel = '';
    if (strengthChartView === '6weeks') {
      // Average of all daily scores across 6 weeks
      const allScores = Object.values(dailyData).map(d => d.score);
      badgeValue = computeAvgScore(allScores);
      badgeLabel = '6-WK AVG';
    } else if (strengthChartView === 'weekly') {
      // Average of the 7 days in selected week
      const wStart = new Date(sixWeeksAgo);
      wStart.setDate(sixWeeksAgo.getDate() + strengthSelectedWeek * 7);
      const wkScores = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(wStart);
        d.setDate(wStart.getDate() + i);
        const ymd = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        if (dailyData[ymd]) wkScores.push(dailyData[ymd].score);
      }
      badgeValue = computeAvgScore(wkScores);
      badgeLabel = 'WK AVG';
    } else {
      // Daily: average of all logged days in last 42-day range
      const allScores = Object.values(dailyData).map(d => d.score);
      badgeValue = computeAvgScore(allScores);
      badgeLabel = 'AVG';
    }
    badge.textContent = badgeValue != null ? `${badgeLabel} ${badgeValue}` : '—';
  }
  // Shared line dataset config
  const lineDataset = (data) => ({
    data,
    borderColor: AC,
    backgroundColor: `rgba(${ACR}, 0.15)`,
    tension: 0.3, fill: true, spanGaps: true,
    pointRadius: 5, pointHoverRadius: 7,
    pointBackgroundColor: AC, pointBorderColor: '#fff',
    pointBorderWidth: 1.5, borderWidth: 2.5
  });
  if (strengthChartView === '6weeks') {
    if (subtitle) subtitle.textContent = 'weekly average · last 6 weeks';
    const hasAny = weeks.some(arr => arr.length > 0);
    if (!hasAny) {
      ctx.style.display = 'none';
      if (emptyEl) { emptyEl.style.display = 'block'; emptyEl.textContent = 'No lifts logged yet'; }
      return;
    }
    ctx.style.display = 'block';
    if (emptyEl) emptyEl.style.display = 'none';
    const data = weeks.map(arr => arr.length === 0
      ? 0
      : Math.round(arr.reduce((a,d) => a + d.score, 0) / arr.length)
    );
    const sum = (days, field) => days.reduce((a, d) => a + d[field], 0);
    chartInstances.strengthTrend = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Wk 1','Wk 2','Wk 3','Wk 4','Wk 5','Wk 6'],
        datasets: [
          {
            type: 'bar',
            data,
            backgroundColor: data.map(v => v > 0 ? `rgba(${ACR}, 0.55)` : `rgba(${ACR}, 0.08)`),
            borderColor: AC,
            borderWidth: 1.5,
            borderRadius: 0,
            borderSkipped: false,
            order: 2
          },
          {
            type: 'line',
            data,
            borderColor: 'transparent',
            backgroundColor: 'transparent',
            borderWidth: 0,
            showLine: false,
            spanGaps: false,
            pointRadius: data.map(v => v > 0 ? 6 : 0),
            pointHoverRadius: data.map(v => v > 0 ? 8 : 0),
            pointBackgroundColor: AC2,
            pointBorderColor: '#fff',
            pointBorderWidth: 1.5,
            order: 1
          }
        ]
      },
      options: {
        ...CHART_BASE_OPTS,
        scales: {
          ...CHART_BASE_OPTS.scales,
          y: { ...CHART_BASE_OPTS.scales.y, max: 1000, ticks: { ...CHART_BASE_OPTS.scales.y.ticks, stepSize: 200 } }
        },
        plugins: {
          ...CHART_BASE_OPTS.plugins,
          legend: { display: false },
          tooltip: {
            ...CHART_BASE_OPTS.plugins.tooltip,
            filter: (item) => item.datasetIndex === 0,
            callbacks: {
              title: (items) => items[0].label,
              label: (item) => {
                const days = weeks[item.dataIndex];
                if (days.length === 0) return 'No data';
                return [
                  `Score: ${item.parsed.y}`,
                  `Days trained: ${days.length}`,
                  `Total weight: ${sum(days,'weight')} lbs`,
                  `Total reps: ${sum(days,'reps')}`,
                  `Total sets: ${sum(days,'sets')}`,
                  `Total rounds: ${sum(days,'rounds')}`,
                  '',
                  'Tap to see weekly view →'
                ];
              }
            }
          }
        },
        onClick: (evt, elements) => {
          if (elements && elements.length > 0) {
            strengthSelectedWeek = elements[0].index;
            strengthChartView = 'weekly';
            renderStrengthScoreChart();
          }
        }
      }
    });
  } else if (strengthChartView === 'weekly') {
    // 7 points displayed Mon-Sun, but underlying week bucket is Sun-anchored.
    // We rotate the data so Mon (index 1 of Sun-first) becomes position 0, Sun becomes position 6.
    const weekStart = new Date(sixWeeksAgo);
    weekStart.setDate(sixWeeksAgo.getDate() + strengthSelectedWeek * 7);
    if (subtitle) subtitle.textContent = `${weekRangeLabel(strengthSelectedWeek)} · daily score`;
    const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const rawData = [null, null, null, null, null, null, null]; // Sun-first internal
    const dayDates = [];
    const rawDetails = [null, null, null, null, null, null, null];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      const ymd = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      dayDates.push(ymd);
      const info = dailyData[ymd];
      if (info && info.sets > 0) {
        rawData[i] = info.score;
        rawDetails[i] = info;
      }
    }
    // Rotate Sun-first → Mon-first: display[i] = raw[(i+1) % 7]
    const rotateArr = (arr) => [arr[1], arr[2], arr[3], arr[4], arr[5], arr[6], arr[0]];
    const dayData = rotateArr(rawData);
    const dayDetails = rotateArr(rawDetails);
    const dayDatesRotated = rotateArr(dayDates);
    dayDates.length = 0;
    dayDatesRotated.forEach(d => dayDates.push(d));
    const hasAny = dayData.some(v => v !== null);
    if (!hasAny) {
      ctx.style.display = 'none';
      if (emptyEl) { emptyEl.style.display = 'block'; emptyEl.textContent = 'No lifts logged this week'; }
      return;
    }
    ctx.style.display = 'block';
    if (emptyEl) emptyEl.style.display = 'none';
    // Build a custom dataset where EVERY day gets a point dot.
    // Days with no workout = small hollow dot at y=0; days with workout = full dot at score.
    const baseDataset = lineDataset(dayData);
    const weeklyDataset = {
      ...baseDataset,
      pointRadius: dayData.map(v => v == null ? 4 : 6),
      pointHoverRadius: dayData.map(v => v == null ? 5 : 8),
      pointBackgroundColor: dayData.map(v => v == null ? `rgba(${ACR}, 0.15)` : AC),
      pointBorderColor: dayData.map(v => v == null ? `rgba(${ACR}, 0.5)` : '#fff'),
      pointBorderWidth: dayData.map(v => v == null ? 1 : 1.5),
      // Replace nulls with 0 so dots render across the whole week
      data: dayData.map(v => v == null ? 0 : v)
    };
    chartInstances.strengthTrend = new Chart(ctx, {
      type: 'line',
      data: { labels: dayLabels, datasets: [weeklyDataset] },
      options: {
        ...CHART_BASE_OPTS,
        scales: {
          ...CHART_BASE_OPTS.scales,
          y: { ...CHART_BASE_OPTS.scales.y, max: 1000, ticks: { ...CHART_BASE_OPTS.scales.y.ticks, stepSize: 200 } }
        },
        plugins: {
          ...CHART_BASE_OPTS.plugins,
          legend: { display: false },
          tooltip: {
            ...CHART_BASE_OPTS.plugins.tooltip,
            callbacks: {
              title: (items) => {
                const dt = new Date(dayDates[items[0].dataIndex] + 'T00:00:00');
                return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
              },
              label: (item) => {
                const d = dayDetails[item.dataIndex];
                if (!d) return 'No workout';
                return [
                  `Score: ${d.score}`,
                  `Weight: ${d.weight} lbs`,
                  `Reps: ${d.reps}`,
                  `Sets: ${d.sets}`,
                  `Rounds: ${d.rounds}`,
                  '',
                  'Tap to view workout →'
                ];
              }
            }
          }
        },
        onClick: (evt, elements) => {
          if (elements && elements.length > 0) {
            const dateStr = dayDates[elements[0].index];
            const dayInfo = dailyData[dateStr];
            const badgeEl = document.getElementById('strength-score-badge');
            if (badgeEl && dayInfo) {
              const dt = new Date(dateStr + 'T00:00:00');
              const dayLabel = dt.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });
              badgeEl.textContent = `${dayLabel}: ${dayInfo.score}`;
            }
            const histRecord = history.find(h => h.date === dateStr);
            if (histRecord && typeof showHistoryDetail === 'function') {
              showHistoryDetail(histRecord);
            }
          }
        }
      }
    });
  } else {
    // Daily view: 2-day buckets across 42 days = 21 connected nodes
    if (subtitle) subtitle.textContent = 'every 2 days · last 6 weeks';
    const buckets = [];
    for (let i = 0; i < 42; i += 2) {
      const bucketDates = [];
      const bucketScores = [];
      const detailsList = [];
      for (let j = 0; j < 2; j++) {
        const d = new Date(sixWeeksAgo);
        d.setDate(sixWeeksAgo.getDate() + i + j);
        const ymd = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        bucketDates.push(ymd);
        const info = dailyData[ymd];
        if (info && info.sets > 0) {
          bucketScores.push(info.score);
          detailsList.push({ ymd, info });
        }
      }
      // Use the first date of the pair for the label
      const labelDate = new Date(sixWeeksAgo);
      labelDate.setDate(sixWeeksAgo.getDate() + i);
      const avgScore = bucketScores.length > 0
        ? Math.round(bucketScores.reduce((a,b)=>a+b,0) / bucketScores.length)
        : null;
      buckets.push({
        label: `${labelDate.getMonth()+1}/${labelDate.getDate()}`,
        score: avgScore,
        dates: bucketDates,
        details: detailsList,
        workoutCount: bucketScores.length
      });
    }
    const hasAny = buckets.some(b => b.score !== null);
    if (!hasAny) {
      ctx.style.display = 'none';
      if (emptyEl) { emptyEl.style.display = 'block'; emptyEl.textContent = 'No lifts logged yet'; }
      return;
    }
    ctx.style.display = 'block';
    if (emptyEl) emptyEl.style.display = 'none';
    const labels = buckets.map(b => b.label);
    const scores = buckets.map(b => b.score);
    // Connect all nodes — spanGaps true
    const dailyDataset = {
      ...lineDataset(scores),
      spanGaps: true,
      pointRadius: 5,
      pointHoverRadius: 7
    };
    chartInstances.strengthTrend = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [dailyDataset] },
      options: {
        ...CHART_BASE_OPTS,
        scales: {
          ...CHART_BASE_OPTS.scales,
          x: { ...CHART_BASE_OPTS.scales.x, ticks: { ...CHART_BASE_OPTS.scales.x.ticks, maxRotation: 45, minRotation: 45, autoSkip: false, font: { size: 8 } } },
          y: { ...CHART_BASE_OPTS.scales.y, max: 1000, ticks: { ...CHART_BASE_OPTS.scales.y.ticks, stepSize: 200 } }
        },
        plugins: {
          ...CHART_BASE_OPTS.plugins,
          legend: { display: false },
          tooltip: {
            ...CHART_BASE_OPTS.plugins.tooltip,
            callbacks: {
              title: (items) => {
                const b = buckets[items[0].dataIndex];
                const start = new Date(b.dates[0] + 'T00:00:00');
                const end = new Date(b.dates[b.dates.length-1] + 'T00:00:00');
                const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                return `${fmt(start)} – ${fmt(end)}`;
              },
              label: (item) => {
                const b = buckets[item.dataIndex];
                if (b.score === null) return 'Rest period';
                return [
                  `Avg Score: ${b.score}`,
                  `Workouts: ${b.workoutCount} of 2 days`,
                  '',
                  'Tap to view workout →'
                ];
              }
            }
          }
        },
        onClick: (evt, elements) => {
          if (elements && elements.length > 0) {
            const b = buckets[elements[0].index];
            const badgeEl = document.getElementById('strength-score-badge');
            if (badgeEl && b.score != null) {
              badgeEl.textContent = `${b.label}: ${b.score}`;
            }
            if (b.details.length > 0) {
              // Open the first (or only) workout from this bucket
              const dateStr = b.details[0].ymd;
              const histRecord = history.find(h => h.date === dateStr);
              if (histRecord && typeof showHistoryDetail === 'function') {
                showHistoryDetail(histRecord);
              }
            }
          }
        }
      }
    });
  }
}
// Chart 6: Conditioning (toggle between distance / sprint subtypes)
let condChartState = { cat: 'all', sub: '' };
function renderChartConditioning() {
  destroyChart('conditioning');
  const ctx = document.getElementById('chart-conditioning');
  const emptyEl = document.getElementById('chart-conditioning-empty');
  const subtitleEl = document.getElementById('chart-conditioning-subtitle');
  if (!ctx) return;
  // Helpers (scoped to this render)
  const fmtTime = (totalSec) => {
    if (!totalSec || totalSec <= 0) return '—';
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
    return `${m}:${String(s).padStart(2,'0')}`;
  };
  const fmtPace = (totalSec, miles) => {
    if (!totalSec || !miles || miles <= 0) return '—';
    const secPerMile = totalSec / miles;
    const m = Math.floor(secPerMile / 60);
    const s = Math.round(secPerMile % 60);
    return `${m}:${String(s).padStart(2,'0')}/mi`;
  };
  const insertStatsBadge = (cells) => {
    // cells = [{label, value}, ...]
    const badge = document.createElement('div');
    badge.id = 'cond-chart-stats-badge';
    badge.style.cssText = 'display:grid; gap:6px; background:linear-gradient(135deg, rgba(var(--mps-accent-2-rgb),0.15), rgba(var(--mps-accent-rgb),0.04)); border:1px solid rgba(var(--mps-accent-2-rgb),0.4); border-radius:10px; padding:12px 14px; margin-bottom:12px; box-shadow:0 4px 12px rgba(var(--mps-accent-rgb),0.15), inset 0 1px 0 rgba(255,255,255,0.06);';
    badge.style.gridTemplateColumns = `repeat(${cells.length}, 1fr)`;
    badge.innerHTML = cells.map(c => `
      <div style="text-align:center;">
        <div style="font-size:9px; font-weight:700; color:var(--mps-accent-2); letter-spacing:1.2px; opacity:0.85; margin-bottom:4px;">${c.label}</div>
        <div style="font-size:16px; font-weight:800; color:var(--mps-accent-2); text-shadow:0 0 8px rgba(var(--mps-accent-2-rgb),0.5); line-height:1; white-space:nowrap;">${c.value}</div>
      </div>
    `).join('');
    ctx.parentElement.parentElement.insertBefore(badge, ctx.parentElement);
  };
  // No sub-pills anymore — sprint chart shows total yards per session
  const subRow = document.getElementById('cond-chart-sub-row');
  subRow.innerHTML = '';
  // Update top category pills
  document.querySelectorAll('#cond-chart-cat-row .pill').forEach(p => {
    p.classList.toggle('active', p.dataset.chartCat === condChartState.cat);
  });
  // Remove any old badges; each branch will recreate its own
  const oldAll = document.getElementById('all-cardio-lifetime');
  if (oldAll) oldAll.remove();
  const oldStats = document.getElementById('cond-chart-stats-badge');
  if (oldStats) oldStats.remove();
  if (condChartState.cat === 'distance') {
    // Scatter: distance (X) vs time (Y), with 8:00/mi reference line + chrono line
    subtitleEl.textContent = 'time vs distance · last 90 days · 8:00/mi reference';
    const today = new Date(); today.setHours(0,0,0,0);
    const ninetyDaysAgo = new Date(today);
    ninetyDaysAgo.setDate(today.getDate() - 90);
    const points = conditioningLogs
      .filter(c => c.conditioning_type === 'distance')
      .filter(c => new Date(c.conditioning_date + 'T00:00:00') >= ninetyDaysAgo)
      .map(c => ({
        date: c.conditioning_date,
        miles: parseFloat(c.conditioning_subtype) || 0,
        seconds: c.conditioning_value
      }))
      .filter(p => p.miles > 0)
      .sort((a,b) => new Date(a.date) - new Date(b.date));
    if (points.length === 0) {
      ctx.style.display = 'none';
      emptyEl.style.display = 'block';
      emptyEl.textContent = 'No runs logged yet';
      return;
    }
    ctx.style.display = 'block';
    emptyEl.style.display = 'none';
    const totalSec = points.reduce((a,p) => a + (p.seconds || 0), 0);
    const totalMiles = points.reduce((a,p) => a + p.miles, 0);
    insertStatsBadge([
      { label: 'AVG PACE', value: fmtPace(totalSec, totalMiles) },
      { label: 'TOTAL DISTANCE', value: `${totalMiles.toFixed(1)} mi` },
      { label: 'TOTAL TIME', value: fmtTime(totalSec) }
    ]);
    // Auto-scale axes
    const maxMiles = Math.max(5, Math.ceil(Math.max(...points.map(p => p.miles)) + 0.5));
    const maxMinutes = Math.max(45, Math.ceil((Math.max(...points.map(p => p.seconds)) / 60) + 5));
    // 8:00/mi reference line endpoints
    const refStart = { x: 0, y: 0 };
    const refEnd   = { x: maxMiles, y: maxMiles * 8 }; // 8 minutes per mile
    chartInstances.conditioning = new Chart(ctx, {
      type: 'scatter',
      data: {
        datasets: [
          // 1) 8:00/mi reference diagonal (drawn behind)
          {
            label: '8:00/mi pace',
            type: 'line',
            data: [refStart, refEnd],
            borderColor: 'rgba(255, 255, 255, 0.35)',
            borderDash: [6, 6],
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 0,
            fill: false,
            order: 3
          },
          // 2) Chrono connecting line
          {
            label: 'chronological',
            type: 'line',
            data: points.map(p => ({ x: p.miles, y: p.seconds / 60 })),
            borderColor: __GRAY ? 'rgba(90,90,90,0.55)' : 'rgba(34, 102, 51, 0.55)',
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 0,
            fill: false,
            tension: 0,
            order: 2
          },
          // 3) Scatter dots (top layer)
          {
            label: 'Runs',
            type: 'scatter',
            data: points.map(p => ({ x: p.miles, y: p.seconds / 60 })),
            backgroundColor: COND_BORDER,
            borderColor: '#fff',
            borderWidth: 1.5,
            pointRadius: 6,
            pointHoverRadius: 9,
            order: 1
          }
        ]
      },
      options: {
        ...CHART_BASE_OPTS,
        plugins: {
          ...CHART_BASE_OPTS.plugins,
          iso3d: { enabled: false },
          legend: { display: false },
          tooltip: {
            ...CHART_BASE_OPTS.plugins.tooltip,
            filter: (item) => item.datasetIndex === 2,
            callbacks: {
              title: (items) => {
                const p = points[items[0].dataIndex];
                if (!p) return '';
                const dt = new Date(p.date + 'T00:00:00');
                return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
              },
              label: (item) => {
                const p = points[item.dataIndex];
                if (!p) return '';
                const min = Math.floor(p.seconds / 60);
                const sec = p.seconds % 60;
                return [
                  `${p.miles} mi · ${min}:${String(sec).padStart(2,'0')}`,
                  `Pace: ${fmtPace(p.seconds, p.miles)}`
                ];
              }
            }
          }
        },
        scales: {
          x: {
            type: 'linear',
            min: 0,
            max: maxMiles,
            ticks: {
              color: '#888',
              font: { size: 10 },
              stepSize: 0.5,
              callback: (val) => {
                if (val % 1 === 0) return val;
                if (val % 0.5 === 0) return val.toFixed(1);
                return '';
              }
            },
            grid: { color: 'rgba(255, 255, 255, 0.06)' },
            title: { display: true, text: 'Distance (miles)', color: '#888', font: { size: 10 } }
          },
          y: {
            type: 'linear',
            min: 0,
            max: maxMinutes,
            ticks: {
              color: '#888',
              font: { size: 10 },
              callback: (val) => {
                const m = Math.floor(val);
                return `${m}:00`;
              }
            },
            grid: { color: 'rgba(255, 255, 255, 0.06)' },
            title: { display: true, text: 'Time (mm:ss)', color: '#888', font: { size: 10 } }
          }
        }
      }
    });
  } else if (condChartState.cat === 'machine') {
    // Scatter: distance (X) vs time (Y), with 8:00/mi reference + chrono line
    // Shows ALL machine types together; machine type shown in tooltip only
    subtitleEl.textContent = 'time vs distance · last 90 days · 8:00/mi reference';
    subRow.innerHTML = '';
    const today = new Date(); today.setHours(0,0,0,0);
    const ninetyDaysAgo = new Date(today);
    ninetyDaysAgo.setDate(today.getDate() - 90);
    const machineColors = __GRAY ? {
      treadmill: '#C9A020',
      bike:      '#9a9a9a',
      rower:     '#5a5a5a'
    } : {
      treadmill: '#4ab3f4',
      bike:      '#9b6bc9',
      rower:     '#4ade80'
    };
    const points = conditioningLogs
      .filter(c => c.conditioning_type === 'machine')
      .filter(c => new Date(c.conditioning_date + 'T00:00:00') >= ninetyDaysAgo)
      .map(c => ({
        date: c.conditioning_date,
        machine: c.conditioning_subtype,
        miles: parseFloat(c.conditioning_distance) || 0,
        seconds: c.conditioning_value
      }))
      .filter(p => p.miles > 0)
      .sort((a,b) => new Date(a.date) - new Date(b.date));
    if (points.length === 0) {
      ctx.style.display = 'none';
      emptyEl.style.display = 'block';
      emptyEl.textContent = 'No machine sessions logged yet';
      return;
    }
    ctx.style.display = 'block';
    emptyEl.style.display = 'none';
    // Machine stats badge: avg pace · total distance · total time
    const mTotalSec = points.reduce((a,p) => a + (p.seconds || 0), 0);
    const mTotalMiles = points.reduce((a,p) => a + p.miles, 0);
    insertStatsBadge([
      { label: 'AVG PACE', value: fmtPace(mTotalSec, mTotalMiles) },
      { label: 'TOTAL DISTANCE', value: `${mTotalMiles.toFixed(1)} mi` },
      { label: 'TOTAL TIME', value: fmtTime(mTotalSec) }
    ]);
    const maxMiles = Math.max(5, Math.ceil(Math.max(...points.map(p => p.miles)) + 0.5));
    const maxMinutes = Math.max(45, Math.ceil((Math.max(...points.map(p => p.seconds)) / 60) + 5));
    const refStart = { x: 0, y: 0 };
    const refEnd   = { x: maxMiles, y: maxMiles * 8 };
    chartInstances.conditioning = new Chart(ctx, {
      type: 'scatter',
      data: {
        datasets: [
          {
            label: '8:00/mi pace',
            type: 'line',
            data: [refStart, refEnd],
            borderColor: 'rgba(255, 255, 255, 0.35)',
            borderDash: [6, 6],
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 0,
            fill: false,
            order: 3
          },
          {
            label: 'chronological',
            type: 'line',
            data: points.map(p => ({ x: p.miles, y: p.seconds / 60 })),
            borderColor: `rgba(${ACR}, 0.55)`,
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 0,
            fill: false,
            tension: 0,
            order: 2
          },
          {
            label: 'Sessions',
            type: 'scatter',
            data: points.map(p => ({ x: p.miles, y: p.seconds / 60 })),
            backgroundColor: points.map(p => machineColors[p.machine] || machineColors.treadmill),
            borderColor: '#fff',
            borderWidth: 1.5,
            pointRadius: 6,
            pointHoverRadius: 9,
            order: 1
          }
        ]
      },
      options: {
        ...CHART_BASE_OPTS,
        plugins: {
          ...CHART_BASE_OPTS.plugins,
          iso3d: { enabled: false },
          legend: { display: false },
          tooltip: {
            ...CHART_BASE_OPTS.plugins.tooltip,
            filter: (item) => item.datasetIndex === 2,
            callbacks: {
              title: (items) => {
                const p = points[items[0].dataIndex];
                if (!p) return '';
                const dt = new Date(p.date + 'T00:00:00');
                return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
              },
              label: (item) => {
                const p = points[item.dataIndex];
                if (!p) return '';
                const min = Math.floor(p.seconds / 60);
                const sec = p.seconds % 60;
                const machineLabel = MACHINE_LABELS[p.machine] || p.machine;
                return [
                  `${machineLabel} · ${p.miles} mi · ${min}:${String(sec).padStart(2,'0')}`,
                  `Pace: ${fmtPace(p.seconds, p.miles)}`
                ];
              }
            }
          }
        },
        scales: {
          x: {
            type: 'linear',
            min: 0,
            max: maxMiles,
            ticks: {
              color: '#888',
              font: { size: 10 },
              stepSize: 0.5,
              callback: (val) => {
                if (val % 1 === 0) return val;
                if (val % 0.5 === 0) return val.toFixed(1);
                return '';
              }
            },
            grid: { color: 'rgba(255, 255, 255, 0.06)' },
            title: { display: true, text: 'Distance (miles)', color: '#888', font: { size: 10 } }
          },
          y: {
            type: 'linear',
            min: 0,
            max: maxMinutes,
            ticks: {
              color: '#888',
              font: { size: 10 },
              callback: (val) => `${Math.floor(val)}:00`
            },
            grid: { color: 'rgba(255, 255, 255, 0.06)' },
            title: { display: true, text: 'Time (mm:ss)', color: '#888', font: { size: 10 } }
          }
        }
      }
    });
  } else if (condChartState.cat === 'all') {
    // ===== ALL VIEW =====
    // Combined view: every cardio session (running + sprints + cardio machine)
    // shown as one bar per session, miles on Y axis, 0.5 mile steps, max 5 miles.
    // Lifetime total miles badge above chart.
    subRow.innerHTML = '';
    subtitleEl.textContent = 'all cardio sessions · miles per session';
    // Yards-per-rep formulas (mirrored from sprint chart)
    const YARDS_PER_SET = {
      '369': 360, '50_50': 550, 'shs_hill': 0,
      '27_6': 0, '400s': 0, '5_yard': 1050
    };
    const SUB_LABEL = (s) => ({ '369':'369','50_50':'50/50','shs_hill':'SHS Hill','27_6':'27/6','400s':"400's",'5_yard':'5 Yard' }[s] || s);
    // Build session list — one entry per logged cardio event
    const sessions = [];
    // 1. Running (conditioning_type = distance): miles stored in subtype
    conditioningLogs.forEach(c => {
      if (c.conditioning_type === 'distance') {
        const miles = parseFloat(c.conditioning_subtype) || 0;
        if (miles > 0) sessions.push({
          date: c.conditioning_date,
          miles,
          type: 'running',
          label: `${miles % 1 === 0 ? miles : miles.toFixed(1)}-Mile Run`
        });
      } else if (c.conditioning_type === 'machine') {
        const miles = parseFloat(c.conditioning_distance) || 0;
        if (miles > 0) sessions.push({
          date: c.conditioning_date,
          miles,
          type: 'machine',
          label: (MACHINE_LABELS[c.conditioning_subtype] || c.conditioning_subtype)
        });
      } else if (c.conditioning_type === 'sprint') {
        const sub = c.conditioning_subtype;
        const yards = (YARDS_PER_SET[sub] || 0) * (c.conditioning_value || 0);
        if (yards > 0) sessions.push({
          date: c.conditioning_date,
          miles: yards / 1760,
          yards,
          type: 'sprint',
          label: `${SUB_LABEL(sub)} Sprints`
        });
      }
    });
    // 2. Sprint workouts logged through the workout tracker (history.detail)
    history.forEach(h => {
      if (!h.detail) return;
      const skillNames = new Set(h.skills || []);
      const blockMap = new Map();
      h.detail.forEach(ex => {
        if (!skillNames.has(ex.blockName)) return;
        const n = (ex.blockName || '').toLowerCase();
        if (!n.includes('sprint') && !n.includes('369') && !n.includes('50/50') && !n.includes('hill') && !n.includes('27/6') && !n.includes("400") && !n.includes('5 yard')) return;
        const key = ex.blockName;
        if (!blockMap.has(key)) blockMap.set(key, []);
        blockMap.get(key).push(ex);
      });
      blockMap.forEach((exs, blockName) => {
        const n = (blockName || '').toLowerCase();
        let subType = null;
        if (n.includes('369')) subType = '369';
        else if (n.includes('50/50')) subType = '50_50';
        else if (n.includes('hill')) subType = 'shs_hill';
        else if (n.includes('27/6')) subType = '27_6';
        else if (n.includes("400")) subType = '400s';
        else if (n.includes('5 yard')) subType = '5_yard';
        let totalYards = 0;
        if (subType === '369') {
          exs.forEach(ex => {
            const m = (ex.name || '').match(/(\d+)\s*y/i);
            const subYards = m ? parseInt(m[1], 10) : 0;
            const done = (ex.sets || []).filter(s => s && s.done).length;
            if (subYards > 0 && done > 0) totalYards += subYards * done;
          });
        } else if (subType && YARDS_PER_SET[subType]) {
          let totalSets = 0;
          exs.forEach(ex => {
            totalSets += (ex.sets || []).filter(s => s && s.done).length;
          });
          totalYards = totalSets * YARDS_PER_SET[subType];
        }
        if (totalYards > 0) {
          sessions.push({
            date: h.date,
            miles: totalYards / 1760,
            yards: totalYards,
            type: 'sprint',
            label: `${subType ? SUB_LABEL(subType) : 'Sprints'}`
          });
        }
      });
    });
    sessions.sort((a, b) => new Date(a.date) - new Date(b.date));
    // Lifetime total miles
    const lifetimeMiles = sessions.reduce((sum, s) => sum + s.miles, 0);
    // Total time across all cardio sessions
    let allTimeSec = 0;
    conditioningLogs.forEach(c => {
      if (c.conditioning_type === 'distance' || c.conditioning_type === 'machine') {
        allTimeSec += c.conditioning_value || 0;
      }
    });
    const lifetimeLabel = lifetimeMiles >= 10 ? lifetimeMiles.toFixed(1) : lifetimeMiles.toFixed(2);
    insertStatsBadge([
      { label: 'LIFETIME', value: `${lifetimeLabel} mi` },
      { label: 'TOTAL TIME', value: fmtTime(allTimeSec) },
      { label: 'SESSIONS', value: `${sessions.length}` }
    ]);
    if (sessions.length === 0) {
      ctx.style.display = 'none';
      emptyEl.style.display = 'block';
      emptyEl.textContent = 'No cardio sessions logged yet';
      return;
    }
    ctx.style.display = 'block';
    emptyEl.style.display = 'none';
    const COLORS = __GRAY ? {
      running: { bg: 'rgba(120,120,120,0.85)', border: '#787878' },  // neutral grey
      sprint:  { bg: 'rgba(201,160,32,0.80)',  border: '#C9A020' },  // gold
      machine: { bg: `rgba(${ACR}, 0.80)`, border: AC }
    } : {
      running: { bg: 'rgba(34, 102, 51, 0.85)',  border: '#226633' },   // forest green
      sprint:  { bg: 'rgba(220, 72, 86, 0.80)',  border: '#dc4856' },   // crimson red
      machine: { bg: `rgba(${ACR}, 0.80)`, border: AC }    // MPS blue
    };
    const THEMES_3D = __GRAY ? {
      running: { top: '#9a9a9a', side: '#2a2a2a' },  // neutral grey
      sprint:  { top: '#d8b13a', side: '#5a4410' },  // gold
      machine: { top: AC2, side: '#3a3a3a' }
    } : {
      running: { top: '#3d9658', side: '#0d2818' },  // forest green
      sprint:  { top: '#ef5a68', side: '#7a1f28' },  // crimson red
      machine: { top: AC2, side: (__GRAY ? '#3a3a3a' : '#1a4570') }   // blue
    };
    // Plugin: draw session label above each bar
    const allLabelPlugin = {
      id: 'allLabels',
      afterDatasetsDraw(chart) {
        try {
          const meta = chart.getDatasetMeta(0);
          if (!meta || !meta.data) return;
          const ctx2 = chart.ctx;
          meta.data.forEach((bar, i) => {
            if (!bar || !sessions[i]) return;
            if (typeof bar.y !== 'number' || isNaN(bar.y)) return;
            ctx2.save();
            ctx2.font = 'bold 8px sans-serif';
            ctx2.fillStyle = '#ffffff';
            ctx2.textAlign = 'center';
            ctx2.fillText(sessions[i].label, bar.x, bar.y - 6);
            ctx2.restore();
          });
        } catch (e) { /* swallow paint errors */ }
      }
    };
    chartInstances.conditioning = new Chart(ctx, {
      type: 'bar',
      plugins: [allLabelPlugin],
      data: {
        labels: sessions.map(s => {
          const d = new Date(s.date + 'T00:00:00');
          return `${d.getMonth()+1}/${d.getDate()}`;
        }),
        datasets: [{
          data: sessions.map(s => parseFloat(s.miles.toFixed(2))),
          backgroundColor: sessions.map(s => COLORS[s.type].bg),
          borderColor: 'rgba(0, 0, 0, 0.3)',
          borderWidth: 1,
          borderRadius: 0,
          borderSkipped: false,
          barThemes: sessions.map(s => THEMES_3D[s.type] || THEMES_3D.sprint)
        }]
      },
      options: {
        ...CHART_BASE_OPTS,
        interaction: { mode: 'nearest', intersect: true },
        plugins: {
          ...CHART_BASE_OPTS.plugins,
          legend: { display: false },
          tooltip: {
            ...CHART_BASE_OPTS.plugins.tooltip,
            titleFont: { size: 13, weight: 'bold' },
            bodyFont: { size: 12 },
            callbacks: {
              title: (items) => {
                const s = sessions[items[0].dataIndex];
                const dt = new Date(s.date + 'T00:00:00');
                return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
              },
              label: (item) => {
                const s = sessions[item.dataIndex];
                const miles = s.miles >= 1 ? s.miles.toFixed(2) : s.miles.toFixed(2);
                const extra = s.yards ? ` (${s.yards} yd)` : '';
                return `${s.label} · ${miles} mi${extra}`;
              }
            }
          }
        },
        scales: {
          ...CHART_BASE_OPTS.scales,
          y: {
            ...CHART_BASE_OPTS.scales.y,
            min: 0,
            max: 5,
            ticks: {
              ...CHART_BASE_OPTS.scales.y.ticks,
              stepSize: 0.5,
              callback: (val) => val % 1 === 0 ? val : val.toFixed(1)
            },
            title: { display: true, text: 'Miles', color: '#888', font: { size: 10 } }
          }
        }
      }
    });
  } else {
    // ===== SPRINT VIEW =====
    //   369: 360 yd/round (30+60+90 down + back)
    //   50/50: 550 yd/set (11 × 50yd cross-sprints)
    //   5 Yard Pyramid: 1050 yd/round (5+10+15+...+100)
    //   SHS Hill / 27/6 / 400s: TBD (counted as sets × estimated yards if defined)
    const today = new Date(); today.setHours(0,0,0,0);
    const eightWeeksAgo = new Date(today);
    eightWeeksAgo.setDate(today.getDate() - 56);
    const YARDS_PER_SET = {
      '369': 360,
      '50_50': 550,
      'shs_hill': 0,
      '27_6': 0,
      '400s': 0,
      '5_yard': 1050
    };
    const subtypeFromBlockName = (blockName) => {
      const n = (blockName || '').toLowerCase();
      if (n.includes('369')) return '369';
      if (n.includes('50/50')) return '50_50';
      if (n.includes('shs')) return 'shs_hill';
      if (n.includes('27/6')) return '27_6';
      if (n.includes('400')) return '400s';
      if (n.includes('5 yard') || n.includes('pyramid')) return '5_yard';
      return null;
    };
    const SUBTYPE_LABELS = {
      '369': '369',
      '50_50': '50/50',
      'shs_hill': 'SHS Hill',
      '27_6': '27/6',
      '400s': '400s',
      '5_yard': '5 Yard Pyramid'
    };
    subtitleEl.textContent = 'total yards per session · last 8 weeks';
    // Aggregate by date — track total yards + which workout types were done
    const byDate = {}; // { ymd: { yards: number, types: Set<string> } }
    const addToDay = (ymd, yards, subtype) => {
      if (!byDate[ymd]) byDate[ymd] = { yards: 0, types: new Set() };
      byDate[ymd].yards += yards;
      if (subtype) byDate[ymd].types.add(subtype);
    };
    // Source 1: Conditioning logs from Today tab
    conditioningLogs
      .filter(c => c.conditioning_type === 'sprint')
      .filter(c => new Date(c.conditioning_date + 'T00:00:00') >= eightWeeksAgo)
      .forEach(c => {
        const sets = c.conditioning_value || 0;
        const yardsPer = YARDS_PER_SET[c.conditioning_subtype] || 0;
        if (yardsPer > 0 && sets > 0) {
          addToDay(c.conditioning_date, sets * yardsPer, c.conditioning_subtype);
        }
      });
    // Source 2: Workout history skill blocks named "Sprints — ..."
    history.forEach(h => {
      const hDate = new Date(h.date + 'T00:00:00');
      if (hDate < eightWeeksAgo) return;
      if (!h.detail || !Array.isArray(h.detail)) return;
      const blockMap = new Map();
      h.detail.forEach(ex => {
        const blockName = ex.blockName || '';
        if (!/sprint/i.test(blockName)) return;
        if (!blockMap.has(blockName)) blockMap.set(blockName, []);
        blockMap.get(blockName).push(ex);
      });
      blockMap.forEach((exs, blockName) => {
        const subType = subtypeFromBlockName(blockName);
        const yardsPer = subType ? (YARDS_PER_SET[subType] || 0) : 0;
        // For 369: each sub-drill (90yd, 60yd, 30yd) is its own exercise.
        // Sum actual yards: parse the sub-drill name to get yardage, multiply by sets done.
        if (subType === '369') {
          let total = 0;
          exs.forEach(ex => {
            const m = (ex.name || '').match(/(\d+)\s*y/i);
            const subYards = m ? parseInt(m[1], 10) : 0;
            const done = (ex.sets || []).filter(s => s && s.done).length;
            if (subYards > 0 && done > 0) total += subYards * done;
          });
          if (total > 0) addToDay(h.date, total, subType);
        } else if (yardsPer > 0) {
          let totalSets = 0;
          exs.forEach(ex => {
            totalSets += (ex.sets || []).filter(s => s && s.done).length;
          });
          if (totalSets > 0) {
            addToDay(h.date, totalSets * yardsPer, subType);
          }
        }
      });
    });
    // Build PROGRAM-PLANNED sprint days (all sprint days in the 6-week program)
    // For each planned day: use actual logged yards/types if available; else show empty bar with planned label
    const SUBTYPE_FROM_SERIES = (series) => {
      const s = (series || '').toLowerCase();
      if (s.includes('369')) return '369';
      if (s.includes('50/50')) return '50_50';
      if (s.includes('shs')) return 'shs_hill';
      if (s.includes('27/6')) return '27_6';
      if (s.includes('400')) return '400s';
      if (s.includes('5 yard') || s.includes('pyramid')) return '5_yard';
      return null;
    };
    const plannedMap = new Map(); // ymd -> { subType, plannedLabel }
    for (let w = 0; w < PROGRAM.length; w++) {
      for (let d = 0; d < PROGRAM[w].length; d++) {
        const slot = PROGRAM[w][d];
        if (!slot || slot.skill !== 'Sprints') continue;
        const subType = SUBTYPE_FROM_SERIES(slot.series);
        if (!subType) continue;
        const ymd = getProgramDate(w, d);
        plannedMap.set(ymd, { subType, plannedLabel: SUBTYPE_LABELS[subType] || subType });
      }
    }
    // SNAP-TO-SLOT: for each actual logged date, snap it to the nearest PRIOR
    // planned sprint slot (within 7 days). This handles cases where Jeff did a
    // scheduled sprint a few days late. If no prior slot within 7 days exists,
    // the actual date stays on its own.
    const sortedPlannedDates = [...plannedMap.keys()].sort();
    const snappedByDate = {}; // final {ymd: {yards, types}}
    Object.keys(byDate).forEach(actualYmd => {
      const entry = byDate[actualYmd];
      // Find latest planned date that is <= actualYmd
      let snapTo = null;
      for (let i = sortedPlannedDates.length - 1; i >= 0; i--) {
        if (sortedPlannedDates[i] <= actualYmd) { snapTo = sortedPlannedDates[i]; break; }
      }
      if (snapTo && snapTo !== actualYmd) {
        const diffDays = (new Date(actualYmd) - new Date(snapTo)) / 86400000;
        if (diffDays > 0 && diffDays <= 7) {
          // Snap to the planned slot — but ONLY if that slot isn't already filled
          if (!snappedByDate[snapTo]) {
            snappedByDate[snapTo] = { yards: entry.yards, types: new Set(entry.types), actualDate: actualYmd };
          } else {
            // Slot already taken — keep on actual date
            snappedByDate[actualYmd] = { yards: entry.yards, types: new Set(entry.types) };
          }
          return;
        }
      }
      // No snap — date stays as-is
      snappedByDate[actualYmd] = { yards: entry.yards, types: new Set(entry.types) };
    });
    // Merge: every date that's planned OR has actual (snapped) data
    const allDates = new Set([...plannedMap.keys(), ...Object.keys(snappedByDate)]);
    const plannedDays = [...allDates].sort().map(ymd => {
      const planned = plannedMap.get(ymd);
      const actual = snappedByDate[ymd];
      let label;
      if (actual && actual.types.size > 0) {
        label = [...actual.types].map(t => SUBTYPE_LABELS[t] || t).join(' + ');
      } else if (planned) {
        label = planned.plannedLabel;
      } else {
        label = 'Sprint';
      }
      return {
        ymd,
        subType: planned ? planned.subType : null,
        plannedLabel: label,
        isUnplanned: !planned && !!actual,
        snappedFrom: actual && actual.actualDate ? actual.actualDate : null
      };
    });
    // Make snapped data visible to the rendering code below by replacing byDate
    Object.keys(byDate).forEach(k => delete byDate[k]);
    Object.keys(snappedByDate).forEach(k => { byDate[k] = snappedByDate[k]; });
    if (plannedDays.length === 0) {
      ctx.style.display = 'none';
      emptyEl.style.display = 'block';
      emptyEl.textContent = 'No sprint sessions in this program';
      return;
    }
    ctx.style.display = 'block';
    emptyEl.style.display = 'none';
    // Sprint stats badge: total yards · sessions · best (most yards) session
    const completedDates = Object.keys(byDate).filter(k => byDate[k] && byDate[k].yards > 0);
    const totalYards = completedDates.reduce((a,k) => a + byDate[k].yards, 0);
    const sessionCount = completedDates.length;
    const bestYards = completedDates.reduce((m,k) => Math.max(m, byDate[k].yards), 0);
    insertStatsBadge([
      { label: 'TOTAL YARDS', value: `${totalYards} yd` },
      { label: 'SESSIONS', value: `${sessionCount}` },
      { label: 'BEST SESSION', value: bestYards > 0 ? `${bestYards} yd` : '—' }
    ]);
    const labels = plannedDays.map(p => {
      const dt = new Date(p.ymd + 'T00:00:00');
      return `${dt.getMonth()+1}/${dt.getDate()}`;
    });
    const values = plannedDays.map(p => (byDate[p.ymd] ? byDate[p.ymd].yards : 0));
    const typeLabels = plannedDays.map(p => {
      // If actual data exists, use actual types; else fall back to planned label
      if (byDate[p.ymd] && byDate[p.ymd].types.size > 0) {
        return [...byDate[p.ymd].types].map(t => SUBTYPE_LABELS[t] || t).join(' + ');
      }
      return p.plannedLabel;
    });
    // Annotation plugin: draw "{workout} · {yards}yd" above each bar (or just workout for empty)
    const annotateBars = {
      id: 'sprintAnnotate',
      afterDatasetsDraw(chart) {
        try {
          const { ctx } = chart;
          const meta = chart.getDatasetMeta(0);
          if (!meta || !meta.data) return;
          meta.data.forEach((bar, i) => {
            if (!bar) return;
            const labelText = values[i] > 0
              ? `${typeLabels[i]} · ${values[i]} yd`
              : typeLabels[i];
            ctx.save();
            ctx.font = 'bold 9px sans-serif';
            ctx.fillStyle = values[i] > 0 ? '#ffffff' : '#888';
            ctx.textAlign = 'center';
            const yPos = values[i] > 0 ? bar.y - 8 : chart.scales.y.getPixelForValue(0) - 8;
            ctx.fillText(labelText, bar.x, yPos);
            ctx.restore();
          });
        } catch (e) { /* swallow chart paint errors */ }
      }
    };
    chartInstances.conditioning = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: SPRINT_BG,
          borderColor: SPRINT_BORDER,
          borderWidth: 1
        }]
      },
      plugins: [annotateBars],
      options: {
        ...CHART_BASE_OPTS,
        plugins: {
          ...CHART_BASE_OPTS.plugins,
          legend: { display: false },
          tooltip: {
            ...CHART_BASE_OPTS.plugins.tooltip,
            callbacks: {
              title: (items) => {
                const dt = new Date(plannedDays[items[0].dataIndex].ymd + 'T00:00:00');
                return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
              },
              label: (item) => {
                const v = item.parsed.y;
                const pd = plannedDays[item.dataIndex];
                if (v === 0) return `${typeLabels[item.dataIndex]} · Not done yet`;
                const base = `${typeLabels[item.dataIndex]} · ${v} yards`;
                if (pd && pd.snappedFrom) {
                  const sd = new Date(pd.snappedFrom + 'T00:00:00');
                  const sdLabel = sd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                  return [base, `Done ${sdLabel} (late)`];
                }
                return base;
              }
            }
          }
        },
        scales: {
          ...CHART_BASE_OPTS.scales,
          y: {
            ...CHART_BASE_OPTS.scales.y,
            min: 0,
            max: 3000,
            ticks: { ...CHART_BASE_OPTS.scales.y.ticks, stepSize: 500 },
            title: { display: true, text: 'Yards', color: '#888', font: { size: 10 } }
          }
        }
      }
    });
  }
}
function renderAllDashboardCharts() {
  if (typeof Chart === 'undefined') return;
  renderChartTotalRounds();
  renderChartStrengthTrend();
  // Wire strength score Daily/Weekly toggle
  document.querySelectorAll('#strength-toggle-row .pill').forEach(p => {
    p.addEventListener('click', () => {
      strengthChartView = p.dataset.strengthView;
      renderStrengthScoreChart();
    });
  });
  // Wire strength week selector
  const strengthWeekSelect = document.getElementById('strength-week-select');
  if (strengthWeekSelect) {
    strengthWeekSelect.addEventListener('change', (e) => {
      strengthSelectedWeek = parseInt(e.target.value, 10);
      renderStrengthScoreChart();
    });
  }
  // Wire Avg Reps view toggle
  document.querySelectorAll('#avgreps-toggle-row .pill').forEach(p => {
    p.addEventListener('click', () => {
      avgRepsView = p.dataset.repsView;
      renderAvgRepsChart();
    });
  });
  // Wire Avg Reps week selector
  const repsWeekSelect = document.getElementById('avgreps-week-select');
  if (repsWeekSelect) {
    repsWeekSelect.addEventListener('change', (e) => {
      avgRepsSelectedWeek = parseInt(e.target.value, 10);
      renderAvgRepsChart();
    });
  }
  // Wire Avg Weight view toggle
  document.querySelectorAll('#avgweight-toggle-row .pill').forEach(p => {
    p.addEventListener('click', () => {
      avgWeightView = p.dataset.weightView;
      renderAvgWeightChart();
    });
  });
  // Wire Avg Weight week selector
  const weightWeekSelect = document.getElementById('avgweight-week-select');
  if (weightWeekSelect) {
    weightWeekSelect.addEventListener('change', (e) => {
      avgWeightSelectedWeek = parseInt(e.target.value, 10);
      renderAvgWeightChart();
    });
  }
  // Wire Total Rounds view toggle
  document.querySelectorAll('#totalrounds-toggle-row .pill').forEach(p => {
    p.addEventListener('click', () => {
      totalRoundsView = p.dataset.roundsView;
      renderChartTotalRounds();
    });
  });
  // Wire Total Rounds week selector
  const trWeekSelect = document.getElementById('totalrounds-week-select');
  if (trWeekSelect) {
    trWeekSelect.addEventListener('change', (e) => {
      totalRoundsSelectedWeek = parseInt(e.target.value, 10);
      renderChartTotalRounds();
    });
  }
  // Wire chart 6 category pills (only once per render)
  document.querySelectorAll('#cond-chart-cat-row .pill').forEach(p => {
    p.addEventListener('click', () => {
      condChartState.cat = p.dataset.chartCat;
      if (condChartState.cat === 'distance') condChartState.sub = '';
      else if (condChartState.cat === 'machine') condChartState.sub = 'all';
      else if (condChartState.cat === 'all') condChartState.sub = '';
      else condChartState.sub = 'all';
      renderChartConditioning();
    });
  });
  renderChartConditioning();
}
// ============ WIRE ============
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).style.display = 'block';
    if (tab.dataset.tab === 'dashboard') renderDashboard();
    if (tab.dataset.tab === 'history') renderHistory();
    if (tab.dataset.tab === 'prs') renderPRs();
    if (tab.dataset.tab === 'plan') renderPlan();
  });
});
document.getElementById('plan-view-select').addEventListener('change', renderPlan);
document.getElementById('add-split-btn').addEventListener('click', showSplitPicker);
document.getElementById('add-skill-btn').addEventListener('click', showSkillPicker);
document.getElementById('end-workout').addEventListener('click', endWorkout);
document.getElementById('reset-day').addEventListener('click', resetDay);
document.getElementById('move-day').addEventListener('click', moveDay);
document.getElementById('copy-from').addEventListener('click', showCopyFromPicker);
// Wire conditioning category pills
wireConditioningCats();
(async () => {
  try {
    await loadAll();
    render();
    renderConditioningUI();
    if (isCore()) {
      // Core = log only; Dashboard is locked, so land on the Today (log) tab
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      var coreTab = document.querySelector('.tab[data-tab="today"]'); if (coreTab) coreTab.classList.add('active');
      var coreContent = document.getElementById('tab-today'); if (coreContent) coreContent.style.display = 'block';
    } else {
      renderDashboard();
    }
    // Auto-backup check on app open (fires if >24h since last)
    if (typeof checkAutoBackupOnOpen === 'function') {
      checkAutoBackupOnOpen().catch(e => console.error('Auto-backup-on-open failed:', e));
    }
    // Initial status indicator render
    if (typeof updateBackupStatus === 'function') {
      setTimeout(updateBackupStatus, 100);
    }
  } catch (e) {
    console.error('Init error:', e);
    document.body.innerHTML = '<div style="padding:20px;color:#fff;">Error loading: ' + e.message + '</div>';
  }
})();
</script>
