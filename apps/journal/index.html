<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MPS Journal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Saira+Condensed:ital,wght@1,900&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/shared/auth-guard.js"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #080808; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2018; border-radius: 2px; }
    textarea { resize: none; }
    #loading-screen {
      position: fixed; inset: 0; background: #080808;
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .loading-pulse {
      font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 52px;
      color: #999999; letter-spacing: 0.12em;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .mps-logo-rsp { font-size: 96px; }
    @media (max-width: 640px) { .mps-logo-rsp { font-size: 78px; } }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-pulse">MPS</div>
  </div>
  <div id="root"></div>

  <script>
    window.addEventListener('load', function () {
      MPS_GUARD.protect('journal');

      firebase.auth().onAuthStateChanged(function (user) {
        if (!user) return;

        var db = firebase.firestore();
        var uid = user.uid;
        var COLL = 'users/' + uid + '/app_storage';
        window.currentUser = user;

        // localStorage fallback so the app never hangs when Firestore (app_storage) is blocked.
        var LS = function (key) { return 'mps_jnl_' + uid + '_' + key; };
        window.storage = {
          get: function (key) {
            return db.doc(COLL + '/jnl__' + key).get().then(function (snap) {
              if (snap.exists && snap.data().value !== undefined) return snap.data().value;
              try { var l = localStorage.getItem(LS(key)); return l ? JSON.parse(l) : null; } catch (e) { return null; }
            }).catch(function () {
              try { var l = localStorage.getItem(LS(key)); return l ? JSON.parse(l) : null; } catch (e) { return null; }
            });
          },
          set: function (key, value) {
            try { localStorage.setItem(LS(key), JSON.stringify(value)); } catch (e) {}
            try { window.journalScheduleBackup && window.journalScheduleBackup(); } catch (e) {}
            return db.doc(COLL + '/jnl__' + key).set({ value: value }).then(function () { return true; }).catch(function () { return true; });
          },
          delete: function (key) {
            try { localStorage.removeItem(LS(key)); } catch (e) {}
            try { window.journalScheduleBackup && window.journalScheduleBackup(); } catch (e) {}
            return db.doc(COLL + '/jnl__' + key).delete().catch(function () {});
          },
          list: function () {
            return db.collection(COLL).get().then(function (snap) {
              return snap.docs.map(function (d) { return d.id; })
                .filter(function (k) { return k.startsWith('jnl__'); })
                .map(function (k) { return k.slice(5); });
            }).catch(function () {
              var out = [], p = 'mps_jnl_' + uid + '_';
              try { for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k && k.indexOf(p) === 0) out.push(k.slice(p.length)); } } catch (e) {}
              return out;
            });
          }
        };

        // ===== SILENT CLOUD BACKUP (journal) =====
        // Mirrors localStorage (mps_jnl_<uid>_*) to users/{uid}/settings/journal_backup
        // (an allowed Firestore location) so entries sync across devices. Restores on a
        // fresh device. Fire-and-forget — never blocks UI.
        var _bDoc = db.doc('users/' + uid + '/settings/journal_backup');
        var _bPfx = 'mps_jnl_' + uid + '_';
        function _bMatch(k){ return !!k && k.indexOf(_bPfx) === 0; }
        function _bCollect(){ var d={}; try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(_bMatch(k)) d[k]=localStorage.getItem(k); } }catch(e){} return d; }
        function _bHasLocal(){ try{ for(var i=0;i<localStorage.length;i++){ if(_bMatch(localStorage.key(i))) return true; } }catch(e){} return false; }
        var _bTimer=null,_bBusy=false;
        window.journalScheduleBackup = function(){ if(_bTimer) clearTimeout(_bTimer); _bTimer=setTimeout(_bNow,1800); };
        function _bNow(){ if(_bBusy) return; _bBusy=true; try{ _bDoc.set({data:_bCollect(),ts:Date.now(),v:1}).then(function(){_bBusy=false;}).catch(function(){_bBusy=false;}); }catch(e){_bBusy=false;} }
        function _bRestoreIfEmpty(){ if(_bHasLocal()) return Promise.resolve(false); return _bDoc.get().then(function(s){ if(s.exists&&s.data()&&s.data().data){ var d=s.data().data,ks=Object.keys(d); if(!ks.length) return false; ks.forEach(function(k){ try{localStorage.setItem(k,d[k]);}catch(e){} }); return true; } return false; }).catch(function(){return false;}); }

        // Restore first (download on fresh device), then mount; seed cloud on open.
        var _mounted=false;
        function _go(){ if(_mounted) return; _mounted=true; document.getElementById('loading-screen').style.display='none'; tryMount(); window.journalScheduleBackup(); }
        setTimeout(_go, 3000);   // safety: never stay stuck on the loading screen
        _bRestoreIfEmpty().then(function(restored){ if(restored){ location.reload(); return; } _go(); });
      });
    });

    function tryMount() {
      if (window.storage) {
        var container = document.getElementById('root');
        var root = ReactDOM.createRoot(container);
        root.render(React.createElement(window.JournalApp));
      } else {
        setTimeout(tryMount, 100);
      }
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── THEME ─────────────────────────────────────────────────────
    const __GRAY = (()=>{ try { return !!(window.parent && window.parent !== window && window.parent.document.body.classList.contains('tier-mono')); } catch(e){ return false; } })();
    const __CORE = (()=>{ try { return !!(window.parent && window.parent !== window && window.parent.document.body.classList.contains('tier-core')); } catch(e){ return false; } })();
    // Premium = full history. Elite sees only the last 60 days of entries (Core has Journal locked entirely).
    const __PREMIUM = (()=>{ try { return !!(window.parent && window.parent !== window && window.parent.document.body.classList.contains('tier-premium')); } catch(e){ return false; } })();
    const HISTORY_CAP_CUTOFF = (()=>{ const d=new Date(); d.setDate(d.getDate()-60); d.setHours(0,0,0,0); const m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return d.getFullYear()+'-'+m+'-'+day; })();
    const NAVY   = __GRAY ? '#f5f5f5' : '#4a6fa5';
    const NAVYL  = __GRAY ? '#C9A020' : '#6b8fc5';
    const GOLD   = '#C9A020';
    const CREAM  = '#f5f5f5';
    const BG     = '#080808';
    const C1     = '#0e0c0a';
    const C2     = '#141210';
    const BR     = __GRAY ? 'rgba(255,255,255,0.08)' : 'rgba(150,150,150,0.14)';
    const BRG    = 'rgba(201,160,32,0.18)';
    const BRB    = __GRAY ? 'rgba(201,160,32,0.32)' : 'rgba(150,150,150,0.30)';

    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    const todayStr = () => new Date().toISOString().slice(0, 10);
    const monthKey = d => d.slice(0, 7);
    const monthLbl = k => { const [y,m]=k.split('-'); return MONTHS[+m-1]+' '+y; };

    const MOODS = [
      { id:'locked',   label:'Locked In',  emoji:'🔥', color:'#ef4444' },
      { id:'grinding', label:'Grinding',   emoji:'😤', color:'#C9A020' },
      { id:'neutral',  label:'Neutral',    emoji:'😐', color:'#6b7280' },
      { id:'offday',   label:'Off Day',    emoji:'😔', color:'#4b5563' },
      { id:'grateful', label:'Grateful',   emoji:'🙏', color:GOLD },
    ];
    const getMood = id => MOODS.find(m=>m.id===id) || MOODS[2];
    // Thin-line wireframe mood icons (match the Habits icon style; gold in gray so no color leak).
    const MoodIcon = ({ id, color, size = 22 }) => {
      const p = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' };
      switch (id) {
        case 'locked':   return <svg {...p}><path d="M12 2c.6 3 3 4 3 7a3 3 0 0 1-6 0c0-1.2.5-2 1-2.8C9 8 9 5.5 12 2z"/></svg>;
        case 'grinding': return <svg {...p}><polyline points="13 2 4 14 12 14 11 22 20 10 12 10 13 2"/></svg>;
        case 'neutral':  return <svg {...p}><circle cx="12" cy="12" r="9"/><line x1="8.5" y1="15" x2="15.5" y2="15"/></svg>;
        case 'offday':   return <svg {...p}><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>;
        case 'grateful': return <svg {...p}><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8L12 21.2l8.8-8.8a5.5 5.5 0 0 0 0-7.8z"/></svg>;
        default: return null;
      }
    };
    const moodColor = m => (__GRAY ? '#C9A020' : (m.color || '#C9A020'));

    const PROMPTS = [
      "What are you grateful for today?",
      "What's one win from today — no matter how small?",
      "What challenged you? How did you respond?",
      "What's one thing you'll do better tomorrow?",
      "What did you do today that future Jeff would be proud of?",
      "Who or what are you fighting for?",
      "What scripture or quote is sitting with you right now?",
      "What are you building toward?",
      "Did you show up fully today?",
      "What needs your attention that you've been avoiding?",
    ];

    // ── STORAGE ───────────────────────────────────────────────────
    const KEY = 'journal_v1';
    const load = () => window.storage.get(KEY).then(d => (d && typeof d === 'object' && !Array.isArray(d)) ? d : {});
    const save = data => window.storage.set(KEY, data);

    // ── SHARED ────────────────────────────────────────────────────
    const Label = ({ children, style }) => (
      <div style={{ color:'#4b5563', fontSize:9, letterSpacing:'0.14em', textTransform:'uppercase', fontWeight:700, marginBottom:6, ...style }}>
        {children}
      </div>
    );

    const Card = ({ children, style }) => (
      <div style={{ background:C1, border:`1px solid ${BR}`, borderRadius:12, ...style }}>
        {children}
      </div>
    );

    // ── NAV ────────────────────────────────────────────────────────
    function Nav() {
      return (
        <nav style={{
          display:'flex', alignItems:'center', padding:'13px 18px',
          borderBottom:`1px solid ${BR}`, background:'rgba(8,8,8,0.95)',
          position:'sticky', top:0, zIndex:100, backdropFilter:'blur(14px)'
        }}>
          <a href="/hub.html" style={{ color:NAVY, fontSize:10, fontWeight:700, letterSpacing:'0.12em', textDecoration:'none', textTransform:'uppercase' }}>← Hub</a>
          <span style={{ fontFamily:"'Inter', system-ui, -apple-system, sans-serif", fontSize:17, color:NAVYL, letterSpacing:'0.1em', flex:1, textAlign:'center' }}>
            MPS JOURNAL
          </span>
          <span style={{ width:48 }} />
        </nav>
      );
    }

    function Tabs({ tab, setTab }) {
      return (
        <div style={{ display:'flex', borderBottom:`1px solid ${BR}`, background:'rgba(8,8,8,0.9)', position:'sticky', top:0, zIndex:90 }}>
          {['WRITE','HISTORY','INSIGHTS','CHECK-IN'].map(t => (
            <button key={t} onClick={() => setTab(t)} style={{
              flex:1, padding:'11px 4px', background:'none', border:'none',
              borderBottom: tab===t ? `2px solid ${NAVY}` : '2px solid transparent',
              color: tab===t ? NAVYL : '#374151',
              fontFamily:"'Inter', system-ui, -apple-system, sans-serif", fontSize:12, letterSpacing:'0.08em', cursor:'pointer'
            }}>{t}</button>
          ))}
        </div>
      );
    }

    // ── WRITE VIEW ─────────────────────────────────────────────────
    function WriteView({ entries, onSave }) {
      const today = todayStr();
      const existing = entries[today] || {};

      const [mood,       setMood]       = useState(existing.mood || '');
      const [entry,      setEntry]      = useState(existing.entry || '');
      const [scripture,  setScripture]  = useState(existing.scripture || '');
      const [wins,       setWins]       = useState(existing.wins || '');
      const [gratitude,  setGratitude]  = useState(existing.gratitude || '');
      const [saving,     setSaving]     = useState(false);
      const [saved,      setSaved]      = useState(false);
      const [prompt,     setPrompt]     = useState(() => PROMPTS[new Date().getDay() % PROMPTS.length]);

      const hasContent = mood || entry.trim() || scripture.trim() || wins.trim() || gratitude.trim();

      const handleSave = async () => {
        if (!hasContent) return;
        setSaving(true);
        const updated = {
          ...entries,
          [today]: {
            date: today,
            mood,
            entry: entry.trim(),
            scripture: scripture.trim(),
            wins: wins.trim(),
            gratitude: gratitude.trim(),
            updatedAt: new Date().toISOString(),
            createdAt: existing.createdAt || new Date().toISOString(),
          }
        };
        await onSave(updated);
        setSaving(false);
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      const [d, mo, yr] = (() => {
        const dt = new Date();
        return [DAYS[dt.getDay()], MONTHS[dt.getMonth()], dt.getFullYear()];
      })();
      const dayNum = new Date().getDate();

      const textarea = {
        width:'100%', background:C2, border:`1px solid ${BR}`, borderRadius:10,
        padding:'12px 14px', color:'#e5e7eb', fontSize:13, outline:'none',
        fontFamily:"'Inter',sans-serif", lineHeight:1.7, minHeight:100,
        caretColor: NAVYL
      };

      return (
        <div style={{ padding:'18px 20px' }}>

          {/* Date header */}
          <div style={{ marginBottom:18, display:'flex', alignItems:'baseline', gap:10 }}>
            <div>
              <div style={{ fontFamily:"'Inter', system-ui, -apple-system, sans-serif", fontSize:42, color:'#fff', lineHeight:1 }}>{d.toUpperCase()}</div>
              <div style={{ color:'#374151', fontSize:11, letterSpacing:'0.1em', textTransform:'uppercase', fontWeight:600 }}>{mo} {dayNum}, {yr}</div>
            </div>
            {existing.updatedAt && (
              <div style={{ marginLeft:'auto', color:'#1f2d1f', fontSize:9, letterSpacing:'0.08em', textAlign:'right' }}>
                Saved<br/>{new Date(existing.updatedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
              </div>
            )}
          </div>

          {/* Mood selector */}
          <div style={{ marginBottom:16 }}>
            <Label>Mood</Label>
            <div style={{ display:'flex', gap:8 }}>
              {MOODS.map(m => (
                <button key={m.id} onClick={() => setMood(mood===m.id?'':m.id)} style={{
                  flex:1, padding:'10px 4px', background: mood===m.id ? 'rgba(150,150,150,0.12)' : C2,
                  border:`1px solid ${mood===m.id ? NAVY : BR}`, borderRadius:10,
                  display:'flex', flexDirection:'column', alignItems:'center', gap:4, cursor:'pointer', transition:'all 0.15s'
                }}>
                  <MoodIcon id={m.id} color={moodColor(m)} size={22} />
                  <span style={{ fontSize:8, color: mood===m.id ? NAVYL : '#374151', fontWeight:600, letterSpacing:'0.04em', textAlign:'center', lineHeight:1.2 }}>
                    {m.label}
                  </span>
                </button>
              ))}
            </div>
          </div>

          {/* Prompt card */}
          <div style={{
            background:`linear-gradient(135deg,${C1},#0d0c10)`,
            border:`1px solid ${BRB}`, borderRadius:12, padding:'14px 16px', marginBottom:16,
            position:'relative'
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
              <Label style={{ marginBottom:0 }}>Today's Prompt</Label>
              <button onClick={() => setPrompt(PROMPTS[Math.floor(Math.random()*PROMPTS.length)])} style={{
                background:'none', border:'none', color:'#374151', fontSize:10, cursor:'pointer', letterSpacing:'0.06em', fontWeight:600, textTransform:'uppercase'
              }}>↻</button>
            </div>
            <div style={{ fontFamily:"'Inter', system-ui, -apple-system, sans-serif", fontStyle:'italic', color:CREAM, fontSize:13, lineHeight:1.6, opacity:0.75 }}>
              "{prompt}"
            </div>
          </div>

          {/* Main entry */}
          <div style={{ marginBottom:14 }}>
            <Label>Journal Entry</Label>
            <textarea
              value={entry}
              onChange={e => setEntry(e.target.value)}
              placeholder="Write freely. No one's watching..."
              rows={6}
              style={textarea}
            />
          </div>

          {/* Wins */}
          <div style={{ marginBottom:14 }}>
            <Label>Today's Win(s)</Label>
            <textarea
              value={wins}
              onChange={e => setWins(e.target.value)}
              placeholder="One win — big or small..."
              rows={2}
              style={{ ...textarea, minHeight:60 }}
            />
          </div>

          {/* Gratitude */}
          <div style={{ marginBottom:14 }}>
            <Label>Gratitude</Label>
            <textarea
              value={gratitude}
              onChange={e => setGratitude(e.target.value)}
              placeholder="What are you thankful for?"
              rows={2}
              style={{ ...textarea, minHeight:60 }}
            />
          </div>

          {/* Scripture */}
          <div style={{ marginBottom:22 }}>
            <Label>Scripture / Verse</Label>
            <div style={{
              background:C2, border:`1px solid ${BRG}`, borderRadius:10, padding:'12px 14px',
              display:'flex', alignItems:'flex-start', gap:10
            }}>
              <span style={{ fontSize:16, marginTop:1 }}></span>
              <input
                type="text"
                value={scripture}
                onChange={e => setScripture(e.target.value)}
                placeholder='e.g. "I can do all things" — Phil 4:13'
                style={{ flex:1, background:'none', border:'none', outline:'none', color:CREAM, fontSize:13, fontFamily:"'Inter',sans-serif" }}
              />
            </div>
          </div>

          {/* Save */}
          <button onClick={handleSave} disabled={!hasContent||saving} style={{
            width:'100%', padding:'14px',
            background: saved ? 'rgba(150,150,150,0.12)' : (hasContent&&!saving) ? `linear-gradient(135deg,#2a4a80,${NAVY})` : C1,
            border: saved ? `1px solid ${NAVY}` : 'none',
            borderRadius:10, color: saved ? NAVYL : '#fff',
            fontFamily:"'Inter', system-ui, -apple-system, sans-serif", fontSize:16, letterSpacing:'0.1em',
            cursor: hasContent&&!saving ? 'pointer' : 'default', transition:'all 0.3s'
          }}>
            {saved ? 'SAVED' : saving ? 'SAVING...' : 'SAVE ENTRY'}
          </button>
        </div>
      );
    }

    // ── HISTORY VIEW ───────────────────────────────────────────────
    function HistoryView({ entries }) {
      const now = new Date();
      const curM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      const [selMonth, setSelMonth] = useState(curM);
      const [expanded, setExpanded] = useState(null);

      const __allDatesRaw = Object.keys(entries).sort((a,b) => b.localeCompare(a));
      // 60-day history cap for Elite (Premium sees all; Core has Journal locked entirely).
      const allDates   = __PREMIUM ? __allDatesRaw : __allDatesRaw.filter(d => d >= HISTORY_CAP_CUTOFF);
      const capHidden  = __allDatesRaw.length - allDates.length;
      const allMonths  = [...new Set(allDates.map(d => monthKey(d)))].sort((a,b) => b.localeCompare(a));
      const monthDates = allDates.filter(d => monthKey(d) === selMonth);

      return (
        <div style={{ padding:'18px 20px' }}>
          {/* Month pills */}
          <div style={{ display:'flex', gap:7, overflowX:'auto', paddingBottom:4, marginBottom:16 }}>
            {allMonths.length === 0 && <div style={{ color:'#374151', fontSize:12 }}>No entries yet</div>}
            {allMonths.map(m => (
              <button key={m} onClick={() => setSelMonth(m)} style={{
                flexShrink:0, padding:'5px 11px',
                background: selMonth===m ? 'rgba(150,150,150,0.14)' : C1,
                border:`1px solid ${selMonth===m ? NAVY : BR}`,
                borderRadius:6, color: selMonth===m ? NAVYL : '#374151',
                fontSize:10, fontWeight:700, letterSpacing:'0.06em', cursor:'pointer'
              }}>{monthLbl(m)}</button>
            ))}
          </div>

          {capHidden > 0 && (
            <div style={{ textAlign:'center', padding:'14px 18px', marginBottom:16, background:'rgba(201,160,32,0.08)', border:'1px solid rgba(201,160,32,0.35)', borderRadius:12 }}>
              <div style={{ fontSize:12, fontWeight:700, color:'#C9A020', letterSpacing:'0.04em' }}>Showing your last 60 days</div>
              <div style={{ fontSize:11, color:'#9a9a9a', marginTop:4, lineHeight:1.5 }}>Upgrade to <b style={{ color:'#C9A020' }}>Premium</b> to revisit your full journal.</div>
              <a href="/billing.html" target="_top" style={{ display:'inline-block', marginTop:8, padding:'7px 18px', background:'#C9A020', color:'#0a0a0a', fontWeight:800, fontSize:11, letterSpacing:'0.04em', borderRadius:8, textDecoration:'none' }}>↑ Unlock full history</a>
            </div>
          )}

          {monthDates.length === 0
            ? <div style={{ color:'#374151', fontSize:13, textAlign:'center', padding:'32px 0' }}>No entries this month</div>
            : monthDates.map(dateStr => {
                const e = entries[dateStr];
                const mood = getMood(e.mood);
                const [yr,mo,dd] = dateStr.split('-');
                const dt = new Date(+yr,+mo-1,+dd);
                const lbl = DAYS[dt.getDay()]+', '+MONTHS[dt.getMonth()]+' '+dd;
                const isOpen = expanded === dateStr;

                return (
                  <div key={dateStr} style={{ marginBottom:10 }}>
                    <button onClick={() => setExpanded(isOpen ? null : dateStr)} style={{
                      width:'100%', background: isOpen ? 'rgba(150,150,150,0.08)' : C1,

    // Reads the cloud backups (users/{uid}/settings/<app>_backup) the trackers write, with
    // localStorage as the fresher fallback. Returns raw data; aggregation happens per period.
    async function loadTrackerData(){
      const out = { habits:{}, blocks:null, expenses:[], workout:[], sleep:{} };
      let H={}, E={}, W={}, S={};
      try {
        const db = firebase.firestore();
        const uid = (window.currentUser && window.currentUser.uid) || (firebase.auth().currentUser && firebase.auth().currentUser.uid);
        if (uid){
          const base = db.collection('users').doc(uid).collection('settings');
          const snaps = await Promise.all([
            base.doc('habits_backup').get().catch(()=>null),
            base.doc('expenses_backup').get().catch(()=>null),
            base.doc('workout_backup').get().catch(()=>null),
            base.doc('sleep_backup').get().catch(()=>null),
          ]);
          const dataOf = (s) => (s && s.exists && s.data() && s.data().data) ? s.data().data : {};
          H=dataOf(snaps[0]); E=dataOf(snaps[1]); W=dataOf(snaps[2]); S=dataOf(snaps[3]);
        }

      out.habits   = ciLS('habits_v4')            || ciP(H['habits_v4'])            || {};
      out.blocks   = ciLS('blocks_v4')            || ciP(H['blocks_v4'])            || null;
      out.expenses = ciLS('mps_expense:entries')  || ciP(E['mps_expense:entries'])  || [];
      out.workout  = ciLS('mps_v3_history')       || ciP(W['mps_v3_history'])       || [];
      const sleep = {};
      Object.keys(S).forEach(k => { if (k.indexOf('rr_sleep:')===0){ const v=ciP(S[k]); if(v) sleep[k.slice(9)]=v; } });
      try { for (let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if (k && k.indexOf('rr_sleep:')===0){ const v=ciLS(k); if(v) sleep[k.slice(9)]=v; } } } catch(e){}
      out.sleep = sleep;
      return out;
    }
    function ciFmt(d){ const m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return d.getFullYear()+'-'+m+'-'+day; }
    function ciWeekKeys(offset){ const now=new Date(); now.setHours(0,0,0,0); const dow=(now.getDay()+6)%7; const mon=new Date(now); mon.setDate(now.getDate()-dow+offset*7); const keys=[]; for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); keys.push(ciFmt(d)); } return keys; }
    function ciHmToMin(t){ if(!t || String(t).indexOf(':')<0) return null; const p=String(t).split(':'); const h=+p[0], m=+p[1]; if(isNaN(h)) return null; return h*60+(m||0); }
    function ciAvgTime(arr){ if(!arr.length) return '—'; const avg=Math.round(arr.reduce((a,b)=>a+b,0)/arr.length); const h=Math.floor(avg/60), m=avg%60; const ap=h>=12?'PM':'AM'; const h12=((h+11)%12)+1; return h12+':'+String(m).padStart(2,'0')+' '+ap; }
    function ciMoney(n){ const v=Math.round(Number(n)||0); return '$'+v.toLocaleString(); }
    function ciRange(a,b){ const A=a.split('-'), B=b.split('-'); return MONTHS[+A[1]-1]+' '+(+A[2])+' – '+MONTHS[+B[1]-1]+' '+(+B[2]); }
    function ciAggregate(data, dateKeys){
      const bl = (data.blocks && data.blocks.MRN && data.blocks.MRN.habits) ? {
        MRN:(data.blocks.MRN.habits||[]).map(h=>h.id), WRK:(data.blocks.WRK.habits||[]).map(h=>h.id), NGT:(data.blocks.NGT.habits||[]).map(h=>h.id)
      } : CI_BLOCKS;
      let mrn=0,wrk=0,ngt=0;
      dateKeys.forEach(dk=>{ const dd=data.habits[dk]||{}; mrn+=bl.MRN.filter(id=>dd[id]).length; wrk+=bl.WRK.filter(id=>dd[id]).length; ngt+=bl.NGT.filter(id=>dd[id]).length; });
      const dayTotal=mrn+wrk+ngt;
      const inR=(d)=> d && dateKeys.indexOf(String(d).slice(0,10))>=0;
      const purch=(data.expenses||[]).filter(e=>e && e.item==='Purchase' && inR(e.date));
      const spending=purch.reduce((s,e)=>s+Math.abs(Number(e.amount)||0),0);
      const income=(data.expenses||[]).filter(e=>e && (e.item==='Income'||e.item==='Paycheck') && inR(e.date)).reduce((s,e)=>s+Math.abs(Number(e.amount)||0),0);
      const workouts=(data.workout||[]).filter(w=>w && inR(w.date)).length;
      const wake=[],slp=[];
      dateKeys.forEach(dk=>{ const s=data.sleep[dk]; if(s){ const wm=ciHmToMin(s.wakeTime); const sm=ciHmToMin(s.sleepTime); if(wm!=null) wake.push(wm); if(sm!=null) slp.push(sm); } });
      const today=todayStr();
      const elapsed=Math.max(1, dateKeys.filter(dk=>dk<=today).length || dateKeys.length);
      return { mrn,wrk,ngt,dayTotal, mrnAvg:Math.round(mrn/elapsed), wrkAvg:Math.round(wrk/elapsed), ngtAvg:Math.round(ngt/elapsed), dayAvg:Math.round(dayTotal/elapsed), spending, income, net:income-spending, workouts, avgWake:ciAvgTime(wake), avgSleep:ciAvgTime(slp) };
    }

      const Stat=({label,value,sub})=>(
        <div style={{ flex:1, textAlign:'center' }}>
          <div style={{ fontSize:20, fontWeight:800, color:'#fff' }}>{value}</div>
          <div style={{ fontSize:9, color:'#6b7280', letterSpacing:'0.06em', textTransform:'uppercase', marginTop:3 }}>{label}</div>
          {sub && <div style={{ fontSize:9, color:NAVYL, marginTop:2 }}>{sub}</div>}
        </div>
      );
      return (
        <div style={{ padding:'18px 20px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <div>
              <div style={{ fontSize:18, fontWeight:800, color:'#fff', letterSpacing:'0.04em' }}>WEEKLY CHECK-IN</div>
              <div style={{ fontSize:11, color:NAVYL, marginTop:2 }}>{ciRange(keys[0],keys[6])}</div>
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={()=>setOffset(offset-1)} style={navBtn}>‹</button>
              <button onClick={()=>setOffset(Math.min(0,offset+1))} disabled={offset>=0} style={{ ...navBtn, opacity:offset>=0?0.4:1, cursor:offset>=0?'default':'pointer' }}>›</button>
            </div>
          </div>
          {loading ? (
            <div style={{ textAlign:'center', padding:'40px 0', color:NAVYL, fontSize:13 }}>Pulling your data…</div>
          ) : (
            <>
              <div style={{ fontSize:10, color:'#6b7280', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:10 }}>◆ Auto-filled from your trackers</div>
              <div style={box}>
                <div style={lbl}>Habits</div>
                <div style={{ display:'flex', gap:6 }}>
                  <Stat label="MRN" value={A.mrn+'/35'} sub={'avg '+A.mrnAvg+'/5'} />
                  <Stat label="WRK" value={A.wrk+'/35'} sub={'avg '+A.wrkAvg+'/5'} />
                  <Stat label="NGT" value={A.ngt+'/35'} sub={'avg '+A.ngtAvg+'/5'} />
                  <Stat label="DAY" value={A.dayTotal+'/105'} sub={'avg '+A.dayAvg+'/15'} />
                </div>
              </div>
              <div style={{ display:'flex', gap:12, marginBottom:12 }}>
                <div style={{ ...box, flex:1, marginBottom:0 }}>
                  <div style={lbl}>Spending</div>
                  <div style={{ fontSize:22, fontWeight:800, color:'#fff' }}>{ciMoney(A.spending)}</div>
                  <div style={{ fontSize:10, color:'#6b7280', marginTop:3 }}>Income {ciMoney(A.income)} · Net {ciMoney(A.net)}</div>
                </div>
                <div style={{ ...box, flex:1, marginBottom:0 }}>
                  <div style={lbl}>Physical</div>
                  <div style={{ fontSize:22, fontWeight:800, color:'#fff' }}>{A.workouts}</div>
                  <div style={{ fontSize:10, color:'#6b7280', marginTop:3 }}>workouts this week</div>
                </div>
              </div>
              <div style={box}>
                <div style={lbl}>Sleep</div>
                <div style={{ display:'flex', gap:6 }}>
                  <Stat label="Avg Wake" value={A.avgWake} />
                  <Stat label="Avg Sleep" value={A.avgSleep} />
                </div>
              </div>
              <div style={{ marginTop:16, padding:'14px 16px', background:'rgba(201,160,32,0.06)', border:`1px dashed ${BR}`, borderRadius:12, fontSize:11, color:'#8a9591', lineHeight:1.6 }}>
                <b style={{ color:GOLD }}>Coming next:</b> jobs, accomplishments, focus &amp; adjustments — your written reflections, saved with each check-in. Then the monthly view.
              </div>
            </>
          )}
        </div>
      );
    }

    window.JournalApp = JournalApp;
  </script>
</body>
</html>
