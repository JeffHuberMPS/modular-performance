<!-- Firebase window.storage bridge — maps window.storage → Firestore -->
<script>
(function() {
  'use strict';

  // Auth guard
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof MPS_GUARD !== 'undefined') MPS_GUARD.protect('habits');
  });

  // Wait for Firebase auth, then set up window.storage and mount React
  firebase.auth().onAuthStateChanged(function(user) {
    if (!user) return; // auth-guard.js handles redirect

    var uid = user.uid;
    var db = firebase.firestore();

    // window.storage — API expected by the React components.
    // localStorage-only: the old app_storage Firestore path was blocked by security
    // rules and every call was caught/discarded, so it has been removed. localStorage is
    // the on-device source of truth; the silent cloud backup below mirrors it to an
    // allowed Firestore location (users/{uid}/settings/habits_backup) for cross-device sync.
    window.storage = {
      get: function(key) {
        var v = localStorage.getItem(key);
        return Promise.resolve(v !== null ? { value: v } : null);
      },
      set: function(key, value) {
        var wrote = false;
        try { localStorage.setItem(key, value); wrote = true; } catch (e) {}
        try {
          if (wrote) { window.habitsScheduleBackup && window.habitsScheduleBackup(); }
          else { window.habitsCloudSet && window.habitsCloudSet(key, value); }   // local blocked/full -> save straight to the cloud
        } catch (e) {}
        return Promise.resolve(true);   // saved to local and/or cloud — never a false failure
      },
      delete: function(key) {
        try { localStorage.removeItem(key); } catch (e) {}
        try { window.habitsScheduleBackup && window.habitsScheduleBackup(); } catch (e) {}
        return Promise.resolve(true);
      },
      list: function() {
        var keys = [];
        try { for (var i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i)); } catch (e) {}
        return Promise.resolve(keys);
      }
    };

    // ===== SILENT CLOUD BACKUP (habits) =====
    // Mirrors localStorage (habits_v4/gym_v4/blocks_v4) to
    // users/{uid}/settings/habits_backup (an allowed Firestore location) so habits
    // sync across devices. Restores on a fresh device. Fire-and-forget.
    var _bDoc = db.doc('users/' + uid + '/settings/habits_backup');
    var _bKeys = ['habits_v4', 'gym_v4', 'blocks_v4'];
    function _bCollect(){ var d={}; _bKeys.forEach(function(k){ try{ var v=localStorage.getItem(k); if(v!==null) d[k]=v; }catch(e){} }); return d; }
    function _bHasLocal(){ for(var i=0;i<_bKeys.length;i++){ try{ if(localStorage.getItem(_bKeys[i])!==null) return true; }catch(e){} } return false; }
    var _bTimer=null,_bBusy=false;
    window.habitsScheduleBackup = function(){ if(_bTimer) clearTimeout(_bTimer); _bTimer=setTimeout(_bNow,700); };
    var _TS_KEY='habits_synced_ts';   // ts of the cloud state this device is synced to
    // ===== ADDITIVE DEEP-UNION MERGE (habits) =====
    // Each of the 3 blobs is its own JSON, so a key-level union can't merge inside them. This generic
    // deep-union merges two blobs: object maps union their keys (recurse on shared), arrays union by
    // id/date (else JSON value), scalars take the OVERLAY side. For habits that means: completion days
    // union, per-day habit checks union (a habit done on EITHER device stays done), gym days union, and
    // block definitions union by id. Result never has fewer completions than either device. Unit-tested.
    function _isObj(x){ return !!x && typeof x==='object' && !Array.isArray(x); }
    function _keyOf(o){ if(!_isObj(o)) return null; if(o.id!=null) return 'id:'+o.id; if(o.date!=null) return 'date:'+o.date; return null; }
    function _unionArr(a, b){
      a=Array.isArray(a)?a:[]; b=Array.isArray(b)?b:[]; var keyed=false,i;
      for(i=0;i<a.length;i++){ if(_keyOf(a[i])){ keyed=true; break; } }
      if(!keyed){ for(i=0;i<b.length;i++){ if(_keyOf(b[i])){ keyed=true; break; } } }
      var out=[];
      if(keyed){ var idx={};
        for(i=0;i<a.length;i++){ var ka=_keyOf(a[i]); out.push(a[i]); if(ka!=null) idx[ka]=out.length-1; }
        for(i=0;i<b.length;i++){ var kb=_keyOf(b[i]); if(kb!=null && (kb in idx)){ out[idx[kb]]=_deepUnion(out[idx[kb]], b[i]); } else { out.push(b[i]); if(kb!=null) idx[kb]=out.length-1; } }
        return out; }
      var seen={};
      for(i=0;i<a.length;i++){ try{seen[JSON.stringify(a[i])]=1;}catch(e){} out.push(a[i]); }
      for(i=0;i<b.length;i++){ var s; try{s=JSON.stringify(b[i]);}catch(e){s=null;} if(s==null || !(s in seen)){ if(s!=null) seen[s]=1; out.push(b[i]); } }
      return out;
    }
    function _deepUnion(base, overlay){
      if(overlay===undefined) return base; if(base===undefined) return overlay;
      if(overlay===null) return base===null?null:base; if(base===null) return overlay;
      if(Array.isArray(base) && Array.isArray(overlay)) return _unionArr(base, overlay);
      if(_isObj(base) && _isObj(overlay)){ var out={},k; for(k in base) out[k]=base[k]; for(k in overlay){ out[k]=(k in base)?_deepUnion(base[k],overlay[k]):overlay[k]; } return out; }
      return overlay;
    }
    function _mergeBlob(baseStr, overlayStr){
      try{
        var b=(baseStr==null||baseStr==='')?undefined:JSON.parse(baseStr);
        var o=(overlayStr==null||overlayStr==='')?undefined:JSON.parse(overlayStr);
        if(b===undefined) return overlayStr; if(o===undefined) return baseStr;
        return JSON.stringify(_deepUnion(b,o));
      }catch(e){ var bl=(baseStr||'').length, ol=(overlayStr||'').length; return ol>=bl?(overlayStr||baseStr):(baseStr||overlayStr); }
    }
    // base/overlay = { key: jsonString }. overlay wins. Never drops a key or shrinks a blob.
    function _mergeHabitsData(base, overlay){
      base=_isObj(base)?base:{}; overlay=_isObj(overlay)?overlay:{}; var out={}, k;
      for(k in base) out[k]=base[k];
      for(k in overlay){ out[k]=(k in base)?_mergeBlob(base[k], overlay[k]):overlay[k]; }
      return out;
    }
    function _bNow(){ if(_bBusy) return; var _data=_bCollect();
      // NEVER back up an empty state — writing {} would wipe the cloud (and, via sync, every device).
      // A device with no entries just skips; a device that HAS data keeps the cloud whole.
      if(!Object.keys(_data).length) return;
      _bBusy=true; var _ts=Date.now();
      // ADDITIVE UNION: merge cloud+local per blob (local wins on conflicts) so a backup NEVER drops a
      // completion/day/habit another device added. We do NOT advance synced_ts on the merge path — the
      // watcher then pulls the union back so every device converges to the same full state.
      try{ _bDoc.get().then(function(s){
        var cloud=(s.exists&&s.data()&&s.data().data)?s.data().data:null;
        var merged=(cloud && Object.keys(cloud).length)? _mergeHabitsData(cloud, _data) : _data;   // local overlays cloud
        _bDoc.set({data:merged,ts:_ts,v:1}).then(function(){ _bBusy=false; }).catch(function(){_bBusy=false;});
      }).catch(function(){ // read failed -> plain write of this device's data (never empty, never loses local)
        _bDoc.set({data:_data,ts:_ts,v:1}).then(function(){ try{localStorage.setItem(_TS_KEY,String(_ts));}catch(e){} _bBusy=false; }).catch(function(){_bBusy=false;});
      }); }catch(e){_bBusy=false;} }
    // Flush a pending debounced backup immediately (used on tab close so the last change isn't dropped).
    function _bFlush(){ if(_bTimer){ clearTimeout(_bTimer); _bTimer=null; } _bNow(); }
    window.habitsBackupNow = _bFlush;
    // If localStorage is unavailable on this device (full, or blocked in the mobile iframe), save the
    // value STRAIGHT to the cloud so nothing is ever lost. Merges a single key into the backup doc.
    window.habitsCloudSet = function(key, value){ try{ _bDoc.get().then(function(s){ var d=(s.exists&&s.data()&&s.data().data)?s.data().data:{}; d[key]=value; var ts=Date.now(); _bDoc.set({data:d,ts:ts,v:1}).then(function(){ try{localStorage.setItem(_TS_KEY,String(ts));}catch(e){} }); }); }catch(e){} };
    window.addEventListener('pagehide', _bFlush);
    document.addEventListener('visibilitychange', function(){ if(document.visibilityState === 'hidden') _bFlush(); });
    function _bRestoreIfEmpty(){ if(_bHasLocal()) return Promise.resolve(false); return _bDoc.get().then(function(s){ if(s.exists&&s.data()&&s.data().data){ var d=s.data().data,ks=Object.keys(d); if(!ks.length) return false; ks.forEach(function(k){ try{localStorage.setItem(k,d[k]);}catch(e){} }); return true; } return false; }).catch(function(){return false;}); }
    // ===== LIVE TWO-WAY ADDITIVE SYNC (habits) =====
    // Real-time listener. When ANOTHER device saves (cloud ts > our synced ts), MERGE each newer cloud
    // blob INTO local (adds/edits ONLY, never deletions). ts-gating ignores our own/older writes. An
    // empty/delete-all cloud is treated as corruption, not a command — we heal it from local instead of
    // wiping. Every device converges to the UNION of all completions, so a mismatch can't delete data.
    function _bWatchLive(){ try{ _bDoc.onSnapshot(function(s){
      if(!s.exists||!s.data()) return;
      var d=(s.data().data)||{};
      var cloudTs=s.data().ts||0;
      var localTs=0; try{ localTs=parseInt(localStorage.getItem(_TS_KEY)||'0',10)||0; }catch(e){}
      if(cloudTs<=localTs) return;            // our own write or older → ignore (never overwrite)
      var localKeys=_bKeys.filter(function(k){ try{ return localStorage.getItem(k)!==null; }catch(e){ return false; } });
      var deletions=localKeys.filter(function(k){ return !(k in d); });
      var cloudCount=_bKeys.filter(function(k){ return (k in d); }).length;
      try{ localStorage.setItem(_TS_KEY, String(cloudTs)); }catch(e){}   // advance synced marker either way
      // SAFETY: an empty (or delete-everything) cloud is a BAD state, never a real user action. Never
      // let it delete your local data. Keep local, re-upload it to heal the cloud, and still apply any
      // genuine adds the cloud may also have.
      var unsafe = deletions.length && (cloudCount===0 || deletions.length===localKeys.length);
      if(unsafe){ Object.keys(d).forEach(function(k){ try{ localStorage.setItem(k,d[k]); }catch(e){} }); try{ window.habitsScheduleBackup && window.habitsScheduleBackup(); }catch(e){} return; }
      // ADDITIVE: merge each newer cloud blob INTO local (cloud wins on conflicts; union never shrinks).
      // NEVER remove a local key just because the cloud lacks it. Reload only when the merge changed local.
      var mine={}; _bKeys.forEach(function(k){ try{ var v=localStorage.getItem(k); if(v!==null) mine[k]=v; }catch(e){} });
      var merged=_mergeHabitsData(mine, d);   // cloud (d) overlays local
      var changed=false; for(var mk in merged){ if(merged[mk]!==mine[mk]) changed=true; }
      if(!changed) return;                    // already the union — no reload needed
      Object.keys(merged).forEach(function(k){ try{ localStorage.setItem(k,merged[k]); }catch(e){} });
      location.reload();
    }); }catch(e){} }

    // Restore first (download on fresh device), then show app; seed cloud on open.
    var _revealed=false;
    var _safetyTimer=null;
    function _reveal(){ if(_revealed) return; _revealed=true; if(_safetyTimer){ clearTimeout(_safetyTimer); _safetyTimer=null; } document.getElementById('auth-loading').style.display='none'; document.getElementById('root').style.display='block'; setTimeout(mountApp, 50); window.habitsScheduleBackup(); _bWatchLive(); }
    _safetyTimer = setTimeout(_reveal, 3000);   // safety: never stay stuck on the loading screen
    _bRestoreIfEmpty().then(function(restored){
      // Cancel the safety-reveal first so it can't fire mid-reload and race the restore.
      if(_safetyTimer){ clearTimeout(_safetyTimer); _safetyTimer=null; }
      if(restored){
        // Loop guard: a device where localStorage writes silently fail would restore →
        // reload → still-empty → restore forever. Reload at most once per session.
        var _looped=false;
        try{ _looped = sessionStorage.getItem('habits_restore_reloaded') === '1'; }catch(e){}
        if(!_looped){
          try{ sessionStorage.setItem('habits_restore_reloaded','1'); }catch(e){}
          location.reload();
          return;
        }
      }
      _reveal();
    });
  });

  function mountApp() {
    if (typeof window.__HABITS_MOUNTED !== 'undefined') return;
    window.__HABITS_MOUNTED = true;
    var script = document.getElementById('habits-app');
    if (script) {
      // Babel will have already processed it, React root should be rendered
    }
  }
})();
</script>

// Rule: Height/Length = Progress, Color = Performance, Glow = Excellence.
// Two palettes (red for the Premium colorful theme, gold/gray for the Core/Elite mono theme)
// so the SAME score reads correctly in whichever theme is active. Never a second color system.
const MPS_PERF_SCALE = {
  red: {
    5: {
      fill: '#b00000',
      glow: '0 0 22px rgba(255,30,30,0.65)'
    },
    4: {

    },

    }

};
function mpsClampScore(score) {
  const n = Number(score);
  if (Number.isNaN(n)) return 0;
  return Math.max(0, Math.min(5, Math.round(n)));
}
// Accepts a 0-5 score OR a 0-100 percent (auto-detected when > 5).
function mpsPerfConfig(scoreOrPct, gray) {
  let s = Number(scoreOrPct);
  if (Number.isNaN(s)) s = 0;
  if (s > 5) s = s / 20; // percent -> 0-5 score
  const lvl = mpsClampScore(s);
  return (gray ? MPS_PERF_SCALE.gray : MPS_PERF_SCALE.red)[lvl];
}
// Style for any solid fill (progress bars, heatmap cells, chart bars).
function mpsPerfStyle(scoreOrPct, gray) {
  const c = mpsPerfConfig(scoreOrPct, gray);
  return {
    background: c.fill,
    boxShadow: c.glow
  };
}
// Height as a share of a chart cell (Height = Progress). 5/5 -> 100%.
function mpsBarHeight(score) {
  return `${mpsClampScore(score) * 20}%`;
}
