<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>MPS Sleep &amp; Recovery</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/shared/auth-guard.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #0a0a0a;
      --card:      rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.08);
      --text:      #ffffff;
      --dim:       #9aa3b2;
      --faint:     #4a5568;
      --gold:      #c9a86b;
      --purple:    #9b6bc9;
      --purple-lo: rgba(155,107,201,0.15);
      --gold-lo:   rgba(201,168,107,0.12);
      --green:     #4ade80;
      --red:       #f87171;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* ── Hub Nav ─────────────────────────────────────────────── */
    #hub-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 46px;
      display: flex; align-items: center; padding: 0 16px;
      background: rgba(10,10,10,0.96); border-bottom: 1px solid rgba(155,107,201,0.2);
      backdrop-filter: blur(14px); z-index: 1000;
    }
    #hub-nav a { color: var(--purple); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-decoration: none; text-transform: uppercase; }
    #hub-nav .nav-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif; font-size: 16px;
      color: rgba(155,107,201,0.75); letter-spacing: 0.12em;
    }

    /* ── Loading ─────────────────────────────────────────────── */
    #auth-loading {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-size: 13px; letter-spacing: 4px; color: var(--purple);
    }
    #app { display: none; padding-top: 46px; }

    /* ── Tabs ────────────────────────────────────────────────── */
    .tabs {
      display: flex; gap: 2px; padding: 12px 16px 0;
      border-bottom: 1px solid var(--border); background: var(--bg);
      position: sticky; top: 46px; z-index: 100;
    }
    .tab {
      padding: 9px 14px; background: none; border: none; color: var(--dim);
      font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .tab.active { color: var(--purple); border-bottom-color: var(--purple); }

    /* ── Section ─────────────────────────────────────────────── */
    .section { padding: 16px; max-width: 640px; margin: 0 auto; }

    /* ── Cards ───────────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 12px;
    }
    .card-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 13px;
      letter-spacing: 0.18em; color: var(--purple); margin-bottom: 12px;
    }

    /* ── Stats grid ──────────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box {
      background: var(--purple-lo); border: 1px solid rgba(155,107,201,0.2);
      border-radius: 10px; padding: 12px; text-align: center;
    }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--purple); line-height: 1; }
    .stat-lbl { font-size: 10px; letter-spacing: 0.12em; color: var(--dim); text-transform: uppercase; margin-top: 4px; }

    /* Recovery ring */
    .recovery-ring {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 20px 0 12px;
    }
    .ring-val { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; line-height: 1; }
    .ring-lbl { font-size: 10px; letter-spacing: 0.22em; color: var(--dim); text-transform: uppercase; margin-top: 4px; }
    .ring-sub { font-size: 12px; color: var(--dim); margin-top: 8px; }

    /* ── Mini bar chart ──────────────────────────────────────── */
    .mini-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; margin-top: 8px; }
    .mini-bar { flex: 1; border-radius: 3px 3px 0 0; min-width: 8px; transition: opacity 0.2s; cursor: pointer; position: relative; }
    .mini-bar:hover { opacity: 0.8; }
    .chart-labels { display: flex; gap: 4px; margin-top: 4px; }
    .chart-lbl { flex: 1; font-size: 9px; color: var(--faint); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Form ────────────────────────────────────────────────── */
    .form-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--dim); text-transform: uppercase; margin-bottom: 6px; display: block; }
    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .form-input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; padding: 10px 12px;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--purple); }
    .form-input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

    /* Slider */
    .slider-row { margin-bottom: 14px; }
    .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .slider-name { font-size: 12px; color: var(--dim); font-weight: 500; }
    .slider-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--purple); min-width: 24px; text-align: right; }
    input[type="range"] {
      width: 100%; height: 4px; background: rgba(155,107,201,0.2);
      border-radius: 2px; outline: none; -webkit-appearance: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      background: var(--purple); border-radius: 50%;
      box-shadow: 0 0 8px rgba(155,107,201,0.5);
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; padding: 11px 20px; border-radius: 8px; font-size: 12px;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; border: none; transition: opacity 0.15s; font-family: 'Inter', sans-serif;
    }
    .btn:hover { opacity: 0.85; }
    .btn.primary { background: var(--purple); color: #fff; width: 100%; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--dim); }
    .btn.danger { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(155,107,201,0.95); color: #fff; padding: 10px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0;
      transition: all 0.3s; z-index: 9999; white-space: nowrap; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── History ─────────────────────────────────────────────── */
    .history-entry {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-radius: 10px; margin-bottom: 8px;
      background: var(--card); border: 1px solid var(--border); gap: 10px;
    }
    .he-date { font-size: 13px; font-weight: 600; color: var(--text); min-width: 80px; }
    .he-dur { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--gold); }
    .he-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; }
    .he-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; letter-spacing: 0.05em; white-space: nowrap; }
    .badge.energy { background: rgba(201,168,107,0.15); color: var(--gold); }
    .badge.soreness { background: rgba(248,113,113,0.15); color: var(--red); }
    .badge.clarity { background: rgba(155,107,201,0.15); color: var(--purple); }
    .he-del { background: none; border: none; color: var(--faint); font-size: 16px; cursor: pointer; padding: 4px; line-height: 1; }
    .he-del:hover { color: var(--red); }

    .month-header {
      font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.2em;
      color: var(--purple); padding: 8px 0 4px; border-bottom: 1px solid var(--border);
      margin-bottom: 8px; margin-top: 4px;
    }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--faint); font-size: 13px; }

    /* ── FAB ─────────────────────────────────────────────────── */
    #fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 52px; height: 52px; background: var(--purple);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: #fff; cursor: pointer; z-index: 500;
      box-shadow: 0 4px 16px rgba(155,107,201,0.45); border: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(155,107,201,0.6); }

    /* score colors */
    .score-high { color: var(--green); }
    .score-mid  { color: var(--gold); }
    .score-low  { color: var(--red); }
  </style>
</head>
<body>

<div id="auth-loading">LOADING...</div>

<div id="app">
  <!-- Hub Nav -->
  <div id="hub-nav">
    <a href="/hub.html">← Hub</a>
    <span class="nav-title">MPS SLEEP</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="switchTab('log')">Log Sleep</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <!-- Dashboard -->
  <div id="tab-dashboard" class="section">
    <div class="card" id="recovery-card">
      <div class="card-title">Recovery Score</div>
      <div class="recovery-ring">
        <div class="ring-val" id="score-display" style="color:#4a5568">—</div>
        <div class="ring-lbl">Overall Recovery</div>
        <div class="ring-sub" id="score-label">No entries yet</div>
      </div>
    </div>

    <div class="stats-grid" style="margin-bottom:12px;">
      <div class="stat-box">
        <div class="stat-val" id="avg-sleep">—</div>
        <div class="stat-lbl">Avg Sleep (hrs)</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="total-entries">0</div>
        <div class="stat-lbl">Sessions Logged</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="avg-energy" style="color:var(--gold);">—</div>
        <div class="stat-lbl">Avg Energy</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="avg-clarity" style="color:var(--purple);">—</div>
        <div class="stat-lbl">Avg Clarity</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Recovery Trend (Last 10)</div>
      <div class="mini-chart" id="trend-chart"></div>
      <div class="chart-labels" id="trend-labels"></div>
    </div>

    <div class="card">
      <div class="card-title">Last Entry</div>
      <div id="last-entry-display" style="color:var(--dim);font-size:13px;">No entries yet.</div>
    </div>
  </div>

  <!-- Log -->
  <div id="tab-log" class="section" style="display:none;">
    <div class="card">
      <div class="card-title">Log Sleep Session</div>

      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="log-date"/>
      </div>

      <div class="form-row">
        <div>
          <label class="form-label">Bedtime</label>
          <input type="time" class="form-input" id="log-bedtime" value="22:00"/>
        </div>
        <div>
          <label class="form-label">Wake Time</label>
          <input type="time" class="form-input" id="log-wake" value="06:00"/>
        </div>
      </div>

      <div class="form-group">
        <div id="duration-display" style="font-size:13px;color:var(--gold);text-align:center;padding:6px 0 4px;letter-spacing:0.05em;"></div>
      </div>

      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-name">⚡ Energy</span>
          <span class="slider-val" id="val-energy">7</span>
        </div>
        <input type="range" min="1" max="10" value="7" id="sl-energy" oninput="updateSlider('energy',this.value)"/>
      </div>

      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-name">🦵 Soreness</span>
          <span class="slider-val" id="val-soreness">3</span>
        </div>
        <input type="range" min="1" max="10" value="3" id="sl-soreness" oninput="updateSlider('soreness',this.value)"/>
      </div>

      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-name">🧠 Mental Clarity</span>
          <span class="slider-val" id="val-clarity">7</span>
        </div>
        <input type="range" min="1" max="10" value="7" id="sl-clarity" oninput="updateSlider('clarity',this.value)"/>
      </div>

      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-name">🌊 Restlessness</span>
          <span class="slider-val" id="val-restlessness">3</span>
        </div>
        <input type="range" min="1" max="10" value="3" id="sl-restlessness" oninput="updateSlider('restlessness',this.value)"/>
      </div>

      <button class="btn primary" onclick="saveEntry()" style="margin-top:8px;">Save Session</button>
    </div>
  </div>

  <!-- History -->
  <div id="tab-history" class="section" style="display:none;">
    <div id="history-list"></div>
  </div>
</div>

<button id="fab" onclick="switchTab('log')" title="Log Sleep">+</button>
<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────
let entries = [];
let db = null;
let uid = null;
const STORE_PREFIX = 'mps_sleep_';

// ── Auth + Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  if (typeof MPS_GUARD !== 'undefined') MPS_GUARD.protect('sleep');
});

firebase.auth().onAuthStateChanged(function(user) {
  if (!user) return;
  uid = user.uid;
  db  = firebase.firestore();

  document.getElementById('auth-loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Set today's date in log form
  const today = new Date();
  document.getElementById('log-date').value = fmtDate(today);

  loadEntries();
  updateDurationDisplay();
});

// ── Storage ──────────────────────────────────────────────────
function storePath(key) { return 'users/' + uid + '/sleep_logs/' + key; }

async function loadEntries() {
  entries = [];
  try {
    if (db) {
      const snap = await db.collection('users/' + uid + '/sleep_logs').get();
      snap.forEach(function(doc) {
        const d = doc.data();
        if (d && d.date) entries.push(d);
      });
    }
  } catch(e) {
    // Fallback to localStorage
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(STORE_PREFIX)) {
        try { entries.push(JSON.parse(localStorage.getItem(k))); } catch(x){}
      }
    }
  }
  entries.sort(function(a,b){ return a.date.localeCompare(b.date); });
  renderAll();
}

async function persistEntry(entry) {
  // localStorage backup always
  localStorage.setItem(STORE_PREFIX + entry.date, JSON.stringify(entry));
  // Firestore
  if (db) {
    try {
      await db.doc(storePath(entry.date)).set(entry);
    } catch(e) { console.warn('Firestore save failed:', e); }
  }
}

async function deleteEntryFromStore(date) {
  localStorage.removeItem(STORE_PREFIX + date);
  if (db) {
    try { await db.doc(storePath(date)).delete(); } catch(e){}
  }
}

// ── Recovery Score ───────────────────────────────────────────
function calcScore(entry) {
  const dur     = entry.duration || 0;
  const energy  = entry.energy   || 5;
  const clarity = entry.clarity  || 5;
  const sore    = entry.soreness || 5;
  const rest    = entry.restlessness || 5;

  const durScore  = Math.min(dur / 8, 1) * 30;          // 30pts: 8h = max
  const engScore  = (energy / 10) * 25;                 // 25pts
  const clarScore = (clarity / 10) * 25;                // 25pts
  const soreScore = ((10 - sore) / 10) * 10;            // 10pts (lower sore = better)
  const restScore = ((10 - rest) / 10) * 10;            // 10pts (lower rest = better)

  return Math.round(durScore + engScore + clarScore + soreScore + restScore);
}

function scoreColor(s) {
  if (s >= 75) return 'var(--green)';
  if (s >= 50) return 'var(--gold)';
  return 'var(--red)';
}
function scoreLabel(s) {
  if (s >= 80) return 'Elite Recovery';
  if (s >= 65) return 'Good Recovery';
  if (s >= 50) return 'Moderate Recovery';
  if (s >= 35) return 'Poor Recovery';
  return 'Recovery Needed';
}

// ── Duration helpers ─────────────────────────────────────────
function calcDuration(bedtime, waketime) {
  if (!bedtime || !waketime) return 0;
  const [bh, bm] = bedtime.split(':').map(Number);
  const [wh, wm] = waketime.split(':').map(Number);
  let mins = (wh * 60 + wm) - (bh * 60 + bm);
  if (mins <= 0) mins += 24 * 60;
  return Math.round(mins / 6) / 10; // hours with 1 decimal
}

function updateDurationDisplay() {
  const bed  = document.getElementById('log-bedtime').value;
  const wake = document.getElementById('log-wake').value;
  const dur  = calcDuration(bed, wake);
  const el   = document.getElementById('duration-display');
  if (dur > 0) el.textContent = '⏱ ' + dur.toFixed(1) + ' hours of sleep';
  else el.textContent = '';
}
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('log-bedtime').addEventListener('input', updateDurationDisplay);
  document.getElementById('log-wake').addEventListener('input', updateDurationDisplay);
});

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
function prettyDate(str) {
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function monthKey(str) {
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
}

// ── Save Entry ───────────────────────────────────────────────
async function saveEntry() {
  const date    = document.getElementById('log-date').value;
  const bedtime = document.getElementById('log-bedtime').value;
  const wake    = document.getElementById('log-wake').value;
  const energy  = parseInt(document.getElementById('sl-energy').value);
  const soreness= parseInt(document.getElementById('sl-soreness').value);
  const clarity = parseInt(document.getElementById('sl-clarity').value);
  const rest    = parseInt(document.getElementById('sl-restlessness').value);
  const duration= calcDuration(bedtime, wake);

  if (!date || !bedtime || !wake) { showToast('Fill in date and times'); return; }

  const entry = { date, bedtime, waketime: wake, duration, energy, soreness, clarity, restlessness: rest };

  entries = entries.filter(function(e){ return e.date !== date; });
  entries.push(entry);
  entries.sort(function(a,b){ return a.date.localeCompare(b.date); });

  await persistEntry(entry);
  renderAll();
  switchTab('dashboard');
  showToast('Sleep logged ✓');
}

// ── Delete Entry ─────────────────────────────────────────────
async function deleteEntry(date) {
  entries = entries.filter(function(e){ return e.date !== date; });
  await deleteEntryFromStore(date);
  renderAll();
  showToast('Entry deleted');
}

// ── Render ───────────────────────────────────────────────────
function renderAll() {
  renderDashboard();
  renderHistory();
}

function renderDashboard() {
  const n = entries.length;
  document.getElementById('total-entries').textContent = n;

  if (n === 0) {
    document.getElementById('score-display').textContent = '—';
    document.getElementById('score-display').style.color = 'var(--faint)';
    document.getElementById('score-label').textContent = 'No entries yet';
    document.getElementById('avg-sleep').textContent = '—';
    document.getElementById('avg-energy').textContent = '—';
    document.getElementById('avg-clarity').textContent = '—';
    document.getElementById('trend-chart').innerHTML = '';
    document.getElementById('trend-labels').innerHTML = '';
    document.getElementById('last-entry-display').innerHTML = 'No entries yet.';
    return;
  }

  const latest = entries[entries.length - 1];
  const score  = calcScore(latest);
  const scoreEl = document.getElementById('score-display');
  scoreEl.textContent = score;
  scoreEl.style.color = scoreColor(score);
  document.getElementById('score-label').textContent = scoreLabel(score) + ' — ' + prettyDate(latest.date);

  const avgDur  = (entries.reduce(function(s,e){ return s + (e.duration||0); },0) / n).toFixed(1);
  const avgEng  = Math.round(entries.reduce(function(s,e){ return s + (e.energy||0); },0) / n * 10) / 10;
  const avgClar = Math.round(entries.reduce(function(s,e){ return s + (e.clarity||0); },0) / n * 10) / 10;
  document.getElementById('avg-sleep').textContent   = avgDur;
  document.getElementById('avg-energy').textContent  = avgEng;
  document.getElementById('avg-clarity').textContent = avgClar;

  // Trend chart (last 10)
  const recent = entries.slice(-10);
  const chartEl  = document.getElementById('trend-chart');
  const labelsEl = document.getElementById('trend-labels');
  const scores   = recent.map(calcScore);
  const maxS = Math.max(...scores, 1);

  chartEl.innerHTML = scores.map(function(s,i) {
    const h = Math.max(Math.round((s / 100) * 56), 4);
    const col = scoreColor(s);
    return '<div class="mini-bar" style="height:'+h+'px;background:'+col+';opacity:0.85;" title="'+prettyDate(recent[i].date)+': '+s+'"></div>';
  }).join('');

  labelsEl.innerHTML = recent.map(function(e) {
    const d = new Date(e.date + 'T12:00:00');
    return '<div class="chart-lbl">'+String(d.getMonth()+1)+'/'+d.getDate()+'</div>';
  }).join('');

  // Last entry detail
  document.getElementById('last-entry-display').innerHTML =
    '<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">' +
    '<span style="color:var(--text);font-weight:600;">' + prettyDate(latest.date) + '</span>' +
    '<span style="color:var(--gold);font-family:\'Bebas Neue\',sans-serif;font-size:1.2rem;">' + (latest.duration||0).toFixed(1) + 'h</span>' +
    '<span class="badge energy">Energy ' + (latest.energy||0) + '</span>' +
    '<span class="badge soreness">Sore ' + (latest.soreness||0) + '</span>' +
    '<span class="badge clarity">Clarity ' + (latest.clarity||0) + '</span>' +
    '</div>';
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty-state">No sleep sessions logged yet.<br>Tap + to add your first entry.</div>';
    return;
  }

  const sorted = entries.slice().reverse();
  const groups = {};
  sorted.forEach(function(e) {
    const mk = monthKey(e.date);
    if (!groups[mk]) groups[mk] = [];
    groups[mk].push(e);
  });

  let html = '';
  Object.keys(groups).forEach(function(month) {
    html += '<div class="month-header">' + month + '</div>';
    groups[month].forEach(function(e) {
      const score = calcScore(e);
      html += '<div class="history-entry">' +
        '<div>' +
          '<div class="he-date">' + prettyDate(e.date) + '</div>' +
          '<div class="he-badges">' +
            '<span class="badge energy">⚡ ' + (e.energy||0) + '</span>' +
            '<span class="badge soreness">🦵 ' + (e.soreness||0) + '</span>' +
            '<span class="badge clarity">🧠 ' + (e.clarity||0) + '</span>' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:12px;">' +
          '<div style="text-align:right;">' +
            '<div class="he-dur">' + (e.duration||0).toFixed(1) + 'h</div>' +
            '<div class="he-score" style="color:' + scoreColor(score) + ';">' + score + '</div>' +
          '</div>' +
          '<button class="he-del" onclick="deleteEntry(\'' + e.date + '\')">✕</button>' +
        '</div>' +
      '</div>';
    });
  });

  el.innerHTML = html;
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(name) {
  ['dashboard','log','history'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(btn, i) {
    btn.classList.toggle('active', ['dashboard','log','history'][i] === name);
  });
  if (name === 'log') {
    // Reset today's date if empty
    if (!document.getElementById('log-date').value) {
      document.getElementById('log-date').value = fmtDate(new Date());
    }
    updateDurationDisplay();
  }
}

// ── Slider display ────────────────────────────────────────────
function updateSlider(name, val) {
  document.getElementById('val-' + name).textContent = val;
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}
</script>
