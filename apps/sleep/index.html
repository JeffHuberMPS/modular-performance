<!-- ── Firebase Auth + Firestore bridge ── -->
<script>
(function() {
  'use strict';

  // Auth guard — redirects if not signed in
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof MPS_GUARD !== 'undefined') MPS_GUARD.protect('sleep');
  });

  firebase.auth().onAuthStateChanged(function(user) {
    if (!user) return; // auth-guard handles redirect

    var uid  = user.uid;
    var db   = firebase.firestore();
    var COLL = 'users/' + uid + '/sleep_entries';

    // window.storage — bonus Firestore sync layer
    // The component's module-level storage uses localStorage as primary
    // and calls window.storage.set() as a cloud backup
    window.storage = {
      get: function(key) {
        return db.doc(COLL + '/' + key).get()
          .then(function(snap) {
            return snap.exists ? snap.data().value : null;
          })
          .catch(function() { return null; });
      },
      set: function(key, value) {
        return db.doc(COLL + '/' + key).set({ value: value })
          .then(function() { return true; })
          .catch(function() { return false; });
      },
      delete: function(key) {
        return db.doc(COLL + '/' + key).delete().catch(function() {});
      },
      list: function() {
        return db.collection(COLL).get()
          .then(function(snap) { return snap.docs.map(function(d) { return d.id; }); })
          .catch(function() { return []; });
      }
    };

    // Reveal app
    document.getElementById('auth-loading').style.display = 'none';
    document.getElementById('root').style.display = 'block';
  });
})();
</script>

<!-- ══════════════════════════════════════════════════

<script type="text/babel">

/* ── CDN Globals ── */
const { useState, useEffect, useMemo } = React;
const _recharts = window.Recharts || {};
const {
  LineChart, Line, BarChart, Bar, XAxis, YAxis,
  Tooltip, ResponsiveContainer, ReferenceLine, Legend
} = _recharts;

/* Lucide React icons — with emoji fallbacks if CDN fails */
const _lc = window.LucideReact || window.lucide || {};
const Moon        = _lc.Moon        || (({size=16}) => <span style={{fontSize:(size*0.85)+'px'}}>🌙</span>);
const Sun         = _lc.Sun         || (({size=16}) => <span style={{fontSize:(size*0.85)+'px'}}>☀️</span>);
const Activity    = _lc.Activity    || (({size=16}) => <span style={{fontSize:(size*0.85)+'px'}}>📈</span>);

const Flame       = _lc.Flame       || (({size=16}) => <span style={{fontSize:(size*0.85)+'px'}}>🔥</span>);
const Plus        = _lc.Plus        || (({size=16}) => <span>＋</span>);
const Trash2      = _lc.Trash2      || (({size=16}) => <span style={{fontSize:(size*0.85)+'px'}}>🗑</span>);
const TrendingUp  = _lc.TrendingUp  || (({size=12}) => <span>↑</span>);
const TrendingDown= _lc.TrendingDown|| (({size=12}) => <span>↓</span>);
const Minus       = _lc.Minus       || (({size=12}) => <span>−</span>);
const Zap         = _lc.Zap         || (({size=16}) => <span>⚡</span>);
const HeartPulse  = _lc.HeartPulse  || (({size=16}) => <span>💓</span>);
const Pencil      = _lc.Pencil      || (({size=16}) => <span>✏</span>);
const ChevronDown = _lc.ChevronDown || (({size=18,style:s}) => <span style={{...s,display:'inline-block'}}>▾</span>);

/* ── Inline SVG icons — guaranteed render, no CDN dependency ── */
const IconSun      = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>;
const IconMoon     = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
const IconZap      = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
const IconHeart    = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l1.5-3 2 4.5 1.5-3h6.78"/></svg>;
const IconActivity = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
const IconBattery  = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="6" width="18" height="12" rx="2"/><line x1="23" y1="13" x2="23" y2="11"/><line x1="5" y1="10" x2="5" y2="14"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="11" y1="10" x2="11" y2="14"/></svg>;

/* ══════════════════════════════════════════════════
   STORAGE — localStorage primary, Firestore bonus sync
   ══════════════════════════════════════════════════ */
const LS_PREFIX = "rr_sleep:";
const storage = {
  async get(key) {
    try {
      const v = localStorage.getItem(LS_PREFIX + key);
      return v;
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      localStorage.setItem(LS_PREFIX + key, value);
      if (typeof window !== "undefined" && window.storage?.set) {
        try { await window.storage.set(key, value); } catch (e) {}
      }
      return true;
    } catch (e) {
      console.error("Save failed:", e);
      return false;
    }
  },
  async delete(key) {
    try { localStorage.removeItem(LS_PREFIX + key); } catch (e) {}
    if (typeof window !== "undefined" && window.storage?.delete) {
      try { await window.storage.delete(key); } catch (e) {}
    }
  },
  async list() {
    const keys = [];
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(LS_PREFIX)) {
          keys.push(k.slice(LS_PREFIX.length));
        }
      }
    } catch (e) {}
    return keys;
  },
};

/* ══════════════════════════════════════════════════
   MAIN COMPONENT
   ══════════════════════════════════════════════════ */
function SleepTracker() {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [saveError, setSaveError] = useState(null);
  const [saveSuccess, setSaveSuccess] = useState(false);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [expandedMonths, setExpandedMonths] = useState({});
  const [selectedMonth, setSelectedMonth] = useState(null);
  const [monthPickerOpen, setMonthPickerOpen] = useState(false);
  const [form, setForm] = useState(() => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return {
      date: `${y}-${m}-${day}`,
      sleepTime: "",
      wakeTime: "04:00",
      energy: 7,
      soreness: 3,
      clarity: 7,
      restlessness: 3,
    };
  });

  /* Load on mount */
  useEffect(() => {
    (async () => {
      try {
        const keys = await storage.list();
        const loaded = [];
        for (const k of keys) {
          const value = await storage.get(k);
          if (value) {
            try {
              const parsed = JSON.parse(value);
              loaded.push({
                ...parsed,
                energy: parsed.energy ?? 5,
                clarity: parsed.clarity ?? 5,
                soreness: parsed.soreness ?? 5,
                restlessness: parsed.restlessness ?? 3,
              });
            } catch (e) {}
          }
        }
        loaded.sort((a, b) => a.date.localeCompare(b.date));
        setEntries(loaded);
      } catch (e) {
        console.error(e);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const saveEntry = async () => {
    const entry = { ...form };
    const next = [...entries.filter((e) => e.date !== form.date), entry].sort((a, b) =>
      a.date.localeCompare(b.date)
    );
    setEntries(next);
    setShowForm(false);
    setSaveSuccess(true);
    setSaveError(null);
    if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" });
    setTimeout(() => setSaveSuccess(false), 1500);
    const ok = await storage.set(form.date, JSON.stringify(entry));
    if (!ok) setSaveError("Could not persist entry");
  };

  const deleteEntry = async (date) => {
    setEntries(entries.filter((e) => e.date !== date));
    await storage.delete(date);
  };

  const editEntry = (entry) => {
    setForm({
      date: entry.date,
      sleepTime: entry.sleepTime || "",
      wakeTime: entry.wakeTime || "",
      energy: entry.energy ?? 5,
      soreness: entry.soreness ?? 5,
      clarity: entry.clarity ?? 5,
      restlessness: entry.restlessness ?? 3,
    });
    setShowForm(true);
    if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const todayStr = () => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  };

  const fmt12 = (t) => {
    if (!t) return "";
    const [h, m] = t.split(":").map(Number);
    const period = h >= 12 ? "PM" : "AM";
    const h12 = h % 12 === 0 ? 12 : h % 12;
    return `${h12}:${String(m).padStart(2, "0")} ${period}`;
  };

  const fmt12Short = (t) => {
    if (!t) return "";
    const [h, m] = t.split(":").map(Number);
    const period = h >= 12 ? "p" : "a";
    const h12 = h % 12 === 0 ? 12 : h % 12;
    return `${h12}:${String(m).padStart(2, "0")}${period}`;
  };

  const fmtDate = (d) => {
    if (!d) return "";
    const [y, m, day] = d.split("-");
    return `${m}/${day}/${y}`;
  };

  const fmtWeekday = (d) => {
    if (!d) return "";
    const [y, m, day] = d.split("-").map(Number);
    return ["SUN","MON","TUE","WED","THU","FRI","SAT"][new Date(y, m - 1, day).getDay()];
  };

  const toDate = (dateStr) => {
    const [y, m, d] = dateStr.split("-").map(Number);
    return new Date(y, m - 1, d);
  };

  const startOfWeek = (dateStr) => {
    const d = toDate(dateStr);
    const day = d.getDay();
    d.setDate(d.getDate() - day);
    return d;
  };

  const dateToStr = (d) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  };

  const fmtWeekRange = (weekStart) => {
    const end = new Date(weekStart);
    end.setDate(end.getDate() + 6);
    const mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const s = `${mn[weekStart.getMonth()]} ${weekStart.getDate()}`;
    const e = weekStart.getMonth() === end.getMonth()
      ? `${end.getDate()}`
      : `${mn[end.getMonth()]} ${end.getDate()}`;
    return `${s} – ${e}`;
  };

  const fmtMonth = (dateStr) => {
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const [y, m] = dateStr.split("-").map(Number);
    return `${monthNames[m - 1]} ${y}`;
  };

  const calcHours = (sleep, wake) => {
    if (!sleep || !wake) return 0;
    const [sh, sm] = sleep.split(":").map(Number);
    const [wh, wm] = wake.split(":").map(Number);
    let mins = wh * 60 + wm - (sh * 60 + sm);
    if (mins < 0) mins += 24 * 60;
    return +(mins / 60).toFixed(2);
  };

  // Recovery formula: sleep(25%) + energy(20%) + clarity(20%) + soreness_inv(15%) + restlessness_inv(20%)
  const calcRecovery = (hours, energy, soreness, clarity, restlessness) => {
    const sleepScore     = Math.min(hours / 7, 1) * 25;
    const energyScore    = (energy / 10) * 20;
    const clarityScore   = (clarity / 10) * 20;
    const soreScore      = ((10 - soreness) / 10) * 15;
    const restScore      = ((10 - restlessness) / 10) * 20;
    return Math.round(sleepScore + energyScore + clarityScore + soreScore + restScore);
  };

  const enriched = useMemo(() =>
    entries.map((e) => {
      const hours    = calcHours(e.sleepTime, e.wakeTime);
      const hasSleep = !!e.sleepTime;
      return {
        ...e,
        hours:    hasSleep ? hours : null,
        recovery: hasSleep ? calcRecovery(hours, e.energy ?? 5, e.soreness ?? 5, e.clarity ?? 5, e.restlessness ?? 3) : null,
        label:    e.date.slice(5),
        weekday: (() => {
          const [yy, mm, dd] = e.date.split("-").map(Number);
          return ["SUN","MON","TUE","WED","THU","FRI","SAT"][new Date(yy, mm - 1, dd).getDay()];
        })(),
      };
    }),
    [entries]
  );

  const last30 = enriched.slice(-30);
  const last7  = enriched.slice(-7);

  const weekdayMap = useMemo(() => {
    const m = {};
    enriched.forEach((e) => { m[e.label] = e.weekday; });
    return m;
  }, [enriched]);

  const avg = (arr, key) => {
    const vals = arr.map((x) => x[key]).filter((v) => v !== undefined && v !== null && !isNaN(v));
    return vals.length ? +(vals.reduce((s, x) => s + x, 0) / vals.length).toFixed(1) : 0;
  };

  const stats = {
    hours:    avg(last7, "hours"),
    energy:   avg(last7, "energy"),
    clarity:  avg(last7, "clarity"),
    soreness: avg(last7, "soreness"),
    recovery: avg(last7, "recovery"),
  };

  /* ── Insights ── */
  const avgMinutes = (arr, key) => {
    const mins = arr.map((e) => e[key]).filter(Boolean).map((t) => {
      const [h, m] = t.split(":").map(Number);
      return key === "sleepTime" && h < 12 ? h * 60 + m + 24 * 60 : h * 60 + m;
    });
    if (!mins.length) return null;
    const av = mins.reduce((s, x) => s + x, 0) / mins.length;
    const totalMins = Math.round(av) % (24 * 60);
    const h = Math.floor(totalMins / 60);
    const m = totalMins % 60;
    return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
  };

  const bestDay = (() => {
    if (!last7.length) return null;
    const valid = last7.filter((e) => e.recovery != null);
    if (!valid.length) return null;
    return valid.reduce((best, e) => (e.recovery > best.recovery ? e : best), valid[0]);
  })();

  const worstDay = (() => {
    if (!last7.length) return null;
    const valid = last7.filter((e) => e.recovery != null);
    if (!valid.length) return null;
    return valid.reduce((worst, e) => (e.recovery < worst.recovery ? e : worst), valid[0]);
  })();

  const dayOfWeek = (dateStr) => {
    const [y, m, d] = dateStr.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString("en-US", { weekday: "long" });
  };

  const insights = {
    avgWake:    avgMinutes(last7, "wakeTime"),
    avgSleep:   avgMinutes(last7, "sleepTime"),
    bestDay,
    worstDay,
    entryCount: last7.length,
  };

  const trend = (key) => {
    if (last7.length < 4) return "flat";
    const half = Math.floor(last7.length / 2);
    const earlier = avg(last7.slice(0, half), key);
    const recent  = avg(last7.slice(half), key);
    const diff = recent - earlier;
    if (Math.abs(diff) < 0.3) return "flat";
    return diff > 0 ? "up" : "down";
  };

  const today = enriched.find((e) => e.date === todayStr());

  if (loading) {
    return (
      <div style={styles.loading}>
        <div style={{ fontFamily: "JetBrains Mono, monospace", letterSpacing: "0.3em", color: "#9b6bc9", fontSize: 12 }}>
          LOADING
        </div>
      </div>
    );
  }

  return (
    <div style={styles.page}>
      <div style={styles.container}>

        {/* Save success toast */}
        {saveSuccess && (
          <div style={{
            background: "rgba(155,107,201,0.15)", border: "1px solid #9b6bc9",
            color: "#c9a8e8", padding: "12px 16px", marginBottom: 16,
            fontFamily: "JetBrains Mono, monospace", fontSize: 12,
            letterSpacing: "0.1em", textAlign: "center"
          }}>
            ✓ ENTRY SAVED · {entries.length} TOTAL
          </div>
        )}

        {/* ── Header / Brand Block ── */}
        <header style={styles.header}>
          <div style={{ width: "100%" }}>

            {/* MPS Logo Card */}
            <div style={styles.mpsLogoWrap}>
              <div style={styles.mpsLogo}>MPS</div>
              <div style={styles.mpsDivider} />
              <div style={styles.mpsTagline}>MODULAR PERFORMANCE SYSTEMS</div>
              <div style={styles.appName}>
                REST <span style={{ color: "#9b6bc9", textShadow: "0 0 12px rgba(155,107,201,0.55)" }}>&amp;</span> RECOVERY
              </div>
            </div>

            {/* Subtitle */}
            <div style={styles.subtitle}>
              {entries.length} {entries.length === 1 ? "entry" : "entries"} · tracking since{" "}
              {entries[0]?.date ? fmtDate(entries[0].date) : "today"}
            </div>

            {/* Action Buttons */}
            <div style={styles.actionRow}>
              {activeTab === "dashboard" ? (
                <>
                  <button className="btn-primary" style={styles.btnPrimary} onClick={() => setShowForm(!showForm)}>
                    <Plus size={16} /> {showForm ? "CLOSE" : "LOG ENTRY"}
                  </button>
                  <button className="btn-purple" style={styles.btnPurple} onClick={() => setActiveTab("insights")}>
                    INSIGHTS
                  </button>
                  <button className="btn-purple" style={styles.btnPurple} onClick={() => setActiveTab("log")}>
                    LOG
                  </button>
                </>
              ) : (
                <button className="btn-purple" style={styles.btnPurple} onClick={() => setActiveTab("dashboard")}>
                  ← DASHBOARD
                </button>
              )}
            </div>
          </div>
        </header>

        {/* ── Entry Form ── */}
        {showForm && (
          <div style={styles.formCard}>
            <div style={styles.formGrid}>
              <Field label="Date">
                <input type="date" value={form.date}
                  onChange={(e) => setForm({ ...form, date: e.target.value })}
                  style={styles.input} />
              </Field>
              <Field label="Wake Time">
                <input type="time" value={form.wakeTime}
                  onChange={(e) => setForm({ ...form, wakeTime: e.target.value })}
                  style={styles.input} />
              </Field>
              <Field label="Sleep Time">
                <input type="time" value={form.sleepTime}
                  onChange={(e) => setForm({ ...form, sleepTime: e.target.value })}
                  style={styles.input} />
              </Field>
              <Field label={`Energy · ${form.energy}/10`}>
                <input type="range" min="1" max="10" value={form.energy}
                  onChange={(e) => setForm({ ...form, energy: +e.target.value })}
                  style={styles.range} />
              </Field>
              <Field label={`Soreness · ${form.soreness}/10`}>
                <input type="range" min="1" max="10" value={form.soreness}
                  onChange={(e) => setForm({ ...form, soreness: +e.target.value })}
                  style={styles.range} />
              </Field>
              <Field label={`Mental Clarity · ${form.clarity}/10`}>
                <input type="range" min="1" max="10" value={form.clarity}
                  onChange={(e) => setForm({ ...form, clarity: +e.target.value })}
                  style={{ ...styles.range, accentColor: "#9b6bc9" }} />
              </Field>
              <Field label={`Restlessness · ${form.restlessness}/10`}>
                <input type="range" min="1" max="10" value={form.restlessness}
                  onChange={(e) => setForm({ ...form, restlessness: +e.target.value })}
                  style={{ ...styles.range, accentColor: "#9b6bc9" }} />
              </Field>
            </div>
            <div style={styles.formFoot}>
              <div style={styles.preview}>
                {form.sleepTime ? (
                  <>
                    Duration: <strong style={{ color: "#9b6bc9" }}>{calcHours(form.sleepTime, form.wakeTime)}h</strong>
                    {" · "}
                    Recovery: <strong style={{ color: "#c9a86b" }}>
                      {calcRecovery(calcHours(form.sleepTime, form.wakeTime), form.energy, form.soreness, form.clarity, form.restlessness)}%
                    </strong>
                  </>
                ) : (
                  <span style={{ color: "#8a7d6b", fontStyle: "italic" }}>
                    Sleep time empty — add later to calculate recovery
                  </span>
                )}
              </div>
              <button className="btn-primary" style={styles.btnPrimary} onClick={saveEntry}>SAVE</button>
            </div>
            {saveError && (
              <div style={{ marginTop: 12, padding: 8, background: "#2a1010", border: "1px solid #8b3a3a", color: "#e8a0a0", fontSize: 11, fontFamily: "JetBrains Mono, monospace" }}>
                {saveError}
              </div>
            )}
          </div>
        )}

        {/* ══════════════════════════════════════════
            DASHBOARD TAB
            ══════════════════════════════════════════ */}
        {activeTab === "dashboard" && (
          <>
            {/* Today snapshot */}
            <section style={styles.todayCard}>
              <div style={styles.eyebrow}>TODAY · {fmtDate(todayStr())}</div>
              {today ? (
                <div style={styles.todayGrid}>
                  <TodayStat icon={<IconSun />}       label="Woke"     value={today.wakeTime ? fmt12(today.wakeTime) : "—"} accent="#9b6bc9" />
                  <TodayStat icon={<IconMoon />}      label="Slept"    value={today.hours != null ? `${today.hours}h` : "—"} accent="#9b6bc9" />
                  <TodayStat icon={<IconZap />}       label="Energy"   value={`${today.energy}/10`}  accent="#9b6bc9" />
                  <TodayStat icon={<IconHeart />}     label="Soreness" value={`${today.soreness}/10`} accent="#9b6bc9" />
                  <TodayStat icon={<IconActivity />}  label="Clarity"  value={`${today.clarity}/10`}  accent="#9b6bc9" />
                  <TodayStat icon={<IconBattery />}   label="Recovery" value={today.recovery != null ? `${today.recovery}%` : "—"} accent="#9b6bc9" />
                </div>
              ) : (
                <div style={styles.empty}>No entry yet. Log today.</div>
              )}
            </section>

            {/* 7-day stats */}
            <section style={styles.statsRow}>
              <StatBlock label="Avg Sleep"    value={`${stats.hours}h`}        sub="7-day" trend={trend("hours")}    good="up" />
              <StatBlock label="Avg Energy"   value={`${stats.energy}/10`}     sub="7-day" trend={trend("energy")}   good="up" />
              <StatBlock label="Avg Clarity"  value={`${stats.clarity}/10`}    sub="7-day" trend={trend("clarity")}  good="up" />
              <StatBlock label="Avg Soreness" value={`${stats.soreness}/10`}   sub="7-day" trend={trend("soreness")} good="down" />
              <StatBlock label="Avg Recovery" value={`${stats.recovery}%`}     sub="7-day" trend={trend("recovery")} good="up" />
            </section>

            {/* Charts */}
            <section style={styles.chartsGrid}>

              {/* Sleep Duration */}
              <ChartCard title="Sleep Duration" sub="hours per night · last 30">
                {ResponsiveContainer ? (
                  <ResponsiveContainer width="100%" height={200}>
                    <BarChart data={last30}>
                      <defs>
                        <linearGradient id="barGradient" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%"   stopColor="#c9a3eb" stopOpacity={1} />
                          <stop offset="50%"  stopColor="#9b6bc9" stopOpacity={1} />
                          <stop offset="100%" stopColor="#5a3088" stopOpacity={1} />
                        </linearGradient>
                        <filter id="barShadow" x="-50%" y="-50%" width="200%" height="200%">
                          <feDropShadow dx="0" dy="5" stdDeviation="5" floodColor="#000000" floodOpacity="0.75" />
                        </filter>
                      </defs>
                      <XAxis dataKey="label" tick={<DateTick weekdayMap={weekdayMap} />} axisLine={false} tickLine={false} height={42} />
                      <YAxis domain={[0, 10]} ticks={[0, 2, 4, 6, 8, 10]} tick={{ fill: "#9aa3b2", fontSize: 10 }} axisLine={false} tickLine={false} width={28} />
                      <Tooltip content={<CustomTooltip suffix="h" />} cursor={{ fill: "rgba(155,107,201,0.05)" }} />
                      <ReferenceLine y={7} stroke="#9b6bc9" strokeDasharray="2 4" opacity={0.5} />
                      <Bar dataKey="hours" fill="url(#barGradient)" shape={<Isometric3DBar />} filter="url(#barShadow)" />
                    </BarChart>
                  </ResponsiveContainer>
                ) : <div style={{ color: "#6a6258", fontSize: 11, padding: 20, fontFamily: "JetBrains Mono, monospace" }}>No chart data</div>}
              </ChartCard>

              {/* Recovery Score */}
              <ChartCard title="Recovery Score" sub="% · last 30 nights">
                {ResponsiveContainer ? (
                  <ResponsiveContainer width="100%" height={200}>
                    <LineChart data={last30}>
                      <defs>
                        <linearGradient id="goldGradient" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%"   stopColor="#c9a86b" stopOpacity={1} />
                          <stop offset="100%" stopColor="#7a5a20" stopOpacity={0.4} />
                        </linearGradient>
                      </defs>
                      <XAxis dataKey="label" tick={<DateTick weekdayMap={weekdayMap} />} axisLine={false} tickLine={false} />
                      <YAxis domain={[0, 100]} ticks={[0, 25, 50, 75, 100]} tick={{ fill: "#9aa3b2", fontSize: 10 }} axisLine={false} tickLine={false} width={34} />
                      <Tooltip content={<CustomTooltip suffix="%" />} cursor={{ stroke: "rgba(201,168,107,0.2)" }} />
                      <ReferenceLine y={70} stroke="#c9a86b" strokeDasharray="2 4" opacity={0.4} />
                      <Line type="monotone" dataKey="recovery" stroke="#c9a86b" strokeWidth={2}
                        dot={false} activeDot={{ r: 4, fill: "#c9a86b" }} connectNulls={false} />
                    </LineChart>
                  </ResponsiveContainer>
                ) : <div style={{ color: "#6a6258", fontSize: 11, padding: 20, fontFamily: "JetBrains Mono, monospace" }}>RECHARTS NOT LOADED</div>}
              </ChartCard>

              {/* Energy vs Soreness */}
              <ChartCard title="Energy vs Soreness" sub="1–10 scale · last 30">
                {ResponsiveContainer ? (
                  <ResponsiveContainer width="100%" height={200}>
                    <LineChart data={last30}>
                      <XAxis dataKey="label" tick={<DateTick weekdayMap={weekdayMap} />} axisLine={false} tickLine={false} />
                      <YAxis domain={[0, 10]} ticks={[0, 2, 4, 6, 8, 10]} tick={{ fill: "#9aa3b2", fontSize: 10 }} axisLine={false} tickLine={false} width={28} />
                      <Tooltip content={<CustomTooltip />} cursor={{ stroke: "rgba(201,168,107,0.1)" }} />
                      <Legend verticalAlign="bottom" height={28} formatter={(val) => <span style={{ color: "#9aa3b2", fontSize: 10, fontFamily: "JetBrains Mono, monospace", textTransform: "capitalize" }}>{val}</span>} />
                      <Line type="monotone" dataKey="energy"   stroke="#c9a86b"  strokeWidth={2} dot={false} activeDot={{ r: 3 }} connectNulls={false} />
                      <Line type="monotone" dataKey="soreness" stroke="#9b6bc9"  strokeWidth={2} dot={false} activeDot={{ r: 3 }} connectNulls={false} />
                    </LineChart>
                  </ResponsiveContainer>
                ) : <div style={{ color: "#6a6258", fontSize: 11, padding: 20, fontFamily: "JetBrains Mono, monospace" }}>RECHARTS NOT LOADED</div>}
              </ChartCard>

            </section>
          </>
        )}

        {/* ══════════════════════════════════════════
            INSIGHTS TAB
            ══════════════════════════════════════════ */}
        {activeTab === "insights" && (
          <section style={styles.insightsCard}>
            <div style={styles.eyebrow}>7-DAY INSIGHTS</div>
            <InsightRow label="Avg Wake Time"  value={insights.avgWake   || "—"} />
            <InsightRow label="Avg Sleep Time" value={insights.avgSleep  || "—"} />
            <InsightRow label="Best Recovery"  value={insights.bestDay   ? `${fmtDate(insights.bestDay.date)} · ${insights.bestDay.recovery}%`  : "—"} />
            <InsightRow label="Worst Recovery" value={insights.worstDay  ? `${fmtDate(insights.worstDay.date)} · ${insights.worstDay.recovery}%` : "—"} />
            <InsightRow label="Entries Logged" value={`${insights.entryCount} / 7`} />
          </section>
        )}

        {/* ══════════════════════════════════════════
            LOG TAB
            ══════════════════════════════════════════ */}
        {activeTab === "log" && (
          <div>
            {entries.length === 0 ? (
              <div style={styles.empty}>No entries yet. Log your first night.</div>
            ) : (
              [...entries].reverse().map((e) => (
                <div key={e.date} style={styles.logRow}>
                  <div style={styles.logLeft}>
                    <div style={styles.logDate}>{fmtDate(e.date)}</div>
                    <div style={styles.logSub}>
                      {e.hours != null ? `${e.hours}h sleep` : "—"}
                      {e.recovery != null ? ` · ${e.recovery}% recovery` : ""}
                    </div>
                  </div>
                  <div style={styles.logStats}>
                    <span style={{ color: "#c9a86b" }}>E {e.energy ?? "—"}</span>
                    <span style={{ color: "#9b6bc9" }}>S {e.soreness ?? "—"}</span>
                    <span style={{ color: "#6a9ecb" }}>C {e.clarity ?? "—"}</span>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button style={styles.iconBtn} onClick={() => editEntry(e)} title="Edit"><Pencil size={13} /></button>
                    <button style={{ ...styles.iconBtn, color: "#8b3a3a" }} onClick={() => deleteEntry(e.date)} title="Delete"><Trash2 size={13} /></button>
                  </div>
                </div>
              ))
            )}
          </div>
        )}

      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   SUB-COMPONENTS
   ══════════════════════════════════════════════════════════ */

/* Field — form label wrapper */
const Field = ({ label, children }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
    <label style={{ fontSize: 10, fontFamily: "JetBrains Mono, monospace", letterSpacing: "0.12em", color: "#9b6bc9", textTransform: "uppercase" }}>
      {label}
    </label>
    {children}
  </div>
);

/* TodayStat — stat card in the Today snapshot grid */
const TodayStat = ({ icon, label, value, accent }) => (
  <div style={{
    background: "rgba(20, 16, 28, 0.85)",
    border: "1px solid rgba(155,107,201,0.18)",
    borderRadius: 10,
    padding: "14px 16px",
    display: "flex",
    flexDirection: "column",
    gap: 8,
  }}>
    <div style={{
      display: "flex", alignItems: "center", gap: 6,
      fontSize: 10, fontFamily: "JetBrains Mono, monospace",
      letterSpacing: "0.14em", color: "#5a5264",
      textTransform: "uppercase",
    }}>
      <span style={{ color: accent || "#c9a86b", display: "flex", alignItems: "center" }}>{icon}</span>
      {label}
    </div>
    <div style={{
      fontSize: 22, fontWeight: 700, lineHeight: 1,
      fontFamily: "Bricolage Grotesque, system-ui, sans-serif",
      color: "#ffffff",
    }}>
      {value}
    </div>
  </div>
);

/* StatBlock — 7-day summary stat */
const StatBlock = ({ label, value, sub, trend, good }) => {
  const arrow = trend === "up" ? (good ? "↑" : "↓") : trend === "down" ? (good ? "↓" : "↑") : "—";
  const arrowColor = (trend === "up" && good) || (trend === "down" && !good) ? "#6ac96b" : trend === "flat" ? "#5a5264" : "#c96b6b";
  return (
    <div style={{
      flex: "1 1 calc(50% - 6px)", minWidth: 120,
      background: "rgba(20,16,28,0.85)", border: "1px solid rgba(155,107,201,0.12)",
      borderRadius: 10, padding: "14px 16px",
    }}>
      <div style={{ fontSize: 10, fontFamily: "JetBrains Mono, monospace", letterSpacing: "0.12em", color: "#5a5264", textTransform: "uppercase", marginBottom: 6 }}>
        {label}
      </div>
      <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "Bricolage Grotesque, system-ui, sans-serif", color: "#ffffff", lineHeight: 1 }}>
        {value}
      </div>
      <div style={{ fontSize: 10, color: "#5a5264", fontFamily: "JetBrains Mono, monospace", marginTop: 4 }}>
        — {sub} <span style={{ color: arrowColor }}>{arrow}</span>
      </div>
    </div>
  );
};

/* InsightRow */
const InsightRow = ({ label, value }) => (
  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
    padding: "12px 0", borderBottom: "1px solid rgba(155,107,201,0.1)" }}>
    <span style={{ fontSize: 11, fontFamily: "JetBrains Mono, monospace", letterSpacing: "0.1em", color: "#5a5264", textTransform: "uppercase" }}>
      {label}
    </span>
    <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "Bricolage Grotesque, system-ui, sans-serif", color: "#c9a86b" }}>
      {value}
    </span>
  </div>
);

/* Isometric3DBar — custom bar shape */
const Isometric3DBar = (props) => {
  const { x, y, width, height } = props;
  if (!height || height <= 0) return null;
  const d = 4;
  return (
    <g>
      <rect x={x} y={y} width={width} height={height} fill={props.fill || "#9b6bc9"} />
      <polygon points={`${x},${y} ${x+d},${y-d} ${x+width+d},${y-d} ${x+width},${y}`} fill="rgba(255,255,255,0.15)" />
      <polygon points={`${x+width},${y} ${x+width+d},${y-d} ${x+width+d},${y+height-d} ${x+width},${y+height}`} fill="rgba(0,0,0,0.25)" />
    </g>
  );
};

/* DateTick — custom XAxis tick */
const DateTick = ({ x, y, payload, weekdayMap }) => {
  if (!payload?.value) return null;
  const wd = weekdayMap?.[payload.value];
  return (
    <g transform={`translate(${x},${y})`}>
      <text x={0} y={0} dy={12} textAnchor="middle" fill="#4a4255" fontSize={9} fontFamily="JetBrains Mono, monospace">
        {wd ? wd.slice(0, 1) : payload.value.slice(-2)}
      </text>
    </g>
  );
};

/* ChartCard */
const ChartCard = ({ title, sub, children }) => (
  <div style={{
    background: "rgba(20,16,28,0.85)", border: "1px solid rgba(155,107,201,0.12)",
    borderRadius: 12, padding: "16px", marginBottom: 12,
  }}>
    <div style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 10, letterSpacing: "0.14em",
      textTransform: "uppercase", color: "#9b6bc9", marginBottom: 2 }}>
      {title}
    </div>
    {sub && <div style={{ fontSize: 9, color: "#4a4255", fontFamily: "JetBrains Mono, monospace", marginBottom: 12 }}>{sub}</div>}
    {children}
  </div>
);

/* CustomTooltip */
const CustomTooltip = ({ active, payload, label, suffix = "" }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: "#120e1c", border: "1px solid rgba(155,107,201,0.3)",
      borderRadius: 6, padding: "8px 12px", fontFamily: "JetBrains Mono, monospace", fontSize: 10 }}>
      <div style={{ color: "#5a5264", marginBottom: 4 }}>{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ color: p.color || "#c9a86b" }}>{p.name}: {p.value}{suffix}</div>
      ))}
    </div>
  );
};

const _root = ReactDOM.createRoot(document.getElementById('root'));
function tryMount() {
  if (window.storage) {
    _root.render(<SleepTracker />);

}
