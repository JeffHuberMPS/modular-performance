<!-- Firebase → window.storage bridge -->
<script>
(function() {
  'use strict';

  document.addEventListener('DOMContentLoaded', function() {
    if (typeof MPS_GUARD !== 'undefined') MPS_GUARD.protect('sleep');
  });

  firebase.auth().onAuthStateChanged(function(user) {
    if (!user) return;

    var uid = user.uid;
    var db = firebase.firestore();
    var COLL = 'users/' + uid + '/app_storage';

    // window.storage — maps to Firestore (same API as sleep component uses)
    window.storage = {
      get: function(key) {
        return db.doc(COLL + '/' + encodeKey(key)).get().then(function(snap) {
          return snap.exists ? snap.data() : null;
        });
      },
      set: function(key, value) {
        return db.doc(COLL + '/' + encodeKey(key)).set({ value: value }).then(function() {
          return true;
        }).catch(function() { return false; });
      },
      delete: function(key) {
        return db.doc(COLL + '/' + encodeKey(key)).delete().catch(function(){});
      },
      list: function() {
        // Sleep tracker uses date strings as keys (e.g. "2026-05-26")
        // stored under sleep_* prefix
        return db.collection(COLL).get().then(function(snap) {
          return snap.docs
            .map(function(d) { return decodeKey(d.id); })
            .filter(function(k) { return /^\d{4}-\d{2}-\d{2}$/.test(k); });
        });
      }
    };

    // Encode/decode Firestore-safe keys (dates have dashes, which are OK, but prefix for namespace)
    function encodeKey(k) { return 'sleep__' + k.replace(/\//g,'__'); }
    function decodeKey(k) { return k.replace(/^sleep__/, '').replace(/__/g,'/'); }

    // Show UI
    document.getElementById('auth-loading').style.display = 'none';
    document.getElementById('mps-nav').style.display = 'flex';

    // Mount React
    setTimeout(function() {
      if (!window.__SLEEP_MOUNTED) {
        window.__SLEEP_MOUNTED = true;
        // Babel will auto-process the text/babel script
      }
    }, 100);
  });
})();
</script>

<!-- Sleep Tracker React Component -->
<script type="text/babel">
// Destructure from globals (UMD builds)
const { useState, useEffect, useMemo } = React;

const {
  LineChart, Line, BarChart, Bar, XAxis, YAxis,
  Tooltip, ResponsiveContainer, ReferenceLine
} = Recharts;

const {
  Moon, Sun, Activity, Battery, Flame, Plus, Trash2,
  TrendingUp, TrendingDown, Minus, Zap, HeartPulse, Pencil, ChevronDown
} = lucide;

// ============================================================
// STORAGE — delegates to window.storage (Firebase bridge)
// ============================================================
const storage = {
  async get(key) {
    try {
      if (window.storage) {
        const v = await window.storage.get(key);
        return v;
      }
      const v = localStorage.getItem('rr_sleep:' + key);
      return v ? { value: v } : null;
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      if (window.storage) {
        await window.storage.set(key, value);
      }
      localStorage.setItem('rr_sleep:' + key, value);
      return true;
    } catch (e) { return false; }
  },
  async delete(key) {
    try {
      if (window.storage) await window.storage.delete(key);
      localStorage.removeItem('rr_sleep:' + key);
    } catch (e) {}
  },
  async list() {
    try {
      if (window.storage) {
        const keys = await window.storage.list();
        return keys;
      }
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('rr_sleep:')) keys.push(k.slice(9));
      }
      return keys;
    } catch (e) { return []; }
  },
};

export default function SleepTracker() {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [saveError, setSaveError] = useState(null);
  const [saveSuccess, setSaveSuccess] = useState(false);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [expandedMonths, setExpandedMonths] = useState({});
  const [selectedMonth, setSelectedMonth] = useState(null);
  const [monthPickerOpen, setMonthPickerOpen] = useState(false);
  const [form, setForm] = useState(() => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return { date: `${y}-${m}-${day}`, sleepTime: "", wakeTime: "04:00", energy: 7, soreness: 3, clarity: 7, restlessness: 3 };
  });

  useEffect(() => {
    (async () => {
      try {
        const keys = await storage.list();
        const loaded = [];
        for (const k of keys) {
          const value = await storage.get(k);
          if (value) {
            try {
              const raw = typeof value === 'string' ? value : value.value;
              if (!raw) continue;
              const parsed = JSON.parse(raw);
              loaded.push({ ...parsed, energy: parsed.energy ?? 5, clarity: parsed.clarity ?? 5, soreness: parsed.soreness ?? 5, restlessness: parsed.restlessness ?? 3 });
            } catch (e) {}
          }
        }
        loaded.sort((a, b) => a.date.localeCompare(b.date));
        setEntries(loaded);
      } catch (e) { console.error(e); } finally { setLoading(false); }
    })();
  }, []);

  const saveEntry = async () => {
    const entry = { ...form };
    const next = [...entries.filter(e => e.date !== form.date), entry].sort((a, b) => a.date.localeCompare(b.date));
    setEntries(next);
    setShowForm(false);
    setSaveSuccess(true);
    setSaveError(null);
    if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" });
    setTimeout(() => setSaveSuccess(false), 1500);
    const ok = await storage.set(form.date, JSON.stringify(entry));
    if (!ok) setSaveError("Could not persist entry");
  };

  const deleteEntry = async (date) => {
    setEntries(entries.filter(e => e.date !== date));
    await storage.delete(date);
  };

  const editEntry = (entry) => {
    setForm({ date: entry.date, sleepTime: entry.sleepTime || "", wakeTime: entry.wakeTime || "", energy: entry.energy ?? 5, soreness: entry.soreness ?? 5, clarity: entry.clarity ?? 5, restlessness: entry.restlessness ?? 3 });
    setShowForm(true);
    if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const todayStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  };

  const fmt12 = (t) => {
    if (!t) return "";
    const [h, m] = t.split(":").map(Number);
    const period = h >= 12 ? "PM" : "AM";
    const h12 = h % 12 === 0 ? 12 : h % 12;
    return `${h12}:${String(m).padStart(2, "0")} ${period}`;
  };

  const fmtDate = (d) => {
    if (!d) return "";
    const [y, m, day] = d.split("-");
    return `${m}/${day}/${y}`;
  };

  const fmtWeekday = (d) => {
    if (!d) return "";
    const [y, m, day] = d.split("-").map(Number);
    return ["SUN","MON","TUE","WED","THU","FRI","SAT"][new Date(y, m-1, day).getDay()];
  };

  const toDate = (dateStr) => { const [y, m, d] = dateStr.split("-").map(Number); return new Date(y, m-1, d); };
  const startOfWeek = (dateStr) => { const d = toDate(dateStr); const day = d.getDay(); d.setDate(d.getDate()-day); return d; };
  const dateToStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

  const fmtWeekRange = (weekStart) => {
    const end = new Date(weekStart); end.setDate(end.getDate()+6);
    const mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const s = `${mn[weekStart.getMonth()]} ${weekStart.getDate()}`;
    const e = weekStart.getMonth() === end.getMonth() ? `${end.getDate()}` : `${mn[end.getMonth()]} ${end.getDate()}`;
    return `${s} – ${e}`;
  };

  const fmtMonth = (dateStr) => {
    const mn = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const [y, m] = dateStr.split("-").map(Number);
    return `${mn[m-1]} ${y}`;
  };

  const calcHours = (sleep, wake) => {
    if (!sleep || !wake) return 0;
    const [sh, sm] = sleep.split(":").map(Number);
    const [wh, wm] = wake.split(":").map(Number);
    let mins = wh*60+wm-(sh*60+sm);
    if (mins < 0) mins += 24*60;
    return +(mins/60).toFixed(2);
  };

  const calcRecovery = (hours, energy, soreness, clarity, restlessness) => {
    const sleepScore = Math.min(hours/7, 1)*25;
    const energyScore = (energy/10)*20;
    const clarityScore = (clarity/10)*20;
    const soreScore = ((10-soreness)/10)*15;
    const restScore = ((10-restlessness)/10)*20;
    return Math.round(sleepScore+energyScore+clarityScore+soreScore+restScore);
  };

  const enriched = useMemo(() => entries.map(e => {
    const hours = calcHours(e.sleepTime, e.wakeTime);
    const hasSleep = !!e.sleepTime;
    return { ...e, hours: hasSleep ? hours : null, recovery: hasSleep ? calcRecovery(hours, e.energy??5, e.soreness??5, e.clarity??5, e.restlessness??3) : null, label: e.date.slice(5), weekday: (() => { const [yy,mm,dd] = e.date.split("-").map(Number); return ["SUN","MON","TUE","WED","THU","FRI","SAT"][new Date(yy,mm-1,dd).getDay()]; })() };
  }), [entries]);

  const last30 = enriched.slice(-30);
  const last7 = enriched.slice(-7);

  const weekdayMap = useMemo(() => { const m = {}; enriched.forEach(e => { m[e.label] = e.weekday; }); return m; }, [enriched]);

  const avg = (arr, key) => { const vals = arr.map(x => x[key]).filter(v => v !== undefined && v !== null && !isNaN(v)); return vals.length ? +(vals.reduce((s,x) => s+x, 0)/vals.length).toFixed(1) : 0; };

  const stats = { hours: avg(last7,"hours"), energy: avg(last7,"energy"), clarity: avg(last7,"clarity"), soreness: avg(last7,"soreness"), recovery: avg(last7,"recovery") };

  const avgMinutes = (arr, key) => {
    const mins = arr.map(e => e[key]).filter(Boolean).map(t => { const [h, m] = t.split(":").map(Number); return key === "sleepTime" && h < 12 ? h*60+m+24*60 : h*60+m; });
    if (!mins.length) return null;
    const avgVal = mins.reduce((s,x) => s+x, 0)/mins.length;
    const totalMins = Math.round(avgVal) % (24*60);
    return `${String(Math.floor(totalMins/60)).padStart(2,"0")}:${String(totalMins%60).padStart(2,"0")}`;
  };

  const bestDay = (() => { if (!last7.length) return null; const v = last7.filter(e => e.recovery != null); return v.length ? v.reduce((b,e) => e.recovery > b.recovery ? e : b, v[0]) : null; })();
  const worstDay = (() => { if (!last7.length) return null; const v = last7.filter(e => e.recovery != null); return v.length ? v.reduce((w,e) => e.recovery < w.recovery ? e : w, v[0]) : null; })();
  const dayOfWeek = (dateStr) => { const [y,m,d] = dateStr.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("en-US", { weekday: "long" }); };

  const insights = { avgWake: avgMinutes(last7,"wakeTime"), avgSleep: avgMinutes(last7,"sleepTime"), bestDay, worstDay, entryCount: last7.length };

  const trend = (key) => {
    if (last7.length < 4) return "flat";
    const half = Math.floor(last7.length/2);
    const earlier = avg(last7.slice(0,half), key);
    const recent = avg(last7.slice(half), key);
    const diff = recent - earlier;
    if (Math.abs(diff) < 0.3) return "flat";
    return diff > 0 ? "up" : "down";
  };

  const today = enriched.find(e => e.date === todayStr());

  if (loading) {
    return (
      <div style={styles.loading}>
        <div style={{ fontFamily: "Georgia, serif", letterSpacing: "0.3em", color: "#8a7d6b" }}>LOADING</div>
      </div>
    );
  }

  return (
    <div style={styles.page}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700;12..96,800&family=JetBrains+Mono:wght@300;500;700&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; }
        .card { transition: transform 0.2s ease, border-color 0.2s ease; }
        .card:hover { border-color: #c9a86b; }
        .btn-primary:hover { background: #c9a86b !important; color: #0a0a0a !important; }
        .btn-purple:hover { background: #9b6bc9 !important; color: #0a0a0a !important; }
        .btn-ghost:hover { color: #c9a86b !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; }
      `}</style>
      <div style={styles.container}>
        {saveSuccess && (
          <div style={{ background: "rgba(155,107,201,0.15)", border: "1px solid #9b6bc9", color: "#c9a8e8", padding: "12px 16px", marginBottom: 16, fontFamily: "JetBrains Mono, monospace", fontSize: 12, letterSpacing: "0.1em", textAlign: "center" }}>
            ✓ ENTRY SAVED · {entries.length} TOTAL
          </div>
        )}

        <header style={styles.header}>
          <div style={{ width: "100%" }}>
            <div style={styles.mpsLogoWrap}>
              <div style={styles.mpsLogo}>MPS</div>
              <div style={styles.mpsDivider} />
              <div style={styles.mpsTagline}>MODULAR PERFORMANCE SYSTEMS</div>
              <div style={styles.appName}>REST <span style={{ color: "#9b6bc9", textShadow: "0 0 12px rgba(155,107,201,0.55)" }}>&amp;</span> RECOVERY</div>
            </div>
            <div style={styles.subtitle}>{entries.length} {entries.length===1?"entry":"entries"} · tracking since {entries[0]?.date ? fmtDate(entries[0].date) : "today"}</div>
            <div style={styles.actionRow}>
              {activeTab === "dashboard" ? (
                <>
                  <button className="btn-primary" style={styles.btnPrimary} onClick={() => setShowForm(!showForm)}>
                    <Plus size={16} /> {showForm ? "CLOSE" : "LOG ENTRY"}
                  </button>
                  <button className="btn-purple" style={styles.btnPurple} onClick={() => setActiveTab("insights")}>INSIGHTS</button>
                  <button className="btn-purple" style={styles.btnPurple} onClick={() => setActiveTab("log")}>LOG</button>
                </>
              ) : (
                <button className="btn-purple" style={styles.btnPurple} onClick={() => setActiveTab("dashboard")}>← DASHBOARD</button>
              )}
            </div>
          </div>
        </header>

        {showForm && (
          <div style={styles.formCard}>
            <div style={styles.formGrid}>
              <Field label="Date"><input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} style={styles.input} /></Field>
              <Field label="Wake Time"><input type="time" value={form.wakeTime} onChange={e => setForm({...form, wakeTime: e.target.value})} style={styles.input} /></Field>
              <Field label="Sleep Time"><input type="time" value={form.sleepTime} onChange={e => setForm({...form, sleepTime: e.target.value})} style={styles.input} /></Field>
              <Field label={`Energy · ${form.energy}/10`}><input type="range" min="1" max="10" value={form.energy} onChange={e => setForm({...form, energy: +e.target.value})} style={styles.range} /></Field>
              <Field label={`Soreness · ${form.soreness}/10`}><input type="range" min="1" max="10" value={form.soreness} onChange={e => setForm({...form, soreness: +e.target.value})} style={styles.range} /></Field>
              <Field label={`Mental Clarity · ${form.clarity}/10`}><input type="range" min="1" max="10" value={form.clarity} onChange={e => setForm({...form, clarity: +e.target.value})} style={{...styles.range, accentColor: "#9b6bc9"}} /></Field>
              <Field label={`Restlessness · ${form.restlessness}/10`}><input type="range" min="1" max="10" value={form.restlessness} onChange={e => setForm({...form, restlessness: +e.target.value})} style={{...styles.range, accentColor: "#9b6bc9"}} /></Field>
            </div>
            <div style={styles.formFoot}>
              <div style={styles.preview}>
                {form.sleepTime ? (
                  <>Duration: <strong style={{ color: "#9b6bc9" }}>{calcHours(form.sleepTime, form.wakeTime)}h</strong>{" · "}Recovery: <strong style={{ color: "#c9a86b" }}>{calcRecovery(calcHours(form.sleepTime, form.wakeTime), form.energy, form.soreness, form.clarity, form.restlessness)}%</strong></>
                ) : (
                  <span style={{ color: "#8a7d6b", fontStyle: "italic" }}>Sleep time empty — add later to calculate recovery</span>
                )}
              </div>
              <button className="btn-primary" style={styles.btnPrimary} onClick={saveEntry}>SAVE</button>
            </div>
            {saveError && <div style={{ marginTop: 12, padding: 8, background: "#2a1010", border: "1px solid #8b3a3a", color: "#e8a0a0", fontSize: 11 }}>{saveError}</div>}
          </div>
        )}

        {activeTab === "dashboard" && (
          <>
            <section style={styles.todayCard}>
              <div style={styles.eyebrow}>TODAY · {fmtDate(todayStr())}</div>
              {today ? (
                <div style={styles.todayGrid}>
                  <TodayStat icon={<Sun size={14} />} label="Woke" value={today.wakeTime ? fmt12(today.wakeTime) : "—"} accent="#9b6bc9" />
                  <TodayStat icon={<Moon size={14} />} label="Slept" value={today.hours != null ? `${today.hours}h` : "—"} accent="#9b6bc9" />
                  <TodayStat icon={<Zap size={14} />} label="Energy" value={`${today.energy}/10`} />
                  <TodayStat icon={<HeartPulse size={14} />} label="Soreness" value={`${today.soreness}/10`} />
                  <TodayStat icon={<Activity size={14} />} label="Clarity" value={`${today.clarity}/10`} accent="#9b6bc9" />
                  <TodayStat icon={<Battery size={14} />} label="Recovery" value={today.recovery != null ? `${today.recovery}%` : "—"} />
                </div>
              ) : (
                <div style={styles.empty}>No entry yet. Log today.</div>
              )}
            </section>

            <section style={styles.statsRow}>
              <StatBlock label="Avg Sleep" value={`${stats.hours}h`} sub="7-day" trend={trend("hours")} good="up" />
              <StatBlock label="Avg Energy" value={`${stats.energy}/10`} sub="7-day" trend={trend("energy")} good="up" />
              <StatBlock label="Avg Clarity" value={`${stats.clarity}/10`} sub="7-day" trend={trend("clarity")} good="up" />
              <StatBlock label="Avg Soreness" value={`${stats.soreness}/10`} sub="7-day" trend={trend("soreness")} good="down" />
              <StatBlock label="Avg Recovery" value={`${stats.recovery}%`} sub="7-day" trend={trend("recovery")} good="up" />
            </section>

            <section style={styles.chartsGrid}>
              <ChartCard title="Sleep Duration" sub="hours per night · last 30">
                <ResponsiveContainer width="100%" height={200}>
                  <BarChart data={last30}>
                    <XAxis dataKey="label" tick={{ fill: "#6a6258", fontSize: 9 }} axisLine={false} tickLine={false} height={28} />
                    <YAxis tick={{ fill: "#6a6258", fontSize: 9 }} axisLine={false} tickLine={false} />
                    <Tooltip content={<CustomTooltip suffix="h" />} cursor={{ fill: "rgba(155,107,201,0.05)" }} />
                    <ReferenceLine y={7} stroke="#9b6bc9" strokeDasharray="2 4" opacity={0.5} />
                    <Bar dataKey="hours" fill="#9b6bc9" radius={[2,2,0,0]} />
                  </BarChart>
                </ResponsiveContainer>
              </ChartCard>
              <ChartCard title="Recovery Score" sub="% · last 30">
                <ResponsiveContainer width="100%" height={200}>
                  <LineChart data={last30}>
                    <XAxis dataKey="label" tick={{ fill: "#6a6258", fontSize: 9 }} axisLine={false} tickLine={false} height={28} />
                    <YAxis domain={[0,100]} tick={{ fill: "#6a6258", fontSize: 9 }} axisLine={false} tickLine={false} />
                    <Tooltip content={<CustomTooltip suffix="%" />} />
                    <Line type="monotone" dataKey="recovery" stroke="#c9a86b" strokeWidth={2} dot={false} activeDot={{ r: 5, fill: "#f5d895", stroke: "#c9a86b", strokeWidth: 2 }} name="Recovery" />
                  </LineChart>
                </ResponsiveContainer>
              </ChartCard>
              <ChartCard title="Energy vs Soreness" sub="last 30">
                <ResponsiveContainer width="100%" height={200}>
                  <LineChart data={last30}>
                    <XAxis dataKey="label" tick={{ fill: "#6a6258", fontSize: 9 }} axisLine={false} tickLine={false} height={28} />
                    <YAxis domain={[0,10]} tick={{ fill: "#6a6258", fontSize: 9 }} axisLine={false} tickLine={false} />
                    <Tooltip content={<CustomTooltip />} />
                    <Line type="monotone" dataKey="energy" stroke="#c9a86b" strokeWidth={2} dot={false} name="Energy" />
                    <Line type="monotone" dataKey="soreness" stroke="#9b6bc9" strokeWidth={2} dot={false} name="Soreness" />
                  </LineChart>
                </ResponsiveContainer>
                <div style={styles.legend}>
                  <span style={{ color: "#c9a86b" }}>― Energy</span>
                  <span style={{ color: "#9b6bc9" }}>― Soreness</span>
                </div>
              </ChartCard>
            </section>
          </>
        )}

        {activeTab === "insights" && (
          <section style={styles.insightsCard}>
            <div style={styles.eyebrow}>WEEKLY INSIGHTS</div>
            <h2 style={styles.insightsTitle}>This Week</h2>
            {insights.entryCount === 0 ? (
              <div style={styles.empty}>No entries yet. Log a night to see insights.</div>
            ) : (
              <div style={styles.insightsGrid}>
                <InsightRow label="Average wake time" value={insights.avgWake ? fmt12(insights.avgWake) : "—"} accent="#9b6bc9" />
                <InsightRow label="Average bedtime" value={insights.avgSleep ? fmt12(insights.avgSleep) : "—"} accent="#9b6bc9" />
                <InsightRow label="Average duration" value={stats.hours > 0 ? `${stats.hours} hours` : "—"} accent="#9b6bc9" />
                <InsightRow label="Average energy" value={stats.energy > 0 ? `${stats.energy}/10` : "—"} accent="#c9a86b" />
                <InsightRow label="Average clarity" value={stats.clarity > 0 ? `${stats.clarity}/10` : "—"} accent="#9b6bc9" />
                <InsightRow label="Average soreness" value={stats.soreness > 0 ? `${stats.soreness}/10` : "—"} accent="#c9a86b" />
                <InsightRow label="Best recovery day" value={insights.bestDay ? `${dayOfWeek(insights.bestDay.date)} · ${insights.bestDay.recovery}%` : "—"} accent="#c9a86b" />
                <InsightRow label="Lowest recovery day" value={insights.worstDay ? `${dayOfWeek(insights.worstDay.date)} · ${insights.worstDay.recovery}%` : "—"} accent="#c9a86b" />
                <InsightRow label="Tracked nights" value={`${insights.entryCount} of 7`} />
              </div>
            )}
          </section>
        )}

        {activeTab === "log" && (
          <section style={styles.logSection}>
            <div style={styles.logHeader}>
              <div style={styles.eyebrow}>FULL LOG</div>
              <div style={styles.logCount}>{entries.length} ENTRIES</div>
            </div>
            {(() => {
              const todayKey = todayStr();
              const currentWeekStart = dateToStr(startOfWeek(todayKey));
              const sorted = [...enriched].sort((a,b) => b.date.localeCompare(a.date));
              const monthMap = new Map();
              for (const e of sorted) {
                const mk = e.date.slice(0,7);
                if (!monthMap.has(mk)) monthMap.set(mk, []);
                monthMap.get(mk).push(e);
              }
              const currentYear = todayKey.slice(0,4);
              const currentMonthKey = todayKey.slice(0,7);
              const allMonths = [];
              for (let m = 1; m <= 12; m++) {
                const mk = `${currentYear}-${String(m).padStart(2,"0")}`;
                allMonths.push([mk, monthMap.get(mk) || []]);
              }
              const activeMonth = selectedMonth || currentMonthKey;
              const activeMonthEntries = monthMap.get(activeMonth) || [];
              const weekMap = new Map();
              for (const e of activeMonthEntries) {
                const wk = dateToStr(startOfWeek(e.date));
                if (!weekMap.has(wk)) weekMap.set(wk, []);
                weekMap.get(wk).push(e);
              }
              return (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  <div style={{ position: "relative" }}>
                    <button style={styles.monthHeaderButton} onClick={() => setMonthPickerOpen(!monthPickerOpen)}>
                      <span style={styles.monthHeaderText}>{fmtMonth(activeMonth + "-01")}</span>
                      <span style={styles.monthHeaderMeta}>
                        <span style={styles.monthCount}>{activeMonthEntries.length === 0 ? "—" : `${activeMonthEntries.length} entries`}</span>
                        <ChevronDown size={18} style={{ transform: monthPickerOpen ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s ease", color: "#9b6bc9" }} />
                      </span>
                    </button>
                    {monthPickerOpen && (
                      <div style={styles.monthDropdown}>
                        {allMonths.map(([mk, me]) => (
                          <button key={mk} style={{ ...styles.monthDropdownItem, ...(mk === activeMonth ? styles.monthDropdownItemActive : {}), ...(me.length === 0 ? { opacity: 0.5 } : {}) }} onClick={() => { setSelectedMonth(mk); setMonthPickerOpen(false); }}>
                            <span>{fmtMonth(mk + "-01")}</span>
                            <span style={styles.monthCount}>{me.length === 0 ? "—" : me.length}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                  {activeMonthEntries.length === 0 ? (
                    <div style={styles.emptyMonth}>No entries this month yet.</div>
                  ) : (
                    [...weekMap.entries()].map(([weekKey, weekEntries]) => {
                      const isCurWeek = weekKey === currentWeekStart;
                      return (
                        <div key={weekKey} style={{ ...styles.weekGroup, ...(isCurWeek ? styles.weekGroupCurrent : {}) }}>
                          <div style={styles.weekHeader}>
                            <span style={isCurWeek ? styles.weekLabelCurrent : styles.weekLabel}>WEEK OF {fmtWeekRange(toDate(weekKey))}</span>
                            {isCurWeek && <span style={styles.currentBadge}>CURRENT</span>}
                          </div>
                          <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                            {weekEntries.map(e => {
                              const isToday = e.date === todayKey;
                              return (
                                <div key={e.date} style={{ ...styles.logEntry, ...(isToday ? styles.logEntryToday : {}) }}>
                                  <div style={styles.logEntryHead}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                      <div style={isToday ? styles.logEntryDateToday : styles.logEntryDate}>
                                        {fmtDate(e.date)}
                                        <span style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 11, color: "#c9a86b", letterSpacing: "0.12em", marginLeft: 10, fontWeight: 600 }}>{fmtWeekday(e.date)}</span>
                                      </div>
                                      {isToday && <span style={styles.todayBadge}>TODAY</span>}
                                    </div>
                                    <div style={{ display: "flex", gap: 8 }}>
                                      <button className="btn-ghost" style={styles.btnGhost} onClick={() => editEntry(e)}><Pencil size={14} /></button>
                                      <button className="btn-ghost" style={styles.btnGhost} onClick={() => deleteEntry(e.date)}><Trash2 size={14} /></button>
                                    </div>
                                  </div>
                                  <div style={styles.logEntryRow1}>
                                    <LogStat label="WAKE" value={e.wakeTime ? fmt12(e.wakeTime) : "—"} />
                                    <LogStat label="SLEEP" value={e.sleepTime ? fmt12(e.sleepTime) : "—"} />
                                    <LogStat label="DURATION" value={e.hours != null ? `${e.hours}h` : "—"} accent="#9b6bc9" />
                                  </div>
                                  <div style={styles.logEntryRow2}>
                                    <LogStat label="RECOVERY" value={e.recovery != null ? `${e.recovery}%` : "—"} accent="#c9a86b" />
                                    <LogStat label="ENERGY" value={`${e.energy ?? "—"}/10`} />
                                    <LogStat label="SORENESS" value={`${e.soreness ?? "—"}/10`} />
                                    <LogStat label="CLARITY" value={`${e.clarity ?? "—"}/10`} accent="#9b6bc9" />
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
              );
            })()}
          </section>
        )}

        <footer style={styles.footer}>
          <div>SLEEP × RECOVERY · OPERATOR'S LOG</div>
          <div>v1.0</div>
        </footer>
      </div>
    </div>
  );
}

}

    </div>

}

function InsightRow({ label, value, accent }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", background: "#161616", border: "1.5px solid #3a3a3a", borderRadius: 4, marginBottom: 10 }}>

    </div>
  );
}

function StatBlock({ label, value, sub, trend, good }) {
  const isGood = (trend === "up" && good === "up") || (trend === "down" && good === "down");
  const isBad = (trend === "down" && good === "up") || (trend === "up" && good === "down");
  const color = isGood ? "#7a9b6e" : isBad ? "#8b3a3a" : "#6a6258";
  const Icon = trend === "up" ? TrendingUp : trend === "down" ? TrendingDown : Minus;
  return (
    <div className="card" style={styles.statBlock}>
      <div style={styles.statLabel}>{label}</div>
      <div style={styles.statValue}>{value}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, color }}>
        <Icon size={12} />
        <span style={{ fontSize: 10, fontFamily: "JetBrains Mono, monospace", letterSpacing: "0.1em" }}>{sub}</span>
      </div>
    </div>
  );
}

function ChartCard({ title, sub, children }) {
  return (
    <div className="card" style={styles.chartCard}>
      <div style={styles.chartHead}>
        <div style={styles.chartTitle}>{title}</div>
        <div style={styles.chartSub}>{sub}</div>
      </div>
      {children}
    </div>
  );
}

function CustomTooltip({ active, payload, label, suffix = "" }) {
  if (!active || !payload?.length) return null;
  const seen = new Set();
  const filtered = payload.filter(p => { if (!p.name) return false; const k = p.name.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; });
  if (!filtered.length) return null;
  return (
    <div style={{ background: "#0a0a0a", border: "1px solid #2a2a2a", padding: "8px 12px", fontFamily: "JetBrains Mono, monospace", fontSize: 11 }}>
      <div style={{ color: "#6a6258", marginBottom: 4 }}>{label}</div>
      {filtered.map((p, i) => <div key={i} style={{ color: p.color }}>{p.name}: {p.value}{suffix}</div>)}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SleepTracker />);
  } else {
    setTimeout(tryMount, 100);
  }
}
