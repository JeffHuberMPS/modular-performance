<!-- ── Firebase Auth + Firestore bridge ── -->
<script>
(function() {
  'use strict';

  // Auth guard — redirects if not signed in
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof MPS_GUARD !== 'undefined') MPS_GUARD.protect('sleep');
  });

  firebase.auth().onAuthStateChanged(function(user) {
    if (!user) return; // auth-guard handles redirect

    var uid  = user.uid;
    var db   = firebase.firestore();
    var COLL = 'users/' + uid + '/sleep_entries';

    // window.storage — LOCAL-FIRST persistence (data-loss fix).
    // BUG (fixed here): the component's `storage` identifier resolves to THIS window.storage at
    // runtime, and it used to write to a users/{uid}/sleep_entries Firestore subcollection that
    // NOTHING read back. Restore-on-open, the live two-way sync, and the Home dashboard all read
    // localStorage rr_sleep:* + the settings/sleep_backup doc — never that subcollection. So every
    // saved entry silently vanished on refresh. Now every write goes to localStorage rr_sleep:* and
    // triggers the sleep_backup cloud mirror (the same durable system every other pillar uses).
    var _slpK = function(key){ return 'rr_sleep:' + key; };
    // ===== DELETION TOMBSTONES =====
    // The cloud mirror is an ADDITIVE UNION, so a plain removeItem could never stick: the backup
    // re-merged the still-present cloud copy and the live watcher wrote it straight back, so a
    // deleted entry reappeared within a second on the SAME device. A tombstone records what was
    // deliberately deleted and when. It travels with the backup like any other key and is honoured
    // by both the merge and the watcher.
    //   value > 0  -> deleted at that moment
    //   value < 0  -> re-saved (revived) at that moment
    // The union keeps whichever action happened LAST, so "delete, then log that date again" resolves
    // correctly even across devices. Pruned after 90 days so the map cannot grow without bound.
    var _TOMB_KEY = 'rr_sleep:__tombstones';
    var _TOMB_TTL = 90*24*60*60*1000;
    function _tParse(raw){ try{ var o=JSON.parse(raw||'{}'); return (o&&typeof o==='object'&&!Array.isArray(o))?o:{}; }catch(e){ return {}; } }
    function _tLocal(){ try{ return _tParse(localStorage.getItem(_TOMB_KEY)); }catch(e){ return {}; } }
    function _tFrom(map){ return _tParse(map && map[_TOMB_KEY]); }
    function _tPrune(t,nowTs){ var cut=(nowTs||Date.now())-_TOMB_TTL,o={},k,v; for(k in t){ v=+t[k]; if(v && Math.abs(v)>cut) o[k]=v; } return o; }
    function _tUnion(a,b){ var o={},k; for(k in a) o[k]=a[k]; for(k in b){ if(o[k]===undefined || Math.abs(b[k])>Math.abs(o[k])) o[k]=b[k]; } return o; }
    function _tDead(t,k){ return (+t[k]||0) > 0; }
    function _tSave(t){ try{ localStorage.setItem(_TOMB_KEY, JSON.stringify(t)); }catch(e){} }
    window.storage = {
      get: function(key) {
        try { return Promise.resolve(localStorage.getItem(_slpK(key))); }
        catch(e){ return Promise.resolve(null); }
      },
      set: function(key, value) {
        var wrote = false, fk = _slpK(key);
        // Record a revival so this save outranks any older delete still sitting in the cloud.
        try { var t=_tLocal(); t[fk]=-Date.now(); _tSave(_tPrune(t)); } catch(e){}
        try { localStorage.setItem(fk, value); wrote = true; } catch(e){}
        try {
          if (wrote) { window.sleepScheduleBackup && window.sleepScheduleBackup(); window.sleepBackupNow && window.sleepBackupNow(); }
          else { window.sleepCloudSet && window.sleepCloudSet(fk, value); }   // local blocked/full -> save straight to the cloud
        } catch(e){}
        return Promise.resolve(true);
      },
      delete: function(key) {
        var fk = _slpK(key);
        try { localStorage.removeItem(fk); } catch(e){}
        try { var t=_tLocal(); t[fk]=Date.now(); _tSave(_tPrune(t)); } catch(e){}
        try { window.sleepScheduleBackup && window.sleepScheduleBackup(); window.sleepBackupNow && window.sleepBackupNow(); } catch(e){}
        return Promise.resolve();
      },
      list: function() {
        var keys = [];
        try {
          for (var i=0;i<localStorage.length;i++){
            var k = localStorage.key(i);
            if (k && k.indexOf('rr_sleep:')===0 && k !== 'rr_sleep:wearable_interest' && k !== _TOMB_KEY) keys.push(k.slice('rr_sleep:'.length));
          }
        } catch(e){}
        return Promise.resolve(keys);
      }
    };

    // ===== SILENT CLOUD BACKUP (sleep) =====
    // Mirrors the app's localStorage (rr_sleep:*) to users/{uid}/settings/sleep_backup
    // (an allowed Firestore location) so data follows the user across devices.
    // Restores automatically on a fresh device. Fire-and-forget — never blocks UI.
    var _bDoc = db.doc('users/' + uid + '/settings/sleep_backup');
    function _bMatch(k){ return !!k && k.indexOf('rr_sleep:') === 0; }
    function _bCollect(){ var d={}; try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(_bMatch(k)) d[k]=localStorage.getItem(k); } }catch(e){} return d; }
    function _bHasLocal(){ try{ for(var i=0;i<localStorage.length;i++){ if(_bMatch(localStorage.key(i))) return true; } }catch(e){} return false; }
    var _bTimer=null,_bBusy=false;
    window.sleepScheduleBackup = function(){ if(_bTimer) clearTimeout(_bTimer); _bTimer=setTimeout(_bNow,700); };
    var _TS_KEY='sleep_synced_ts';   // ts of the cloud state this device is synced to (enables safe delete propagation)
    function _bNow(){ if(_bBusy) return; var _data=_bCollect();
      // NEVER back up an empty state — writing {} would wipe the cloud (and, via sync, every device).
      if(!Object.keys(_data).length) return;
      _bBusy=true; var _ts=Date.now();
      // ADDITIVE UNION: MERGE with the cloud so a backup NEVER removes entries another device added.
      // We do NOT advance _synced_ts here on purpose — the live watcher then pulls any cloud-only
      // entries into this device and refreshes, so every device converges to the SAME full set.
      try{ _bDoc.get().then(function(s){
        var cloud=(s.exists&&s.data()&&s.data().data)?s.data().data:{}, merged={}, k;
        for(k in cloud) merged[k]=cloud[k];      // keep every device's existing entries
        for(k in _data) merged[k]=_data[k];      // this device's values win for the keys it holds
        // HONOUR DELETIONS: union both tombstone maps, drop everything still marked deleted, and
        // carry the map forward so other devices delete it too. Without this the union silently
        // resurrected whatever this device had just deleted.
        var _tomb=_tPrune(_tUnion(_tFrom(cloud), _tFrom(_data)), _ts);
        for(k in _tomb){ if(k!==_TOMB_KEY && _tDead(_tomb,k)) delete merged[k]; }
        merged[_TOMB_KEY]=JSON.stringify(_tomb);
        _tSave(_tomb);
        _bDoc.set({data:merged,ts:_ts,v:1}).then(function(){ _bBusy=false; }).catch(function(){_bBusy=false;});
      }).catch(function(){ // read failed → plain write (still never empty, never loses this device's data)
        _bDoc.set({data:_data,ts:_ts,v:1}).then(function(){ try{localStorage.setItem(_TS_KEY,String(_ts));}catch(e){} _bBusy=false; }).catch(function(){_bBusy=false;});
      }); }catch(e){_bBusy=false;} }
    // Flush any pending backup the instant the app is hidden or closing. Mobile pauses/kills timers
    // when you background or leave the app, which was dropping just-saved entries before the debounce
    // fired -- so they never reached the cloud. This makes saves durable across devices.
    var _bFlush=function(){ if(_bTimer){ clearTimeout(_bTimer); _bTimer=null; } _bNow(); };
    window.sleepBackupNow = _bFlush;   // every save calls this -> immediate cloud sync, every time
    // If localStorage is unavailable on this device (full, or blocked in the mobile iframe), save the
    // entry STRAIGHT to the cloud so nothing is ever lost. Merges a single key into the backup doc.
    window.sleepCloudSet = function(fullKey, value){ try{ _bDoc.get().then(function(s){ var d=(s.exists&&s.data()&&s.data().data)?s.data().data:{}; d[fullKey]=value; var ts=Date.now(); _bDoc.set({data:d,ts:ts,v:1}).then(function(){ try{localStorage.setItem(_TS_KEY,String(ts));}catch(e){} }); }); }catch(e){} };
    try{ document.addEventListener("visibilitychange", function(){ if(document.visibilityState==="hidden") _bFlush(); }); window.addEventListener("pagehide", _bFlush); }catch(e){}
    function _bRestoreIfEmpty(){ if(_bHasLocal()) return Promise.resolve(false); return _bDoc.get().then(function(s){ if(s.exists&&s.data()&&s.data().data){ var d=s.data().data,ks=Object.keys(d); if(!ks.length) return false; var _tomb=_tPrune(_tFrom(d)); ks.forEach(function(k){ if(k===_TOMB_KEY||!_tDead(_tomb,k)){ try{localStorage.setItem(k,d[k]);}catch(e){} } }); return _bHasLocal(); } return false; }).catch(function(){return false;}); }
    // ===== LIVE TWO-WAY ADDITIVE SYNC (sleep) =====
    // ts-gated: a NEWER cloud state applies adds/edits ONLY (never deletions). Every device converges
    // to the UNION of all entries, so a cross-device mismatch can never delete your data.
    function _bWatchLive(){ try{ _bDoc.onSnapshot(function(s){
      if(!s.exists||!s.data()) return;
      var d=(s.data().data)||{};
      var cloudTs=s.data().ts||0;
      var localTs=0; try{ localTs=parseInt(localStorage.getItem(_TS_KEY)||'0',10)||0; }catch(e){}
      if(cloudTs<=localTs) return;           // our own write or older → ignore
      // HONOUR DELETIONS FIRST: union the tombstone maps, persist them, and drop anything still
      // marked deleted from this device. A tombstoned key must never be re-applied from the cloud.
      var _tomb=_tPrune(_tUnion(_tLocal(), _tFrom(d)));
      _tSave(_tomb);
      Object.keys(_tomb).forEach(function(k){ if(k!==_TOMB_KEY && _tDead(_tomb,k)){ try{ localStorage.removeItem(k); }catch(e){} } });
      var localKeys=[]; try{ for(var i=0;i<localStorage.length;i++){ var lk=localStorage.key(i); if(_bMatch(lk)) localKeys.push(lk); } }catch(e){}
      // A key missing from the cloud WITHOUT a tombstone is suspicious (a corrupt or empty cloud) and
      // the safety net below still protects it. A tombstoned one is a real delete, so it is not counted.
      var deletions=localKeys.filter(function(k){ return !(k in d) && !_tDead(_tomb,k); });
      var cloudCount=Object.keys(d).filter(_bMatch).length;
      // SAFETY: an empty (or delete-everything) cloud is a BAD state, never a real user action. Never
      // let it delete your local data. Keep local, re-upload it to heal the cloud, and still apply any
      // genuine adds the cloud may also have.
      var unsafe = deletions.length && (cloudCount===0 || deletions.length===localKeys.length);
      try{ localStorage.setItem(_TS_KEY, String(cloudTs)); }catch(e){}
      if(unsafe){ Object.keys(d).forEach(function(k){ if(k===_TOMB_KEY||!_tDead(_tomb,k)){ try{ localStorage.setItem(k,d[k]); }catch(e){} } }); try{ window.sleepScheduleBackup && window.sleepScheduleBackup(); }catch(e){} return; }
      // ADDITIVE: apply only adds/edits from the cloud; NEVER remove a local entry just because a
      // newer cloud snapshot is missing it — that cross-device delete-propagation is what lost data.
      // Both devices converge to the UNION of all entries; explicit deletes are handled on-device.
      var changed = false;
      for(var ck in d){ if(_bMatch(ck) && ck!==_TOMB_KEY && !_tDead(_tomb,ck) && localStorage.getItem(ck)!==d[ck]) changed=true; }   // an add/edit?
      if(!changed) return;
      Object.keys(d).forEach(function(k){ if(k!==_TOMB_KEY && !_tDead(_tomb,k)){ try{ localStorage.setItem(k,d[k]); }catch(e){} } });   // apply adds/edits only
      // The data is already applied above. The reload only exists to re-render from localStorage,
      // so it must never yank you out of the pillar mid-use. Recovery was the ONLY pillar without a
      // guard here (Expenses has had one), and because the additive backup deliberately does not
      // advance synced_ts, every save produced a newer snapshot and therefore a reload. That is why
      // the page kept jumping to the top while you were reading a chart.
      //   settle  - never reload in the first 6s after load
      //   throttle- at most one reload per 15s
      //   restore - remember scrollY and put you back where you were
      try{
        if(performance.now() < 6000) return;
        var _last=parseInt(sessionStorage.getItem('sleep_last_reload')||'0',10)||0;
        if(Date.now()-_last < 15000) return;
        sessionStorage.setItem('sleep_last_reload', String(Date.now()));
        var _se=document.scrollingElement||document.documentElement;
        sessionStorage.setItem('sleep_scroll', String(_se?_se.scrollTop:0));
      }catch(e){}
      location.reload();
    }); }catch(e){} }

    // KEEP THE PAGE STILL WHEN A DROPDOWN CLOSES.
    // Root cause: closing a <details> removes a few hundred px of content. If you were scrolled below
    // that content, the page becomes shorter than your scroll position and the browser CLAMPS
    // scrollTop, which on a short-ish page dumps you at the very top. Toggling via the .open property
    // does not do this because there's no timing gap; a real click does, which is why it only bit on
    // real use and my synthetic tests missed it.
    // Fix: record the scroll position the instant the summary is pressed (pointerdown/keydown, BEFORE
    // the collapse), then on the resulting `toggle` restore that ABSOLUTE position, clamped to the new
    // maximum, synchronously and again after two frames so nothing can beat it. Absolute (not a delta)
    // means it can never over-correct the way the reverted v425 version did.
    (function(){
      var saved = null;
      function arm(ev){
        try {
          var s = ev.target && ev.target.closest ? ev.target.closest('summary') : null;
          if (!s) { saved = null; return; }
          var se = document.scrollingElement || document.documentElement;
          saved = se ? se.scrollTop : null;
        } catch(e){ saved = null; }
      }
      document.addEventListener('pointerdown', arm, true);
      document.addEventListener('keydown', function(ev){ if (ev.key === 'Enter' || ev.key === ' ') arm(ev); }, true);
      document.addEventListener('toggle', function(){
        if (saved === null) return;
        var want = saved; saved = null;
        function put(){
          try {
            var se = document.scrollingElement || document.documentElement;
            if (!se) return;
            var max = Math.max(0, se.scrollHeight - se.clientHeight);
            var target = Math.min(want, max);
            if (se.scrollTop !== target) se.scrollTop = target;
          } catch(e){}
        }
        put();                                                         // before paint
        requestAnimationFrame(function(){ put(); requestAnimationFrame(put); });   // and after layout settles
      }, true);
    })();

    // Put the page back where it was after a sync reload, so a background sync is invisible
    // instead of throwing you to the top of the pillar.
    try{
      var _sy=parseInt(sessionStorage.getItem('sleep_scroll')||'-1',10);
      if(_sy>=0){
        sessionStorage.removeItem('sleep_scroll');
        window.addEventListener('load', function(){
          setTimeout(function(){ try{ var e=document.scrollingElement||document.documentElement; if(e) e.scrollTop=_sy; }catch(err){} }, 60);
        });
      }
    }catch(e){}

    // Restore first (download on fresh device), then reveal; seed cloud on open.
    var _revealed=false;
    function _reveal(){ if(_revealed) return; _revealed=true; document.getElementById('auth-loading').style.display='none'; document.getElementById('root').style.display='block'; window.sleepScheduleBackup(); _bWatchLive(); }
    setTimeout(_reveal, 3000);   // safety: never stay stuck on the loading screen
    var _bDidReload=false; try{ _bDidReload = sessionStorage.getItem('sleep_restored')==='1'; }catch(e){}
    _bRestoreIfEmpty().then(function(restored){ if(restored && !_bDidReload){ try{ sessionStorage.setItem('sleep_restored','1'); }catch(e){} location.reload(); return; } _reveal(); });
  });
})();
</script>

<script id="sleep-app">

/* ── CDN Globals ── */
const {
  useState,
  useEffect,
  useMemo
} = React;

/* ── Gray/Gold theme (Free/Medium): purple → white, gold stays gold. __GRAY reads parent tier. ── */
const __GRAY = (() => {
  try {
    return !!(window.parent && window.parent !== window && window.parent.document.body.classList.contains('tier-mono'));
  } catch (e) {
    return false;
  }
})();
const __CORE = (() => {
  try {
    return !!(window.parent && window.parent !== window && window.parent.document.body.classList.contains('tier-core'));
  } catch (e) {
    return false;
  }
})();
// Premium = full history. Core/Elite see only the last 60 days of the log list (stats/charts unaffected).
const __PREMIUM = (() => {
  try {
    return !!(window.parent && window.parent !== window && window.parent.document.body.classList.contains('tier-premium'));
  } catch (e) {
    return false;
  }
})();
const HISTORY_CAP_CUTOFF = (() => {
  const d = new Date();
  d.setDate(d.getDate() - 60);
  d.setHours(0, 0, 0, 0);
  const m = String(d.getMonth() + 1).padStart(2, '0'),
    day = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + m + '-' + day;
