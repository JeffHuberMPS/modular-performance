<!-- ── Firebase Auth + Firestore bridge ── -->
<script>
(function() {
  'use strict';

  // Auth guard — redirects if not signed in
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof MPS_GUARD !== 'undefined') MPS_GUARD.protect('sleep');
  });

  firebase.auth().onAuthStateChanged(function(user) {
    if (!user) return; // auth-guard handles redirect

    var uid  = user.uid;
    var db   = firebase.firestore();
    var COLL = 'users/' + uid + '/sleep_entries';

    // window.storage — LOCAL-FIRST persistence (data-loss fix).
    // BUG (fixed here): the component's `storage` identifier resolves to THIS window.storage at
    // runtime, and it used to write to a users/{uid}/sleep_entries Firestore subcollection that
    // NOTHING read back. Restore-on-open, the live two-way sync, and the Home dashboard all read
    // localStorage rr_sleep:* + the settings/sleep_backup doc — never that subcollection. So every
    // saved entry silently vanished on refresh. Now every write goes to localStorage rr_sleep:* and
    // triggers the sleep_backup cloud mirror (the same durable system every other pillar uses).
    var _slpK = function(key){ return 'rr_sleep:' + key; };
    window.storage = {
      get: function(key) {
        try { return Promise.resolve(localStorage.getItem(_slpK(key))); }
        catch(e){ return Promise.resolve(null); }
      },
      set: function(key, value) {
        var wrote = false;
        try { localStorage.setItem(_slpK(key), value); wrote = true; } catch(e){}
        try {
          if (wrote) { window.sleepScheduleBackup && window.sleepScheduleBackup(); window.sleepBackupNow && window.sleepBackupNow(); }
          else { window.sleepCloudSet && window.sleepCloudSet(_slpK(key), value); }   // local blocked/full -> save straight to the cloud
        } catch(e){}
        return Promise.resolve(true);
      },
      delete: function(key) {
        try { localStorage.removeItem(_slpK(key)); } catch(e){}
        try { window.sleepScheduleBackup && window.sleepScheduleBackup(); window.sleepBackupNow && window.sleepBackupNow(); } catch(e){}
        return Promise.resolve();
      },
      list: function() {
        var keys = [];
        try {
          for (var i=0;i<localStorage.length;i++){
            var k = localStorage.key(i);
            if (k && k.indexOf('rr_sleep:')===0 && k !== 'rr_sleep:wearable_interest') keys.push(k.slice('rr_sleep:'.length));
          }
        } catch(e){}
        return Promise.resolve(keys);
      }
    };

    // ===== SILENT CLOUD BACKUP (sleep) =====
    // Mirrors the app's localStorage (rr_sleep:*) to users/{uid}/settings/sleep_backup
    // (an allowed Firestore location) so data follows the user across devices.
    // Restores automatically on a fresh device. Fire-and-forget — never blocks UI.
    var _bDoc = db.doc('users/' + uid + '/settings/sleep_backup');
    function _bMatch(k){ return !!k && k.indexOf('rr_sleep:') === 0; }
    function _bCollect(){ var d={}; try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(_bMatch(k)) d[k]=localStorage.getItem(k); } }catch(e){} return d; }
    function _bHasLocal(){ try{ for(var i=0;i<localStorage.length;i++){ if(_bMatch(localStorage.key(i))) return true; } }catch(e){} return false; }
    var _bTimer=null,_bBusy=false;
    window.sleepScheduleBackup = function(){ if(_bTimer) clearTimeout(_bTimer); _bTimer=setTimeout(_bNow,700); };
    var _TS_KEY='sleep_synced_ts';   // ts of the cloud state this device is synced to (enables safe delete propagation)
    function _bNow(){ if(_bBusy) return; var _data=_bCollect();
      // NEVER back up an empty state — writing {} would wipe the cloud (and, via sync, every device).
      if(!Object.keys(_data).length) return;
      _bBusy=true; var _ts=Date.now();
      // ADDITIVE UNION: MERGE with the cloud so a backup NEVER removes entries another device added.
      // We do NOT advance _synced_ts here on purpose — the live watcher then pulls any cloud-only
      // entries into this device and refreshes, so every device converges to the SAME full set.
      try{ _bDoc.get().then(function(s){
        var cloud=(s.exists&&s.data()&&s.data().data)?s.data().data:{}, merged={}, k;
        for(k in cloud) merged[k]=cloud[k];      // keep every device's existing entries
        for(k in _data) merged[k]=_data[k];      // this device's values win for the keys it holds
        _bDoc.set({data:merged,ts:_ts,v:1}).then(function(){ _bBusy=false; }).catch(function(){_bBusy=false;});
      }).catch(function(){ // read failed → plain write (still never empty, never loses this device's data)
        _bDoc.set({data:_data,ts:_ts,v:1}).then(function(){ try{localStorage.setItem(_TS_KEY,String(_ts));}catch(e){} _bBusy=false; }).catch(function(){_bBusy=false;});
      }); }catch(e){_bBusy=false;} }
    // Flush any pending backup the instant the app is hidden or closing. Mobile pauses/kills timers
    // when you background or leave the app, which was dropping just-saved entries before the debounce
    // fired -- so they never reached the cloud. This makes saves durable across devices.
    var _bFlush=function(){ if(_bTimer){ clearTimeout(_bTimer); _bTimer=null; } _bNow(); };
    window.sleepBackupNow = _bFlush;   // every save calls this -> immediate cloud sync, every time
    // If localStorage is unavailable on this device (full, or blocked in the mobile iframe), save the
    // entry STRAIGHT to the cloud so nothing is ever lost. Merges a single key into the backup doc.
    window.sleepCloudSet = function(fullKey, value){ try{ _bDoc.get().then(function(s){ var d=(s.exists&&s.data()&&s.data().data)?s.data().data:{}; d[fullKey]=value; var ts=Date.now(); _bDoc.set({data:d,ts:ts,v:1}).then(function(){ try{localStorage.setItem(_TS_KEY,String(ts));}catch(e){} }); }); }catch(e){} };
    try{ document.addEventListener("visibilitychange", function(){ if(document.visibilityState==="hidden") _bFlush(); }); window.addEventListener("pagehide", _bFlush); }catch(e){}
    function _bRestoreIfEmpty(){ if(_bHasLocal()) return Promise.resolve(false); return _bDoc.get().then(function(s){ if(s.exists&&s.data()&&s.data().data){ var d=s.data().data,ks=Object.keys(d); if(!ks.length) return false; ks.forEach(function(k){ try{localStorage.setItem(k,d[k]);}catch(e){} }); return _bHasLocal(); } return false; }).catch(function(){return false;}); }
    // ===== LIVE TWO-WAY ADDITIVE SYNC (sleep) =====
    // ts-gated: a NEWER cloud state applies adds/edits ONLY (never deletions). Every device converges
    // to the UNION of all entries, so a cross-device mismatch can never delete your data.
    function _bWatchLive(){ try{ _bDoc.onSnapshot(function(s){
      if(!s.exists||!s.data()) return;
      var d=(s.data().data)||{};
      var cloudTs=s.data().ts||0;
      var localTs=0; try{ localTs=parseInt(localStorage.getItem(_TS_KEY)||'0',10)||0; }catch(e){}
      if(cloudTs<=localTs) return;           // our own write or older → ignore
      var localKeys=[]; try{ for(var i=0;i<localStorage.length;i++){ var lk=localStorage.key(i); if(_bMatch(lk)) localKeys.push(lk); } }catch(e){}
      var deletions=localKeys.filter(function(k){ return !(k in d); });
      var cloudCount=Object.keys(d).filter(_bMatch).length;
      // SAFETY: an empty (or delete-everything) cloud is a BAD state, never a real user action. Never
      // let it delete your local data. Keep local, re-upload it to heal the cloud, and still apply any
      // genuine adds the cloud may also have.
      var unsafe = deletions.length && (cloudCount===0 || deletions.length===localKeys.length);
      try{ localStorage.setItem(_TS_KEY, String(cloudTs)); }catch(e){}
      if(unsafe){ Object.keys(d).forEach(function(k){ try{ localStorage.setItem(k,d[k]); }catch(e){} }); try{ window.sleepScheduleBackup && window.sleepScheduleBackup(); }catch(e){} return; }
      // ADDITIVE: apply only adds/edits from the cloud; NEVER remove a local entry just because a
      // newer cloud snapshot is missing it — that cross-device delete-propagation is what lost data.
      // Both devices converge to the UNION of all entries; explicit deletes are handled on-device.
      var changed = false;
      for(var ck in d){ if(_bMatch(ck) && localStorage.getItem(ck)!==d[ck]) changed=true; }   // an add/edit?
      if(!changed) return;
      Object.keys(d).forEach(function(k){ try{ localStorage.setItem(k,d[k]); }catch(e){} });   // apply adds/edits only
      location.reload();
    }); }catch(e){} }

    // Restore first (download on fresh device), then reveal; seed cloud on open.
    var _revealed=false;
    function _reveal(){ if(_revealed) return; _revealed=true; document.getElementById('auth-loading').style.display='none'; document.getElementById('root').style.display='block'; window.sleepScheduleBackup(); _bWatchLive(); }
    setTimeout(_reveal, 3000);   // safety: never stay stuck on the loading screen
    var _bDidReload=false; try{ _bDidReload = sessionStorage.getItem('sleep_restored')==='1'; }catch(e){}
    _bRestoreIfEmpty().then(function(restored){ if(restored && !_bDidReload){ try{ sessionStorage.setItem('sleep_restored','1'); }catch(e){} location.reload(); return; } _reveal(); });
  });
})();
</script>
